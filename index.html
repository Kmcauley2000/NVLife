function upChar(){
  const tab=$('char-tab');if(!S)return;tab.innerHTML='';

  // Profile
  const prof=el('div','cd');
  prof.innerHTML=`<div style="display:flex;align-items:center;gap:10px">
  <div style="font-size:36px">${S.isMale?'👨':'👩'}</div>
  <div style="flex:1"><div style="font-size:15px;font-weight:bold;color:var(--amber)">${S.name}</div>
  <div style="font-size:10px;color:var(--muted)">Level ${S.level} ${S.class} · Age ${S.age} · Day ${S.days}</div>
  <div style="font-size:10px;color:var(--muted)">Karma: <span style="color:${S.karma>0?'var(--green)':S.karma<0?'var(--red)':'var(--muted)'}">${S.karma>0?'Good':S.karma<0?'Evil':'Neutral'} (${S.karma})</span></div></div></div>`;
  tab.appendChild(prof);

  // HP/AP/XP bars
  const bars=el('div','cd');
  bars.innerHTML=`<div style="font-size:10px;margin-bottom:2px">❤ HP ${S.hp}/${S.maxHp}</div>
  <div class="hb"><div class="hf hp" style="width:${hpPct(S.hp,S.maxHp)}%"></div></div>
  <div style="font-size:10px;margin:4px 0 2px">⚡ AP ${S.ap}/${S.maxAp}</div>
  <div class="hb"><div class="hf ap" style="width:${hpPct(S.ap,S.maxAp)}%"></div></div>
  <div style="font-size:10px;margin:4px 0 2px">⭐ XP ${S.xp}/${xpNeed(S.level)}</div>
  <div class="hb"><div class="hf xp" style="width:${hpPct(S.xp,xpNeed(S.level))}%"></div></div>`;
  tab.appendChild(bars);

  // SPECIAL
  tab.appendChild(el('div','sh','S.P.E.C.I.A.L.'));
  const sp=el('div','cd');
  let spHtml='';
  S.special.forEach((v,i)=>{
    spHtml+=`<div class="sp-bar"><div class="sp-label">${SPECIAL_LABELS[i]}</div>
    <div style="font-size:10px;color:var(--muted);width:70px">${SPECIAL_NAMES[i]}</div>
    <div class="sp-fill-bg"><div class="sp-fill" style="width:${v*10}%"></div></div>
    <div class="sp-val">${v}</div></div>`;
  });
  sp.innerHTML=spHtml;
  tab.appendChild(sp);

  // Combat stats
  tab.appendChild(el('div','sh','Combat'));
  tab.appendChild(el('div','cd',`<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px">
  <div>⚔ ATK: <b style="color:var(--green)">${atkPow()}</b></div>
  <div>🛡 DEF: <b style="color:var(--green)">${defPow()}</b></div>
  <div>💨 SPD: <b>${S.spd}</b></div>
  <div>💰 Caps: <b>${S.caps}</b></div>
  <div>🗡 Kills: <b>${S.killCount||0}</b></div>
  <div>📜 Quests: <b>${S.questsComplete||0}</b></div></div>`));

  // Companions
  if(S.companions.length){
    tab.appendChild(el('div','sh','Companions'));
    S.companions.forEach(c=>{
      tab.appendChild(el('div','cd',`<div style="display:flex;align-items:center;gap:8px">
      <div style="font-size:24px">${renderIcon(c.icon||inferNpcIcon(c,{loc:c.loc||S.loc}),24)}</div>
      <div style="flex:1"><div style="font-weight:bold;font-size:12px">${c.name}</div>
      <div class="hb"><div class="hf g" style="width:${hpPct(c.hp,c.maxHp)}%"></div></div>
      <div style="font-size:9px;color:var(--muted)">HP ${c.hp}/${c.maxHp} · ATK ${c.atk} · DEF ${c.def}</div></div></div>`));
    });
  }

  // Family
  if(S.spouse||S.children.length){
    tab.appendChild(el('div','sh','Family'));
    if(S.spouse)tab.appendChild(el('div','cd',`💍 Spouse: <b>${S.spouse.name}</b>`));
    S.children.forEach(c=>{tab.appendChild(el('div','cd',`👶 ${c.name} — Age ${c.age||0}`))});
  }

  // Quests
  const active=S.quests.filter(q=>!q.done);
  if(active.length){
    tab.appendChild(el('div','sh','Active Quests'));
    active.forEach(q=>{
      const prog=q.progText|| (q.t==='kill'?`${q.kd||0}/${q.kc}`:q.t==='fetch'?`${q.fd||0}/${q.fc}`:q.t==='explore'?`${q.ed||0}/${q.ec}`:'');
      tab.appendChild(el('div','qc',`<div style="font-weight:bold;font-size:12px">📜 ${q.name}</div>
      <div style="font-size:10px;color:var(--muted)">${q.desc}</div>
      <div style="font-size:10px;color:var(--green);margin-top:2px">Progress: ${prog} · 💰 ${q.rg} · ⭐ ${q.rx}</div>`));
    });
  }

  // Relationships
  if(S.relationships.length){
    tab.appendChild(el('div','sh','Relationships'));
    S.relationships.slice(0,8).forEach(r=>{
      const rc=el('div','inv-card');rc.style.cursor='pointer';
      rc.innerHTML=`<div class="inv-row"><div>${renderIcon(r.icon||inferNpcIcon(r,{loc:r.loc||S.loc}),18)} ${r.name}</div><div style="font-size:10px;color:var(--muted)">${r.rel} · ❤${r.aff}</div></div>`;
      rc.onclick=()=>openNPCInteraction({name:r.name,male:r.male,age:r.age,role:r.role||r.rel,loc:r.loc||S.loc,fac:r.fac,icon:r.icon},r);
      tab.appendChild(rc);
    });
  }
}

// ============================================================
// INVENTORY TAB
// ============================================================
function upInv(){
  const tab=$('inv-tab');if(!S)return;tab.innerHTML='';

  // Equipped
  tab.appendChild(el('div','sh','Equipped'));
  const gear=el('div','cd');
  const w=S.gear.w?ITEMS[S.gear.w]:null;
  const b2=S.gear.body?ITEMS[S.gear.body]:null;
  const h=S.gear.head?ITEMS[S.gear.head]:null;
  gear.innerHTML=`<div style="font-size:11px">
  <div>🔫 Weapon: <b>${w?w.e+' '+w.n:'— None —'}</b>${w?' (ATK +'+w.a+')':''}</div>
  ${w&&w.ammo?`<div>🔸 Ammo: <b>${ITEMS[w.ammo]?.n||'Ammo'} ×${countItem(w.ammo)}</b> <span style="color:var(--muted)">(uses 1 per attack)</span></div>`:''}
  <div>🧥 Body: <b>${b2?b2.e+' '+b2.n:'— None —'}</b>${b2?' (DEF +'+b2.d+')':''}</div>
  <div>🪖 Head: <b>${h?h.e+' '+h.n:'— None —'}</b>${h?' (DEF +'+h.d+')':''}</div></div>`;
  tab.appendChild(gear);

  // Inventory
  tab.appendChild(el('div','sh',`Inventory (${S.inv.length} items)`));
  if(!S.inv.length){tab.appendChild(el('div','cd','<div style="font-size:11px;color:var(--muted)">Empty.</div>'));return}

  const counts={};S.inv.forEach(id=>{counts[id]=(counts[id]||0)+1});
  Object.entries(counts).forEach(([id,cnt])=>{
    const it=ITEMS[id];if(!it)return;
    const ic=el('div','inv-card');
    let actions='';
    if(it.t==='w')actions=`<button class="bt sm go" onclick="equipItem('${id}','w')">Equip</button>`;
    if(it.t==='a'&&it.slot==='body')actions=`<button class="bt sm go" onclick="equipItem('${id}','body')">Equip</button>`;
    if(it.t==='a'&&it.slot==='head')actions=`<button class="bt sm go" onclick="equipItem('${id}','head')">Equip</button>`;
    if(it.t==='c')actions=`<button class="bt sm pip" onclick="useItem('${id}')">Use</button>`;
    actions+=`<button class="bt sm dn" onclick="dropItem('${id}')">Drop</button>`;

    ic.innerHTML=`<div class="inv-row"><div style="flex:1"><span style="font-size:13px">${it.e}</span> <b>${it.n}</b>${cnt>1?' ×'+cnt:''}</div><div style="font-size:10px;color:var(--muted)">${it.p}c</div></div>
    <div style="font-size:10px;color:var(--muted);margin:2px 0">${it.desc||''} ${it.a?'ATK +'+it.a:''}${it.d?'DEF +'+it.d:''}${it.hp?'HP +'+it.hp:''}${it.ammo?' · Uses '+(ITEMS[it.ammo]?.n||'ammo'):''}${it.t==='ammo'?' · Ammunition':''}</div>
    <div>${actions}</div>`;
    tab.appendChild(ic);
  });
}
function equipItem(id,slot){
  const idx=S.inv.indexOf(id);if(idx===-1)return;
  if(S.gear[slot])S.inv.push(S.gear[slot]);
  S.gear[slot]=id;S.inv.splice(idx,1);
  log('Equipped '+ITEMS[id]?.n+'.','n');notify('Equipped '+ITEMS[id]?.n);upInv();save();
}
function useItem(id){
  const idx=S.inv.indexOf(id);if(idx===-1)return;
  const it=ITEMS[id];if(!it)return;
  if(it.hp){S.hp=Math.min(S.maxHp,S.hp+it.hp);log('Used '+it.n+'. +'+it.hp+' HP.','e');notify('❤ +'+it.hp+' HP')}
  if(it.buff){if(it.buff.ap)S.ap=Math.min(S.maxAp,S.ap+it.buff.ap)}
  S.inv.splice(idx,1);upInv();upSB();save();
}
function dropItem(id){
  const idx=S.inv.indexOf(id);if(idx===-1)return;
  S.inv.splice(idx,1);log('Dropped '+ITEMS[id]?.n+'.','n');upInv();save();
}

// ============================================================
// TRAVEL TAB
// ============================================================
function upRoads(){
  const tab=$('roads-tab');if(!S)return;tab.innerHTML='';
  tab.appendChild(el('div','sh','Travel from '+LOCS[S.loc]?.n));
  const roads=ROADS[S.loc]||{};
  if(!Object.keys(roads).length){tab.appendChild(el('div','cd','No known routes.'));return}
  Object.entries(roads).forEach(([dest,days])=>{
    const loc=LOCS[dest];if(!loc)return;
    const dc=el('div','bc');
    dc.innerHTML=`<div style="font-size:28px">${loc.e}</div><div style="flex:1"><div style="font-weight:bold;font-size:13px">${loc.n}</div><div style="font-size:10px;color:var(--muted)">${loc.r} · ${days} day${days>1?'s':''} · ${'☠'.repeat(loc.dg)}</div><div style="font-size:10px;color:var(--muted);font-style:italic">${loc.d.substring(0,50)}${loc.d.length>50?'...':''}</div></div><div style="color:var(--muted)">›</div>`;
    dc.onclick=()=>beginTravel(dest,days);
    tab.appendChild(dc);
  });
}
function beginTravel(dest,days){
  if(combat)return;tDest=dest;
  tQ=genTravelEv(days,S.loc,dest);
  $('TO').classList.add('A');$('TB').style.width='0%';$('TC').innerHTML='';$('TN').style.display='none';
  nextTEv();
}
function genTravelEv(days,from,to){
  const evs=[];const total=days*2+rnd(1,3);
  for(let i=0;i<total;i++){
    const r=R();
    if(r<.3){
      const dloc=LOCS[to];
      const enPool=dloc?.sur?.length?rndA(dloc.sur).en:['gecko','bloatfly'];
      const validPool=enPool.filter(e=>ENEMIES[e]);
      if(validPool.length){
        const cnt=rnd(1,2);const enemies=[];
        for(let j=0;j<cnt;j++)enemies.push(mkEnemy(rndA(validPool)));
        evs.push({tp:'combat',e:'⚔',tx:'Hostiles on the road!',enemies,_i:i,_t:total});
      }
    }else if(r<.5){
      const finds=['stimpak','sunset_sars','dirty_water','cram','iguana_bits','ammo_9mm','ammo_10mm','ammo_357','ammo_556','ammo_shells','energy_cell','herbs','scrap','pre_war_money','wonderglue','wrench','scrap_electronics','camera','cigarette_pack','cigarette_carton','silverware','silver_watch','gold_necklace','conductor'];
      const fi=rndA(finds);const it=ITEMS[fi];
      evs.push({tp:'loot',e:'✨',tx:`You spot something: <b style="color:var(--green)">${it?.e} ${it?.n}</b>`,fn:()=>{if(fi&&ITEMS[fi])S.inv.push(fi);log('Found '+it?.n+' on the road.','e')},_i:i,_t:total});
    }else{
      const scenes=["The road stretches endlessly.","Heat waves shimmer off the asphalt.","You pass a rusted pre-war car.","A brahmin caravan passes going the other way.","Dust devils spin across the highway.","Radio signals fade in and out."];
      evs.push({tp:'scene',e:rndA(['🏜','🌵','☀','🛣']),tx:rndA(scenes),_i:i,_t:total});
    }
  }
  return evs;
}
function nextTEv(){
  if(!tQ.length){finTravel();return}
  const ev=tQ.shift();
  $('TB').style.width=Math.round(((ev._i+1)/ev._t)*100)+'%';
  $('TS').textContent=ev.e;$('TT').innerHTML=ev.tx;$('TC').innerHTML='';$('TN').style.display='none';
  if(ev.tp==='combat'){
    const cd=$('TC');
    const fb=el('button','bt go','⚔ Fight!');fb.style.textAlign='center';
    fb.onclick=()=>{startCombat(ev.enemies);combat.postT=tDest};cd.appendChild(fb);
    const fl=el('button','bt dn','🏃 Try to run');fl.style.textAlign='center';
    fl.onclick=()=>{if(R()<.5){log('Evaded enemies.','e');$('TN').style.display='block';$('TN').onclick=()=>travelCont()}
    else{startCombat(ev.enemies);combat.postT=tDest}};cd.appendChild(fl);
    return;
  }
  if(ev.fn)ev.fn();
  $('TN').style.display='block';$('TN').onclick=()=>travelCont();
}
function finTravel(){
  if(tDest){
    S.loc=tDest;S.days++;S.hours=8;
    payDaily();
    log('Arrived at '+LOCS[S.loc]?.n+'.','q');
  }
  tDest=null;tQ=[];
  upSB();
  refreshActiveTab();
  save();
  $('TO').classList.remove('A');
}

// ============================================================
// LOG TAB
// ============================================================
function upLog(){
  const tab=$('log-tab');if(!S)return;tab.innerHTML='';
  tab.appendChild(el('div','sh','Chronicle'));
  if(!S.log||!S.log.length){tab.appendChild(el('div','cd','<span style="color:var(--muted)">No entries.</span>'));return}
  S.log.forEach((dg,di)=>{
    const group=el('div','log-group');
    const header=el('div','log-header');
    header.innerHTML=`<span style="color:var(--amber)">Day ${dg.day}</span><span style="font-size:10px;color:var(--muted)">${dg.entries.length} events</span>`;
    const entries=el('div','log-entries'+(di===0?' open':''));
    dg.entries.forEach(e=>{
      const le=el('div','log-entry '+(e.type==='c'?'combat-log':e.type==='e'?'event-log':e.type==='q'?'quest-log':''));
      le.innerHTML=e.text;entries.appendChild(le);
    });
    header.onclick=()=>entries.classList.toggle('open');
    group.appendChild(header);group.appendChild(entries);tab.appendChild(group);
  });

  // Game controls
  tab.appendChild(el('div','sh','System'));
  const ng=el('button','bt dn','🔄 New Game');ng.style.textAlign='center';
  ng.onclick=()=>confirmNewGame();
  tab.appendChild(ng);
}

// ============================================================
// TIME & ECONOMY
// ============================================================
function advanceTime(hours){
  S.hours=(S.hours||8)+hours;
  while(S.hours>=24){S.hours-=24;S.days++;payDaily();dailyEvent()}
  // Quest progress
  S.quests.forEach(q=>{
    if(q.done)return;
    if(q.t==='kill'&&q.kt){q.kd=S.kills[q.kt]||0;if(q.kd>=q.kc)completeQuest(q)}
    if(q.t==='explore'){q.ed=(q.ed||0);if(q.ed>=q.ec)completeQuest(q)}
  });
  if(S.flags&&S.flags.hv)hvRefreshState();
  // AP regen
  S.ap=Math.min(S.maxAp,S.ap+Math.floor(hours*3));
}
function payDaily(){
  // Age
  if(S.days%90===0){
    S.age++;
    if(S.spouse&&R()<.2&&S.children.length<4){
      const cm=R()<.5;const cn=(cm?rndA(FM):rndA(FF))+' '+S.name.split(' ').pop();
      S.children.push({name:cn,male:cm,born:S.days,age:0});
      log('A child is born! '+cn,'e');notify('👶 '+cn+' is born!');
    }
    S.children.forEach(c=>{c.age=Math.floor((S.days-c.born)/90)});
  }
  worldTick();
}
function completeQuest(q){
  if(q.done)return;q.done=true;
  S.xp+=q.rx;S.caps+=q.rg;S.questsComplete++;
  if(q.fac)S.rep[q.fac]=(S.rep[q.fac]||0)+(q.repBonus||5);
  log('Quest complete: '+q.name+' (+'+q.rg+' caps, +'+q.rx+' XP)','q');
  notify('📜 Quest Complete!');chkLU();
}
function dailyEvent(){
  if(R()<.3){
    const events=[
      ()=>{const g=rnd(5,15);S.caps+=g;log('Found '+g+' caps in an old cache.','e')},
      ()=>{log('Radio New Vegas: "'+rndA(["This is Mr. New Vegas, and I love you.","The NCR reports increased Legion activity.","Travelers beware: Deathclaws near Quarry Junction.","The Strip is open for business, baby."])+'".','e')},
      ()=>{if(S.companions.length){const c=rndA(S.companions);log(c.name+': "'+rndA(["Stay sharp.","I've got a bad feeling.","We should keep moving.","Watch the ridgeline."])+'"','e')}},
    ];
    rndA(events)();
  }
}
function worldTick(){
  if(!S.worldEvents)S.worldEvents=[];
  if(S.days-S.lastWorldTick<5)return;
  S.lastWorldTick=S.days;
  if(R()<.5&&S.worldEvents.length<3){
    const templates=[
      {title:'NCR patrols increase near {loc}',type:'military',duration:10},
      {title:'Legion raids reported near {loc}',type:'raid',duration:8},
      {title:'Caravan route to {loc} reopened',type:'trade',duration:12},
      {title:'Fiend attacks intensify near {loc}',type:'raid',duration:7},
      {title:'Water supply issues at {loc}',type:'crisis',duration:6},
    ];
    const t=rndA(templates);const locKey=rndA(Object.keys(LOCS));
    const title=t.title.replace('{loc}',LOCS[locKey]?.n||'somewhere');
    S.worldEvents.push({...t,title,started:S.days,loc:locKey});
    log('📰 '+title,'e');
  }
  S.worldEvents=S.worldEvents.filter(ev=>S.days-ev.started<ev.duration);
}

// ============================================================
// INIT
// ============================================================
(async function init(){
  bindAutoSave();
  startAutoSaveLoop();
  requestPersistentStorage();
  if(await loadAsync()){upAll();save(true)}else{newGame()}
})();
</script>
