<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a0e">
<title>Fallout: New Vegas RPG</title>
<style>
:root{--bg:#1a1a0e;--panel:#242418;--panel2:#1e1e14;--amber:#f0c850;--amber2:#c9a230;--green:#4aff4a;--green2:#2ecc2e;--red:#ff4444;--blue:#4488cc;--text:#e8e4d0;--muted:#9a9680;--line:#3a3828;--pip:#14cc64;--hp-red:#cc3333;--ap-blue:#3388cc;--xp-gold:#ccaa33;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
@font-face{font-family:'Pip';src:local('Courier New'),local('Courier');font-weight:normal}
body{background:var(--bg);font-family:'Courier New',monospace;color:var(--text);min-height:100dvh;overscroll-behavior:none;font-size:13px}
#W{max-width:430px;margin:0 auto;min-height:100dvh;overflow:hidden;position:relative;
background:linear-gradient(180deg,#1a1a0e 0%,#141410 100%)}
#H{position:sticky;top:0;background:linear-gradient(180deg,#1a1808,#141408);
color:var(--amber);text-align:center;padding:calc(var(--st)+6px) 12px 5px;
font-size:13px;font-weight:bold;letter-spacing:3px;z-index:100;
border-bottom:1px solid #3a3418;text-transform:uppercase}
#H .sub{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:1px}
#SB{background:#0e0e08;color:var(--text);font-size:10px;display:flex;flex-wrap:wrap;padding:2px 4px;gap:1px;border-bottom:1px solid #282818}
#SB .s{flex:1 1 auto;text-align:center;padding:2px 3px;white-space:nowrap}
#SB .s b{color:var(--amber)}
#SB .s .g{color:var(--green)}
#SB .s .r{color:var(--red)}
.scanline{position:fixed;top:0;left:50%;transform:translateX(-50%);width:430px;height:100%;
pointer-events:none;z-index:999;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}
#C{padding:10px;padding-bottom:calc(90px + var(--sb))}
.T{display:none}.T.A{display:block}
#N{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
background:linear-gradient(0deg,#0e0e06,#1a1a0e);display:flex;
border-top:1px solid var(--amber2);z-index:100;padding-bottom:var(--sb)}
#N button{flex:1;padding:6px 1px 4px;background:0 0;color:var(--muted);border:0;
font-size:8px;text-align:center;cursor:pointer;line-height:1.3;font-family:'Courier New',monospace}
#N button i{font-size:14px;display:block;font-style:normal}
#N button.A{background:#2a2a10;color:var(--amber)}
.sh{color:var(--amber2);padding:3px 0;margin:10px 0 4px;font-size:10px;letter-spacing:2px;
text-transform:uppercase;border-bottom:1px solid #2a2818}
.cd{background:var(--panel);border:1px solid #2a2818;border-radius:6px;padding:8px;margin:4px 0}
.bt{display:block;width:100%;padding:8px 10px;margin:3px 0;background:#2a2a18;color:var(--text);
border:1px solid #3a3828;border-radius:4px;font-family:'Courier New',monospace;font-size:12px;
cursor:pointer;text-align:left;transition:transform 80ms}
.bt:active{transform:scale(.97);filter:brightness(1.1)}
.bt.go{background:#2a3a18;color:var(--green);border-color:#3a4828}
.bt.dn{background:#3a1818;color:var(--red);border-color:#4a2828}
.bt.pip{background:#182a1a;color:var(--pip);border-color:#1a3a1a}
.bt:disabled{opacity:.4;transform:none}
.bt.sm{display:inline-block;width:auto;padding:4px 8px;font-size:10px;margin:2px}
.hb{background:#1a1a10;border-radius:3px;height:7px;overflow:hidden;margin:2px 0;border:1px solid #2a2818}
.hf{height:100%;border-radius:2px;transition:width .3s}
.hf.hp{background:var(--hp-red)}.hf.ap{background:var(--ap-blue)}.hf.xp{background:var(--xp-gold)}
.hf.g{background:var(--green2)}.hf.lo{background:var(--amber2)}.hf.cr{background:var(--red)}
.bc{display:flex;align-items:center;gap:8px;padding:7px 8px;background:var(--panel);
border:1px solid #2a2818;border-radius:5px;margin:3px 0;cursor:pointer}
.bc:active{background:#2a2a1a}
/* Overlays */
#CO{position:fixed;inset:0;background:rgba(5,5,2,.9);display:none;justify-content:center;
align-items:flex-start;z-index:200;padding-top:8px;overflow-y:auto}
#CP{background:var(--panel);border:1px solid var(--amber2);border-radius:8px;padding:10px;
width:96%;max-width:400px;max-height:92vh;overflow-y:auto}
/* Building overlay */
#BO{position:fixed;inset:0;background:var(--bg);z-index:150;overflow-y:auto;display:none}
#BO.A{display:block}
.bh{display:flex;align-items:center;gap:8px;padding:calc(var(--st)+8px) 10px 8px;
background:#141408;border-bottom:1px solid #2a2818;position:sticky;top:0;z-index:10}
.bb{font-size:20px;color:var(--amber);cursor:pointer;padding:4px 8px}
.bp{padding:10px}
.bs2{color:var(--amber2);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
padding:3px 0;margin:10px 0 4px;border-bottom:1px solid #2a2818}
.ba{font-size:11px;color:var(--muted);font-style:italic;padding:6px 0;text-align:center;
border-bottom:1px solid #1a1810;margin-bottom:8px}
.bn{display:flex;align-items:center;gap:10px;padding:8px;background:#1a1a10;border-radius:6px;margin:4px 0}
/* Travel overlay */
#TO{position:fixed;inset:0;background:var(--bg);z-index:160;overflow-y:auto;display:none}
#TO.A{display:block}
/* Dialog */
#DO{position:fixed;inset:0;background:rgba(5,5,2,.88);z-index:250;display:none;
justify-content:center;align-items:center;overflow-y:auto;padding:20px 10px}
#DO.A{display:flex}
#DB{background:var(--panel);border:1px solid var(--amber2);border-radius:8px;padding:14px;
width:94%;max-width:380px;max-height:85vh;overflow-y:auto}
/* Result popup */
#RP{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--panel);
border:1px solid var(--amber2);border-radius:10px;padding:18px;width:90%;max-width:340px;
z-index:350;text-align:center;box-shadow:0 0 30px rgba(0,0,0,.6);display:none;opacity:0;transition:opacity .2s}
#RP.show{display:block;opacity:1}
#RBG{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:340;display:none}
#RBG.show{display:block}
/* Ticker */
#TK{position:fixed;top:calc(var(--st) + 44px);left:50%;transform:translateX(-50%);
width:90%;max-width:400px;z-index:300;pointer-events:none}
#TK .tk{background:#1a2a10;color:var(--green);padding:6px 12px;border-radius:4px;
font-size:11px;text-align:center;opacity:0;transition:opacity .3s;border:1px solid #2a3a18}
#TK .tk.show{opacity:1}
/* Notification */
#NF{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--panel);
color:var(--amber);padding:10px 20px;border-radius:6px;font-size:12px;z-index:400;
opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid var(--amber2)}
#NF.show{opacity:1}
/* Log */
.log-group{margin:4px 0;border:1px solid #2a2818;border-radius:4px;overflow:hidden}
.log-header{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;
background:var(--panel2);cursor:pointer;font-size:11px}
.log-header:active{background:#1a1a12}
.log-entries{display:none;padding:4px 8px 6px;font-size:11px;line-height:1.5}
.log-entries.open{display:block}
.log-entry{padding:2px 0;border-bottom:1px dotted #1a1810}
.log-entry:last-child{border-bottom:none}
.combat-log{color:var(--red)}.event-log{color:var(--green2)}.quest-log{color:var(--blue)}
/* SPECIAL bars */
.sp-bar{display:flex;align-items:center;gap:6px;margin:2px 0;font-size:11px}
.sp-label{width:14px;color:var(--amber);font-weight:bold;text-align:center}
.sp-fill-bg{flex:1;height:6px;background:#1a1a10;border-radius:3px;overflow:hidden;border:1px solid #2a2818}
.sp-fill{height:100%;background:var(--green2);border-radius:2px;transition:width .3s}
.sp-val{width:16px;text-align:right;color:var(--muted);font-size:10px}
/* Tap button */
.tap-btn{width:100%;padding:16px;background:linear-gradient(135deg,#2a3a18,#1a2a10);
color:var(--green);border:2px solid #3a4a28;border-radius:8px;font-family:'Courier New',monospace;
font-size:16px;font-weight:bold;cursor:pointer;text-align:center;letter-spacing:2px;
text-transform:uppercase;transition:transform 60ms,box-shadow 60ms}
.tap-btn:active{transform:scale(.95);box-shadow:0 0 20px rgba(74,255,74,.2) inset}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}
.dmg-float{position:absolute;color:var(--red);font-weight:bold;font-size:14px;pointer-events:none;animation:dmgFloat .8s forwards}
.npc-line{font-size:12px;font-style:italic;color:var(--muted);padding:6px 8px;border-left:2px solid var(--amber2);margin:6px 0}
.qc{background:#1a1a10;border:1px solid #2a2818;border-radius:4px;padding:8px;margin:6px 0}
/* Inventory card */
.inv-card{background:var(--panel2);border:1px solid #2a2818;border-radius:5px;padding:6px 8px;margin:3px 0}
.inv-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
/* Combat */
.combat-panel{background:#1a0a0a;border:1px solid #3a1818;border-radius:6px;padding:10px;margin:4px 0}
.enemy-portrait{text-align:center;font-size:48px;margin:8px 0}
.combat-bar{display:flex;gap:4px;margin:4px 0;flex-wrap:wrap}
.combat-bar .bt{flex:1;min-width:80px;text-align:center}
</style>
</head>
<body>
<div class="scanline"></div>
<div id="W">
<div id="H">FALLOUT: NEW VEGAS<div class="sub">Mojave Wasteland</div></div>
<div id="SB"></div>
<div id="C">
<div id="world-tab" class="T A"></div>
<div id="char-tab" class="T"></div>
<div id="inv-tab" class="T"></div>
<div id="roads-tab" class="T"></div>
<div id="log-tab" class="T"></div>
</div>
</div>
<div id="N">
<button onclick="switchTab('world')" id="nb-world" class="A"><i>🏜</i>World</button>
<button onclick="switchTab('char')" id="nb-char"><i>👤</i>Char</button>
<button onclick="switchTab('inv')" id="nb-inv"><i>🎒</i>Items</button>
<button onclick="switchTab('roads')" id="nb-roads"><i>🗺</i>Travel</button>
<button onclick="switchTab('log')" id="nb-log"><i>📋</i>Log</button>
</div>
<div id="BO"><div id="BI"></div></div>
<div id="TO">
<div style="padding:calc(var(--st)+10px) 12px 12px">
<div style="text-align:center;font-size:48px;margin:20px 0" id="TS">🏜</div>
<div style="text-align:center;font-size:14px;margin-bottom:12px" id="TT"></div>
<div class="hb" style="margin:8px 20px"><div class="hf g" id="TB" style="width:0%"></div></div>
<div id="TC" style="padding:0 10px"></div>
<button class="bt go" id="TN" style="display:none;text-align:center;margin:8px 10px" onclick="travelCont()">Continue</button>
</div>
</div>
<div id="DO"><div id="DB"></div></div>
<div id="CO"><div id="CP"></div></div>
<div id="RBG"></div><div id="RP"></div>
<div id="TK"><div class="tk" id="ticker-inner"></div></div>
<div id="NF"></div>

<script>
// ============================================================
// UTILITIES
// ============================================================
const $=id=>document.getElementById(id);
const el=(t,c,h)=>{const e=document.createElement(t||'div');if(c)e.className=c;if(h)e.innerHTML=h;return e};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function rndA(a){return a[Math.floor(Math.random()*a.length)]}
function R(){return Math.random()}
function clone(o){return JSON.parse(JSON.stringify(o))}
function notify(m,d=2200){const n=$('NF');n.textContent=m;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),d)}
function showResult(title,emoji,lines,btnText,btnFn){
  const rp=$('RP');const bg=$('RBG');
  rp.innerHTML=`<div style="font-size:40px;margin-bottom:8px">${emoji}</div><div style="font-size:15px;font-weight:bold;margin-bottom:8px;color:var(--amber)">${title}</div>${lines.map(l=>'<div style="font-size:11px;margin:3px 0;color:var(--muted)">'+l+'</div>').join('')}<button class="bt go" style="margin-top:10px;text-align:center" onclick="closeResult();${btnFn||''}">${btnText||'Continue'}</button>`;
  rp.style.display='block';bg.style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{rp.classList.add('show');bg.classList.add('show')}));
}
function closeResult(){$('RP').classList.remove('show');$('RBG').classList.remove('show');setTimeout(()=>{$('RP').style.display='none';$('RBG').style.display='none'},200)}
function openDlg(h){$('DB').innerHTML=h;$('DO').classList.add('A')}
function closeDlg(){$('DO').classList.remove('A')}

function resumeExpeditionAfterCombat(){
  if(!window._resumeArea)return upAll();
  $('TO').classList.add('A');
  runExpedition(window._resumeArea,window._resumeStep||0);
}
function resumeTravelAfterCombat(){
  $('TO').classList.add('A');
  if(tQ.length) nextTEv();
  else finTravel();
}
function acceptPendingQuest(){
  if(!window._pendingQuest)return;
  accQuest(window._pendingQuest);
  window._pendingQuest=null;
}
function npcActPending(action){
  if(!window._npcTarget)return;
  npcAct(action,window._npcTarget);
}
function resetTransientState(){
  combat=null;
  tQ=[];
  tDest=null;
  window._resumeArea=null;
  window._resumeStep=0;
  window._pendingQuest=null;
  window._npcTarget=null;
  try{closeResult()}catch(e){}
  try{closeDlg()}catch(e){}
  if($('CO'))$('CO').style.display='none';
  if($('TO'))$('TO').classList.remove('A');
  if($('BO'))$('BO').classList.remove('A');
  if($('TN')){$('TN').style.display='none';$('TN').onclick=null;}
}
function startFreshGame(){
  localStorage.removeItem('fnv_rpg');
  S=null;
  resetTransientState();
  if(typeof switchTab==='function')switchTab('world');
  newGame();
}
function confirmNewGame(){
  openDlg(`<div style="text-align:center">
  <div style="font-size:42px;margin-bottom:8px">⚠️</div>
  <div style="font-size:15px;font-weight:bold;color:var(--amber);margin-bottom:6px">Start New Game?</div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Your current save will be erased.</div>
  <button class="bt dn" style="text-align:center" onclick="closeDlg();startFreshGame()">Yes, start over</button>
  <button class="bt" style="text-align:center" onclick="closeDlg()">Cancel</button>
  </div>`);
}

function calcMaxHp(){return 60+S.level*8+(S.special?S.special[2]*6:0)}
function calcMaxAp(){return 50+(S.special?S.special[5]*3:0)+S.level*2}
function atkPow(){let a=S.atk+Math.floor(S.level*.5)+(S.special?Math.floor(S.special[0]*0.8):0);if(S.gear.w){const w=ITEMS[S.gear.w];if(w)a+=w.a||0}return a}
function defPow(){let d=S.def+Math.floor(S.level*.3)+(S.special?Math.floor(S.special[2]*0.5):0);if(S.gear.body){const a=ITEMS[S.gear.body];if(a)d+=a.d||0}if(S.gear.head){const h=ITEMS[S.gear.head];if(h)d+=h.d||0}return d}
function xpNeed(l){return Math.floor(50*Math.pow(1.4,l-1))}
function hpPct(h,m){return Math.max(0,Math.min(100,Math.round(h/m*100)))}
function countItem(id){return S&&S.inv?S.inv.filter(x=>x===id).length:0}
function getEquippedWeapon(){return S&&S.gear&&S.gear.w?ITEMS[S.gear.w]||null:null}
function getEquippedWeaponAmmoId(){const w=getEquippedWeapon();return w&&w.ammo?w.ammo:null}
function getEquippedWeaponAmmoCount(){const ammoId=getEquippedWeaponAmmoId();return ammoId?countItem(ammoId):0}
function getCombatAttackProfile(consumeAmmo){
  let a=S.atk+Math.floor(S.level*.5)+(S.special?Math.floor(S.special[0]*0.8):0);
  const w=getEquippedWeapon();
  if(!w)return{atk:a,weapon:null,ammoId:null,ammoName:'',hadAmmo:true,gun:false,usedAmmo:false};
  if(!w.ammo){
    a+=w.a||0;
    return{atk:a,weapon:w,ammoId:null,ammoName:'',hadAmmo:true,gun:false,usedAmmo:false};
  }
  const ammoId=w.ammo;
  const ammoIdx=S.inv.indexOf(ammoId);
  const ammoName=ITEMS[ammoId]?.n||'ammo';
  if(ammoIdx!==-1){
    if(consumeAmmo)S.inv.splice(ammoIdx,1);
    a+=w.a||0;
    return{atk:a,weapon:w,ammoId,ammoName,hadAmmo:true,gun:true,usedAmmo:!!consumeAmmo};
  }
  return{atk:Math.max(1,a+Math.max(1,Math.floor((w.a||0)*0.2))),weapon:w,ammoId,ammoName,hadAmmo:false,gun:true,usedAmmo:false};
}

function log(text,type='n'){
  if(!S.log)S.log=[];
  let dg=S.log.find(g=>g.day===S.days);
  if(!dg){dg={day:S.days,entries:[]};S.log.unshift(dg)}
  dg.entries.push({text,type});
  if(S.log.length>40)S.log.pop();
  // Ticker
  const ti=$('ticker-inner');
  if(ti){ti.textContent=text.replace(/<[^>]*>/g,'');ti.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>ti.classList.remove('show'),3000)}
}

// ============================================================
// SCAVENGE SYSTEM (Tap mechanic from Elder to King)
// ============================================================
function doScavenge(){
  if(combat)return;
  S.scavengeCount++;
  advanceTime(1);
  const loc=LOCS[S.loc];
  const r=R();

  if(r<.20*loc.dg){
    // Combat encounter
    const surs=loc.sur||[];
    const area=surs.length?rndA(surs):null;
    const enPool=area?area.en:['gecko','radroach'];
    const validPool=enPool.filter(e=>ENEMIES[e]);
    if(validPool.length){
      const cnt=rnd(1,Math.min(2,validPool.length));
      const enemies=[];for(let i=0;i<cnt;i++)enemies.push(mkEnemy(rndA(validPool)));
      startCombat(enemies);
      return;
    }
  }
  if(r<.45){
    // Find caps
    const g=rnd(2,8+S.level*2);S.caps+=g;S.capsEarned+=g;
    log('Found '+g+' caps scavenging.','e');
    notify('💰 +'+g+' caps');
  } else if(r<.70){
    // Find item
    const surs=loc.sur||[];
    const area=surs.length?rndA(surs):null;
    const ltPool=area?area.lt:['herbs','scrap'];
    const fi=rndA(ltPool);const it=ITEMS[fi];
    if(it){S.inv.push(fi);log('Found '+it.n+'.','e');notify(it.e+' Found '+it.n)}
  } else if(r<.82){
    // NPC encounter
    const npc=mkNPC();
    if(!S.relationships.find(r2=>r2.name===npc.name)){
      S.relationships.push({name:npc.name,rel:'stranger',aff:0,male:npc.male,age:npc.age,loc:S.loc,met:S.days});
    }
    openNPCInteraction(npc,S.relationships.find(r2=>r2.name===npc.name));
    return;
  } else {
    // Flavor text
    const scenes=["The wind carries the smell of dust and decay.","You hear gunshots in the distance.","A tumbleweed rolls past.","The Pip-Boy crackles with static.","You spot tracks in the sand — something big.",
    "An old billboard reads: 'NEVADA: Silver State'","Brahmin bones bleach in the sun.","The heat is oppressive."];
    log(rndA(scenes),'n');
    notify(rndA(scenes));
  }
  chkLU();upAll();
}

function explore(idx){
  const loc=LOCS[S.loc];const area=loc?.sur?.[idx];if(!area)return;
  const o=$('TO');o.classList.add('A');
  $('TB').style.width='0%';$('TC').innerHTML='';$('TN').style.display='none';
  $('TS').textContent=area.e;
  $('TT').innerHTML=`<b>${area.n}</b><br><span style="font-size:11px;color:var(--muted)">${area.d}</span>`;
  setTimeout(()=>runExpedition(area,0),500);
}
function runExpedition(area,step){
  const maxSteps=rnd(2,4);
  if(step>=maxSteps){
    $('TS').textContent=area.e;
    $('TT').innerHTML=`Finished scouting <b>${area.n}</b>.`;
    const cd=$('TC');cd.innerHTML='';
    const cb=el('button','bt go','🔍 Keep exploring');cb.style.textAlign='center';
    cb.onclick=()=>{cd.innerHTML='';$('TN').style.display='none';runExpedition(area,0)};cd.appendChild(cb);
    const rb=el('button','bt','🔙 Return to '+LOCS[S.loc]?.n);rb.style.textAlign='center';
    rb.onclick=()=>{$('TO').classList.remove('A');upAll()};cd.appendChild(rb);
    $('TN').style.display='none';return;
  }
  advanceTime(1);
  $('TB').style.width=Math.round(((step+1)/maxSteps)*100)+'%';
  const r=R();
  if(r<.45){
    const cnt=rnd(1,Math.min(2,area.en.length));
    const enemies=[];for(let i=0;i<cnt;i++){const eid=rndA(area.en);if(ENEMIES[eid])enemies.push(mkEnemy(eid))}
    if(!enemies.length){$('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step+1);return}
    $('TS').textContent='⚔';
    $('TT').innerHTML=`<b>Hostiles!</b> ${enemies.map(e=>e.name).join(' & ')}!`;
    const cd=$('TC');cd.innerHTML='';
    const fb=el('button','bt go','⚔ Fight!');fb.style.textAlign='center';
    fb.onclick=()=>{startCombat(enemies);combat._expArea=area;combat._expStep=step+1};cd.appendChild(fb);
    const fl=el('button','bt dn','🏃 Retreat');fl.style.textAlign='center';
    fl.onclick=()=>{log('Retreated from '+area.n+'.','e');$('TO').classList.remove('A');upAll()};cd.appendChild(fl);
    $('TN').style.display='none';
  } else if(r<.65){
    const li=rndA(area.lt);const it=ITEMS[li];
    if(it){S.inv.push(li);log('Found '+it.n+' in '+area.n+'.','e');save();
    $('TS').textContent='✨';$('TT').innerHTML=`Found: <b style="color:var(--green)">${it.e} ${it.n}</b>`;
    $('TC').innerHTML='';$('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step+1)}
  } else {
    const scenes=["Tracks in the dirt — recent.","The wind shifts. Something watches.","Shell casings litter the ground.","A faded sign: DANGER - MINES","An old campfire, still warm."];
    $('TS').textContent=rndA(['🏜','💀','🪨','🌵']);
    $('TT').innerHTML=rndA(scenes);
    $('TC').innerHTML='';$('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step+1);
  }
}

function mkEnemy(id){
  const e=ENEMIES[id];if(!e)return{name:"Gecko",hp:20,maxHp:20,a:4,d:0,xp:8,e:"🦎",loot:[]};
  const lvlBonus=Math.max(0,S.level-3);
  return{name:e.n,hp:e.hp+lvlBonus*3,maxHp:e.hp+lvlBonus*3,a:e.a+Math.floor(lvlBonus*.5),d:e.d+Math.floor(lvlBonus*.3),xp:e.xp,e:e.e,loot:clone(e.loot),id};
}

// ============================================================
// COMBAT SYSTEM
// ============================================================
function startCombat(enemies){
  combat={enemies,turn:0,log:[]};
  renderCombat();
}
function renderCombat(){
  if(!combat)return;
  const o=$('CO');o.style.display='flex';
  const p=$('CP');if(!p){
    const cp=el('div','','');cp.id='CP';o.appendChild(cp);
  }
  const panel=$('CP');
  const e=combat.enemies[0];if(!e)return;
  const alive=combat.enemies.filter(en=>en.hp>0);
  const hp=hpPct(S.hp,S.maxHp);

  let enemyHtml=alive.map((en,i)=>`<div class="combat-panel" style="margin:2px 0;padding:6px">
  <div style="display:flex;align-items:center;gap:8px">
  <div style="font-size:28px">${en.e}</div>

  <div style="font-size:10px;color:var(--muted);margin-top:4px">${(()=>{const w=getEquippedWeapon();if(!w)return 'Weapon: Unarmed';if(!w.ammo)return `Weapon: ${w.e} ${w.n}`;const ammoId=w.ammo;const ammo=ITEMS[ammoId];const ammoCount=countItem(ammoId);return `Weapon: ${w.e} ${w.n} · ${ammo?ammo.e+' '+ammo.n:''} ×${ammoCount}`})()}</div></div>
  <div class="combat-bar">
  <button class="bt go" onclick="combatAction('attack')">⚔ Attack</button>

  <button class="bt dn" onclick="combatAction('flee')">🏃 Flee</button></div>
  <div style="max-height:100px;overflow-y:auto;margin-top:6px;padding:4px;background:#0a0a04;border-radius:4px;font-size:10px;color:var(--muted)">${combat.log.slice(-8).map(l=>'<div>'+l+'</div>').join('')}</div>`;
}
function combatAction(act){
  if(!combat)return;
  const alive=combat.enemies.filter(en=>en.hp>0);
  if(!alive.length){endCombat(true);return}
  const target=alive[0];

  switch(act){
    case 'attack':{
      const attack=getCombatAttackProfile(true);
      const dmg=Math.max(1,attack.atk-Math.floor(target.d*.5)+rnd(-2,3));
      target.hp=Math.max(0,target.hp-dmg);
      if(attack.gun&&attack.hadAmmo){
        combat.log.push(`You fire ${attack.weapon.n} and deal ${dmg} damage to ${target.name}.`);
      }else if(attack.gun&&!attack.hadAmmo){
        combat.log.push(`Out of ${attack.ammoName}! You swing ${attack.weapon.n} and deal ${dmg} damage to ${target.name}.`);
        notify('Out of '+attack.ammoName+'! Weak melee attack only.');
      }else{
        combat.log.push(`You deal ${dmg} damage to ${target.name}.`);
      }
      S.ap=Math.max(0,S.ap-8);
      if(target.hp<=0){
        combat.log.push(`${target.name} is killed!`);
        log('Killed '+target.name+'.','c');
        S.kills[target.id||'unknown']=(S.kills[target.id||'unknown']||0)+1;
        S.killCount++;
      }
      break;
    }
    case 'vats':{
      if(S.ap<20){notify('Not enough AP!');return}
      const attack=getCombatAttackProfile(true);
      if(attack.gun&&!attack.hadAmmo){
        notify('No '+attack.ammoName+' loaded.');
        combat.log.push(`V.A.T.S. failed — no ${attack.ammoName}.`);
        renderCombat();
        return;
      }
      S.ap-=20;
      const crit=R()<(.15+S.special[6]*.02);
      const mult=crit?2.5:1.8;
      const dmg=Math.max(1,Math.round((attack.atk-Math.floor(target.d*.3))*mult)+rnd(0,5));
      target.hp=Math.max(0,target.hp-dmg);
      if(attack.gun)combat.log.push(`V.A.T.S.! ${crit?'CRITICAL! ':''}${dmg} damage to ${target.name} with ${attack.weapon.n}!`);
      else combat.log.push(`V.A.T.S.! ${crit?'CRITICAL! ':''}${dmg} damage to ${target.name}!`);
      if(target.hp<=0){
        combat.log.push(`${target.name} eliminated!`);
        log('Killed '+target.name+' (V.A.T.S.).','c');
        S.kills[target.id||'unknown']=(S.kills[target.id||'unknown']||0)+1;
        S.killCount++;
      }
      break;
    }
    case 'heal':{
      const si=S.inv.indexOf('stimpak');
      const ssi=si===-1?S.inv.indexOf('super_stimpak'):-1;
      const idx=si!==-1?si:ssi;
      if(idx===-1){notify('No healing items!');return}
      const item=ITEMS[S.inv[idx]];
      S.hp=Math.min(S.maxHp,S.hp+(item.hp||30));
      combat.log.push(`Used ${item.n}. +${item.hp||30} HP.`);
      S.inv.splice(idx,1);
      break;
    }
    case 'flee':{
      const flee=R()<(.3+S.spd*.05+(S.special?S.special[5]*.03:0));
      if(flee){combat.log.push('You escaped!');log('Fled from combat.','c');endCombat(false);return}
      else{combat.log.push('Failed to escape!');}
      break;
    }
  }

  const survivors=combat.enemies.filter(en=>en.hp>0);
  if(!survivors.length){endCombat(true);return}

  survivors.forEach(en=>{
    const eDmg=Math.max(1,en.a-Math.floor(defPow()*.4)+rnd(-2,2));
    S.hp=Math.max(0,S.hp-eDmg);
    combat.log.push(`${en.name} deals ${eDmg} damage to you.`);
  });

  if(S.hp<=0){combat.log.push('You are critically wounded!');endCombat(false,true);return}
  combat.turn++;
  renderCombat();
}
function endCombat(won,died){
  if(!combat)return;
  const expArea=combat._expArea;
  const expStep=combat._expStep;
  const postT=combat.postT;
  $('CO').style.display='none';
  window._resumeArea=expArea||null;
  window._resumeStep=expStep||0;

  if(died){
    S.hp=Math.floor(S.maxHp*.3);S.caps=Math.max(0,S.caps-rnd(10,30));
    combat=null;save();
    if(postT){
      showResult('Knocked Out','💀',['You wake up later, stripped of some caps.','Lost some caps.'],'Continue','resumeTravelAfterCombat()');
    }else{
      showResult('Knocked Out','💀',['You wake up later, stripped of some caps.','Lost some caps.'],'Continue','upAll()');
    }
    return;
  }
  if(!won){
    combat=null;save();
    if(postT){showResult('Escaped Combat','🏃',['You got away and kept moving.'],'Continue','resumeTravelAfterCombat()');}
    else if(expArea){showResult('Retreated','🏃',['You escaped the fight.'],'Continue','resumeExpeditionAfterCombat()');}
    else{upAll();}
    return;
  }

  let totalXp=0,totalCaps=0;const lootFound=[];
  combat.enemies.forEach(en=>{
    totalXp+=en.xp;
    const c=rnd(3,8+S.level*2);totalCaps+=c;
    if(en.loot&&en.loot.length){
      const li=rndA(en.loot);
      if(ITEMS[li]){lootFound.push(li);S.inv.push(li)}
    }
  });
  S.xp+=totalXp;S.caps+=totalCaps;S.capsEarned+=totalCaps;

  const lines=['⭐ +'+totalXp+' XP','💰 +'+totalCaps+' caps'];
  lootFound.forEach(l=>{const it=ITEMS[l];if(it)lines.push(it.e+' '+it.n)});

  combat=null;
  chkLU();save();

  if(postT){
    showResult('Victory!','⚔',lines,'Continue','resumeTravelAfterCombat()');
  } else if(expArea){
    showResult('Victory!','⚔',lines,'Continue','resumeExpeditionAfterCombat()');
  } else {
    showResult('Victory!','⚔',lines,'Continue','upAll()');
  }
}

// ============================================================
function chkLU(){
  while(S.xp>=xpNeed(S.level)){
    S.xp-=xpNeed(S.level);S.level++;
    S.maxHp=calcMaxHp();S.hp=S.maxHp;
    S.maxAp=calcMaxAp();S.ap=S.maxAp;
    S.atk++;if(S.level%2===0)S.def++;if(S.level%3===0)S.spd++;
    log('Level up! Now level '+S.level+'.','q');
    notify('⬆ LEVEL '+S.level+'!');
    // Offer SPECIAL point
    if(S.level%2===0)S.special[rnd(0,6)]++;
  }
}

function mkNPC(){
  const male=R()<.5;
  const name=(male?rndA(FM):rndA(FF))+' '+rndA(LN);
  const roles=['Trader','Prospector','Drifter','NCR Trooper','Caravan Guard','Settler','Scavenger','Doctor','Gambler','Bounty Hunter','Mechanic','Farmer'];
  return{name,male,age:rnd(18,55),role:rndA(roles)};
}
function openNPCInteraction(npc,existing){
  let rel=existing;
  if(!rel){rel={name:npc.name,rel:'stranger',aff:0,male:npc.male,age:npc.age,loc:S.loc,met:S.days};S.relationships.push(rel)}
  const aff=rel.aff;
  const canFlirt=npc.male!==S.isMale&&!S.spouse;

  let h=`<h3 style="display:flex;align-items:center;gap:8px"><span style="font-size:28px">${npc.male?'👨':'👩'}</span><span style="color:var(--amber)">${npc.name}</span></h3>
  <div style="font-size:10px;color:var(--muted);margin-bottom:6px">${npc.role} · Age ${npc.age} · ${rel.rel}</div>
  ${aff?`<div class="hb" style="margin-bottom:8px"><div class="hf g" style="width:${aff}%"></div></div>`:''}
  <div class="npc-line">"${rndA(["Hey there.","What do you want?","Looking for something?","Watch yourself out there.","Got caps? I got time.","You look like trouble.","Need something?","Stay safe, stranger."])}"</div>`;

  h+=`<button class="bt" onclick="npcAct('chat','${npc.name.replace(/'/g,"\\'")}')">💬 Talk</button>`;
  h+=`<button class="bt" onclick="npcAct('compliment','${npc.name.replace(/'/g,"\\'")}')">😊 Compliment</button>`;
  if(canFlirt)h+=`<button class="bt" onclick="npcAct('flirt','${npc.name.replace(/'/g,"\\'")}')">💕 Flirt</button>`;
  h+=`<button class="bt" onclick="npcAct('drink','${npc.name.replace(/'/g,"\\'")}')">🍺 Share a drink (5 caps)</button>`;
  h+=`<button class="bt" onclick="npcAct('quest','${npc.name.replace(/'/g,"\\'")}')">📜 Ask for work</button>`;
  if(aff>=40)h+=`<button class="bt pip" onclick="npcAct('recruit','${npc.name.replace(/'/g,"\\'")}')">🤝 Recruit as companion</button>`;
  if(aff>=60&&canFlirt)h+=`<button class="bt" onclick="npcAct('propose','${npc.name.replace(/'/g,"\\'")}')">💍 Propose</button>`;
  h+=`<button class="bt dn" onclick="closeDlg()">Walk away</button>`;
  openDlg(h);
}
function npcAct(action,name){
  let rel=S.relationships.find(r=>r.name===name);
  if(!rel){rel={name,rel:'stranger',aff:0,male:R()<.5,age:rnd(20,50),loc:S.loc,met:S.days};S.relationships.push(rel)}
  let msg='',affChange=0;

  switch(action){
    case 'chat': affChange=rnd(3,8);msg=rndA(["You swap stories about the wasteland.","You talk about the NCR and Legion.","A pleasant conversation about survival.","You discuss trade routes."]);break;
    case 'compliment': if(R()<.8){affChange=rnd(5,12);msg=rndA(["They appreciate the kind words.","They smile.","That seemed to land well."])}else{affChange=-3;msg="They seem suspicious of flattery."};break;
    case 'flirt': if(R()<.5+(S.special?S.special[3]*.04:0)){affChange=rnd(8,18);msg=rndA(["They blush.","They lean closer.","Chemistry in the wasteland."])}else{affChange=-5;msg="Awkward silence."}break;
    case 'drink': if(S.caps<5){notify("Not enough caps.");return}S.caps-=5;affChange=rnd(5,15);msg="You share drinks. Trust builds.";break;
    case 'quest':
      if(R()<.5){
        const q=mkQuest(name);
        window._pendingQuest=q;closeDlg();showResult('New Quest!','📜',[`<b>${q.name}</b>`,q.desc,`💰 ${q.rg} caps · ⭐ ${q.rx} XP`],'Accept','acceptPendingQuest()');
        return;
      }else{msg="They don't have anything right now."};break;
    case 'recruit':
      if(S.companions.length>=2){notify("Max 2 companions.");return}
      if(rel.aff<40){notify("Not friendly enough.");return}
      S.companions.push({name,hp:40+S.level*5,maxHp:40+S.level*5,atk:5+S.level,def:3+Math.floor(S.level*.5),male:rel.male});
      rel.rel='companion';msg=name+" joins you!";log(name+' is now your companion.','q');break;
    case 'propose':
      if(R()<(rel.aff/100)){
        S.spouse={name,aff:rel.aff,male:rel.male};rel.rel='spouse';
        msg=name+" says yes!";log('Married '+name+'!','q');
      }else{msg="They're not ready.";affChange=-5}break;
  }
  rel.aff=Math.max(0,Math.min(100,rel.aff+affChange));
  if(affChange>0&&rel.rel==='stranger')rel.rel='acquaintance';
  if(rel.aff>=30&&rel.rel==='acquaintance')rel.rel='friend';
  if(rel.aff>=60&&rel.rel==='friend')rel.rel='close friend';
  log(msg,'e');save();
  closeDlg();
  if(msg)notify(msg);
  upAll();
}

function mkQuest(giver){
  const types=[
    {n:'Clear the Area',t:'kill',desc:'Eliminate hostiles near {loc}.',kt:rndA(Object.keys(ENEMIES).filter(k=>!ENEMIES[k].boss)),kc:rnd(2,4)},

    {n:'Patrol Duty',t:'explore',desc:'Scout the surroundings for threats.',ec:rnd(3,5)},
    {n:'Bounty',t:'kill',desc:'Take out a dangerous target.',kt:rndA(['fiend','convict','powder_ganger','legion_recruit']),kc:1},
  ];
  const qt=rndA(types);
  return{id:'q_'+Date.now()+'_'+rnd(0,999),name:qt.n,desc:qt.desc.replace('{loc}',LOCS[S.loc]?.n||'here'),

    dc.onclick=()=>beginTravel(dest,days);

function beginTravel(dest,days){
  if(combat)return;tDest=dest;
  tQ=genTravelEv(days,S.loc,dest);
  $('TO').classList.add('A');$('TB').style.width='0%';$('TC').innerHTML='';$('TN').style.display='none';
  nextTEv();
}
function genTravelEv(days,from,to){
  const evs=[];const total=days*2+rnd(1,3);
  for(let i=0;i<total;i++){
    const r=R();
    if(r<.3){
      const dloc=LOCS[to];
      const enPool=dloc?.sur?.length?rndA(dloc.sur).en:['gecko','bloatfly'];
      const validPool=enPool.filter(e=>ENEMIES[e]);
      if(validPool.length){
        const cnt=rnd(1,2);const enemies=[];
        for(let j=0;j<cnt;j++)enemies.push(mkEnemy(rndA(validPool)));
        evs.push({tp:'combat',e:'⚔',tx:'Hostiles on the road!',enemies,_i:i,_t:total});
      }
    }else if(r<.5){
      const finds=['stimpak','sunset_sars','ammo_9mm','ammo_10mm','ammo_357','ammo_556','ammo_shells','energy_cell','herbs','scrap','pre_war_money'];
      const fi=rndA(finds);const it=ITEMS[fi];
      evs.push({tp:'loot',e:'✨',tx:`You spot something: <b style="color:var(--green)">${it?.e} ${it?.n}</b>`,fn:()=>{if(fi&&ITEMS[fi])S.inv.push(fi);log('Found '+it?.n+' on the road.','e')},_i:i,_t:total});
    }else{
      const scenes=["The road stretches endlessly.","Heat waves shimmer off the asphalt.","You pass a rusted pre-war car.","A brahmin caravan passes going the other way.","Dust devils spin across the highway.","Radio signals fade in and out."];
      evs.push({tp:'scene',e:rndA(['🏜','🌵','☀','🛣']),tx:rndA(scenes),_i:i,_t:total});
    }
  }
  return evs;
}
function nextTEv(){
  if(!tQ.length){finTravel();return}
  const ev=tQ.shift();
  $('TB').style.width=Math.round(((ev._i+1)/ev._t)*100)+'%';
  $('TS').textContent=ev.e;$('TT').innerHTML=ev.tx;$('TC').innerHTML='';$('TN').style.display='none';
  if(ev.tp==='combat'){
    const cd=$('TC');
    const fb=el('button','bt go','⚔ Fight!');fb.style.textAlign='center';
    fb.onclick=()=>{startCombat(ev.enemies);combat.postT=tDest};cd.appendChild(fb);
    const fl=el('button','bt dn','🏃 Try to run');fl.style.textAlign='center';
    fl.onclick=()=>{if(R()<.5){log('Evaded enemies.','e');$('TN').style.display='block';$('TN').onclick=()=>travelCont()}
    else{startCombat(ev.enemies);combat.postT=tDest}};cd.appendChild(fl);
    return;
  }
  if(ev.fn)ev.fn();
  $('TN').style.display='block';$('TN').onclick=()=>travelCont();
}
function finTravel(){
  if(tDest){
    S.loc=tDest;S.days++;S.hours=8;
    payDaily();
    log('Arrived at '+LOCS[S.loc]?.n+'.','q');
  }
  tDest=null;tQ=[];
  upSB();
  refreshActiveTab();
  save();
  $('TO').classList.remove('A');
}

    const header=el('div','log-header');
    header.innerHTML=`<span style="color:var(--amber)">Day ${dg.day}</span><span style="font-size:10px;color:var(--muted)">${dg.entries.length} events</span>`;
    const entries=el('div','log-entries'+(di===0?' open':''));
    dg.entries.forEach(e=>{
      const le=el('div','log-entry '+(e.type==='c'?'combat-log':e.type==='e'?'event-log':e.type==='q'?'quest-log':''));
      le.innerHTML=e.text;entries.appendChild(le);
    });
    header.onclick=()=>entries.classList.toggle('open');
    group.appendChild(header);group.appendChild(entries);tab.appendChild(group);
  });

  // Game controls
  tab.appendChild(el('div','sh','System'));
  const ng=el('button','bt dn','🔄 New Game');ng.style.textAlign='center';
  ng.onclick=()=>confirmNewGame();
  tab.appendChild(ng);
}

// ============================================================
// TIME & ECONOMY
// ============================================================
function advanceTime(hours){
  S.hours=(S.hours||8)+hours;
  while(S.hours>=24){S.hours-=24;S.days++;payDaily();dailyEvent()}
  // Quest progress
  S.quests.forEach(q=>{
    if(q.done)return;
    if(q.t==='kill'&&q.kt){q.kd=S.kills[q.kt]||0;if(q.kd>=q.kc)completeQuest(q)}
    if(q.t==='explore'){q.ed=(q.ed||0);if(q.ed>=q.ec)completeQuest(q)}
  });
  // AP regen
  S.ap=Math.min(S.maxAp,S.ap+Math.floor(hours*3));
}
function payDaily(){
  // Property income
  S.properties.forEach(p=>{S.caps+=(p.income||0);S.capsEarned+=(p.income||0)});
  // Age
  if(S.days%90===0){
    S.age++;
    if(S.spouse&&R()<.2&&S.children.length<4){
      const cm=R()<.5;const cn=(cm?rndA(FM):rndA(FF))+' '+S.name.split(' ').pop();
      S.children.push({name:cn,male:cm,born:S.days,age:0});
      log('A child is born! '+cn,'e');notify('👶 '+cn+' is born!');
    }
    S.children.forEach(c=>{c.age=Math.floor((S.days-c.born)/90)});
  }
  worldTick();
}
function completeQuest(q){
  if(q.done)return;q.done=true;
  S.xp+=q.rx;S.caps+=q.rg;S.questsComplete++;
  if(q.fac)S.rep[q.fac]=(S.rep[q.fac]||0)+5;
  log('Quest complete: '+q.name+' (+'+q.rg+' caps, +'+q.rx+' XP)','q');
  notify('📜 Quest Complete!');chkLU();
}
function dailyEvent(){
  if(R()<.3){
    const events=[
      ()=>{const g=rnd(5,15);S.caps+=g;log('Found '+g+' caps in an old cache.','e')},
      ()=>{log('Radio New Vegas: "'+rndA(["This is Mr. New Vegas, and I love you.","The NCR reports increased Legion activity.","Travelers beware: Deathclaws near Quarry Junction.","The Strip is open for business, baby."])+'".','e')},
      ()=>{if(S.companions.length){const c=rndA(S.companions);log(c.name+': "'+rndA(["Stay sharp.","I've got a bad feeling.","We should keep moving.","Watch the ridgeline."])+'"','e')}},
    ];
    rndA(events)();
  }
}
function worldTick(){
  if(!S.worldEvents)S.worldEvents=[];
  if(S.days-S.lastWorldTick<5)return;
  S.lastWorldTick=S.days;
  if(R()<.5&&S.worldEvents.length<3){
    const templates=[
      {title:'NCR patrols increase near {loc}',type:'military',duration:10},
      {title:'Legion raids reported near {loc}',type:'raid',duration:8},
      {title:'Caravan route to {loc} reopened',type:'trade',duration:12},
      {title:'Fiend attacks intensify near {loc}',type:'raid',duration:7},
      {title:'Water supply issues at {loc}',type:'crisis',duration:6},
    ];
    const t=rndA(templates);const locKey=rndA(Object.keys(LOCS));
    const title=t.title.replace('{loc}',LOCS[locKey]?.n||'somewhere');
    S.worldEvents.push({...t,title,started:S.days,loc:locKey});
    log('📰 '+title,'e');
  }
  S.worldEvents=S.worldEvents.filter(ev=>S.days-ev.started<ev.duration);
}

// ============================================================
// INIT
// ============================================================
(function init(){
  if(load()){upAll()}else{newGame()}
})();
</script>
