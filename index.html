function getNpcRolePool(ctx={}){
  const locId=ctx.loc||S.loc||'';
  const bId=(ctx.bId||'').toLowerCase();
  const fac=((ctx.fac||((LOCS[locId]||{}).fac)||'')+'').toLowerCase();

  if(fac==='bos'||bId.includes('bos')||locId==='HiddenValley')return['Brotherhood Knight','Brotherhood Paladin','Brotherhood Scribe','Brotherhood Initiate','Brotherhood Guard','Brotherhood Technician'];
  if(fac==='ncr'||['CampMcCarran','CampGolf','BitterSprings','HeliosOne','HooverDam','MojaveOutpost','CampForlornHope'].includes(locId)||/(mccarran|golf|bitter|helios|outpost|dam|forlorn)/.test(bId))return['NCR Trooper','NCR Ranger','NCR Scout','NCR Officer','NCR Medic','NCR Engineer'];
  if(fac==='powdergangers'||locId==='NCRCF'||bId.includes('ncrcf'))return['Powder Ganger','Powder Ganger Trader','Prisoner','Powder Ganger Guard','Escaped Convict'];
  if(fac==='legion'||locId==='TheFort'||locId==='NelsonCamp'||locId==='CottonwoodCove'||/(legion|caesar|cove)/.test(bId))return['Legion Recruit','Legion Veteran','Legion Scout','Legion Handler','Legion Priest'];
  if(fac==='boomers'||locId==='NellisAFB'||bId.includes('nellis'))return['Boomer Guard','Boomer Mechanic','Boomer Pilot','Boomer Loader','Boomer Doctor'];
  if(fac==='kings'||locId==='FreesideN'||/(king|wrangler|mick|mormon|silver_rush|cerulean)/.test(bId))return['Merchant','Drifter','King Member','Mechanic','Doctor','Guard'];
  return['Trader','Prospector','Drifter','NCR Trooper','Caravan Guard','Settler','Scavenger','Doctor','Gambler','Bounty Hunter','Mechanic','Farmer'];
}
function inferNpcIcon(npc,ctx={}){
  const locId=ctx.loc||npc.loc||S.loc||'';
  const bId=(ctx.bId||'').toLowerCase();
  const role=((npc.role||'')+'').toLowerCase();
  const fac=((npc.fac||ctx.fac||((LOCS[locId]||{}).fac)||'')+'').toLowerCase();

  if(npc.icon)return npc.icon;
  if(fac==='bos'||bId.includes('bos')||locId==='HiddenValley'||role.includes('brotherhood'))return(role.includes('scribe')||role.includes('technician')||role.includes('scientist'))?ICONS.NPC.BOS_SCRIBE:ICONS.NPC.BOS;
  if(fac==='ncr'||role.includes('ncr')||['CampMcCarran','CampGolf','BitterSprings','HeliosOne','HooverDam','MojaveOutpost','CampForlornHope'].includes(locId)||/(mccarran|golf|bitter|helios|outpost|dam|forlorn)/.test(bId)){
    if(role.includes('ranger'))return ICONS.NPC.NCR_RANGER;
    if(role.includes('medic')||role.includes('doctor'))return ICONS.NPC.NCR_MEDIC;
    if(role.includes('officer')||role.includes('sergeant')||role.includes('lieutenant')||role.includes('captain')||role.includes('major')||role.includes('chief')||role.includes('command'))return ICONS.NPC.NCR_COMMAND;
    if(role.includes('scout'))return ICONS.NPC.NCR_SCOUT;
    return ICONS.NPC.NCR;
  }
  if(fac==='followers'||role.includes('follower'))return ICONS.NPC.FOLLOWERS;
  if(fac==='powdergangers'||locId==='NCRCF'||bId.includes('ncrcf')||role.includes('powder ganger'))return role.includes('trader')?ICONS.NPC.POWDER_TRADER:(role.includes('prisoner')||role.includes('convict')?ICONS.NPC.PRISONER:ICONS.NPC.POWDER_GANGER);
  if(fac==='kings'||role.includes('king'))return ICONS.NPC.KINGS;
  if(fac==='boomers'||locId==='NellisAFB'||bId.includes('nellis')||role.includes('boomer'))return role.includes('doctor')?ICONS.NPC.DOCTOR:(role.includes('mechanic')?ICONS.NPC.MECHANIC:ICONS.NPC.BOOMERS);
  if(role.includes('merchant')||role.includes('trader'))return ICONS.NPC.MERCHANT;
  if(role.includes('cook'))return ICONS.NPC.COOK;
  if(role.includes('robot'))return ICONS.NPC.ROBOT;
  if(role.includes('law')||role.includes('deputy')||role.includes('guard'))return ICONS.NPC.LAW;
  if(role.includes('doctor'))return ICONS.NPC.DOCTOR;
  if(role.includes('mechanic')||role.includes('engineer')||role.includes('technician'))return ICONS.NPC.MECHANIC;
  if(role.includes('ranch'))return ICONS.NPC.RANCHER;
  if(role.includes('entertainer'))return ICONS.NPC.ENTERTAINER;
  return npc.male?ICONS.NPC.MALE:ICONS.NPC.FEMALE;
}
function mkNPC(ctx={}){
  const male=R()<.5;
  const name=(male?rndA(FM):rndA(FF))+' '+rndA(LN);
  const role=rndA(getNpcRolePool(ctx));
  const npc={name,male,age:rnd(18,55),role,loc:ctx.loc||S.loc,fac:ctx.fac||((LOCS[ctx.loc||S.loc]||{}).fac)||''};
  npc.icon=inferNpcIcon(npc,ctx);
  return npc;
}
function getBuildingNpcKey(loc,bId,slot='main'){
  return `${loc||S.loc}::${bId}::${slot}`;
}
function getBuildingNpc(loc,bId,ctx={},slot='main'){
  if(!S.buildingNpcs)S.buildingNpcs={};
  const key=getBuildingNpcKey(loc,bId,slot);
  if(!S.buildingNpcs[key]){
    S.buildingNpcs[key]=mkNPC(Object.assign({},ctx,{loc:loc||S.loc,bId}));
  }
  return S.buildingNpcs[key];
}
function getBuildingNpcGroup(loc,bId,countFactory,ctx={},slot='group'){
  if(!S.buildingNpcs)S.buildingNpcs={};
  const key=getBuildingNpcKey(loc,bId,slot);
  if(!Array.isArray(S.buildingNpcs[key])||!S.buildingNpcs[key].length){
    const count=typeof countFactory==='function'?countFactory():countFactory;
    S.buildingNpcs[key]=Array.from({length:Math.max(1,count||1)},(_,i)=>mkNPC(Object.assign({},ctx,{loc:loc||S.loc,bId,slot:`${slot}_${i}`})));
  }
  return S.buildingNpcs[key];
}
function openNPCInteraction(npc,existing){
  let rel=existing;
  if(!rel){rel={name:npc.name,rel:'stranger',aff:0,male:npc.male,age:npc.age,role:npc.role,loc:npc.loc||S.loc,fac:npc.fac,icon:inferNpcIcon(npc),met:S.days};S.relationships.push(rel)}
  const aff=rel.aff;
  const canFlirt=npc.male!==S.isMale&&!S.spouse;

  let h=`<h3 style="display:flex;align-items:center;gap:8px"><span style="font-size:28px">${renderIcon(inferNpcIcon(npc),28)}</span><span style="color:var(--amber)">${npc.name}</span></h3>
  <div style="font-size:10px;color:var(--muted);margin-bottom:6px">${npc.role} · Age ${npc.age} · ${rel.rel}</div>
  ${aff?`<div class="hb" style="margin-bottom:8px"><div class="hf g" style="width:${aff}%"></div></div>`:''}
  <div class="npc-line">"${rndA(["Hey there.","What do you want?","Looking for something?","Watch yourself out there.","Got caps? I got time.","You look like trouble.","Need something?","Stay safe, stranger."])}"</div>`;

  const safeName=npc.name.replace(/'/g,"\'");
  h+=`<button class="bt" onclick="npcAct('chat','${safeName}')">💬 Talk</button>`;
  h+=`<button class="bt" onclick="npcAct('rumour','${safeName}')">📡 Ask for rumours</button>`;
  h+=`<button class="bt" onclick="npcAct('quest','${safeName}')">📜 Ask for work</button>`;
  h+=`<button class="bt" onclick="npcAct('favour','${safeName}')">🤝 Request favour</button>`;
  h+=`<button class="bt" onclick="npcAct('drink','${safeName}')">🍺 Share supplies (5 caps)</button>`;
  if(aff>=45)h+=`<button class="bt pip" onclick="npcAct('recruit','${safeName}')">🧭 Ask to travel with you</button>`;
  h+=`<button class="bt dn" onclick="closeDlg()">Walk away</button>`;
  openDlg(h);
}
function npcAct(action,name){
  let rel=S.relationships.find(r=>r.name===name);
  if(!rel){rel={name,rel:'stranger',aff:0,male:R()<.5,age:rnd(20,50),role:'Wastelander',loc:S.loc,icon:null,met:S.days};S.relationships.push(rel)}
  let msg='',affChange=0;

  switch(action){
    case 'chat': affChange=rnd(3,8);msg=rndA(["You swap stories about the wasteland.","You talk about the NCR and Legion.","A pleasant conversation about survival.","You discuss trade routes."]);break;
    case 'compliment': if(R()<.8){affChange=rnd(5,12);msg=rndA(["They appreciate the kind words.","They smile.","That seemed to land well."])}else{affChange=-3;msg="They seem suspicious of flattery."};break;
    case 'flirt': if(R()<.5+(S.special?S.special[3]*.04:0)){affChange=rnd(8,18);msg=rndA(["They blush.","They lean closer.","Chemistry in the wasteland."])}else{affChange=-5;msg="Awkward silence."}break;
    case 'drink': if(S.caps<5){notify("Not enough caps.");return}S.caps-=5;affChange=rnd(5,15);msg="You share drinks. Trust builds.";break;
    case 'quest':
      if(R()<.5){
        const q=mkQuest(name);
        window._pendingQuest=q;closeDlg();showResult('New Quest!','📜',[`<b>${q.name}</b>`,q.desc,`💰 ${q.rg} caps · ⭐ ${q.rx} XP`],'Accept','acceptPendingQuest()');
        return;
      }else{msg="They don't have anything right now."};break;
    case 'recruit':
      if(S.companions.length>=2){notify("Max 2 companions.");return}
      if(rel.aff<40){notify("Not friendly enough.");return}
      S.companions.push({name,hp:40+S.level*5,maxHp:40+S.level*5,atk:5+S.level,def:3+Math.floor(S.level*.5),male:rel.male,role:rel.role||'Companion',loc:rel.loc||S.loc,fac:rel.fac,icon:rel.icon||inferNpcIcon(rel,{loc:rel.loc||S.loc})});
      rel.rel='companion';msg=name+" joins you!";log(name+' is now your companion.','q');break;
    case 'propose':
      if(R()<(rel.aff/100)){
        S.spouse={name,aff:rel.aff,male:rel.male};rel.rel='spouse';
        msg=name+" says yes!";log('Married '+name+'!','q');
      }else{msg="They're not ready.";affChange=-5}break;
  }
  rel.aff=Math.max(0,Math.min(100,rel.aff+(affChange>0?affChange+Math.floor((S.charmPerk||0)/5):affChange)));
  if(affChange>0&&rel.rel==='stranger')rel.rel='acquaintance';
  if(rel.aff>=30&&rel.rel==='acquaintance')rel.rel='friend';
  if(rel.aff>=60&&rel.rel==='friend')rel.rel='close friend';
  log(msg,'e');save();
  closeDlg();
  if(msg)notify(msg);
  upAll();
}

function findBooneBill(){

function finishBooneQuest(){

function countMat(id){return S.inv?S.inv.filter(x=>x===id).length:0}

function canCraft(recipe,advanced){
  if(recipe.advanced&&!advanced)return false;
  return recipe.mats.every(m=>countMat(m.id)>=m.qty);
}

function doCraft(recipeId,bId){
  const recipe=RECIPES.find(r=>r.id===recipeId);if(!recipe)return;
  const hasWorkbench=S.properties.some(p=>p.id==='goodsprings_workshop');
  if(!canCraft(recipe,hasWorkbench)){notify('Missing materials.');return}
  // Remove mats
  recipe.mats.forEach(m=>{
    let removed=0;
    for(let i=S.inv.length-1;i>=0&&removed<m.qty;i--){
      if(S.inv[i]===m.id){S.inv.splice(i,1);removed++;}
    }
  });
  // Give output
  for(let i=0;i<recipe.qty;i++) giveItem(recipe.out,1,{ignoreLimit:false,silent:false});
  const out=ITEMS[recipe.out];
  const label=recipe.qty>1?`${out.e} ${out.n} ×${recipe.qty}`:`${out.e} ${out.n}`;
  log(`Crafted: ${out.n}${recipe.qty>1?' ×'+recipe.qty:''}.`,'e');
  advanceTime(1);
  save();
  // Re-render the building
  closeBld();
  showResult('Crafted!','🔧',[label,'⏰ 1 hour passed'],'Continue','openBld("'+bId+'")');
}

function bldWorkshop(body,bId){
  const hasWorkbench=S.properties.some(p=>p.id==='goodsprings_workshop');

  body.appendChild(el('div','bs2','Craft'));
  body.appendChild(el('div','cd',`<div style="font-size:11px;color:var(--muted)">Use materials from your inventory to craft items.${hasWorkbench?'':' <span style="color:var(--amber2)">Own the Goodsprings Workshop to unlock Advanced recipes.</span>'}</div>`));

  const cats=[...new Set(RECIPES.map(r=>r.cat))];
  cats.forEach(cat=>{
    const inCat=RECIPES.filter(r=>r.cat===cat);
    // Hide Advanced if no workbench and all locked
    if(cat==='Advanced'&&!hasWorkbench)return;
    body.appendChild(el('div','bs2 fade-in',cat));
    inCat.forEach(recipe=>{
      if(recipe.advanced&&!hasWorkbench)return;
      const out=ITEMS[recipe.out];if(!out)return;
      const canDo=canCraft(recipe,hasWorkbench);
      const card=el('div','craft-card');
      const matHtml=recipe.mats.map(m=>{
        const have=countMat(m.id);
        const ok=have>=m.qty;
        const mat=ITEMS[m.id];
        return `<span class="craft-mat ${ok?'ok':'missing'}">${mat?mat.e:'?'} ${mat?mat.n:m.id} ${have}/${m.qty}</span>`;
      }).join(' ');
      card.innerHTML=`<div class="craft-row" style="margin-bottom:5px">
        <span style="font-size:20px">${out.e}</span>
        <div style="flex:1"><div style="font-size:12px;font-weight:bold;color:${canDo?'var(--green)':'var(--text)'}">${out.n}${recipe.qty>1?' ×'+recipe.qty:''}</div>
        <div style="font-size:10px;color:var(--muted)">${recipe.desc}</div></div>
      </div>
      <div style="margin-bottom:6px">${matHtml}</div>`;
      const btn=el('button',canDo?'bt go':'bt',canDo?'🔧 Craft':'🔒 Missing materials');
      btn.disabled=!canDo;
      btn.onclick=()=>doCraft(recipe.id,bId);
      card.appendChild(btn);

  S.caps-=10;S.inv.splice(si,1);S.atk+=1;advanceTime(1);log('Repaired gear. +1 ATK.','e');
  closeBld();showResult('Repaired','🔧',['⚔ +1 ATK','Used Scrap Metal','⏰ 1 hour passed'],'Continue','openBld("'+bId+'")')};
  body.appendChild(repairBtn);

function propertyOwned(id){return !!S.properties.find(p=>p.id===id)}
function getPropertyDef(id){return PROPERTY_DEFS.find(p=>p.id===id)||null}
function propertyAtLoc(loc){return S.properties.filter(p=>p.loc===loc)}
function canBuyProperty(def){
  if(!def||propertyOwned(def.id))return false;
  if(def.requires){
    const rep=S.rep[def.requires.fac]||0;
    if(rep<def.requires.rep)return false;
  }
  return S.caps>=def.cost;
}
function propertyReady(flagKey){return (S.flags[flagKey]||0)!==S.days}
function markPropertyUsed(flagKey){S.flags[flagKey]=S.days;queueSave()}
function getCurrentBounty(){
  const b=S.flags.bountyBoard?.current;
  if(!b)return null;
  return PRIMM_BOUNTY_TARGETS.find(t=>t.id===b.id)||null;
}
function rollNewBounty(){
  const board=S.flags.bountyBoard||(S.flags.bountyBoard={});
  const used=board.lastTarget||null;
  const pool=PRIMM_BOUNTY_TARGETS.filter(t=>t.id!==used);
  const pick=clone(rndA(pool.length?pool:PRIMM_BOUNTY_TARGETS));
  board.current={id:pick.id,day:S.days};
  board.lastTarget=pick.id;
  return pick;
}
function startPrimmBountyHunt(){
  if(!propertyOwned('primm_bounty_office')){notify('You do not own the bounty office.');return}
  const target=getCurrentBounty()||rollNewBounty();
  advanceTime(2);
  const en=mkEnemy(target.enemy);
  en.name=target.name;
  en.maxHp=Math.round(en.maxHp*1.2)+8;
  en.hp=en.maxHp;
  en.a+=3;
  en.d+=1;
  en.xp+=target.xp;
  en.loot=clone(target.itemPool||en.loot||[]);
  closeBld();
  combat={enemies:[en],turn:0,log:[`Bounty target spotted: ${target.name}.`,target.desc],bountyTarget:clone(target)};
  renderCombat();
}

  });

function equipItem(id,slot){
  const idx=S.inv.indexOf(id);if(idx===-1)return;
  if(S.gear[slot])giveItem(S.gear[slot],1,{ignoreLimit:true,silent:true});
  S.gear[slot]=id;S.inv.splice(idx,1);
  log('Equipped '+ITEMS[id]?.n+'.','n');notify('Equipped '+ITEMS[id]?.n);upInv();save();
}
function useItem(id){
  const idx=S.inv.indexOf(id);if(idx===-1)return;
  const it=ITEMS[id];if(!it)return;
  if(it.hp){S.hp=Math.min(S.maxHp,S.hp+it.hp);log('Used '+it.n+'. +'+it.hp+' HP.','e');notify('❤ +'+it.hp+' HP')}
  if(it.buff){if(it.buff.ap)S.ap=Math.min(S.maxAp,S.ap+it.buff.ap)}
  S.inv.splice(idx,1);upInv();upSB();save();
}
function dropItem(id){
  const idx=S.inv.indexOf(id);if(idx===-1)return;
  S.inv.splice(idx,1);log('Dropped '+ITEMS[id]?.n+'.','n');upInv();save();
}
function unequipSlot(slot){
  if(!S.gear||!S.gear[slot])return;
  const id=S.gear[slot];
  giveItem(id,1,{ignoreLimit:true,silent:true});
  S.gear[slot]=null;
  log('Unequipped '+(ITEMS[id]?.n||id)+'.','n');
  notify('Unequipped '+(ITEMS[id]?.n||id));
  upInv();save();
}
function sellJunk(){
  // Sell all material-type items (type 'm') at half price
  const junkIds=S.inv.filter(id=>ITEMS[id]&&ITEMS[id].t==='m');
  if(!junkIds.length){notify('No junk to sell.');return}
  let total=0;
  const sold={};
  junkIds.forEach(id=>{
    total+=Math.floor((ITEMS[id].p||0)*0.5);
    sold[id]=(sold[id]||0)+1;
  });
  S.inv=S.inv.filter(id=>!(ITEMS[id]&&ITEMS[id].t==='m'));
  S.caps+=total;
  S.capsEarned=(S.capsEarned||0)+total;
  const names=Object.entries(sold).map(([id,n])=>`${ITEMS[id]?.n||id}${n>1?' ×'+n:''}`).join(', ');
  log(`Sold junk: ${names} for ${total} caps.`,'e');
  notify(`💰 Sold junk for ${total} caps`);
  upInv();upSB();save();
}

function upRoads(){
  const tab=$('roads-tab');if(!S)return;tab.innerHTML='';
  tab.appendChild(el('div','sh','Travel from '+LOCS[S.loc]?.n));
  const roads=ROADS[S.loc]||{};
  if(!Object.keys(roads).length){tab.appendChild(el('div','cd','No known routes.'));return}
  Object.entries(roads).forEach(([dest,days])=>{

    const dgColor=loc.dg>=4?'var(--red)':loc.dg>=2?'var(--amber2)':'var(--muted)';
    const dc=el('div','bc big-icon-card');
    dc.innerHTML=`<div class="card-icon-lg">${loc.e}</div><div style="flex:1"><div style="font-weight:bold;font-size:13px">${loc.n}</div><div style="font-size:10px;color:var(--muted)">${loc.r} · ~${days} day${days>1?'s':''} · <span style="color:${dgColor}">${'☠'.repeat(loc.dg)||'Safe'}</span></div><div style="font-size:10px;color:var(--muted);font-style:italic">${loc.d.substring(0,50)}${loc.d.length>50?'...':''}</div></div><div style="color:var(--muted)">›</div>`;
    dc.onclick=()=>beginTravel(dest,days);
    tab.appendChild(dc);
  });

function beginTravel(dest,days){
  if(combat)return;tDest=dest;
  tQ=genTravelEv(days,S.loc,dest);
  $('TO').classList.add('A');$('TB').style.width='0%';$('TC').innerHTML='';$('TN').style.display='none';
  nextTEv();
}
function genTravelEv(days,from,to){
  const evs=[];const total=days*2+rnd(1,3);
  for(let i=0;i<total;i++){
    const r=R();
    if(r<.3){
      const dloc=LOCS[to];
      const enPool=dloc?.sur?.length?rndA(dloc.sur).en:['gecko','bloatfly'];
      const validPool=enPool.filter(e=>ENEMIES[e]);
      if(validPool.length){
        const cnt=rnd(1,2);
        const enemies=buildCohesiveGroup(validPool,cnt);
        if(enemies.length)evs.push({tp:'combat',e:enemies[0].e,tx:'',enemies,_i:i,_t:total});
      }
    }else if(r<.48){
      const finds=['stimpak','sunset_sars','dirty_water','cram','iguana_bits','ammo_9mm','ammo_10mm','ammo_357','ammo_556','ammo_shells','energy_cell','herbs','scrap','pre_war_money','wonderglue','wrench','scrap_electronics','camera','cigarette_pack','cigarette_carton','silverware','silver_watch','gold_necklace','conductor'];
      const fi=rndA(finds);const it=ITEMS[fi];
      evs.push({tp:'loot',e:'✨',tx:`You spot something: <b style="color:var(--green)">${it?.e} ${it?.n}</b>`,fn:()=>{if(fi&&ITEMS[fi])giveItem(fi);log('Found '+it?.n+' on the road.','e')},_i:i,_t:total});
    }else if(r<.72){
      // Encounter card — use destination location for flavour
      const card=rollEncounterCard(to,null);
      if(card)evs.push({tp:'encounter',e:card.icon,tx:'',card,_i:i,_t:total});
      else{
        const scenes=["The road stretches endlessly.","Heat waves shimmer off the asphalt.","You pass a rusted pre-war car.","A brahmin caravan passes going the other way.","Dust devils spin across the highway.","Radio signals fade in and out."];
        evs.push({tp:'scene',e:rndA(['🏜','🌵','☀','🛣']),tx:rndA(scenes),_i:i,_t:total});
      }
    }else{
      const scenes=["The road stretches endlessly.","Heat waves shimmer off the asphalt.","You pass a rusted pre-war car.","A brahmin caravan passes going the other way.","Dust devils spin across the highway.","Radio signals fade in and out."];
      evs.push({tp:'scene',e:rndA(['🏜','🌵','☀','🛣']),tx:rndA(scenes),_i:i,_t:total});
    }
  }
  return evs;
}
function nextTEv(){
  if(!tQ.length){finTravel();return}
  const ev=tQ.shift();
  $('TB').style.width=Math.round(((ev._i+1)/ev._t)*100)+'%';
  $('TS').innerHTML=ev.e;$('TT').innerHTML=ev.tx;$('TC').innerHTML='';$('TN').style.display='none';
  if(ev.tp==='combat'){
    preEncounter(ev.enemies,null,0,true);
    return;
  }
  if(ev.tp==='encounter'){
    // Travel encounter card — choices resume travel on resolve
    const card=ev.card;
    $('TS').innerHTML=card.icon;
    $('TT').innerHTML=`<b style="color:var(--amber)">${card.title}</b><br><span style="font-size:11px;color:var(--muted)">${card.body}</span>`;
    const cd=$('TC');cd.innerHTML='';
    card.choices.forEach((ch,i)=>{
      const btn=el('button','bt','');btn.style.textAlign='left';btn.textContent=ch.label;
      btn.onclick=()=>{
        const customResult=ch.fn();
        if(combat){
          combat.postT=tDest;
          combat._encTitle=card.title;
          combat._encResult=customResult||ch.result||'The road encounter is resolved.';
          return;
        }
        chkLU();save();
        const resultText=customResult||ch.result||'Done.';
        $('TC').innerHTML='';
        $('TS').innerHTML='✅';
        $('TT').innerHTML=`<div style="font-size:12px;color:var(--green);margin-bottom:4px"><b>${card.title}</b></div><div style="font-size:11px;color:var(--muted)">${resultText}</div>`;
        showResult(card.title,'✅',[resultText],'Continue','travelCont()');
      };
      cd.appendChild(btn);
    });
    return;
  }
  if(ev.fn)ev.fn();
  $('TN').style.display='block';$('TN').onclick=()=>travelCont();
}
function finTravel(){
  if(tDest){
    S.loc=tDest;S.days++;S.hours=8;
    payDaily();
    log('Arrived at '+LOCS[S.loc]?.n+'.','q');
  }
  tDest=null;tQ=[];
  upSB();
  refreshActiveTab();
  save();
  $('TO').classList.remove('A');
}

function relTitle(v){
  v=Number(v||0);
  if(v>=80)return 'Loyal';
  if(v>=60)return 'Close Ally';
  if(v>=35)return 'Trusted';
  if(v>=15)return 'Friendly';
  if(v<=-20)return 'Hostile';
  if(v<0)return 'Wary';
  return 'Neutral';
}
function getNpcRumour(rel){
  const loc=LOCS[rel.loc||S.loc]||LOCS[S.loc];
  const s=rndA((loc&&loc.sur)||[]);
  const roads=Object.keys(ROADS[S.loc]||{});
  const road=rndA(roads);
  const fac=rel.fac||loc?.fac||'';
  if(s)return rel.name+' mentions '+s.n+': '+s.d;
  if(road)return rel.name+' says the road toward '+(LOCS[road]?.n||road)+' has been busy lately.';
  if(fac)return rel.name+' says '+(FACTIONS[fac]||fac)+' patrols have been active nearby.';
  return rel.name+' has not heard anything useful today.';
}
function npcFavour(rel){
  if((rel.aff||0)<20)return {ok:false,msg:rel.name+' does not trust you enough yet.'};
  const roll=R();
  if(roll<.35){S.hp=Math.min(S.maxHp,S.hp+15);return{ok:true,msg:rel.name+' patches you up a little. +15 HP'}}
  if(roll<.7){const ammo=rndA(['ammo_9mm','ammo_10mm','ammo_357','ammo_556']);addItem(ammo,rnd(3,8));return{ok:true,msg:rel.name+' hands over spare '+ITEMS[ammo].n+'.'}}
  const caps=rnd(8,22);S.caps+=caps;return{ok:true,msg:rel.name+' tips you toward a small paying lead. +'+caps+' caps'};
}
function ensureLocalContacts(){
  if(!S.localContacts)S.localContacts={};
  const loc=S.loc||'Goodsprings';
  if(!S.localContacts[loc]){
    S.localContacts[loc]=Array.from({length:rnd(2,4)},()=>mkNPC({loc}));
  }
  return S.localContacts[loc];
}
function meetLocalContact(){
  const list=ensureLocalContacts();
  const unknown=list.filter(n=>!S.relationships.find(r=>r.name===n.name));
  const npc=rndA(unknown.length?unknown:list);
  openNPCInteraction(npc,S.relationships.find(r=>r.name===npc.name));
}

    '<div class="hb" style="margin-top:4px"><div class="hf g" style="width:'+pct+'%"></div></div>'+ 
    (r.last?'<div style="font-size:10px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+r.last+'</div>':'')+'</div>';
    card.onclick=()=>openNPCInteraction({name:r.name,male:r.male,age:r.age,role:r.role||'Wastelander',loc:r.loc||S.loc,fac:r.fac,icon:r.icon},r);
    tab.appendChild(card);
  });
  const locals=ensureLocalContacts();
  tab.appendChild(el('div','sh','Local Faces'));
  locals.forEach(n=>{
    const met=S.relationships.find(r=>r.name===n.name);
    const c=el('div','inv-card');c.style.cursor='pointer';
    c.innerHTML='<div class="inv-row"><div>'+renderIcon(n.icon||inferNpcIcon(n,{loc:S.loc}),18)+' '+(met?n.name:'Unknown '+(n.role||'Local'))+'</div><div style="font-size:10px;color:var(--muted)">'+(met?relTitle(met.aff):'Unmet')+'</div></div>';
    c.onclick=()=>openNPCInteraction(n,met);
    tab.appendChild(c);
  });
  if(S.log&&S.log.length){
    tab.appendChild(el('div','sh','Recent Activity'));
    const recent=(S.log[0].entries||[]).slice(-5).reverse().map(e=>'<div class="log-entry '+(e.type==='c'?'combat-log':e.type==='q'?'quest-log':'event-log')+'">'+e.text+'</div>').join('');
    tab.appendChild(el('div','cd',recent));
  }
}
function upLog(){
  const tab=$('log-tab');if(!S)return;tab.innerHTML='';
  tab.appendChild(el('div','sh','Chronicle'));
  if(!S.log||!S.log.length){tab.appendChild(el('div','cd','<span style="color:var(--muted)">No entries.</span>'));return}
  S.log.forEach((dg,di)=>{
    const group=el('div','log-group');
    const header=el('div','log-header');
    header.innerHTML=`<span style="color:var(--amber)">Day ${dg.day}</span><span style="font-size:10px;color:var(--muted)">${dg.entries.length} events</span>`;
    const entries=el('div','log-entries'+(di===0?' open':''));
    dg.entries.forEach(e=>{
      const le=el('div','log-entry '+(e.type==='c'?'combat-log':e.type==='e'?'event-log':e.type==='q'?'quest-log':''));
      le.innerHTML=e.text;entries.appendChild(le);
    });
    header.onclick=()=>entries.classList.toggle('open');
    group.appendChild(header);group.appendChild(entries);tab.appendChild(group);
  });

  // Game controls
  tab.appendChild(el('div','sh','System'));
  const ng=el('button','bt dn','🔄 New Game');ng.style.textAlign='center';
  ng.onclick=()=>confirmNewGame();
  tab.appendChild(ng);
}

// ============================================================
// TIME & ECONOMY
// ============================================================
function advanceTime(hours){
  S.hours=(S.hours||8)+hours;
  while(S.hours>=24){S.hours-=24;S.days++;payDaily();dailyEvent()}
  // Quest progress
  S.quests.forEach(q=>{
    if(q.done)return;
    if(q.t==='kill'&&q.kt){q.kd=S.kills[q.kt]||0;if(q.kd>=q.kc)completeQuest(q)}
    if(q.t==='explore'){q.ed=(q.ed||0);if(q.ed>=q.ec)completeQuest(q)}
  });
  if(S.flags&&S.flags.hv)hvRefreshState();
  gsRefreshState();
  if(typeof novacRefreshState==='function')novacRefreshState();
  // AP regen
  S.ap=Math.min(S.maxAp,S.ap+Math.floor(hours*3));
}
function payDaily(){
  // Age
  if(S.days%90===0){
    S.age++;
    if(S.spouse&&R()<.2&&S.children.length<4){
      const cm=R()<.5;const cn=(cm?rndA(FM):rndA(FF))+' '+S.name.split(' ').pop();
      S.children.push({name:cn,male:cm,born:S.days,age:0});
      log('A child is born! '+cn,'e');notify('👶 '+cn+' is born!');
    }
    S.children.forEach(c=>{c.age=Math.floor((S.days-c.born)/90)});
  }
  worldTick();
}
function completeQuest(q){
  if(q.done)return;q.done=true;
  S.xp+=grantXP(q.rx);S.caps+=q.rg;S.questsComplete++;
  if(q.fac){const gain=(q.repBonus||5)*(S.leaderPerk?2:1);S.rep[q.fac]=(S.rep[q.fac]||0)+gain;}
  log('Quest complete: '+q.name+' (+'+q.rg+' caps, +'+q.rx+' XP)','q');
  notify('📜 Quest Complete!');chkLU();
}
function dailyEvent(){
  if(R()<.3){
    const events=[
      ()=>{const g=rnd(5,15);S.caps+=g;log('Found '+g+' caps in an old cache.','e')},
      ()=>{log('Radio New Vegas: "'+rndA(["This is Mr. New Vegas, and I love you.","The NCR reports increased Legion activity.","Travelers beware: Deathclaws near Quarry Junction.","The Strip is open for business, baby."])+'".','e')},
      ()=>{if(S.companions.length){const c=rndA(S.companions);log(c.name+': "'+rndA(["Stay sharp.","I've got a bad feeling.","We should keep moving.","Watch the ridgeline."])+'"','e')}},
    ];
    rndA(events)();
  }
}
function worldTick(){
  if(!S.worldEvents)S.worldEvents=[];
  if(S.days-S.lastWorldTick<5)return;
  S.lastWorldTick=S.days;
  if(R()<.5&&S.worldEvents.length<3){
    const templates=[
      {title:'NCR patrols increase near {loc}',type:'military',duration:10},
      {title:'Legion raids reported near {loc}',type:'raid',duration:8},
      {title:'Caravan route to {loc} reopened',type:'trade',duration:12},
      {title:'Fiend attacks intensify near {loc}',type:'raid',duration:7},
      {title:'Water supply issues at {loc}',type:'crisis',duration:6},
    ];
    const t=rndA(templates);const locKey=rndA(Object.keys(LOCS));
    const title=t.title.replace('{loc}',LOCS[locKey]?.n||'somewhere');
    S.worldEvents.push({...t,title,started:S.days,loc:locKey});
    log('📰 '+title,'e');
  }
  S.worldEvents=S.worldEvents.filter(ev=>S.days-ev.started<ev.duration);
}

// ============================================================
// INIT
// ============================================================
// Global error shield — catches any uncaught JS exception and shows
// a brief non-intrusive toast rather than silently breaking.
window.addEventListener('error',ev=>{
  if(S)queueSave(50); // emergency save on any error
  console.error('[FNV-RPG]',ev.message,ev.filename,ev.lineno);
});
window.addEventListener('unhandledrejection',ev=>{
  if(S)queueSave(50);
  console.error('[FNV-RPG promise]',ev.reason);
});

(async function init(){
  try{
    bindAutoSave();
    startAutoSaveLoop();
    requestPersistentStorage();
    if(await loadAsync()){upAll();save(true);snapshotState()}else{newGame()}
  }catch(e){
    console.error('[FNV-RPG init error]',e);
    // Last-resort: try to boot a new game if init fails
    try{newGame()}catch(e2){console.error('[FNV-RPG] Fatal init failure',e2)}
  }
})();
</script>
