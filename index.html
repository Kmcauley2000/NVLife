<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./apple-touch-icon.png">
<meta name="theme-color" content="#1a1a0e">
<title>Fallout: New Vegas RPG</title>
<style>
:root{--bg:#1a1a0e;--panel:#242418;--panel2:#1e1e14;--amber:#f0c850;--amber2:#c9a230;--green:#4aff4a;--green2:#2ecc2e;--red:#ff4444;--blue:#4488cc;--text:#e8e4d0;--muted:#9a9680;--line:#3a3828;--pip:#14cc64;--hp-red:#cc3333;--ap-blue:#3388cc;--xp-gold:#ccaa33;--st:max(env(safe-area-inset-top,0px),10px);--sb:max(env(safe-area-inset-bottom,0px),8px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
@font-face{font-family:'Pip';src:local('Courier New'),local('Courier');font-weight:normal}
body{background:var(--bg);font-family:'Courier New',monospace;color:var(--text);min-height:100dvh;overscroll-behavior:none;font-size:14px}
#W{max-width:430px;margin:0 auto;min-height:100dvh;overflow:hidden;position:relative;
background:linear-gradient(180deg,#1a1a0e 0%,#141410 100%)}
#H{position:sticky;top:0;background:linear-gradient(180deg,#1a1808,#141408);
color:var(--amber);text-align:center;padding:calc(var(--st)+8px) 12px 7px;min-height:52px;
font-size:13px;font-weight:bold;letter-spacing:3px;z-index:100;
border-bottom:1px solid #3a3418;text-transform:uppercase}
#H .sub{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:1px}
#SB{background:#0e0e08;color:var(--text);font-size:11px;display:flex;flex-wrap:wrap;padding:3px 4px;gap:1px;border-bottom:1px solid #282818}
#SB .s{flex:1 1 auto;text-align:center;padding:3px 4px;white-space:nowrap}
#SB .s b{color:var(--amber)}
#SB .s .g{color:var(--green)}
#SB .s .r{color:var(--red)}
.scanline{position:fixed;top:0;left:50%;transform:translateX(-50%);width:430px;height:100%;
pointer-events:none;z-index:999;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}
#C{padding:8px 10px;padding-bottom:calc(86px + var(--sb))}
#roads-tab.T.A{margin:-8px -10px;padding-bottom:calc(86px + var(--sb))}
.T{display:none}.T.A{display:block}
.T:not(.A){display:none!important}
#N{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
background:linear-gradient(0deg,#0e0e06,#1a1a0e);display:flex;
border-top:1px solid var(--amber2);z-index:100;padding-bottom:var(--sb)}
#N button{flex:1;padding:7px 1px calc(7px + var(--sb));background:0 0;color:var(--muted);border:0;
font-size:10px;text-align:center;cursor:pointer;line-height:1.2;min-height:58px;font-family:'Courier New',monospace}
#N button i{font-size:18px;display:flex;justify-content:center;align-items:center;height:26px;font-style:normal;margin-bottom:2px}
#N button.A{background:#2a2a10;color:var(--amber)}
.sh{color:var(--amber2);padding:4px 0;margin:12px 0 5px;font-size:11px;letter-spacing:2px;
text-transform:uppercase;border-bottom:1px solid #2a2818}
.cd{background:var(--panel);border:1px solid #2a2818;border-radius:6px;padding:8px;margin:4px 0}
.bt{display:block;width:100%;padding:11px 12px;margin:4px 0;background:#2a2a18;color:var(--text);
border:1px solid #3a3828;border-radius:4px;font-family:'Courier New',monospace;font-size:13px;
cursor:pointer;text-align:left;transition:transform 80ms;min-height:44px}
.bt:active{transform:scale(.97);filter:brightness(1.1)}
.bt.go{background:#2a3a18;color:var(--green);border-color:#3a4828}
.bt.dn{background:#3a1818;color:var(--red);border-color:#4a2828}
.bt.pip{background:#182a1a;color:var(--pip);border-color:#1a3a1a}
.bt:disabled{opacity:.4;transform:none}
.bt.sm{display:inline-block;width:auto;padding:6px 10px;font-size:11px;margin:2px;min-height:36px}
.hb{background:#1a1a10;border-radius:3px;height:9px;overflow:hidden;margin:3px 0;border:1px solid #2a2818}
.hf{height:100%;border-radius:2px;transition:width .3s}
.hf.hp{background:var(--hp-red)}.hf.ap{background:var(--ap-blue)}.hf.xp{background:var(--xp-gold)}
.hf.g{background:var(--green2)}.hf.lo{background:var(--amber2)}.hf.cr{background:var(--red)}
.bc{display:flex;align-items:center;gap:8px;padding:10px 10px;background:var(--panel);
border:1px solid #2a2818;border-radius:5px;margin:4px 0;cursor:pointer;min-height:48px}
.bc:active{background:#2a2a1a}
/* Overlays */
#CO{position:fixed;inset:0;background:rgba(5,5,2,.9);display:none;justify-content:center;
align-items:center;z-index:200;padding:calc(env(safe-area-inset-top,12px) + 8px) 12px calc(env(safe-area-inset-bottom,8px) + 8px);overflow-y:auto}
#CP{background:var(--panel);border:1px solid var(--amber2);border-radius:8px;padding:10px;
width:96%;max-width:400px;max-height:92vh;overflow-y:auto}
/* Building overlay */
#BO{position:fixed;inset:0;background:var(--bg);z-index:150;display:none;flex-direction:column;overflow:hidden}
#BO.A{display:flex}
#BI{height:100%;min-height:0;display:flex;flex-direction:column;overflow:hidden;padding-top:env(safe-area-inset-top,0px)}
.bh{display:flex;align-items:center;gap:8px;padding:14px 10px 8px;min-height:52px;
background:#141408;border-bottom:1px solid #2a2818;flex-shrink:0;z-index:10}
.bh img,.bh svg{width:28px!important;height:28px!important;max-width:28px!important;max-height:28px!important;object-fit:contain!important;display:inline-block!important;vertical-align:middle!important}
.bb{font-size:22px;color:var(--amber);cursor:pointer;padding:10px 14px;min-width:48px;min-height:48px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:rgba(240,200,80,0.15)}
.bp{padding:10px;overflow-y:auto;flex:1 1 auto;min-height:0;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:calc(96px + var(--sb))}
.bs2{color:var(--amber2);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
padding:3px 0;margin:10px 0 4px;border-bottom:1px solid #2a2818}
.ba{font-size:11px;color:var(--muted);font-style:italic;padding:6px 0;text-align:center;
border-bottom:1px solid #1a1810;margin-bottom:8px}
.bn{display:flex;align-items:center;gap:10px;padding:8px;background:#1a1a10;border-radius:6px;margin:4px 0}
/* Travel overlay */
#TO{position:fixed;inset:0;background:var(--bg);z-index:160;overflow-y:auto;display:none;
flex-direction:column;justify-content:center;align-items:center}
#TO.A{display:flex}
#TO>div{width:100%;max-width:430px;padding:20px 12px}
/* Dialog */
#DO{position:fixed;inset:0;background:rgba(5,5,2,.88);z-index:250;display:none;
justify-content:center;align-items:center;overflow-y:auto;padding:calc(var(--st) + 10px) 10px calc(var(--sb) + 10px)}
#DO.A{display:flex}
#DB{background:var(--panel);border:1px solid var(--amber2);border-radius:8px;padding:14px;
width:94%;max-width:380px;max-height:80vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
/* Result popup */
#RP{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--panel);
border:1px solid var(--amber2);border-radius:10px;padding:18px;width:90%;max-width:340px;
z-index:350;text-align:center;box-shadow:0 0 30px rgba(0,0,0,.6);display:none;opacity:0;transition:opacity .2s}
#RP.show{display:block;opacity:1}
#RBG{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:340;display:none}
#RBG.show{display:block}
/* Ticker */
#TK{position:fixed;top:calc(var(--st) + 44px);left:50%;transform:translateX(-50%);
width:90%;max-width:400px;z-index:300;pointer-events:none}
#TK .tk{background:#1a2a10;color:var(--green);padding:6px 12px;border-radius:4px;
font-size:11px;text-align:center;opacity:0;transition:opacity .3s;border:1px solid #2a3a18}
#TK .tk.show{opacity:1}
/* Notification */
#NF{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--panel);
color:var(--amber);padding:10px 20px;border-radius:6px;font-size:12px;z-index:400;
opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid var(--amber2)}
#NF.show{opacity:1}
/* Log */
.log-group{margin:4px 0;border:1px solid #2a2818;border-radius:4px;overflow:hidden}
/* Trade overlay */
#TRADE{position:fixed;inset:0;background:var(--bg);z-index:155;display:none;flex-direction:column;overflow:hidden;overscroll-behavior:contain}
#TRADE.A{display:flex}
/* Adjust trade header padding to mirror the building overlay header. We remove the top padding here and move it into the topbar so the back button sits lower on the screen, making it easy to tap on mobile devices. */
#TRADE-HEAD{background:#141408;border-bottom:2px solid var(--amber2);flex:0 0 auto;position:relative;z-index:210}
/* The trade topbar now includes the safe area inset and extra vertical padding similar to the building overlay header. This ensures the back button is positioned lower and more accessible on devices like the iPhone. */
.trade-topbar{display:flex;align-items:center;gap:8px;padding:calc(var(--st) + 14px) 10px 8px;min-height:52px}
.trade-back{font-size:22px;color:var(--amber);cursor:pointer;padding:10px 14px;min-width:48px;min-height:48px;display:flex;align-items:center;justify-content:center;background:transparent;border:0;font-family:'Courier New',monospace;touch-action:manipulation;-webkit-tap-highlight-color:rgba(240,200,80,.15)}
.trade-back:active{background:#2a2a18;transform:scale(.96)}
#TRADE-TABS{display:flex;border-bottom:1px solid #2a2818}
#TRADE-TABS button{flex:1;padding:8px 4px;background:none;border:none;font-family:'Courier New',monospace;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
#TRADE-TABS button.active{color:var(--amber);border-bottom-color:var(--amber)}
#TRADE-CATS{display:flex;gap:4px;padding:6px 10px;overflow-x:auto;background:#0e0e08;flex:0 0 auto;border-bottom:1px solid #1a1810}
#TRADE-CATS::-webkit-scrollbar{display:none}
#TRADE-CATS button{white-space:nowrap;padding:4px 10px;background:#1a1a10;color:var(--muted);border:1px solid #2a2818;border-radius:12px;font-family:'Courier New',monospace;font-size:10px;cursor:pointer;flex-shrink:0}
#TRADE-CATS button.active{background:#2a2a14;color:var(--amber);border-color:var(--amber2)}
#TRADE-BODY{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 8px 150px;min-height:0;overscroll-behavior:contain}
#TRADE-FOOTER{position:fixed;bottom:0;left:50%;right:auto;transform:translateX(-50%);width:100%;max-width:430px;background:linear-gradient(0deg,#0e0e06,#141408);border-top:1px solid var(--amber2);padding:8px 12px calc(8px + var(--sb));display:flex;align-items:center;gap:8px;z-index:220}
/* Previously a separate lower back button for the trade screen; removed in favour of the top back button */
#TRADE-LOW-BACK{display:none}
.tr-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--panel);border:1px solid #2a2818;border-radius:6px;margin:4px 0;cursor:pointer;min-height:56px;transition:border-color .15s}
.tr-item:active{background:#2a2a18;border-color:var(--amber2)}
.tr-item.selected{border-color:var(--amber);background:#252510}
.tr-icon{width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:#111108;border:1px solid #1a1810;border-radius:5px;flex:0 0 auto;overflow:hidden}
.tr-icon img,.tr-icon svg{width:30px!important;height:30px!important;max-width:30px!important;max-height:30px!important;object-fit:contain!important;display:block!important}
.tr-qty{display:flex;align-items:center;gap:5px;margin-top:8px;flex-wrap:wrap}
.tr-qty button{padding:6px 10px;background:#1a1a10;color:var(--amber);border:1px solid #2a2818;border-radius:4px;font-family:'Courier New',monospace;font-size:12px;cursor:pointer;min-height:38px;min-width:42px;text-align:center}
.tr-qty button:active{transform:scale(.95)}
.tr-confirm{flex:1;padding:12px;background:#1a2a10;color:var(--green);border:1px solid #2a3a18;border-radius:4px;font-family:'Courier New',monospace;font-size:13px;font-weight:bold;cursor:pointer;text-align:center;min-height:46px;letter-spacing:1px}
.tr-confirm:disabled{opacity:.35;cursor:not-allowed;background:#1a1a10;border-color:#2a2818}
.tr-confirm.sell{background:#2a1810;color:var(--amber2);border-color:#3a2818}
.log-header{display:flex;justify-content:space-between;align-items:center;padding:9px 10px;
background:var(--panel2);cursor:pointer;font-size:12px;min-height:44px}
.log-header:active{background:#1a1a12}
.log-entries{display:none;padding:5px 10px 8px;font-size:12px;line-height:1.6}
.log-entries.open{display:block}
.log-entry{padding:2px 0;border-bottom:1px dotted #1a1810}
.log-entry:last-child{border-bottom:none}
.combat-log{color:var(--red)}.event-log{color:var(--green2)}.quest-log{color:var(--blue)}
/* SPECIAL bars */
.sp-bar{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:12px}
.sp-label{width:16px;color:var(--amber);font-weight:bold;text-align:center}
.sp-fill-bg{flex:1;height:8px;background:#1a1a10;border-radius:3px;overflow:hidden;border:1px solid #2a2818}
.sp-fill{height:100%;background:var(--green2);border-radius:2px;transition:width .3s}
.sp-val{width:18px;text-align:right;color:var(--muted);font-size:11px}
/* Tap button */
.tap-btn{width:100%;padding:20px;background:linear-gradient(135deg,#2a3a18,#1a2a10);
color:var(--green);border:2px solid #3a4a28;border-radius:8px;font-family:'Courier New',monospace;
font-size:18px;font-weight:bold;cursor:pointer;text-align:center;letter-spacing:2px;
text-transform:uppercase;transition:transform 60ms,box-shadow 60ms}
.tap-btn:active{transform:scale(.95);box-shadow:0 0 20px rgba(74,255,74,.2) inset}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}
.dmg-float{position:absolute;color:var(--red);font-weight:bold;font-size:14px;pointer-events:none;animation:dmgFloat .8s forwards}
.npc-line{font-size:12px;font-style:italic;color:var(--muted);padding:6px 8px;border-left:2px solid var(--amber2);margin:6px 0}
.qc{background:#1a1a10;border:1px solid #2a2818;border-radius:4px;padding:8px;margin:6px 0}
/* Inventory card */
.inv-card{background:var(--panel2);border:1px solid #2a2818;border-radius:5px;padding:6px 8px;margin:3px 0}
.inv-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
/* Combat */
.combat-panel{background:#1a0a0a;border:1px solid #3a1818;border-radius:6px;padding:10px;margin:4px 0}
.enemy-portrait{text-align:center;font-size:48px;margin:8px 0}
.icon-wrap{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;line-height:1;flex:0 0 auto}
.icon-wrap img,.icon-wrap svg{width:100%;height:100%;object-fit:contain;display:block}
.combat-bar{display:flex;gap:4px;margin:4px 0;flex-wrap:wrap}
.combat-bar .bt{flex:1;min-width:80px;text-align:center}
/* Combat */
.combat-panel{background:#1a0a0a;border:1px solid #3a1818;border-radius:6px;padding:10px;margin:4px 0}
.enemy-portrait{text-align:center;font-size:48px;margin:8px 0}
.icon-wrap{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;line-height:1;flex:0 0 auto}
.icon-wrap img,.icon-wrap svg{width:100%;height:100%;object-fit:contain;display:block}
.combat-bar{display:flex;gap:4px;margin:4px 0;flex-wrap:wrap}
.combat-bar .bt{flex:1;min-width:80px;text-align:center}
.corpse-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-top:8px}
.corpse-card{background:#15150d;border:1px solid #3a3828;border-radius:8px;padding:8px;text-align:center;position:relative}
.corpse-portrait{position:relative;width:72px;height:72px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;background:#0f0f08;border:1px solid #2a2818;border-radius:8px}
.corpse-portrait .icon-wrap{width:46px !important;height:46px !important;font-size:46px !important}
.loot-actions{display:flex;gap:8px;margin-top:10px}
.loot-actions .bt{flex:1;text-align:center}
.loot-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.loot-item{
  display:flex;align-items:center;gap:8px;
  background:#1a1a10;border:1px solid #3a3828;border-radius:6px;
  padding:10px;cursor:pointer;min-height:48px
}
.loot-item:active{transform:scale(.98);filter:brightness(1.08)}
.loot-item.taken{opacity:.45;filter:grayscale(.2)}
.loot-item-icon{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  background:#0f0f08;border:1px solid #2a2818;border-radius:6px;font-size:20px;flex:0 0 auto
}
.loot-item-name{flex:1;font-size:12px}
.loot-item-tick{color:var(--green);font-size:18px}
@keyframes enemyShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-5px)}30%{transform:translateX(5px)}45%{transform:translateX(-4px)}60%{transform:translateX(4px)}75%{transform:translateX(-2px)}}
.enemy-hit{animation:enemyShake .24s ease both;filter:brightness(1.25)}
.enemy-crit{animation:enemyShake .32s ease both;filter:brightness(1.45) drop-shadow(0 0 8px rgba(240,200,80,.55));border-color:var(--amber)!important}
.crit-float{position:absolute;right:8px;top:4px;color:var(--amber);font-weight:bold;font-size:11px;letter-spacing:1px;pointer-events:none;animation:dmgFloat .8s forwards}
/* Perk screen */
#PO{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:none;
  justify-content:center;align-items:center;padding:16px}
#PO.A{display:flex}
#PP{background:var(--panel);border:2px solid var(--amber);border-radius:10px;
  padding:14px;width:96%;max-width:400px;max-height:90vh;overflow-y:auto}
.perk-card{background:#1e1e10;border:1px solid #3a3828;border-radius:8px;
  padding:12px 14px;margin:6px 0;cursor:pointer;transition:border-color .15s,background .15s;position:relative;min-height:52px}
.perk-card:active{transform:scale(.98)}
.perk-card.selected{border-color:var(--amber);background:#2a2a14}
.perk-card.locked{opacity:.38;cursor:not-allowed}
.perk-icon{font-size:28px;flex:0 0 auto;width:40px;text-align:center}
.perk-name{font-size:14px;font-weight:bold;color:var(--amber)}
.perk-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.45}
.perk-req{font-size:10px;color:var(--red);margin-top:3px}
/* Crafting */
.craft-card{background:#1a1a10;border:1px solid #2a2818;border-radius:6px;padding:8px 10px;margin:5px 0}
.craft-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.craft-mat{display:inline-flex;align-items:center;gap:3px;background:#141408;
  border:1px solid #2a2818;border-radius:4px;padding:2px 6px;font-size:10px}
.craft-mat.ok{border-color:#2a4a18;color:var(--green)}
.craft-mat.missing{border-color:#4a1818;color:var(--red)}

.craft-out-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.craft-out-icon img,.craft-out-icon svg,.craft-mat img,.craft-mat svg{width:20px!important;height:20px!important;max-width:20px!important;max-height:20px!important;object-fit:contain!important;display:inline-block!important;vertical-align:middle!important}

/* Encounter/icon image size safety */
#TS{display:flex;align-items:center;justify-content:center;min-height:74px;text-align:center}
#TS img,#TS svg,#TS .icon-wrap{
  width:64px!important;height:64px!important;
  max-width:64px!important;max-height:64px!important;
  object-fit:contain!important;display:block!important;margin:0 auto!important
}
#TT img,#TT svg,#TT .icon-wrap,
#TC img,#TC svg,#TC .icon-wrap{
  width:42px!important;height:42px!important;
  max-width:42px!important;max-height:42px!important;
  object-fit:contain!important;display:inline-flex!important;vertical-align:middle!important
}
.loot-item-icon img,.loot-item-icon svg,
.inv-card img,.inv-card svg,
.bc img,.bc svg,.bn img,.bn svg{
  width:28px!important;height:28px!important;
  max-width:28px!important;max-height:28px!important;
  object-fit:contain!important;display:inline-block!important;vertical-align:middle!important
}

/* Map-card icons. Building cards are intentionally larger than crafting/loot icons. */
.card-icon-lg{
  width:70px!important;height:70px!important;min-width:70px!important;
  display:flex!important;align-items:center!important;justify-content:center!important;
  background:#111108;border:1px solid #2a2818;border-radius:8px;
  overflow:hidden;font-size:48px!important;line-height:1!important;
}

function setupMapPanZoom(svg,VW,VH){
  if(!svg||svg._panZoomReady)return;svg._panZoomReady=true;
  let vb={x:0,y:0,w:VW,h:VH};
  try{
    const raw=(svg.getAttribute('viewBox')||'').trim().split(/\s+/).map(Number);
    if(raw.length===4&&raw.every(Number.isFinite))vb={x:raw[0],y:raw[1],w:raw[2],h:raw[3]};
  }catch(e){}
  const pointers=new Map();let last=null,lastDist=0,lastCenter=null;
  function clamp(){vb.w=Math.max(VW*.38,Math.min(VW,vb.w));vb.h=Math.max(VH*.38,Math.min(VH,vb.h));vb.x=Math.max(0,Math.min(VW-vb.w,vb.x));vb.y=Math.max(0,Math.min(VH-vb.h,vb.y));}
  function apply(){clamp();svg.setAttribute('viewBox',`${vb.x} ${vb.y} ${vb.w} ${vb.h}`)}
  function svgPt(clientX,clientY){const r=svg.getBoundingClientRect();return {x:vb.x+((clientX-r.left)/Math.max(1,r.width))*vb.w,y:vb.y+((clientY-r.top)/Math.max(1,r.height))*vb.h};}
  function zoomAt(factor,clientX,clientY){const p=svgPt(clientX,clientY);const nw=vb.w*factor,nh=vb.h*factor;vb.x=p.x-(p.x-vb.x)*(nw/vb.w);vb.y=p.y-(p.y-vb.y)*(nh/vb.h);vb.w=nw;vb.h=nh;apply();}
  svg.addEventListener('wheel',e=>{e.preventDefault();zoomAt(e.deltaY>0?1.12:.88,e.clientX,e.clientY)},{passive:false});
  svg.addEventListener('pointerdown',e=>{pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});svg.setPointerCapture&&svg.setPointerCapture(e.pointerId);last={x:e.clientX,y:e.clientY};lastDist=0;});
  svg.addEventListener('pointermove',e=>{
    if(!pointers.has(e.pointerId))return;pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    const pts=[...pointers.values()];
    if(pts.length>=2){const a=pts[0],b=pts[1];const dist=Math.hypot(a.x-b.x,a.y-b.y);const cen={x:(a.x+b.x)/2,y:(a.y+b.y)/2};if(lastDist)zoomAt(lastDist/dist,cen.x,cen.y);if(lastCenter){const r=svg.getBoundingClientRect();vb.x-=(cen.x-lastCenter.x)/Math.max(1,r.width)*vb.w;vb.y-=(cen.y-lastCenter.y)/Math.max(1,r.height)*vb.h;apply();}lastDist=dist;lastCenter=cen;}
    else if(last){const r=svg.getBoundingClientRect();vb.x-=(e.clientX-last.x)/Math.max(1,r.width)*vb.w;vb.y-=(e.clientY-last.y)/Math.max(1,r.height)*vb.h;last={x:e.clientX,y:e.clientY};apply();}
  });
  ['pointerup','pointercancel','pointerleave'].forEach(type=>svg.addEventListener(type,e=>{pointers.delete(e.pointerId);last=null;lastDist=0;lastCenter=null;}));
  svg._zoomIn=()=>{const r=svg.getBoundingClientRect();zoomAt(.82,r.left+r.width/2,r.top+r.height/2)};
  svg._zoomOut=()=>{const r=svg.getBoundingClientRect();zoomAt(1.22,r.left+r.width/2,r.top+r.height/2)};
  svg._setViewBox=(next)=>{if(!next)return;vb={x:+next.x||0,y:+next.y||0,w:+next.w||VW,h:+next.h||VH};apply();};
}


function getBonusLootPool(locId,area){
  const loc=LOCS[locId];
  const pool=['wonderglue','wrench','scrap_electronics','camera','silverware'];
  if(!loc)return pool.filter(id=>ITEMS[id]);
  if(loc.fac==='NCR'||loc.t==='base'||loc.t==='facility'||loc.t==='dam'||locId==='HeliosOne'){
    pool.push('fission_battery','conductor','scrap_electronics','wrench');
  }
  if(loc.fac==='Legion'){
    pool.push('legion_coin','silverware','gold_necklace');
  }
  if(loc.fac==='Khans'){
    pool.push('cigarette_pack','cigarette_carton','pre_war_money');
  }
  if(['town','city','district','trading_post','settlement'].includes(loc.t)){
    pool.push('cigarette_pack','camera','silver_watch','gold_necklace');
  }
  if(area&&/(house|hotel|motel|hall|lodge|office|barracks|cottages|station|school|casino|bar|store)/i.test(area.n)){
    pool.push('camera','pre_war_money','silver_watch');
  }
  return pool.filter(id=>ITEMS[id]);
}

function tunnelsUnlocked(){return !!(S&&S.flags&&S.flags.mojave_tunnels_unlocked)}
function unlockMojaveTunnels(){
  if(!S.flags)S.flags={};
  S.flags.mojave_tunnels_unlocked=true;
  if(!ROADS.TheStrip)ROADS.TheStrip={};
  if(!ROADS.FreesideN)ROADS.FreesideN={};
  ROADS.TheStrip.MojaveTunnels=1;
  ROADS.FreesideN.MojaveTunnels=1;
  mapMarkVisited('TheStrip');
  log('The Tunnel Broker marked the Mojave Service Tunnels on your Pip-Boy.','q');
  save();upAll();
  showResult('Tunnels Unlocked','🕳',["A hidden route has been added from the Strip.","The Mojave Service Tunnels are built for level 20+ characters and scale upward without making early towns harder.","Expect elite packs, rare legendary enemies, and deeper loot."],'Enter later');
}
function openTunnelBroker(){
  if(S.level<20){openDlg(`<div style="text-align:center"><div style="font-size:42px">🕶️</div><h3 style="color:var(--amber)">Tunnel Broker</h3><div style="font-size:11px;color:var(--muted);margin:8px 0">"You are not ready for what is under Vegas. Come back at level 20."</div><button class="bt" style="text-align:center" onclick="closeDlg()">Leave</button></div>`);return}
  if(tunnelsUnlocked()){openDlg(`<div style="text-align:center"><div style="font-size:42px">🕳</div><h3 style="color:var(--amber)">Tunnel Broker</h3><div style="font-size:11px;color:var(--muted);margin:8px 0">"You already have the route. The deeper doors keep moving."</div><button class="bt go" style="text-align:center" onclick="closeDlg();beginTravel('MojaveTunnels',1)">Travel to the Tunnels</button><button class="bt" style="text-align:center" onclick="closeDlg()">Leave</button></div>`);return}
  openDlg(`<div style="text-align:center"><div style="font-size:42px">🕶️</div><h3 style="color:var(--amber)">Tunnel Broker</h3><div style="font-size:11px;color:var(--muted);margin:8px 0;text-align:left;line-height:1.45">"There are service tunnels below the Strip that do not appear on tourist maps. People go in looking for weapons, tech, and old-world doors. Most come back as rumours. You look experienced enough to hear the route."</div><button class="bt go" style="text-align:center" onclick="closeDlg();unlockMojaveTunnels()">Mark the tunnels on my Pip-Boy</button><button class="bt" style="text-align:center" onclick="closeDlg()">Not now</button></div>`);
}
function applyEndgameRoutes(){
  if(!S||!S.flags||!S.flags.mojave_tunnels_unlocked)return;
  if(!ROADS.TheStrip)ROADS.TheStrip={}; if(!ROADS.FreesideN)ROADS.FreesideN={};
  ROADS.TheStrip.MojaveTunnels=1; ROADS.FreesideN.MojaveTunnels=1;
}

function renderIcon(icon,size=28){
  return `<span class="icon-wrap" style="width:${size}px;height:${size}px;font-size:${size}px">${icon||''}</span>`;
}

// Helper: create an NPC image icon string from a filename in NVImages/
function imgFallback(img){
  try{
    const rest=(img.dataset.fallbacks||'').split('|').filter(Boolean);
    const next=rest.shift();
    if(next){img.dataset.fallbacks=rest.join('|');img.src=next;return}
    img.onerror=null;img.style.display='none';
    if(img.parentNode&&!img.parentNode.querySelector('.img-fallback-mark'))img.parentNode.insertAdjacentHTML('beforeend','<span class="img-fallback-mark">?</span>');
  }catch(e){}
}
function npcImg(filename,...fallbacks){
  const chain=[filename,...fallbacks].filter(Boolean).map(f=>'NVImages/'+f);
  const esc=v=>String(v).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
  return `<img src="${esc(chain[0]||'')}" data-fallbacks="${esc(chain.slice(1).join('|'))}" onerror="imgFallback(this)" style="width:100%;height:100%;object-fit:contain;display:block;">`;
}

// Key naming convention: UPPER_SNAKE matches NPC name, e.g.
//   CRAIG_BOONE → "Craig Boone",  DOC_MITCHELL → "Doc Mitchell",  EDE → "ED-E"
// So to add a new named NPC icon, you ONLY touch ICONS.NPC — nothing else.
// Role/faction keys (all-caps generic words) are excluded from auto-matching.
const _NPC_ROLE_KEYS=new Set(['MALE','FEMALE','CIVILIAN','MERCHANT','COOK','LAW','DOCTOR','MECHANIC',
  'RANCHER','ENTERTAINER','PILOT','TOWN','MOTEL','WRANGLER','CYBERDOG','PRISONER',
  'SECURITRON','NCR','NCR_RANGER','NCR_COMMAND','NCR_MEDIC','NCR_SCOUT',
  'BOS','BOS_SCRIBE','FOLLOWERS','KINGS','POWDER_GANGER','POWDER_TRADER','BOOMERS','DINO']);
// Special key→name overrides for names that don't convert cleanly from UPPER_SNAKE
const _NPC_KEY_ALIASES={'EDE':'ED-E','DOC_MITCHELL':'Doc Mitchell','PRIMM_SLIM':'Primm Slim',
  'EASY_PETE':'Easy Pete','SUNNY_SMILES':'Sunny Smiles','JOHNSON_NASH':'Johnson Nash'};
const NPC_ICON=(()=>{
  const map={};
  for(const [key,icon] of Object.entries(ICONS.NPC)){
    if(_NPC_ROLE_KEYS.has(key))continue;
    const name=_NPC_KEY_ALIASES[key]||key.split('_').map(w=>w[0]+w.slice(1).toLowerCase()).join(' ');
    map[name]=icon;
  }
  // ── Role/faction overrides for named NPCs without unique icons ──
  // These NPCs share a generic faction icon. Add them here so inferNpcIcon
  // doesn't have to guess. Remove the line when you give them their own ICONS.NPC entry.
  Object.assign(map,{

function gsEnsure(){
  if(!S.flags)S.flags={};
  if(!S.flags.goodsprings)S.flags.goodsprings={spoke:{}};
  return S.flags.goodsprings;
}
function gsNpcRel(id){return S.relationships.find(r=>r.name===GOODSPRINGS_NPCS[id].name)}
function addGoodspringsNpcCard(body,id){
  const npc=GOODSPRINGS_NPCS[id];if(!npc)return;
  const ex=gsNpcRel(id);
  const nc=el('div','bn');nc.style.cursor='pointer';
  nc.innerHTML=`<div style="font-size:28px">${renderIcon(inferNpcIcon(npc),28)}</div><div style="flex:1"><div style="font-weight:bold;font-size:12px">${npc.name}</div><div style="font-size:12px;color:var(--muted)">${npc.role}${ex?' · '+ex.rel:''}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;font-style:italic">${npc.line}</div></div><div style="color:var(--muted)">›</div>`;
  nc.onclick=()=>openGoodspringsNPC(id);
  body.appendChild(nc);
}
function gsFindQuest(id){return (S.quests||[]).find(q=>q.id===id)||null}
function gsQuestActive(id){const q=gsFindQuest(id);return !!(q&&!q.done)}
function gsKillSince(start,id){return Math.max(0,(S.kills[id]||0)-((start||{})[id]||0))}
function gsCompleteQuest(id){
  const q=gsFindQuest(id);if(!q||q.done)return;
  q.done=true;
  S.xp+=(q.rx||0);S.caps+=(q.rg||0);S.questsComplete=(S.questsComplete||0)+1;
  log('Quest complete: '+q.name+' (+'+(q.rg||0)+' caps, +'+(q.rx||0)+' XP)','q');
  notify('📜 Quest Complete!');
  // Special rewards for certain quests
  // Schoolhouse Sweep quest rewards: give items automatically upon completion
  if(id==='gs_schoolhouse_clear' && !q._rewarded){
    // Provide the same loot Doc Mitchell would have given
    giveItem('stimpak');
    giveItem('ammo_9mm');
    q._rewarded=true;
  }
  chkLU();queueSave();
}

function gsGhostQuest(){return gsFindQuest('gs_ghost_town_gunfight')}
function gsGhostActive(){const q=gsGhostQuest();return !!(q&&!q.done)}
function gsGhostDone(){const q=gsGhostQuest();return !!(q&&q.done)}
function gsGhostCount(){return ['gs_ghost_trudy','gs_ghost_sunny','gs_ghost_chet','gs_ghost_pete'].filter(hasFlag).length}
function gsGhostLine(){
  const bits=[];
  if(hasFlag('gs_ghost_trudy'))bits.push('Trudy rallied');
  if(hasFlag('gs_ghost_sunny'))bits.push('Sunny ready');
  if(hasFlag('gs_ghost_chet'))bits.push('Chet supplied');
  if(hasFlag('gs_ghost_pete'))bits.push('Easy Pete armed');
  return bits.length?bits.join(', '):'No town help recruited yet';
}
function gsUpdateGhostQuest(){
  const q=gsGhostQuest();if(!q||q.done)return;
  const n=gsGhostCount();
  q.progText=`Recruit Goodsprings help, then start the fight from the Prospector Saloon (${n}/4 helped: ${gsGhostLine()}).`;
}
function gsStartGhostQuest(){
  if(gsGhostDone()){closeDlg();showResult('Ringo','📦',['The Powder Ganger trouble is already settled.','Goodsprings still remembers who stood with them.'],'Continue','upAll()');return}
  if(gsGhostActive()){gsUpdateGhostQuest();closeDlg();showResult('Ghost Town Gunfight','📜',[gsGhostQuest().progText],'Continue','upAll()');return}
  S.quests.push({id:'gs_ghost_town_gunfight',name:'Ghost Town Gunfight',desc:'Ringo is hiding in Goodsprings while Joe Cobb and the Powder Gangers threaten the town. Recruit help, then defend the Prospector Saloon.',t:'custom',progText:'Recruit Goodsprings help, then start the fight from the Prospector Saloon (0/4 helped).',rg:160,rx:75,fac:'Goodsprings',repBonus:8,giver:'Ringo',done:false});
  log('Accepted: Ghost Town Gunfight','q');
  closeDlg();showResult('New Quest!','📜',['<b>Ghost Town Gunfight</b>','Ringo needs help against Joe Cobb. Talk to Trudy, Sunny Smiles, Chet, and Easy Pete before starting the fight at the saloon.'],'Continue','upAll()');
}
function gsRecruitGhost(id,label,lines,item){
  if(!gsGhostActive()){notify('No active town defence quest.');return}
  const flag='gs_ghost_'+id;
  if(hasFlag(flag)){notify(label+' is already helping.');return}
  setFlag(flag);
  if(item)giveItem(item,1,{ignoreLimit:true});
  gsUpdateGhostQuest();
  log(label+' agreed to help defend Goodsprings.','q');
  closeDlg();showResult('Help Recruited','🤝',lines,'Continue','upAll()');
}
function gsStartGhostFight(){
  const q=gsGhostQuest();
  if(!q||q.done){notify('No Goodsprings fight to start.');return}
  const n=gsGhostCount();
  if(n<2){notify('Recruit at least 2 townsfolk first.');return}
  setFlag('gs_ghost_fight_started');
  closeBld();closeDlg();
  const gang=[mkEnemy('joe_cobb'),mkEnemy('powder_ganger'),mkEnemy('powder_ganger')];
  if(n<4)gang.push(mkEnemy('powder_ganger'));
  combat={enemies:gang,turn:0,log:[`Joe Cobb and the Powder Gangers march on Goodsprings.`,`${gsGhostLine()}.`],questComplete:'gs_ghost_town_gunfight'};
  renderCombat();
}
function gsFinishGhostQuest(lines){
  const q=gsGhostQuest();if(!q||q.done)return lines;
  setFlag('gs_ghost_fight_won');
  const idx1=S.inv.indexOf('goodsprings_town_supplies');if(idx1!==-1)S.inv.splice(idx1,1);
  const idx2=S.inv.indexOf('goodsprings_dynamite_bundle');if(idx2!==-1)S.inv.splice(idx2,1);
  completeQuest(q);
  giveItem('varmint_rifle',1,{ignoreLimit:true});
  giveItem('ammo_556',3,{ignoreLimit:true});
  S.karma=(S.karma||0)+5;
  lines.push('📜 Ghost Town Gunfight complete');
  lines.push('🔫 Varmint Rifle');
  lines.push('🔸 5.56mm Rounds x3');
  lines.push('⚖ +5 karma');
  return lines;
}
function gsRefreshState(){
  const q1=gsFindQuest('gs_source_clear');
  if(q1&&!q1.done){
    const geckos=gsKillSince(q1.ks,'gecko');
    const scorps=gsKillSince(q1.ks,'bark_scorpion');
    q1.progText=`Kill geckos and a bark scorpion near Goodsprings Source (${Math.min(geckos,2)}/2 geckos, ${Math.min(scorps,1)}/1 bark scorpion).`;
    if(geckos>=2&&scorps>=1)gsCompleteQuest('gs_source_clear');
  }
  const q2=gsFindQuest('gs_schoolhouse_clear');
  if(q2&&!q2.done){
    const mantis=gsKillSince(q2.ks,'mantis');
    // When the player has killed enough mantises, immediately complete the quest.
    if(mantis>=2){
      // Automatically complete the Schoolhouse Sweep quest rather than requiring manual turn-in.
      gsCompleteQuest('gs_schoolhouse_clear');
      // Update progress text to reflect completion.
      q2.ready=true;
      q2.progText='Return to Doc Mitchell and tell him the abandoned schoolhouse is cleared.';
    }else{
      q2.ready=false;
      q2.progText=`Thin out the schoolhouse mantises (${Math.min(mantis,2)}/2), then report back to Doc Mitchell.`;
    }
  }
  const q3=gsFindQuest('gs_powder_road');
  if(q3&&!q3.done){
    const pg=gsKillSince(q3.ks,'powder_ganger');
    const conv=gsKillSince(q3.ks,'convict');
    q3.progText=`Break up the raiders hitting roads near Goodsprings (${Math.min(pg,2)}/2 Powder Gangers, ${Math.min(conv,1)}/1 convict).`;
    if(pg>=2&&conv>=1)gsCompleteQuest('gs_powder_road');
  }
  gsUpdateGhostQuest();
}

function primmFindQuest(id){return (S.quests||[]).find(q=>q.id===id)||null}
function primmKindQuest(){return primmFindQuest('primm_my_kind_of_town')}
function primmKindActive(){const q=primmKindQuest();return !!(q&&!q.done)}
function primmKindDone(){const q=primmKindQuest();return !!(q&&q.done)}
function primmKindReadyForSheriff(){return primmKindActive()&&hasFlag('primm_beagle_freed_for_quest')}
function primmRefreshKindQuest(){
  const q=primmKindQuest();if(!q||q.done)return;
  if(hasFlag('primm_sheriff_chosen'))q.progText='Return to Johnson Nash at Vikki & Vance and tell him Primm has a sheriff.';
  else if(hasFlag('primm_beagle_freed_for_quest'))q.progText='Choose Primm\'s new sheriff: reprogram Primm Slim, ask NCR under Hayes, or recruit Meyers from NCRCF.';
  else q.progText='Go to the Bison Steve Hotel and free Deputy Beagle from the convicts.';
}
function primmStartKindQuest(){
  if(primmKindDone()){closeDlg();showResult('My Kind of Town','⭐',['Primm already has a sheriff again.','The town is safer because of it.'],'Continue','upAll()');return}
  if(primmKindActive()){primmRefreshKindQuest();closeDlg();showResult('My Kind of Town','📜',[primmKindQuest().progText],'Continue','upAll()');return}
  S.quests.push({id:'primm_my_kind_of_town',name:'My Kind of Town',desc:'Primm needs law again. Free Deputy Beagle, then help the town choose a new sheriff.',t:'custom',progText:'Go to the Bison Steve Hotel and free Deputy Beagle from the convicts.',rg:95,rx:80,fac:'Primm',repBonus:6,giver:'Johnson Nash',done:false});

  closeDlg();showResult('New Quest!','📜',['<b>My Kind of Town</b>','Johnson Nash says Primm cannot recover without law.','Start by freeing Deputy Beagle from the Bison Steve.'],'Continue','upAll()');
}
function primmFreeBeagleQuest(){
  const q=primmKindQuest();
  if(!q||q.done){notify('No active reason to risk that storage room.');return}
  if(hasFlag('primm_beagle_freed_for_quest')){notify('Deputy Beagle is already free.');return}
  setFlag('primm_beagle_freed_for_quest');setFlag('bison_beagle_rescued');
  giveItem('primm_sheriff_papers',1,{ignoreLimit:true});
  q.progText='Choose Primm\'s new sheriff: reprogram Primm Slim, ask NCR under Hayes, or recruit Meyers from NCRCF.';
  advanceTime(1);
  log('You free Deputy Beagle and recover Primm sheriff paperwork.','q');
  closeBld();showResult('Deputy Rescued','👮',['You force open the storage room and drive off the convicts guarding Beagle.','📄 Primm Sheriff Paperwork added','Beagle says Primm needs a real sheriff.'],'Continue','upAll()');
}
function primmChooseSheriff(who){
  const q=primmKindQuest();
  if(!q||q.done){notify('Primm is not waiting on your decision.');return}
  if(!hasFlag('primm_beagle_freed_for_quest')){notify('Free Deputy Beagle first.');return}
  if(hasFlag('primm_sheriff_chosen')){notify('A sheriff has already been chosen.');return}
  setFlag('primm_sheriff_chosen',who);
  const names={slim:'Primm Slim',ncr:'NCR protection under Lieutenant Hayes',meyers:'Meyers'};
  q.progText='Return to Johnson Nash at Vikki & Vance and tell him Primm has a sheriff.';
  log('Chosen sheriff for Primm: '+(names[who]||who)+'.','q');
  closeDlg();showResult('Sheriff Chosen','⭐',[`${names[who]||'A new sheriff'} will take responsibility for Primm.`,`Return to Johnson Nash at Vikki & Vance.`],'Continue','upAll()');
}
function primmFinishKindQuest(){
  const q=primmKindQuest();
  if(!q||q.done){closeDlg();showResult('Johnson Nash','📦',['Nash says Primm is trading again, slowly but surely.'],'Continue','upAll()');return}
  primmRefreshKindQuest();
  if(!hasFlag('primm_sheriff_chosen')){closeDlg();showResult('My Kind of Town','📜',[q.progText],'Continue','upAll()');return}
  const idx=S.inv.indexOf('primm_sheriff_papers');if(idx!==-1)S.inv.splice(idx,1);
  giveItem('primm_sheriff_badge',1,{ignoreLimit:true});
  completeQuest(q);
  closeDlg();showResult('My Kind of Town Complete','⭐',['Primm has law again.','Johnson Nash presses an old sheriff badge into your hand.','⭐ Primm Sheriff\'s Badge','💰 +95 caps','⭐ +80 XP'],'Continue','upAll()');
}

function hvEnsure(){
  if(!S.flags)S.flags={};
  if(!S.flags.hv)S.flags.hv={stage:0,spoke:{},side:null,veronicaCounsel:false};
  return S.flags.hv;
}
function hvFindQuest(id){return (S.quests||[]).find(q=>q.id===id)||null}
function hvQuestDone(id){const q=hvFindQuest(id);return !!(q&&q.done)}
function hvQuestActive(id){const q=hvFindQuest(id);return !!(q&&!q.done)}
function hvAddQuest(q){if(hvFindQuest(q.id))return hvFindQuest(q.id);S.quests.push(q);log('Accepted: '+q.name,'q');notify('📜 Quest accepted!');queueSave();return q}
function hvSetQuestText(id,text){const q=hvFindQuest(id);if(q)q.progText=text}
function hvCompleteManualQuest(id,repBonus){
  const q=hvFindQuest(id);if(!q||q.done)return;
  q.done=true;
  S.xp+=(q.rx||0);
  S.caps+=(q.rg||0);
  if(repBonus)S.rep.BOS=(S.rep.BOS||0)+repBonus;
  S.questsComplete=(S.questsComplete||0)+1;
  log('Quest complete: '+q.name+' (+'+(q.rg||0)+' caps, +'+(q.rx||0)+' XP)','q');
  notify('📜 Quest Complete!');
  chkLU();queueSave();
}
function hvRefreshState(){
  const hv=hvEnsure();
  const q0=hvFindQuest('hv_access');
  if(q0&&!q0.done){
    const start=q0.ks||{};
    const cleared=Math.max(0,((S.kills['bark_scorpion']||0)-(start.bark_scorpion||0))+((S.kills['radscorpion']||0)-(start.radscorpion||0)));
    q0.progText=`Clear Hidden Valley threats (${Math.min(cleared,3)}/3).`;
  }
  const q1=hvFindQuest('hvq1');
  if(q1&&!q1.done){
    const count=(hv.spoke.hardin?1:0)+(hv.spoke.veronica?1:0);
    q1.progText=`Talk to Veronica and Hardin (${count}/2).`;
    if(count>=2){hvCompleteManualQuest('hvq1',10);hv.stage=Math.max(hv.stage,1);}
  }
  const q3=hvFindQuest('hvq3');
  if(q3&&q3.done)hv.stage=Math.max(hv.stage,3);
  const q5=hvFindQuest('hvq5');
  if(q5&&!q5.done){
    if(!hv.side)q5.progText='Choose whether to back McNamara or Hardin.';
    else if(!hv.veronicaCounsel)q5.progText='Talk to Veronica about the leadership dispute.';
    else q5.progText='Report back to the leader you chose.';
  }
}
function hvHasAccess(){
  const hv=hvEnsure();
  if(hv.access)return true;
  if((S.rep?.BOS||0)>=10){hv.access=true;return true}
  return false;
}
function hvEntryProgress(){
  const q=hvFindQuest('hv_access');
  if(!q)return 0;
  const start=q.ks||{};
  return Math.max(0,((S.kills['bark_scorpion']||0)-(start.bark_scorpion||0))+((S.kills['radscorpion']||0)-(start.radscorpion||0)));
}
function hvStartAccessQuest(){

function hvFinishAccessQuest(){

function serializeSave(){try{return JSON.stringify(S)}catch(e){return null}}
function canUseStorage(){
  try{return typeof localStorage!=='undefined'}catch(e){return false}
}
function safeParse(raw){
  if(!raw||typeof raw!=='string')return null;
  try{return JSON.parse(raw)}catch(e){return null}
}
function makeSaveEnvelope(raw){
  return JSON.stringify({stamp:Date.now(),version:2,raw});
}
function unpackSaveEnvelope(packed){
  const parsed=safeParse(packed);
  if(!parsed)return null;
  if(typeof parsed.raw==='string')return parsed;
  if(typeof packed==='string')return {stamp:0,version:1,raw:packed};
  return null;
}
function collectStorageCandidates(){
  const out=[];
  if(!canUseStorage())return out;
  [SAVE_KEY,SAVE_BACKUP_KEY,SAVE_MIRROR_KEY,...SAVE_SLOT_KEYS].forEach(key=>{
    const packed=localStorage.getItem(key);
    const env=unpackSaveEnvelope(packed);
    if(env&&env.raw)out.push({raw:env.raw,stamp:env.stamp||0,src:key});
  });
  return out.sort((a,b)=>b.stamp-a.stamp);
}
function writeLocalCopies(raw,stamp){
  if(!canUseStorage())return;
  const packed=JSON.stringify({stamp,version:2,raw});
  localStorage.setItem(SAVE_KEY,packed);
  localStorage.setItem(SAVE_BACKUP_KEY,packed);
  localStorage.setItem(SAVE_MIRROR_KEY,packed);
  localStorage.setItem(SAVE_SLOT_KEYS[_slotCursor%SAVE_SLOT_KEYS.length],packed);
  localStorage.setItem(SAVE_META_KEY,JSON.stringify({stamp,slot:_slotCursor%SAVE_SLOT_KEYS.length}));
  _slotCursor++;
}
function getSaveDb(){
  if(_dbPromise)return _dbPromise;
  _dbPromise=new Promise(resolve=>{
    if(!window.indexedDB){resolve(null);return}
    try{
      const req=indexedDB.open(SAVE_DB_NAME,1);
      req.onupgradeneeded=()=>{
        const db=req.result;
        if(!db.objectStoreNames.contains(SAVE_DB_STORE))db.createObjectStore(SAVE_DB_STORE);
      };
      req.onsuccess=()=>resolve(req.result);
      req.onerror=()=>resolve(null);
    }catch(e){resolve(null)}
  });
  return _dbPromise;
}
async function saveToIndexedDb(raw){
  const db=await getSaveDb();
  if(!db)return false;
  return await new Promise(resolve=>{
    try{
      const tx=db.transaction(SAVE_DB_STORE,'readwrite');
      const store=tx.objectStore(SAVE_DB_STORE);
      const stamp=Date.now();
      SAVE_DB_SLOTS.forEach((slot,i)=>store.put({raw,stamp:stamp-i},slot));
      tx.oncomplete=()=>resolve(true);
      tx.onerror=()=>resolve(false);
      tx.onabort=()=>resolve(false);
    }catch(e){resolve(false)}
  });
}
async function loadFromIndexedDb(){
  const db=await getSaveDb();
  if(!db)return null;
  return await new Promise(resolve=>{
    try{
      const tx=db.transaction(SAVE_DB_STORE,'readonly');
      const store=tx.objectStore(SAVE_DB_STORE);
      const reqs=SAVE_DB_SLOTS.map(slot=>new Promise(done=>{
        try{
          const req=store.get(slot);
          req.onsuccess=()=>done(req.result&&req.result.raw?{raw:req.result.raw,stamp:req.result.stamp||0,src:'idb:'+slot}:null);
          req.onerror=()=>done(null);
        }catch(e){done(null)}
      }));
      Promise.all(reqs).then(rows=>{
        const best=rows.filter(Boolean).sort((a,b)=>b.stamp-a.stamp)[0]||null;
        resolve(best?best.raw:null);
      });
    }catch(e){resolve(null)}
  });
}
function save(force=false){
  if(!S)return false;
  const now=Date.now();
  if(!force&&now-_lastSaveStamp<120)return true;
  try{
    const raw=serializeSave();
    if(!raw)return false;
    // Always keep a memory/window copy first. This survives some iOS tab restores even
    // when the page process is killed before async writes finish.
    _lastSerialized=raw;
    try{sessionStorage.setItem(SAVE_KEY+'_session',raw)}catch(e){}
    try{window.name='fnv_rpg::'+raw}catch(e){}
    // localStorage writes are synchronous, so do them before IndexedDB.
    writeLocalCopies(raw,now);
    // IndexedDB is the durable backup for iOS/Safari storage edge cases.
    saveToIndexedDb(raw);
    _lastSaveStamp=now;
    return true;
  }catch(e){
    try{
      const raw=_lastSerialized||serializeSave();
      if(raw){
        try{sessionStorage.setItem(SAVE_KEY+'_session',raw)}catch(e2){}
        try{window.name='fnv_rpg::'+raw}catch(e2){}
        writeLocalCopies(raw,Date.now());
        saveToIndexedDb(raw);
      }
    }catch(err){}
    return false
  }
}

function snapshotState(){

function recoverWindowSnapshot(){
  try{
    const raws=[];
    try{const ss=sessionStorage.getItem(SAVE_KEY+'_session');if(ss)raws.push(ss)}catch(e){}
    if(typeof window.name==='string'&&window.name.startsWith('fnv_rpg::'))raws.push(window.name.slice(9));
    for(const raw of raws){
      const parsed=safeParse(raw);
      if(!parsed)continue;
      S=parsed;

function startAutoSaveLoop(){
  clearInterval(_autoSaveTimer);
  // iOS can kill a suspended PWA/tab without beforeunload. Keep a near-current
  // synchronous localStorage save while the user is actively playing.
  _autoSaveTimer=setInterval(()=>{

function bindAutoSave(){
  if(_autoSaveBound)return;
  _autoSaveBound=true;
  const hardSave=()=>{save(true);snapshotState()};
  const softSave=()=>queueSave(80);
  ['pagehide','beforeunload','blur','focusout','unload'].forEach(ev=>window.addEventListener(ev,hardSave,{capture:true}));
  ['visibilitychange','webkitvisibilitychange'].forEach(ev=>document.addEventListener(ev,()=>{
    if(document.hidden||document.visibilityState==='hidden')hardSave();

  ['freeze','resume','pause'].forEach(ev=>document.addEventListener(ev,hardSave,{capture:true}));
  ['pageshow','focus','online'].forEach(ev=>window.addEventListener(ev,()=>{if(S)hardSave()},{capture:true}));

  // clicks/taps before overlays or buttons stop propagation.
  ['touchstart','touchend','pointerup','click','input','change','keyup'].forEach(ev=>document.addEventListener(ev,softSave,{capture:true,passive:true}));

// STAT HELPERS
// ============================================================
function calcMaxHp(){return 100+((S&&S.special)?S.special[2]:5)*20+Math.max(0,((S&&S.level)||1)-1)*5}
function calcMaxAp(){return 65+((S&&S.special)?S.special[5]:5)*3}
function itemWeight(id){
  const it=ITEMS[id];
  return it&&typeof it.w==='number'?it.w:0;
}
function carryCapacity(){
  return calcCarryCap();
}
function currentCarryWeight(){
  if(!S)return 0;
  let total=0;
  (S.inv||[]).forEach(id=>{total+=itemWeight(id)});
  if(S.gear){
    ['w','body','head'].forEach(slot=>{if(S.gear[slot])total+=itemWeight(S.gear[slot])});
  }
  return Math.round(total*10)/10;
}
function carryPct(){
  const cap=carryCapacity()||1;
  return Math.max(0,Math.min(100,Math.round((currentCarryWeight()/cap)*100)));
}
function fmtWeight(n){
  return Number.isInteger(n)?String(n):n.toFixed(1);
}
function overEncumbered(){
  return currentCarryWeight()>carryCapacity();
}
function giveItem(id,count=1,opts={}){
  if(!S||!ITEMS[id])return 0;
  let added=0;
  const ignoreLimit=!!opts.ignoreLimit;
  for(let i=0;i<count;i++){
    if(ignoreLimit||currentCarryWeight()+itemWeight(id)<=carryCapacity()){
      S.inv.push(id);
      added++;
    }else{
      if(!opts.silent)notify(`Too heavy for ${ITEMS[id].n}.`);
      break;
    }
  }
  return added;
}
function atkPow(){const w=getEquippedWeapon&&getEquippedWeapon();let a=w?(w.a||1):(1+Math.max(0,Math.floor(((S.special?S.special[0]:5)-5)/2)));a+=S.atk||0;return Math.max(1,Math.round(a))}
function defPow(){let d=S.def||0;if(S.gear.body){const a=ITEMS[S.gear.body];if(a)d+=a.d||0}if(S.gear.head){const h=ITEMS[S.gear.head];if(h)d+=h.d||0}if(S.nerdRage&&S.hp<=Math.floor(S.maxHp*0.25))d+=10;return Math.max(0,Math.round(d))}
function xpNeed(l){return Math.floor(200*l)}
function grantXP(amount){
  const bonus=S.xpPerk||0;
  return Math.max(0,Math.round(amount*(1+bonus/100))+(S.flatXpBonus||0));
}
function hpPct(h,m){return Math.max(0,Math.min(100,Math.round(h/m*100)))}
function countItem(id){return S&&S.inv?S.inv.filter(x=>x===id).length:0}
function getEquippedWeapon(){return S&&S.gear&&S.gear.w?ITEMS[S.gear.w]||null:null}
function getEquippedWeaponAmmoId(){const w=getEquippedWeapon();return w&&w.ammo?w.ammo:null}
function getEquippedWeaponAmmoCount(){const ammoId=getEquippedWeaponAmmoId();return ammoId?countItem(ammoId):0}
function getCombatAttackProfile(consumeAmmo){
  const w=getEquippedWeapon();
  const baseUnarmed=1+Math.max(0,Math.floor(((S.special?S.special[0]:5)-5)/2))+(S.unarmedBonus||0);
  if(!w)return{atk:baseUnarmed,weapon:null,ammoId:null,ammoName:'',hadAmmo:true,gun:false,usedAmmo:false};
  let a=w.a||1;
  if(!w.ammo){
    a+=calcMeleeBonus()+(S.meleeBonus||0);
    return{atk:Math.max(1,a),weapon:w,ammoId:null,ammoName:'',hadAmmo:true,gun:false,usedAmmo:false};
  }
  const ammoId=w.ammo;
  const ammoIdx=S.inv.indexOf(ammoId);
  const ammoName=ITEMS[ammoId]?.n||'ammo';
  if(ammoIdx!==-1){
    if(consumeAmmo)S.inv.splice(ammoIdx,1);
    a+=S.gunBonus||0;
    return{atk:Math.max(1,a),weapon:w,ammoId,ammoName,hadAmmo:true,gun:true,usedAmmo:!!consumeAmmo};
  }
  return{atk:baseUnarmed,weapon:w,ammoId,ammoName,hadAmmo:false,gun:true,usedAmmo:false};
}
function hasFlag(k){return !!(S&&S.flags&&S.flags[k])}
function setFlag(k,v=true){if(!S.flags)S.flags={};S.flags[k]=v;save()}

function log(text,type='n'){
  if(!S.log)S.log=[];
  let dg=S.log.find(g=>g.day===S.days);
  if(!dg){dg={day:S.days,entries:[]};S.log.unshift(dg)}
  dg.entries.push({text,type});
  if(S.log.length>40)S.log.pop();
  // Ticker
  const ti=$('ticker-inner');
  if(ti){ti.textContent=(text||'').replace(/<[^>]*>/g,'');ti.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>ti.classList.remove('show'),3000)}
}

    const fc=el('div','cd');
    const rep=S.rep[loc.fac]||0;
    const repLabel=rep>=50?'Idolized':rep>=30?'Liked':rep>=10?'Accepted':rep>=0?'Neutral':rep>=-20?'Shunned':'Vilified';
    const repCol=rep>=10?'var(--green)':rep>=-10?'var(--muted)':rep>=-20?'var(--amber2)':'var(--red)';
    let consequence='';
    if(rep<=-20)consequence='<div style="font-size:10px;color:var(--red);margin-top:4px">⚠ Vilified here — people will attack on sight.</div>';
    else if(rep<=-10)consequence='<div style="font-size:10px;color:var(--amber2);margin-top:4px">⚡ Shunned — expect hostility and higher prices.</div>';
    else if(rep>=30)consequence=`<div style="font-size:10px;color:var(--green);margin-top:4px">🤝 ${isLocal?'The locals trust you.':'This faction respects your presence.'} Better prices and access.</div>`;
    else if(rep>=10)consequence=`<div style="font-size:10px;color:var(--green);margin-top:4px">✓ ${isLocal?'Accepted by the community.':'Accepted by the faction.'}</div>`;
    fc.innerHTML=`<div style="font-size:11px">Standing: <b style="color:${repCol}">[ ${repLabel} ] ${rep>=0?'+':''}${rep}</b></div>${consequence}`;
    tab.appendChild(fc);
  }

  // Active World Events
  if(S.worldEvents&&S.worldEvents.length){
    tab.appendChild(el('div','sh','Mojave Intel'));
    S.worldEvents.forEach(ev=>{
      if(ev.resolved)return;
      const daysLeft=Math.max(0,ev.duration-(S.days-ev.started));
      const typeColor=ev.type==='raid'?'var(--red)':ev.type==='military'?'var(--amber)':ev.type==='trade'?'var(--green)':'var(--blue)';
      const card=el('div','cd');
      const atEventLoc=ev.loc===S.loc;
      const evLocName=LOCS[ev.loc]?.n||MAP_META[ev.loc]?.n||'Unknown location';
      card.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <div style="font-size:22px">${ev.icon}</div>
        <div style="flex:1"><div style="font-size:12px;font-weight:bold;color:${typeColor}">${ev.title}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">Location: <span style="color:${atEventLoc?'var(--green)':'var(--amber2)'}">${evLocName}</span> · Expires in ${daysLeft} day${daysLeft!==1?'s':''}</div></div></div>
        <div style="font-size:11px;color:var(--muted);font-style:italic;margin-bottom:6px">${ev.body}</div>
        ${atEventLoc
          ? `<button class="bt go" style="text-align:center" onclick="interceptWorldEvent('${ev.id}')">🎯 Intercept — make a choice</button>`
          : `<button class="bt" style="text-align:center;opacity:.55" disabled>Travel to ${evLocName} to interact</button>`}`;
      tab.appendChild(card);
    });
  }

  // Rep consequence warnings
  const repWarnings=[];
  if((S.rep.NCR||0)<=-20)repWarnings.push({col:'var(--red)',msg:'⚠ NCR is hostile — checkpoints will attack on sight'});
  if((S.rep.Legion||0)<=-20)repWarnings.push({col:'var(--red)',msg:'⚠ Legion is hostile — Legion territory is extremely dangerous'});
  if((S.rep.PowderGangers||0)<=-20)repWarnings.push({col:'var(--red)',msg:'⚠ Powder Gangers will attack you near NCRCF'});
  if((S.rep.NCR||0)>=-10&&(S.rep.NCR||0)<0)repWarnings.push({col:'var(--amber2)',msg:'⚡ NCR Shunned — expect toll demands at checkpoints'});
  if((S.rep.Legion||0)>=30)repWarnings.push({col:'var(--amber)',msg:'🏴 Legion allies — Legion territory is safer for you'});
  if((S.rep.NCR||0)>=30)repWarnings.push({col:'var(--green)',msg:'🛡 NCR Liked — checkpoints wave you through freely'});
  if(repWarnings.length){
    tab.appendChild(el('div','sh','Standing Alerts'));
    const wc=el('div','cd');
    wc.innerHTML=repWarnings.map(w=>`<div style="font-size:11px;color:${w.col};padding:3px 0;border-bottom:1px solid #1a1810">${w.msg}</div>`).join('');
    tab.appendChild(wc);
  }
}

// ============================================================
// SCAVENGE SYSTEM (Tap mechanic from Elder to King)
// ============================================================
function doScavenge(){
  if(combat)return;
  S.scavengeCount++;
  S.lastScavengeTick={day:S.days,hour:S.hours||8};
  advanceTime(1);
  const loc=LOCS[S.loc];
  const r=R();

  if(r<.20*loc.dg){
    const surs=loc.sur||[];
    const area=surs.length?rndA(surs):null;
    const enPool=area?area.en:['gecko','radroach'];
    const validPool=enPool.filter(e=>ENEMIES[e]);
    if(validPool.length){
      const enemies=buildCohesiveGroup(validPool,rnd(1,Math.min(2,validPool.length)));
      if(enemies.length){
        // Scavenge encounters go straight to pre-encounter via a quick overlay
        $('TO').classList.add('A');
        preEncounter(enemies,area,0,false);
        return;
      }
    }
  }
  if(r<.45){
    // Find caps
    const g=rnd(2,8+S.level*2);S.caps+=g;S.capsEarned+=g;
    log('Found '+g+' caps scavenging.','e');
    notify('💰 +'+g+' caps');
  } else if(r<.70){
    // Find item
    const surs=loc.sur||[];
    const area=surs.length?rndA(surs):null;
    const ltPool=area?area.lt:['herbs','scrap'];
    const bonusPool=getBonusLootPool(S.loc,area);
    const fi=rndA(ltPool.concat(bonusPool));const it=ITEMS[fi];
    if(it){giveItem(fi);log('Found '+it.n+'.','e');showItemFound('Scavenged',it.n,it.e)}
  } else if(r<.82){
    // NPC encounter
    const npc=mkNPC({loc:S.loc});
    if(!S.relationships.find(r2=>r2.name===npc.name)){
      S.relationships.push({name:npc.name,rel:'stranger',aff:0,male:npc.male,age:npc.age,loc:S.loc,met:S.days});
    }
    openNPCInteraction(npc,S.relationships.find(r2=>r2.name===npc.name));
    return;
  } else {
    // Flavor text
    const scenes=["The wind carries the smell of dust and decay.","You hear gunshots in the distance.","A tumbleweed rolls past.","The Pip-Boy crackles with static.","You spot tracks in the sand — something big.",
    "An old billboard reads: 'NEVADA: Silver State'","Brahmin bones bleach in the sun.","The heat is oppressive."];
    log(rndA(scenes),'n');
    notify(rndA(scenes));
  }
  chkLU();upAll();
}

// ── ENCOUNTER ENGINE ─────────────────────────────────────────

let _activeEncounter=null;

// Area encounter routing is data-driven so future locations can add
// "Location_AreaName" pools without changing the encounter engine.
const AREA_ENCOUNTER_INDEX={
  Goodsprings:[
    {match:/cemetery|grave/i,key:'Goodsprings_Cemetery'},
    {match:/source|spring|water/i,key:'Goodsprings_Source'},
    {match:/schoolhouse|school/i,key:'Goodsprings_Schoolhouse'}
  ]
};
function areaEncounterKeyName(locId,areaName){
  return String(locId||'')+'_'+String(areaName||'')
    .replace(/[^a-z0-9]+/gi,'_')
    .replace(/^_+|_+$/g,'');
}
function encounterAreaKey(locId,area){
  const n=(area&&area.n?area.n:'');
  const configured=AREA_ENCOUNTER_INDEX[locId]||[];
  const hit=configured.find(r=>r.match&&r.match.test(n));
  if(hit)return hit.key;
  const auto=areaEncounterKeyName(locId,n);
  return ENCOUNTER_CARDS[auto]?auto:null;
}
function startCombatGroup(enemyIds){
  const ids=Array.isArray(enemyIds)?enemyIds:[enemyIds];
  const enemies=[];
  ids.forEach(id=>{if(ENEMIES[id])enemies.push(mkEnemy(id));else log('Missing enemy id in encounter: '+id,'c')});
  if(enemies.length)startCombat(enemies);
}
function fightChoice(label,enemyIds,result,after){
  const ids=Array.isArray(enemyIds)?enemyIds:[enemyIds];
  return {label:label||'⚔ Fight',enemies:ids,fn:()=>{startCombatGroup(ids);if(typeof after==='function')after();},result:result||'Fight resolved.'};
}
function rollEncounterCard(locId,area){
  // Build candidate pool: area-specific first, then location-specific, then generic
  const areaCards=ENCOUNTER_CARDS[encounterAreaKey(locId,area)]||[];
  const locCards=ENCOUNTER_CARDS[locId]||[];
  const genCards=ENCOUNTER_CARDS.generic||[];
  // Weight area cards hardest so Goodsprings cemetery/source/schoolhouse feel different
  const pool=[...areaCards,...areaCards,...areaCards,...areaCards,...locCards,...locCards,...genCards];
  if(!pool.length)return null;
  // Avoid repeating same card too soon
  const recent=S.recentEncounters||[];
  const fresh=pool.filter(c=>!recent.includes(c.id));
  const pick=rndA(fresh.length?fresh:pool);
  if(!S.recentEncounters)S.recentEncounters=[];
  S.recentEncounters.unshift(pick.id);
  if(S.recentEncounters.length>6)S.recentEncounters.pop();
  return pick;
}

function startCombatCard(enemyId,count=1){
  // Helper used inside encounter choice fns — queues combat that resumes expedition
  if(Array.isArray(enemyId))return startCombatGroup(enemyId);
  const ids=[];
  for(let i=0;i<count;i++)ids.push(enemyId);
  startCombatGroup(ids);
}

function showEncounterCard(card,area,step){
  _activeEncounter={card,area,step};
  $('TS').innerHTML=card.icon;
  $('TT').innerHTML=`<b style="color:var(--amber)">${card.title}</b><br><span style="font-size:11px;color:var(--muted)">${card.body}</span>`;
  const cd=$('TC');cd.innerHTML='';
  card.choices.forEach((ch,i)=>{
    const btn=el('button','bt','');
    btn.style.textAlign='left';
    btn.textContent=ch.label;
    btn.onclick=()=>resolveEncounterChoice(i);
    cd.appendChild(btn);
  });
  $('TN').style.display='none';
}

function resolveEncounterChoice(idx){
  if(!_activeEncounter)return;
  const {card,area,step}=_activeEncounter;
  const choice=card.choices[idx];
  if(!choice)return;
  // Run the choice function — it may start combat (which will take over the screen)
  const customResult=choice.fn();
  // If combat was started, it takes over — set resume state
  if(combat){
    combat._expArea=area;
    combat._expStep=step;
    combat._encTitle=card.title;
    combat._encResult=customResult||choice.result||'The encounter is resolved.';
    _activeEncounter=null;
    return;
  }
  _activeEncounter=null;
  // Show a clear result popup, then continue expedition
  const resultText=customResult||choice.result||'Done.';
  $('TC').innerHTML='';
  $('TS').innerHTML='✅';
  $('TT').innerHTML=`<div style="font-size:12px;color:var(--green);margin-bottom:4px"><b>${card.title}</b></div><div style="font-size:11px;color:var(--muted)">${resultText}</div>`;
  chkLU();save();
  window._activeOutcomeArea=area;
  window._activeOutcomeStep=step;
  showResult(card.title,'✅',[resultText],'Continue','runExpedition(_activeOutcomeArea,_activeOutcomeStep)');
}
