function propertyOwned(id){return !!S.properties.find(p=>p.id===id)}
function getPropertyDef(id){return PROPERTY_DEFS.find(p=>p.id===id)||null}
function propertyAtLoc(loc){return S.properties.filter(p=>p.loc===loc)}
function canBuyProperty(def){
  if(!def||propertyOwned(def.id))return false;
  if(def.requires){
    const rep=S.rep[def.requires.fac]||0;
    if(rep<def.requires.rep)return false;
  }
  return S.caps>=def.cost;
}
function propertyReady(flagKey){return (S.flags[flagKey]||0)!==S.days}
function markPropertyUsed(flagKey){S.flags[flagKey]=S.days;queueSave()}
function getCurrentBounty(){
  const b=S.flags.bountyBoard?.current;
  if(!b)return null;
  return PRIMM_BOUNTY_TARGETS.find(t=>t.id===b.id)||null;
}
function rollNewBounty(){
  const board=S.flags.bountyBoard||(S.flags.bountyBoard={});
  const used=board.lastTarget||null;
  const pool=PRIMM_BOUNTY_TARGETS.filter(t=>t.id!==used);
  const pick=clone(rndA(pool.length?pool:PRIMM_BOUNTY_TARGETS));
  board.current={id:pick.id,day:S.days};
  board.lastTarget=pick.id;
  return pick;
}
function startPrimmBountyHunt(){
  if(!propertyOwned('primm_bounty_office')){notify('You do not own the bounty office.');return}
  const target=getCurrentBounty()||rollNewBounty();
  advanceTime(2);
  const en=mkEnemy(target.enemy);
  en.name=target.name;
  en.maxHp=Math.round(en.maxHp*1.2)+8;
  en.hp=en.maxHp;
  en.a+=3;
  en.d+=1;
  en.xp+=target.xp;
  en.loot=clone(target.itemPool||en.loot||[]);
  closeBld();
  combat={enemies:[en],turn:0,log:[`Bounty target spotted: ${target.name}.`,target.desc],bountyTarget:clone(target)};
  renderCombat();
}

    ['Crit chance, gambling odds',`Crit: ${Math.max(1,(S.special?S.special[6]:5)+(S.critBonus||0))}%`]
  ];
  tab.appendChild(el('div','sh','S.P.E.C.I.A.L.'));
  const sp=el('div','cd');
  let spHtml='';
  S.special.forEach((v,i)=>{
    const maxed=v>=10;
    spHtml+=`<div onclick="this.querySelector('.sp-detail').style.display=this.querySelector('.sp-detail').style.display==='none'?'block':'none'" style="cursor:pointer;padding:3px 0;border-bottom:1px solid #1a1810">
    <div class="sp-bar" style="margin:0"><div class="sp-label">${SPECIAL_LABELS[i]}</div>
    <div style="font-size:10px;color:var(--muted);width:70px">${SPECIAL_NAMES[i]}</div>
    <div class="sp-fill-bg"><div class="sp-fill" style="width:${v*10}%;${maxed?'background:var(--amber)':''}"></div></div>
    <div class="sp-val" style="${maxed?'color:var(--amber);font-weight:bold':''}">${v}${maxed?' ★':''}</div></div>
    <div class="sp-detail" style="display:none;font-size:10px;color:var(--muted);padding:2px 0 2px 22px;line-height:1.5">
      <div style="color:var(--green2)">${spEffects[i][0]}</div>
      <div>${spEffects[i][1]}</div>
    </div></div>`;
  });
  spHtml+=`<div style="font-size:9px;color:var(--muted);text-align:center;margin-top:6px;font-style:italic">Tap any stat for details · Raise stats with Intense Training perks</div>`;
  sp.innerHTML=spHtml;
  tab.appendChild(sp);

  // ── Companions ──
  if(S.companions.length){
    tab.appendChild(el('div','sh','Companions'));
    S.companions.forEach(c=>{
      tab.appendChild(el('div','cd',`<div style="display:flex;align-items:center;gap:8px">
      <div style="font-size:24px">${renderIcon(c.icon||inferNpcIcon(c,{loc:c.loc||S.loc}),24)}</div>
      <div style="flex:1"><div style="font-weight:bold;font-size:12px">${c.name}</div>
      <div class="hb"><div class="hf g" style="width:${hpPct(c.hp,c.maxHp)}%"></div></div>
      <div style="font-size:9px;color:var(--muted)">HP ${c.hp}/${c.maxHp} · ATK ${c.atk} · DEF ${c.def}</div></div></div>`));
    });
  }

  // ── Perk Tree (full view — all perks, grouped by category) ──
  tab.appendChild(el('div','sh',`Perks (${(S.perks||[]).length}/${PERKS.length})`));
  const perkCats=['Training','Combat','Survival','Social','Utility'];
  const perkWrap=el('div','');

  perkCats.forEach(cat=>{
    const catPerks=PERKS.filter(p=>p.cat===cat);
    if(!catPerks.length)return;
    const owned=catPerks.filter(p=>perkOwned(p.id)).length;
    const catIcons={Training:'🏋️',Combat:'⚔️',Survival:'❤️',Social:'💬',Utility:'🔧'};

    const hdr=el('div','');
    hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px;background:var(--panel);border:1px solid #2a2818;border-radius:6px 6px 0 0;cursor:pointer;margin-top:6px';
    hdr.innerHTML=`<span style="font-size:11px;font-weight:bold;color:var(--amber);letter-spacing:1px">${catIcons[cat]||'📋'} ${cat.toUpperCase()}</span><span style="font-size:12px;color:var(--muted)">${owned}/${catPerks.length} owned</span>`;

    const body=el('div','');
    body.style.cssText='background:var(--panel2);border:1px solid #2a2818;border-top:none;border-radius:0 0 6px 6px;padding:6px;display:'+(cat==='Training'||owned>0?'block':'none');

    body.innerHTML=catPerks.map(p=>{
      const owns=perkOwned(p.id);
      const meets=perkMeetsReq(p);
      const statusColor=owns?'var(--green)':meets?'var(--amber)':'var(--red)';
      const statusIcon=owns?'✓':meets?'○':'🔒';
      const statusText=owns?'OWNED':meets?'AVAILABLE':'LOCKED';
      let reqParts=[];
      if(p.req&&p.req.level)reqParts.push('Lv '+p.req.level+(S.level>=p.req.level?' ✓':''));
      if(p.req&&p.req.special!==undefined)reqParts.push(SPECIAL_NAMES[p.req.special]+' '+p.req.min+'+'+(S.special[p.req.special]>=p.req.min?' ✓':''));
      if(p.req&&p.req.perk)reqParts.push((PERKS.find(x=>x.id===p.req.perk)||{}).name||p.req.perk+(perkOwned(p.req.perk)?' ✓':''));
      const itMap={it_str:0,it_per:1,it_end:2,it_cha:3,it_int:4,it_agi:5,it_lck:6};
      let itInfo='';
      if(itMap[p.id]!==undefined){
        const si=itMap[p.id];
        const cur=S.special[si];
        itInfo=cur>=10?'<span style="color:var(--amber)">MAXED (10)</span>':'Current: '+cur+'/10';
      }
      return '<div style="display:flex;align-items:flex-start;gap:8px;padding:6px 4px;border-bottom:1px solid #1a1810;'+(owns?'':'opacity:'+(meets?'0.85':'0.4'))+'">'+
        '<div style="font-size:22px;width:32px;text-align:center;flex-shrink:0">'+p.icon+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="display:flex;align-items:center;gap:6px">'+
            '<span style="font-size:12px;font-weight:bold;color:'+(owns?'var(--green)':'var(--amber)')+'">'+p.name+'</span>'+
            '<span style="font-size:8px;padding:1px 4px;border-radius:3px;background:'+statusColor+'22;color:'+statusColor+';font-weight:bold">'+statusIcon+' '+statusText+'</span>'+
          '</div>'+
          '<div style="font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4">'+p.desc+'</div>'+
          (itInfo?'<div style="font-size:10px;color:var(--green2);margin-top:2px">'+itInfo+'</div>':'')+
          (!owns&&reqParts.length?'<div style="font-size:9px;color:#886;margin-top:2px">Requires: '+reqParts.join(' · ')+'</div>':'')+
        '</div></div>';
    }).join('');

    let isOpen=cat==='Training'||owned>0;
    hdr.onclick=()=>{isOpen=!isOpen;body.style.display=isOpen?'block':'none'};
    perkWrap.appendChild(hdr);
    perkWrap.appendChild(body);
  });
  tab.appendChild(perkWrap);

  // ── Quest Tracker ──
  const active=S.quests.filter(q=>!q.done);
  const completed=S.quests.filter(q=>q.done);
  tab.appendChild(el('div','sh',`Quests (${active.length} active${completed.length?' · '+completed.length+' done':''})`));

  if(active.length||completed.length){
    const qtWrap=el('div','');

    // ── Active Quests ──
    if(active.length){
      const aqHdr=el('div','');
      aqHdr.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px;background:var(--panel);border:1px solid #2a3a1a;border-radius:6px 6px 0 0;cursor:pointer';
      aqHdr.innerHTML=`<span style="font-size:11px;font-weight:bold;color:var(--green);letter-spacing:1px">📜 ACTIVE (${active.length})</span><span style="font-size:12px;color:var(--muted)">tap to toggle</span>`;
      const aqBody=el('div','');
      aqBody.style.cssText='background:var(--panel2);border:1px solid #2a3a1a;border-top:none;border-radius:0 0 6px 6px;padding:6px;display:block';

      aqBody.innerHTML=active.map(q=>{
        // Build step-by-step for deep quests
        let steps='';
        let locHint='';
        if(q.id==='novac_come_fly'){
          const s=S.flags.cfwm_stage||0;
          steps=buildQuestSteps([
            {text:'Travel to REPCONN Test Site',done:s>=1},
            {text:'Clear the nightkin in the basement',done:s>=2},
            {text:'Decide the fate of the ghouls',done:s>=3},
            {text:'Report to Manny Vargas in Novac',done:q.done}
          ]);
          locHint=s<1?'Novac → Dino Bite → REPCONN':s<3?'REPCONN Test Site (Novac → Dino Bite)':'Novac → Dino Bite → Manny Vargas';
        }else if(q.id==='freeside_kings_gambit'){
          const s=S.flags.kg_stage||0;
          steps=buildQuestSteps([
            {text:'Talk to Pacer about the NCR trouble',done:s>=1},
            {text:'Find the NCR envoy at the Old Mormon Fort',done:s>=2},
            {text:'Return to The King with your recommendation',done:q.done}
          ]);
          locHint=s===0?'Freeside → Kings HQ → Pacer':s===1?'Freeside → Old Mormon Fort → Julie Farkas':'Freeside → Kings HQ → The King';
        }else if(q.id==='mccarran_bitter_harvest'){
          const ev=S.flags.bh_evidence||0;
          const sus=S.flags.bh_suspects||{};
          steps=buildQuestSteps([
            {text:'Investigate Corporal Sterling',done:!!sus.sterling},
            {text:'Investigate Sergeant Contreras',done:!!sus.contreras},
            {text:'Investigate Private Crenshaw',done:!!sus.crenshaw},
            {text:`Make your accusation (${ev}/2 evidence needed)`,done:q.done}
          ]);
          locHint='Camp McCarran → McCarran HQ → Colonel Hsu';
        }else if(q.id==='freeside_the_debt'){
          const d=S.flags.td_debtors||{};
          const c=S.flags.td_collected||0;
          steps=buildQuestSteps([
            {text:'Collect from Marco (caravan guard)',done:!!d.marco},
            {text:'Collect from Esperanza (water seller)',done:!!d.esperanza},
            {text:'Collect from Dixon (chem dealer)',done:!!d.dixon},
            {text:'Return to James Garret',done:q.done}
          ]);
          locHint=c<3?'Freeside → Atomic Wrangler → James Garret → Go collect':'Freeside → Atomic Wrangler → James Garret';
        }else if(q.id==='golf_watchtower'){
          const s=S.flags.aw_stage||0;
          const t=S.flags.aw_trained||0;
          steps=buildQuestSteps([
            {text:`Train the Misfits (${t}/3 sessions)`,done:t>=3||s>=1},
            {text:'Choose assault plan',done:s>=2},
            {text:'Destroy the Legion camp',done:s>=2},
            {text:'Report to Chief Hanlon',done:q.done}
          ]);
          locHint=s===0?'Camp Golf → Golf Command → Sgt. McCredie (train) or skip':s<2?'Camp Golf → Golf Command → Sgt. McCredie (choose plan)':'Camp Golf → Golf Command → Chief Hanlon';
        }else if(q.id==='novac_one_for_my_baby'){
          steps=buildQuestSteps([
            {text:'Search motel office records',done:hasFlag('boone_bill_found')},
            {text:'Confront or present evidence',done:hasFlag('boone_culprit_exposed')},
            {text:'Return to Boone',done:q.done}
          ]);
          locHint=!hasFlag('boone_bill_found')?'Novac → Motel → Search records':'Novac → Dino Bite → Boone';
        }else if(q.id==='gs_ghost_town_gunfight'){
          const n=typeof gsGhostCount==='function'?gsGhostCount():0;
          steps=buildQuestSteps([
            {text:`Recruit townsfolk (${n}/4)`,done:n>=4||hasFlag('gs_ghost_fight_started')},
            {text:'Start the fight at the saloon',done:hasFlag('gs_ghost_fight_started')},
            {text:'Defeat Joe Cobb',done:q.done}
          ]);
          locHint='Goodsprings → Talk to NPCs → Saloon';
        }

        // Generic progress for non-deep quests
        let progPct=0,progText='';
        if(q.t==='kill'){const kd=q.kd||0;progPct=Math.min(100,Math.round(kd/q.kc*100));progText=`${kd}/${q.kc} killed`}
        else if(q.t==='fetch'){const fd=q.fd||0;progPct=Math.min(100,Math.round(fd/q.fc*100));progText=`${fd}/${q.fc} collected`}
        else if(q.t==='explore'){const ed=q.ed||0;progPct=Math.min(100,Math.round(ed/q.ec*100));progText=`${ed}/${q.ec} areas`}
        else if(!steps){progText=q.progText||'In progress'}

        return `<div style="padding:8px 4px;border-bottom:1px solid #1a2a1a">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
            <span style="font-size:14px">📜</span>
            <span style="font-size:12px;font-weight:bold;color:var(--amber)">${q.name}</span>
          </div>
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px;line-height:1.4">${q.desc}</div>
          ${steps||''}
          ${!steps&&progPct>0?`<div class="hb" style="margin:4px 0"><div class="hf g" style="width:${progPct}%"></div></div>`:''}
          ${!steps&&progText?`<div style="font-size:10px;color:var(--green)">${progText}</div>`:''}
          ${locHint?`<div style="font-size:9px;color:var(--amber2);margin-top:4px;display:flex;align-items:center;gap:4px"><span>📍</span> ${locHint}</div>`:''}
          <div style="font-size:9px;color:var(--muted);margin-top:3px">${q.giver?'From: '+q.giver+' · ':''}💰 ${q.rg} caps · ⭐ ${q.rx} XP</div>
        </div>`;
      }).join('');

      let aqOpen=true;
      aqHdr.onclick=()=>{aqOpen=!aqOpen;aqBody.style.display=aqOpen?'block':'none'};
      qtWrap.appendChild(aqHdr);
      qtWrap.appendChild(aqBody);
    }else{
      qtWrap.appendChild(el('div','cd','<div style="font-size:11px;color:var(--muted);text-align:center;padding:8px 0;font-style:italic">No active quests. Talk to NPCs to find work.</div>'));
    }

    // ── Completed Quests ──
    if(completed.length){
      const cqHdr=el('div','');
      cqHdr.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px;background:var(--panel);border:1px solid #2a2818;border-radius:6px 6px 0 0;cursor:pointer;margin-top:8px';
      cqHdr.innerHTML=`<span style="font-size:11px;font-weight:bold;color:var(--muted);letter-spacing:1px">✓ COMPLETED (${completed.length})</span><span style="font-size:12px;color:var(--muted)">tap to view</span>`;
      const cqBody=el('div','');
      cqBody.style.cssText='background:var(--panel2);border:1px solid #2a2818;border-top:none;border-radius:0 0 6px 6px;padding:6px;display:none';
      cqBody.innerHTML=completed.map(q=>`<div style="padding:4px;border-bottom:1px solid #1a1810;opacity:0.6">
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:11px;color:var(--green)">✓</span>
          <span style="font-size:11px;font-weight:bold;color:var(--green)">${q.name}</span>
          <span style="font-size:9px;color:var(--muted);margin-left:auto">💰 ${q.rg} · ⭐ ${q.rx}</span>
        </div>
        <div style="font-size:9px;color:var(--muted);margin-top:2px">${q.desc}</div>
      </div>`).join('');

      let cqOpen=false;
      cqHdr.onclick=()=>{cqOpen=!cqOpen;cqBody.style.display=cqOpen?'block':'none'};
      qtWrap.appendChild(cqHdr);
      qtWrap.appendChild(cqBody);
    }

    tab.appendChild(qtWrap);
  }else{
    tab.appendChild(el('div','cd','<div style="font-size:11px;color:var(--muted);text-align:center;padding:8px 0;font-style:italic">No quests yet. Explore and talk to NPCs to find work.</div>'));
  }

  // ── Faction & Settlement Standings ──
  tab.appendChild(el('div','sh','Standings'));
  const repGetLabel=(r)=>r>=50?'Idolized':r>=30?'Liked':r>=10?'Accepted':r>=0?'Neutral':r>=-20?'Shunned':'Vilified';
  const repGetCol=(r)=>r>=30?'var(--green)':r>=10?'#6a8':r>=0?'var(--muted)':r>=-20?'var(--amber2)':'var(--red)';
  const repBar=(fac,rep)=>{
    const label=repGetLabel(rep);const col=repGetCol(rep);
    const pct=Math.max(2,Math.min(100,Math.round((rep+50)/100*100)));
    return `<div style="padding:6px 0;border-bottom:1px solid #1a1810">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">
        <span style="color:var(--amber)">${FACTIONS[fac]||fac}</span>
        <span style="color:${col}">${label} (${rep>=0?'+':''}${rep})</span>
      </div><div class="hb"><div class="hf ${rep>=0?'g':'cr'}" style="width:${pct}%"></div></div></div>`;
  };
  const majorReps=MAJOR_FACS.filter(f=>(S.rep[f]||0)!==0);
  const localReps=LOCAL_FACS.filter(f=>(S.rep[f]||0)!==0);
  const otherReps=Object.keys(S.rep||{}).filter(f=>(S.rep[f]||0)!==0&&!MAJOR_FACS.includes(f)&&!LOCAL_FACS.includes(f)&&FACTIONS[f]);
  const facWrap=el('div','');
  const mjHdr=el('div','');
  mjHdr.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px;background:var(--panel);border:1px solid #2a2818;border-radius:6px 6px 0 0;cursor:pointer;margin-top:4px';
  mjHdr.innerHTML=`<span style="font-size:11px;font-weight:bold;color:var(--amber);letter-spacing:1px">🏴 MAJOR FACTIONS</span><span style="font-size:12px;color:var(--muted)">${majorReps.length} active</span>`;
  const mjBody=el('div','');
  mjBody.style.cssText='background:var(--panel2);border:1px solid #2a2818;border-top:none;border-radius:0 0 6px 6px;padding:4px 8px;display:block';
  if(majorReps.length){mjBody.innerHTML=majorReps.map(f=>repBar(f,S.rep[f]||0)).join('')}
  else{mjBody.innerHTML='<div style="font-size:10px;color:var(--muted);text-align:center;padding:8px 0;font-style:italic">No major faction standing yet.</div>'}
  const dormantMajor=MAJOR_FACS.filter(f=>(S.rep[f]||0)===0);
  if(dormantMajor.length){mjBody.innerHTML+=`<div style="font-size:9px;color:#3a3828;padding:4px 0;margin-top:4px;border-top:1px solid #1a1810">${dormantMajor.map(f=>FACTIONS[f]).join(' · ')}</div>`}
  let mjOpen=true;
  mjHdr.onclick=()=>{mjOpen=!mjOpen;mjBody.style.display=mjOpen?'block':'none'};
  facWrap.appendChild(mjHdr);facWrap.appendChild(mjBody);
  const lcHdr=el('div','');
  lcHdr.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px;background:var(--panel);border:1px solid #2a2818;border-radius:6px 6px 0 0;cursor:pointer;margin-top:8px';
  lcHdr.innerHTML=`<span style="font-size:11px;font-weight:bold;color:var(--green2);letter-spacing:1px">📍 SETTLEMENTS</span><span style="font-size:12px;color:var(--muted)">${localReps.length} active</span>`;
  const lcBody=el('div','');
  lcBody.style.cssText='background:var(--panel2);border:1px solid #2a2818;border-top:none;border-radius:0 0 6px 6px;padding:4px 8px;display:'+(localReps.length>0?'block':'none');
  if(localReps.length){lcBody.innerHTML=localReps.map(f=>repBar(f,S.rep[f]||0)).join('')}
  else{lcBody.innerHTML='<div style="font-size:10px;color:var(--muted);text-align:center;padding:8px 0;font-style:italic">No local standing yet.</div>'}
  const dormantLocal=LOCAL_FACS.filter(f=>(S.rep[f]||0)===0);
  if(dormantLocal.length){lcBody.innerHTML+=`<div style="font-size:9px;color:#3a3828;padding:4px 0;margin-top:4px;border-top:1px solid #1a1810">${dormantLocal.map(f=>FACTIONS[f]).join(' · ')}</div>`}
  let lcOpen=localReps.length>0;
  lcHdr.onclick=()=>{lcOpen=!lcOpen;lcBody.style.display=lcOpen?'block':'none'};
  facWrap.appendChild(lcHdr);facWrap.appendChild(lcBody);
  if(otherReps.length){
    const otHdr=el('div','');
    otHdr.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px;background:var(--panel);border:1px solid #2a2818;border-radius:6px 6px 0 0;cursor:pointer;margin-top:8px';
    otHdr.innerHTML=`<span style="font-size:11px;font-weight:bold;color:var(--muted);letter-spacing:1px">📋 OTHER</span><span style="font-size:12px;color:var(--muted)">${otherReps.length}</span>`;
    const otBody=el('div','');
    otBody.style.cssText='background:var(--panel2);border:1px solid #2a2818;border-top:none;border-radius:0 0 6px 6px;padding:4px 8px;display:none';
    otBody.innerHTML=otherReps.map(f=>repBar(f,S.rep[f]||0)).join('');
    let otOpen=false;
    otHdr.onclick=()=>{otOpen=!otOpen;otBody.style.display=otOpen?'block':'none'};
    facWrap.appendChild(otHdr);facWrap.appendChild(otBody);
  }
  tab.appendChild(facWrap);
}

// INVENTORY TAB
// ============================================================

  // Equipped
  tab.appendChild(el('div','sh','Equipped'));
  const gear=el('div','cd');
  const w=S.gear.w?ITEMS[S.gear.w]:null;
  const b2=S.gear.body?ITEMS[S.gear.body]:null;

    <span>🔫 Weapon: <b>${w?w.e+' '+w.n:'— None —'}</b>${w?' (ATK +'+w.a+')':''}</span>
    ${w?`<button class="bt sm dn" style="margin:0" onclick="unequipSlot('w')">Unequip</button>`:''}
  </div>
  ${w&&w.ammo?`<div style="margin-bottom:2px">🔸 Ammo: <b>${ITEMS[w.ammo]?.n||'Ammo'} ×${countItem(w.ammo)}</b> <span style="color:var(--muted)">(uses 1 per attack)</span></div>`:''}

    ${b2?`<button class="bt sm dn" style="margin:0" onclick="unequipSlot('body')">Unequip</button>`:''}
  </div>

    <span>🪖 Head: <b>${h?h.e+' '+h.n:'— None —'}</b>${h?' (DEF +'+h.d+')':''}</span>
    ${h?`<button class="bt sm dn" style="margin:0" onclick="unequipSlot('head')">Unequip</button>`:''}
  </div>
  <div>🎒 Carry: <b style="color:${overEncumbered()?'var(--red)':'var(--green)'}">${fmtWeight(currentCarryWeight())}/${fmtWeight(carryCapacity())}kg</b></div></div>`;
  tab.appendChild(gear);

  // Inventory
  const carryWarn=overEncumbered()?'cr':carryPct()>=80?'lo':'g';
  tab.appendChild(el('div','sh',`Inventory (${S.inv.length} items)`));
  const invCtrl=el('div','cd');

  </div>`;

  const counts={};S.inv.forEach(id=>{counts[id]=(counts[id]||0)+1});

    const it=ITEMS[id];if(!it)return;
    const ic=el('div','inv-card');
    let actions='';
    if(it.t==='w')actions=`<button class="bt sm go" onclick="equipItem('${id}','w')">Equip</button>`;
    if(it.t==='a'&&it.slot==='body')actions=`<button class="bt sm go" onclick="equipItem('${id}','body')">Equip</button>`;
    if(it.t==='a'&&it.slot==='head')actions=`<button class="bt sm go" onclick="equipItem('${id}','head')">Equip</button>`;
    if(it.t==='c')actions=`<button class="bt sm pip" onclick="useItem('${id}')">Use</button>`;
    actions+=`<button class="bt sm dn" onclick="dropItem('${id}')">Drop</button>`;

    ic.innerHTML=`<div class="inv-row"><div style="flex:1"><span class="inv-item-icon">${renderIcon(it.e,96)}</span><span><b>${it.n}</b>${cnt>1?' ×'+cnt:''}</span></div><div style="font-size:12px;color:var(--muted)">${it.p}c</div></div>
    <div style="font-size:10px;color:var(--muted);margin:2px 0">${it.desc||''} ${it.a?'ATK +'+it.a:''}${it.d?'DEF +'+it.d:''}${it.hp?'HP +'+it.hp:''}${it.ammo?' · Uses '+(ITEMS[it.ammo]?.n||'ammo'):''}${it.t==='ammo'?' · Ammunition':''} · WT ${fmtWeight(it.w||0)}kg</div>
    <div>${actions}</div>`;
    tab.appendChild(ic);
  });
}
function equipItem(id,slot){
  const idx=S.inv.indexOf(id);if(idx===-1)return;
  if(S.gear[slot])giveItem(S.gear[slot],1,{ignoreLimit:true,silent:true});
  S.gear[slot]=id;S.inv.splice(idx,1);
  log('Equipped '+ITEMS[id]?.n+'.','n');notify('Equipped '+ITEMS[id]?.n);upInv();save();
}
function useItem(id){
  const idx=S.inv.indexOf(id);if(idx===-1)return;
  const it=ITEMS[id];if(!it)return;
  if(it.hp){S.hp=Math.min(S.maxHp,S.hp+it.hp);log('Used '+it.n+'. +'+it.hp+' HP.','e');notify('❤ +'+it.hp+' HP')}
  if(it.buff){if(it.buff.ap)S.ap=Math.min(S.maxAp,S.ap+it.buff.ap)}
  S.inv.splice(idx,1);upInv();upSB();save();
}
function dropItem(id){
  const idx=S.inv.indexOf(id);if(idx===-1)return;
  S.inv.splice(idx,1);log('Dropped '+ITEMS[id]?.n+'.','n');upInv();save();
}
function unequipSlot(slot){
  if(!S.gear||!S.gear[slot])return;
  const id=S.gear[slot];
  giveItem(id,1,{ignoreLimit:true,silent:true});
  S.gear[slot]=null;
  log('Unequipped '+(ITEMS[id]?.n||id)+'.','n');
  notify('Unequipped '+(ITEMS[id]?.n||id));
  upInv();save();
}
function sellJunk(){
  // Sell all material-type items (type 'm') at half price
  const junkIds=S.inv.filter(id=>ITEMS[id]&&ITEMS[id].t==='m');
  if(!junkIds.length){notify('No junk to sell.');return}
  let total=0;
  const sold={};
  junkIds.forEach(id=>{
    total+=Math.floor((ITEMS[id].p||0)*0.5);
    sold[id]=(sold[id]||0)+1;
  });
  S.inv=S.inv.filter(id=>!(ITEMS[id]&&ITEMS[id].t==='m'));
  S.caps+=total;
  S.capsEarned=(S.capsEarned||0)+total;
  const names=Object.entries(sold).map(([id,n])=>`${ITEMS[id]?.n||id}${n>1?' ×'+n:''}`).join(', ');
  log(`Sold junk: ${names} for ${total} caps.`,'e');
  notify(`💰 Sold junk for ${total} caps`);
  upInv();upSB();save();
}

function mapIsVisited(locId){
  if(!S)return false;
  if(locId===S.loc)return true;
  if(S.visitedLocs&&S.visitedLocs.has&&S.visitedLocs.has(locId))return true;
  return !!(S.visitedLocs&&Array.isArray(S.visitedLocs)&&S.visitedLocs.includes(locId));
}

function mapIsKnown(locId){
  // Pins are always visible on the Pip-Boy map now.
  // This still lets old code ask if a location has been discovered/reached.
  if(mapIsVisited(locId))return true;
  if(ROADS[S.loc]&&ROADS[S.loc][locId]!==undefined)return true;
  if(MAP_META&&MAP_META[locId])return true;
  if(S.visitedLocs){
    const vl=Array.isArray(S.visitedLocs)?S.visitedLocs:[...S.visitedLocs];
    for(const v of vl){if(ROADS[v]&&ROADS[v][locId]!==undefined)return true}
  }
  return false;
}

  if(!S.visitedLocs)S.visitedLocs=[];
  if(!S.visitedLocs.includes(locId))S.visitedLocs.push(locId);

let _travelMapState=null;
function travelRouteViewBox(fc,tc,VW,VH){
  if(!fc||!tc)return{x:0,y:0,w:VW,h:VH};
  const pad=58;
  let x=Math.min(fc.x,tc.x)-pad,y=Math.min(fc.y,tc.y)-pad;
  let w=Math.abs(tc.x-fc.x)+pad*2,h=Math.abs(tc.y-fc.y)+pad*2;
  w=Math.max(155,Math.min(VW,w));h=Math.max(225,Math.min(VH,h));
  x=(fc.x+tc.x)/2-w/2;y=(fc.y+tc.y)/2-h/2;
  x=Math.max(0,Math.min(VW-w,x));y=Math.max(0,Math.min(VH-h,y));
  return{x,y,w,h};
}

      if(icon){const im=document.createElementNS('http://www.w3.org/2000/svg','image');im.setAttribute('href',icon);im.setAttribute('x',p.x-15);im.setAttribute('y',p.y-15);im.setAttribute('width','30');im.setAttribute('height','30');svg.appendChild(im);} 
      const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',p.x);c.setAttribute('cy',p.y);c.setAttribute('r','8');c.setAttribute('fill',col);c.setAttribute('stroke','#0a0a06');c.setAttribute('stroke-width','2');svg.appendChild(c);
      const label=document.createElementNS('http://www.w3.org/2000/svg','text');label.setAttribute('x',p.x);label.setAttribute('y',p.y+27);label.setAttribute('text-anchor','middle');label.setAttribute('font-size','8');label.setAttribute('font-family','Courier New');label.setAttribute('fill',col);label.textContent=tag;svg.appendChild(label);
    });
    const marker=document.createElementNS('http://www.w3.org/2000/svg','image');marker.id='LIVE_TRAVEL_PLAYER';marker.setAttribute('href','NVImages/CharIcon.png');marker.setAttribute('width','34');marker.setAttribute('height','34');marker.setAttribute('x',fc.x-17);marker.setAttribute('y',fc.y-17);svg.appendChild(marker);

function travelEnemyIconSrc(enemy){
  const html=(enemy&&enemy.e)||'';
  const m=String(html).match(/<img[^>]+src=["']([^"']+)["']/i);
  return m?m[1]:null;
}
function setTravelEncounterIcons(enemies){
  const st=_travelMapState;if(!st)return;

function renderTravelEncounterIcons(x,y){
  const st=_travelMapState;if(!st)return;

function updateTravelMapProgress(done,total){
  const st=_travelMapState;if(!st)return;
  st.done=done;st.total=Math.max(1,total||st.total||1);
  const fc=MAP_COORDS[st.from],tc=MAP_COORDS[st.to],mk=$('LIVE_TRAVEL_PLAYER');if(!fc||!tc||!mk)return;
  const p=Math.max(0,Math.min(1,st.done/st.total));
  const x=fc.x+(tc.x-fc.x)*p,y=fc.y+(tc.y-fc.y)*p;

function mapDoTravel(dest,days){
  _mapSel=null;
  beginTravel(dest,days);
}
function beginTravel(dest,days){
  if(combat)return;
  if(tTravelActive||tDest){notify('Already travelling.');return;}
  applyEndgameRoutes();
  if(dest==='MojaveTunnels'&&!tunnelsUnlocked()){notify('Find the Tunnel Broker on the Strip at level 20.');return;}
  const destLoc=LOCS[dest];
  const ncrRep=S.rep.NCR||0;
  const legionRep=S.rep.Legion||0;
  const destFac=destLoc?.fac;

  // NCR hostile — blocked at NCR territory
  if(destFac==='NCR'&&ncrRep<=-20){
    openDlg(`<div style="text-align:center">
      <div style="font-size:36px;margin-bottom:8px">🛑</div>
      <div style="font-size:14px;font-weight:bold;color:var(--red);margin-bottom:6px">NCR Hostile</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">NCR troopers have orders to shoot you on sight. Travelling to ${destLoc.n} right now would be suicide. Raise your NCR standing first.</div>
      <button class="bt" style="text-align:center" onclick="closeDlg()">Back down</button>
      <button class="bt dn" style="text-align:center" onclick="closeDlg();_beginTravelForce('${dest}',${days})">Push through anyway (very dangerous)</button>
    </div>`);
    return;
  }

  // NCR shunned — toll warning
  if(destFac==='NCR'&&ncrRep>=-20&&ncrRep<-5){
    const toll=20;
    openDlg(`<div style="text-align:center">
      <div style="font-size:36px;margin-bottom:8px">🛡</div>
      <div style="font-size:14px;font-weight:bold;color:var(--amber);margin-bottom:6px">NCR Checkpoint Ahead</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Your standing with the NCR is poor. Expect a toll of ~${toll} caps at the checkpoint into ${destLoc.n}.</div>
      <button class="bt go" style="text-align:center" onclick="closeDlg();_applyNcrToll(${toll});_beginTravelForce('${dest}',${days})">Pay the toll (${toll} caps) and travel</button>
      <button class="bt" style="text-align:center" onclick="closeDlg()">Wait until your rep improves</button>
    </div>`);
    return;
  }

  // Legion hostile — Legion territory is a death sentence
  if(destFac==='Legion'&&legionRep<=-20){
    openDlg(`<div style="text-align:center">
      <div style="font-size:36px;margin-bottom:8px">⚔</div>
      <div style="font-size:14px;font-weight:bold;color:var(--red);margin-bottom:6px">Legion Territory — Vilified</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Caesar's Legion has marked you for death. Entering ${destLoc.n} means fighting your way in — and probably not out.</div>
      <button class="bt" style="text-align:center" onclick="closeDlg()">Back down</button>
      <button class="bt dn" style="text-align:center" onclick="closeDlg();_beginTravelForce('${dest}',${days})">Push through anyway</button>
    </div>`);
    return;
  }

  // Legion liked — note the relative safety
  if(destFac==='Legion'&&legionRep>=30){
    _beginTravelForce(dest,days);
    return;
  }

  _beginTravelForce(dest,days);
}
function _applyNcrToll(amount){
  if((S.caps||0)<amount){notify('Not enough caps for the toll.');return}
  S.caps-=amount;
  log('Paid NCR checkpoint toll: '+amount+' caps.','e');
  notify('🛡 NCR toll: -'+amount+' caps');
}
function _beginTravelForce(dest,days){
  if(tTravelActive||tDest){notify('Already travelling.');return;}
  tOrigin=S.loc;
  tDest=dest;
  tTravelActive=true;
  tQ=genTravelEv(days,S.loc,dest);
  $('TO').classList.add('A');$('TB').style.width='0%';$('TC').innerHTML='';$('TN').style.display='none';
  buildTravelMap(S.loc,dest);

function genTravelEv(days,from,to){
  applyEndgameRoutes();
  const evs=[];const total=days*2+rnd(1,3);
  for(let i=0;i<total;i++){
    const r=R();
    if(r<.22){
      // Standard creature/enemy combat
      const dloc=LOCS[to];
      const enPool=dloc?.sur?.length?rndA(dloc.sur).en:['gecko','bloatfly'];
      const validPool=enPool.filter(e=>ENEMIES[e]);
      if(validPool.length){
        const cnt=rnd(1,2);
        const enemies=buildCohesiveGroup(validPool,cnt);
        if(enemies.length)evs.push({tp:'combat',e:enemies[0].e,tx:'',enemies,_i:i,_t:total});
      }
    }else if(r<.35){
      // Faction patrol encounter — based on rep and location
      const facPatrol=rollFactionPatrol(to);
      if(facPatrol&&facPatrol._factionAid){
        evs.push({tp:'factionAid',e:'🏴',tx:'',aidData:facPatrol,_i:i,_t:total});
      }else if(facPatrol){
        evs.push({tp:'combat',e:facPatrol[0].e,tx:'',enemies:facPatrol,_i:i,_t:total});
      }else{
        // Fallback to scene
        evs.push({tp:'scene',e:'🏜',tx:rndA(TRAVEL_SCENES),_i:i,_t:total});
      }
    }else if(r<.48){
      const finds=['stimpak','sunset_sars','dirty_water','cram','iguana_bits','ammo_9mm','ammo_10mm','ammo_357','ammo_556','ammo_shells','energy_cell','herbs','scrap','pre_war_money','wonderglue','wrench','scrap_electronics','camera','cigarette_pack','cigarette_carton','silverware','silver_watch','gold_necklace','conductor'];
      const fi=rndA(finds);const it=ITEMS[fi];
      evs.push({tp:'loot',e:'✨',tx:`You spot something: <b style="color:var(--green)">${it?.e} ${it?.n}</b>`,fn:()=>{if(fi&&ITEMS[fi])giveItem(fi);log('Found '+it?.n+' on the road.','e')},_i:i,_t:total});
    }else if(r<.72){
      const card=rollEncounterCard(to,null);
      if(card)evs.push({tp:'encounter',e:card.icon,tx:'',card,_i:i,_t:total});
      else{
        evs.push({tp:'scene',e:rndA(['🏜','🌵','☀','🛣']),tx:rndA(TRAVEL_SCENES),_i:i,_t:total});
      }
    }else{
      evs.push({tp:'scene',e:rndA(['🏜','🌵','☀','🛣']),tx:rndA(TRAVEL_SCENES),_i:i,_t:total});
    }
  }
  return evs;
}

// Roll a faction patrol encounter based on region and rep
function rollFactionPatrol(destId){
  const dloc=LOCS[destId];if(!dloc)return null;
  const locFac=dloc.fac;

  // Build weighted faction pool based on location and player rep
  const candidates=[];

  // Location's own faction patrols — hostile factions patrol more heavily
  if(locFac&&FACTION_PATROLS[locFac]){
    const rep=S.rep[locFac]||0;
    const disp=getFactionDisposition(locFac);
    let weight=1;
    if(disp==='hostile')weight=5;
    else if(disp==='wary')weight=3;
    else if(disp==='friendly')weight=1;
    else if(disp==='allied')weight=1;
    // Extra patrols scale with how negative rep is
    if(rep<=-20)weight+=2;
    if(rep<=-40)weight+=2;
    for(let w=0;w<weight;w++)candidates.push(locFac);
  }

  // Enemy factions of player's allies send hostile patrols
  Object.entries(S.rep||{}).forEach(([fac,rep])=>{
    if(rep>=10&&FACTION_WARS[fac]){
      FACTION_WARS[fac].forEach(enemy=>{
        if(FACTION_PATROLS[enemy]){
          // More allied = more enemy activity
          const w=rep>=30?3:rep>=20?2:1;
          for(let i=0;i<w;i++)candidates.push(enemy);
        }
      });
    }
  });

  // Factions the player is very hostile with send hunters
  Object.entries(S.rep||{}).forEach(([fac,rep])=>{
    if(rep<=-15&&FACTION_PATROLS[fac]){
      const w=rep<=-30?4:rep<=-20?3:2;
      for(let i=0;i<w;i++)candidates.push(fac);
    }
  });

  // Random NCR/Legion patrols in contested territory
  const contested=['NovacN','FreesideN','NiptonN','BoulderCityN','CampMcCarran','CampGolf'];
  if(contested.some(c=>destId.includes(c)||destId===c)){
    if(R()<0.35)candidates.push('NCR');
    if(R()<0.25)candidates.push('Legion');
  }

  if(!candidates.length)return null;

  const pickedFac=rndA(candidates);
  const rep=S.rep[pickedFac]||0;
  const disp=getFactionDisposition(pickedFac);

  // ── Bounty hunter squads for vilified factions ──
  const hunter=FACTION_HUNTERS[pickedFac];
  if(hunter&&rep<=hunter.minRep&&R()<0.25){
    const squad=hunter.pool.filter(id=>ENEMIES[id]);
    if(squad.length){
      const enemies=buildCohesiveGroup(squad,rnd(2,Math.min(4,squad.length)));
      enemies.forEach(en=>{en.name=hunter.name.split(' ')[0]+' '+en.name;en.xp=Math.round(en.xp*1.5)});
      return enemies;
    }
  }

  const pool=FACTION_PATROLS[pickedFac];
  if(!pool)return null;

  // ── Friendly/allied factions give aid instead of combat ──
  if((disp==='friendly'||disp==='allied')&&R()<(disp==='allied'?0.6:0.35)){
    // Return a special "aid encounter" marker
    const aidPool=FACTION_AID[pickedFac];
    if(aidPool&&aidPool.length){
      const aid=rndA(aidPool);
      return {_factionAid:true,fac:pickedFac,aid:aid};
    }
  }

  const cnt=rnd(1,Math.min(3,pool.length));
  const validPool=pool.filter(id=>ENEMIES[id]);
  if(!validPool.length)return null;

  return buildCohesiveGroup(validPool,cnt);
}

// Handle faction aid encounters during travel
function handleFactionAid(aidData){
  const fac=aidData.fac;
  const aid=aidData.aid;
  const facName=FACTIONS[fac]||fac;
  const disp=getFactionDisposition(fac);
  const lines=[`A ${facName} patrol approaches.`];
  lines.push(aid.text);
  if(aid.items){aid.items.forEach(id=>{const it=ITEMS[id];if(it){giveItem(id,1,{ignoreLimit:true});lines.push(`${it.e} ${it.n} received.`)}})}
  if(aid.caps){S.caps+=aid.caps;lines.push(`+${aid.caps} caps.`)}
  if(aid.xp){S.xp+=grantXP(aid.xp);lines.push(`⭐ +${aid.xp} XP`)}
  if(aid.heal){S.hp=Math.min(S.maxHp,S.hp+Math.round(S.maxHp*0.4));lines.push(`❤ Healed to ${S.hp}/${S.maxHp}`)}
  if(aid.questHint){lines.push(`📜 ${aid.questHint}`)}
  const repGain=R()<0.3?1:0;
  if(repGain){S.rep[fac]=(S.rep[fac]||0)+1;lines.push(`+1 ${facName} rep`)}
  return lines;
}
function nextTEv(){

function cancelTravel(msg){

function finTravel(){
  if(!tTravelActive&&!tDest){
    tQ=[];tOrigin=null;
    $('TO').classList.remove('A');
    clearTravelMap();
    upAll();

  }
  const arrived=tDest;
  const arrivedName=LOCS[arrived]?.n||arrived||'your destination';

  // Clear route state before refreshing UI or showing the arrival popup.
  // This prevents stale Continue buttons / old travel cards from starting the same route again.
  tDest=null;
  tQ=[];
  tOrigin=null;
  tTravelActive=false;
  clearTravelEncounterIcons();
  clearTravelMap();
  $('TO').classList.remove('A');

  if(arrived){
    S.loc=arrived;S.days++;S.hours=8;

    mapMarkVisited(S.loc);

  }
  upSB();
  refreshActiveTab();
  save();
  if(arrived)showResult('Destination Reached','📍',[`You arrived at ${arrivedName}.`],'Continue','upAll()');

function advanceTime(hours){
  S.hours=(S.hours||8)+hours;
  while(S.hours>=24){S.hours-=24;S.days++;payDaily();dailyEvent()}
  // Quest progress
  S.quests.forEach(q=>{
    if(q.done)return;
    if(q.t==='kill'&&q.kt){q.kd=S.kills[q.kt]||0;if(q.kd>=q.kc)completeQuest(q)}
    if(q.t==='explore'){q.ed=(q.ed||0);if(q.ed>=q.ec)completeQuest(q)}
    if(q.t==='side_kill')sideTaskCheck(q);
  });
  if(S.flags&&S.flags.hv)hvRefreshState();
  gsRefreshState();
  if(typeof novacRefreshState==='function')novacRefreshState();
  // AP regen
  S.ap=Math.min(S.maxAp,S.ap+Math.floor(hours*3));
}
function payDaily(){
  // Age
  if(S.days%90===0){
    S.age++;
    if(S.spouse&&R()<.2&&S.children.length<4){
      const cm=R()<.5;const cn=(cm?rndA(FM):rndA(FF))+' '+S.name.split(' ').pop();
      S.children.push({name:cn,male:cm,born:S.days,age:0});
      log('A child is born! '+cn,'e');notify('👶 '+cn+' is born!');
    }
    S.children.forEach(c=>{c.age=Math.floor((S.days-c.born)/90)});
  }
  worldTick();
}
function completeQuest(q){
  if(q.done)return;q.done=true;
  S.xp+=grantXP(q.rx);S.caps+=q.rg;S.questsComplete++;
  if(q.fac){const gain=(q.repBonus||5)*(S.leaderPerk?2:1);S.rep[q.fac]=(S.rep[q.fac]||0)+gain;}
  log('Quest complete: '+q.name+' (+'+q.rg+' caps, +'+q.rx+' XP)','q');
  notify('📜 Quest Complete!');chkLU();
}
function dailyEvent(){
  if(R()<.3){
    const events=[
      ()=>{const g=rnd(5,15);S.caps+=g;log('Found '+g+' caps in an old cache.','e')},
      ()=>{log('Radio New Vegas: "'+rndA(["This is Mr. New Vegas, and I love you.","The NCR reports increased Legion activity.","Travelers beware: Deathclaws near Quarry Junction.","The Strip is open for business, baby."])+'".','e')},

}

function worldTick(){
  if(!S.worldEvents)S.worldEvents=[];
  if(S.days-S.lastWorldTick<4)return;
  S.lastWorldTick=S.days;
  // Expire old events
  S.worldEvents=S.worldEvents.filter(ev=>S.days-ev.started<ev.duration);
  // Only roll if under cap
  if(R()<.55&&S.worldEvents.length<4){
    const t=rndA(WORLD_EVENT_TEMPLATES);
    const locKey=rndA(Object.keys(LOCS));
    const locName=LOCS[locKey]?.n||'somewhere';
    const id='we_'+Date.now()+'_'+Math.floor(R()*1000);
    S.worldEvents.push({
      id,
      templateId:t.title,
      title:t.title.replace('{loc}',locName),
      body:t.body,
      type:t.type,
      fac:t.fac,
      icon:t.icon,
      duration:t.duration,
      started:S.days,
      loc:locKey,
      resolved:false
    });
    log('📰 '+t.title.replace('{loc}',locName),'e');
    notify('📰 New world event — check the World tab');
  }
}

// Helper: start a combat encounter from within a world event resolution
// Uses a lightweight approach — sets up combat and stores a pending WE result
function startCombatWE(enemyId,count){
  const enList=[];
  for(let i=0;i<(count||1);i++){if(ENEMIES[enemyId])enList.push(mkEnemy(enemyId))}
  if(!enList.length)return;
  closeDlg();
  startCombat(enList);
  combat._fromWorldEvent=true;
}

function resolveWorldEvent(ev,result){
  if(!ev||ev.resolved)return;
  ev.resolved=true;
  // Apply rep deltas
  if(result.repDelta){
    Object.entries(result.repDelta).forEach(([fac,val])=>{
      if(val===0)return;
      S.rep[fac]=(S.rep[fac]||0)+val;
      const label=val>0?'+'+val:String(val);
      log(FACTIONS[fac]||fac+' standing: '+label,'e');
    });
  }
  if(result.karma){S.karma=(S.karma||0)+result.karma}
  if(result.caps&&result.caps>0){S.caps+=result.caps}
  if(result.capsDelta&&result.capsDelta<0){S.caps=Math.max(0,S.caps+result.capsDelta)}
  if(result.capsDelta&&result.capsDelta>0){S.caps+=result.capsDelta}
  if(result.xpBonus&&result.xpBonus>0){const x=grantXP(result.xpBonus);S.xp+=x}
  chkLU();save();
  // Remove event
  S.worldEvents=S.worldEvents.filter(e=>e.id!==ev.id);
}

function interceptWorldEvent(evId){
  const ev=S.worldEvents.find(e=>e.id===evId);
  if(!ev||ev.resolved){notify('This situation has already passed.');upWorld();return}
  if(ev.loc!==S.loc){notify(`Travel to ${LOCS[ev.loc]?.n||MAP_META[ev.loc]?.n||'the event location'} first.`);upWorld();return}
  // Find matching template
  const tmpl=WORLD_EVENT_TEMPLATES.find(t=>t.title===ev.templateId);
  if(!tmpl){notify('No choices available.');return}
  let html=`<div style="text-align:center;font-size:32px;margin-bottom:8px">${ev.icon}</div>`;
  html+=`<div style="font-size:14px;font-weight:bold;color:var(--amber);margin-bottom:6px">${ev.title}</div>`;
  html+=`<div class="npc-line" style="margin-bottom:10px">${ev.body}</div>`;
  if(ev.fac&&ev.fac!=='None'&&FACTIONS[ev.fac]){
    const rep=S.rep[ev.fac]||0;
    const label=rep>=50?'Idolized':rep>=30?'Liked':rep>=10?'Accepted':rep>=0?'Neutral':rep>=-20?'Shunned':'Vilified';
    const col=rep>=10?'var(--green)':rep>=0?'var(--muted)':'var(--red)';
    html+=`<div style="font-size:10px;color:var(--muted);margin-bottom:8px">${FACTIONS[ev.fac]}: <span style="color:${col}">${label} (${rep>=0?'+':''}${rep})</span></div>`;
  }
  tmpl.choices.forEach((ch,i)=>{
    html+=`<button class="bt" style="text-align:left;margin:3px 0" onclick="weChoose('${evId}',${i})">${ch.label}</button>`;
  });
  html+=`<button class="bt" style="text-align:center;margin-top:4px;color:var(--muted)" onclick="closeDlg()">↩ Come back later</button>`;
  openDlg(html);
}

function weChoose(evId,choiceIdx){
  const ev=S.worldEvents.find(e=>e.id===evId);
  if(!ev||ev.resolved){closeDlg();return}
  const tmpl=WORLD_EVENT_TEMPLATES.find(t=>t.title===ev.templateId);
  if(!tmpl||!tmpl.choices[choiceIdx]){closeDlg();return}
  const ch=tmpl.choices[choiceIdx];
  closeDlg();
  const result=ch.fn();
  if(!result){
    // Combat was triggered — store event for post-combat resolution
    if(combat){combat._pendingWEId=evId;combat._pendingWEResult={repDelta:{},karma:0,caps:0,xpBonus:15,postText:ch.result||'The situation resolves.'}}
    return;
  }
  resolveWorldEvent(ev,result);
  const lines=[result.postText||ch.result||'Done.'];
  if(result.repDelta)Object.entries(result.repDelta).forEach(([fac,v])=>{if(v!==0)lines.push((FACTIONS[fac]||fac)+': '+(v>0?'+':'')+v+' rep')});
  if(result.karma&&result.karma!==0)lines.push('⚖ Karma: '+(result.karma>0?'+':'')+result.karma);
  if(result.caps&&result.caps>0)lines.push('💰 +'+result.caps+' caps');
  if(result.capsDelta&&result.capsDelta<0)lines.push('💰 '+result.capsDelta+' caps');
  if(result.xpBonus&&result.xpBonus>0)lines.push('⭐ +'+result.xpBonus+' XP');
  showResult(ev.title,ev.icon,lines,'Continue','upAll()');
}

// Global error shield — catches any uncaught JS exception and shows
// a brief non-intrusive toast rather than silently breaking.
window.addEventListener('error',ev=>{
  if(S)queueSave(50); // emergency save on any error
  console.error('[FNV-RPG]',ev.message,ev.filename,ev.lineno);
});
window.addEventListener('unhandledrejection',ev=>{
  if(S)queueSave(50);
  console.error('[FNV-RPG promise]',ev.reason);
});

(async function init(){
  try{
    bindAutoSave();
    startAutoSaveLoop();
    requestPersistentStorage();
    if(await loadAsync()){upAll();save(true);snapshotState()}else{newGame()}
  }catch(e){
    console.error('[FNV-RPG init error]',e);
    // Do not instantly overwrite a possible save if boot fails. Try every recovery
    // source one more time before showing character creation.
    try{
      if(load()||recoverWindowSnapshot()){upAll();save(true);snapshotState()}
      else newGame();
    }catch(e2){console.error('[FNV-RPG] Fatal init failure',e2)}
  }
})();

 raul:{id:'raul',name:'Raul Tejada',icon:'🔧',role:'Ghoul Vaquero',loc:'Jacobstown',reqText:'Level 10+',req:s=>(s.level||1)>=10,baseHp:230,baseAtk:16,baseDef:9,carryBonus:45,ability:{id:'vaquero',name:'Old Vaquero',icon:'🔧',desc:'+3 companion attack and +3 player defence this fight.'},talk:['Sure thing, boss. I have only been alive forever.','These old bones still shoot straight.','Maintenance first. Heroics second.']}
};
window.COMPANION_DEFS=COMPANION_DEFS;

const locAliases={HiddenValley:['HiddenValley','Hidden Valley','HiddenValleyBunker'],TradingPost188:['TradingPost188','188TradingPost','188 Trading Post'],Freeside:['Freeside','FreesideN','FreesideNorth','Freeside N']};
function sameLoc(a,b){const arr=locAliases[b]||[b];return arr.includes(a)}
function party(){if(!S)return[];S.companionSystem=S.companionSystem||{recruited:[],dismissed:[],aff:{}};S.companions=Array.isArray(S.companions)?S.companions:[];return S.companions}
function compDef(id){return COMPANION_DEFS[id]||null}
function compLevelBonus(){return Math.max(0,Math.floor(((S&&S.level)||1)/5))}
function scaleComp(id){const d=compDef(id);if(!d)return null;const b=compLevelBonus();return {hp:d.baseHp+b*30,atk:d.baseAtk+b*2,def:d.baseDef+b,carry:d.carryBonus}}
function normalizeCompanions(){
 if(!S)return;S.companionSystem=S.companionSystem||{recruited:[],dismissed:[],aff:{}};S.companions=Array.isArray(S.companions)?S.companions:[];
 S.companions=S.companions.map(c=>{
  if(c&&c.id&&COMPANION_DEFS[c.id]){const st=scaleComp(c.id);return Object.assign({hp:st.hp,maxHp:st.hp,abilityUsed:false},c,{maxHp:st.hp,atk:st.atk,def:st.def,carryBonus:st.carry})}
  return c;
 }).filter(c=>c&&c.id&&COMPANION_DEFS[c.id]).slice(0,2);
}
function recruitedIds(){normalizeCompanions();return party().map(c=>c.id)}
function dismissedIds(){return (S&&S.companionSystem&&S.companionSystem.dismissed)||[]}
function isRecruited(id){return recruitedIds().includes(id)}
function isDismissed(id){return dismissedIds().includes(id)}
function knownCompanions(){return Object.values(COMPANION_DEFS)}
function canRecruit(id){const d=compDef(id);return !!(S&&d&&sameLoc(S.loc,d.loc)&&d.req(S)&&!isRecruited(id)&&party().length<2)}
function companionName(c){const d=compDef(c.id);return d?d.name:(c.name||'Companion')}
function companionIcon(c){const d=compDef(c.id);return d?d.icon:(c.icon||'👥')}
function companionAff(id){S.companionSystem=S.companionSystem||{aff:{}};S.companionSystem.aff=S.companionSystem.aff||{};if(S.companionSystem.aff[id]==null)S.companionSystem.aff[id]=35;return S.companionSystem.aff[id]}
function changeAff(id,n){S.companionSystem.aff[id]=Math.max(0,Math.min(100,companionAff(id)+n))}

window.recruitCompanion=function(id){
 normalizeCompanions();const d=compDef(id);if(!d)return notify('Unknown companion.');
 if(party().length>=2)return notify('Max 2 companions.');
 if(!sameLoc(S.loc,d.loc))return notify(d.name+' is not here.');
 if(!d.req(S))return notify('Requirement not met: '+d.reqText+'.');
 const st=scaleComp(id);S.companions.push({id,hp:st.hp,maxHp:st.hp,atk:st.atk,def:st.def,carryBonus:st.carry,abilityUsed:false});
 S.companionSystem.recruited=[...new Set([...(S.companionSystem.recruited||[]),id])];
 S.companionSystem.dismissed=(S.companionSystem.dismissed||[]).filter(x=>x!==id);
 changeAff(id,10);log(d.name+' is now travelling with you.','q');notify(d.name+' joined you.');upAll();save(true);
};
window.dismissCompanion=function(id){
 normalizeCompanions();const d=compDef(id);S.companions=party().filter(c=>c.id!==id);
 S.companionSystem.dismissed=[...new Set([...(S.companionSystem.dismissed||[]),id])];
 if(d){log(d.name+' stopped travelling with you.','e');notify(d.name+' dismissed.')}upAll();save(true);
};
window.talkCompanion=function(id){const d=compDef(id);if(!d)return;changeAff(id,rnd(2,6));notify(rndA(d.talk));save(true);upParty&&upParty()};
window.shareStimCompanion=function(id){
 normalizeCompanions();const c=party().find(x=>x.id===id);const d=compDef(id);if(!c||!d)return;
 const idx=S.inv.indexOf('stimpak');if(idx<0)return notify('No stimpaks.');
 S.inv.splice(idx,1);const before=c.hp;c.hp=Math.min(c.maxHp,c.hp+55);changeAff(id,4);
 notify(`${d.name} healed +${c.hp-before} HP.`);log('Shared a stimpak with '+d.name+'.','e');save(true);upAll();
};

function partyCarryBonus(){normalizeCompanions();return party().reduce((sum,c)=>sum+(c.carryBonus||0),0)}
const oldCalcCarry=window.calcCarryCap||calcCarryCap;
window.calcCarryCap=calcCarryCap=function(){return oldCalcCarry()+partyCarryBonus()};
const oldMigrate=window.migrate||migrate;
window.migrate=migrate=function(){oldMigrate();normalizeCompanions();S.companionSystem=S.companionSystem||{recruited:[],dismissed:[],aff:{}}};

function companionCombatHtml(){
 normalizeCompanions();if(!combat||!party().length)return '';
 return `<div style="background:#10180d;border:1px solid #263a18;border-radius:6px;padding:7px;margin:6px 0">
 <div style="font-size:10px;color:var(--amber);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px">👥 Companions</div>
 ${party().map(c=>{const d=compDef(c.id);const hp=hpPct(c.hp,c.maxHp);return `<div style="display:flex;align-items:center;gap:6px;margin:4px 0">
  <div style="font-size:20px;width:24px;text-align:center">${d.icon}</div><div style="flex:1;min-width:0">
  <div style="font-size:11px;color:var(--text)">${d.name} <span style="color:var(--muted)">· ${d.role}</span></div>
  <div class="hb" style="margin-top:2px"><div class="hf hp" style="width:${hp}%"></div></div></div>
  <button class="bt pip sm" style="min-height:32px;padding:5px 7px" ${c.abilityUsed?'disabled':''} onclick="companionAbility('${c.id}')">${d.ability.icon} ${d.ability.name}</button>
 </div>`}).join('')}</div>`;
}
function livingEnemies(){return combat?combat.enemies.filter(e=>e.hp>0):[]}
function strongestEnemy(){const a=livingEnemies();return a.sort((x,y)=>(y.hp+y.a*4)-(x.hp+x.a*4))[0]||null}
function companionBasicAttacks(){
 if(!combat)return;normalizeCompanions();if(!party().length)return;
 party().filter(c=>c.hp>0).forEach(c=>{
  const d=compDef(c.id), target=strongestEnemy();if(!target)return;
  let dmg=fnvDTDamage((c.atk||5)+rnd(-2,3)+(combat.companionAtkBonus||0),target.d||0,FNV_NORMAL.playerDamage);
  target.hp=Math.max(0,target.hp-dmg);combat.log.push(`${d.icon} ${d.name} hits ${target.name} for ${dmg}.`);
  if(target.hp<=0){combat.log.push(`${target.name} is killed by ${d.name}!`);S.kills[target.id||'unknown']=(S.kills[target.id||'unknown']||0)+1;S.killCount++;}
 });
}
function companionInterceptDamage(hpBefore){
 if(!combat||!party().length||S.hp>=hpBefore)return;normalizeCompanions();
 const loss=hpBefore-S.hp;if(loss<=0)return;
 const living=party().filter(c=>c.hp>0);if(!living.length)return;
 if(R()<0.28){const c=rndA(living),d=compDef(c.id);const take=Math.max(1,Math.round(loss*.55));S.hp=Math.min(S.maxHp,S.hp+take);c.hp=Math.max(0,c.hp-Math.max(1,take-(c.def||0)));combat.log.push(`${d.icon} ${d.name} draws fire and takes ${take} damage.`);if(c.hp<=0)combat.log.push(`${d.name} is down but can recover after combat.`)}
}
window.companionAbility=function(id){
 if(!combat)return;normalizeCompanions();const c=party().find(x=>x.id===id);const d=compDef(id);if(!c||!d||c.abilityUsed)return;
 c.abilityUsed=true;let target=strongestEnemy();
 if(id==='boone'&&target){let dmg=fnvDTDamage(Math.round((c.atk||10)*2.5),target.d||0,FNV_NORMAL.playerDamage);target.hp=Math.max(0,target.hp-dmg);combat.log.push(`🎯 Boone's First Shot deals ${dmg} to ${target.name}.`)}
 else if(id==='ede'){combat.playerScanBonus=(combat.playerScanBonus||0)+4;combat.log.push('📡 ED-E scans weak points. Your attacks hit harder this fight.');}
 else if(id==='veronica'&&target){let dmg=fnvDTDamage(Math.round((c.atk||10)*3),target.d||0,FNV_NORMAL.playerDamage);target.hp=Math.max(0,target.hp-dmg);combat.log.push(`👊 Veronica slams ${target.name} for ${dmg}.`)}
 else if(id==='cass'){S.hp=Math.min(S.maxHp,S.hp+20);party().forEach(x=>x.hp=Math.min(x.maxHp,x.hp+20));combat.companionAtkBonus=(combat.companionAtkBonus||0)+4;combat.log.push('🥃 Cass rallies the party: +20 HP and companion damage up.');}
 else if(id==='arcade'){S.hp=Math.min(S.maxHp,S.hp+35);party().forEach(x=>x.hp=Math.min(x.maxHp,x.hp+15));combat.log.push('💉 Arcade performs field triage.');}
 else if(id==='raul'){combat.companionAtkBonus=(combat.companionAtkBonus||0)+3;combat.playerDefBonus=(combat.playerDefBonus||0)+3;combat.log.push('🔧 Raul keeps everyone steady: companions +3 ATK, you +3 DEF.');}
 if(target&&target.hp<=0){combat.log.push(`${target.name} is eliminated!`);S.kills[target.id||'unknown']=(S.kills[target.id||'unknown']||0)+1;S.killCount++;}
 if(!livingEnemies().length){endCombat(true);return}save(true);renderCombat();
};

const oldPlayerHit=window.playerHitDamage||playerHitDamage;
window.playerHitDamage=playerHitDamage=function(attack,target,vats){const res=oldPlayerHit(attack,target,vats);if(combat&&combat.playerScanBonus)res.dmg+=combat.playerScanBonus;return res};
const oldDefPow=window.defPow||defPow;
window.defPow=defPow=function(){return oldDefPow()+(combat&&combat.playerDefBonus?combat.playerDefBonus:0)};
const oldStartCombat=window.startCombat||startCombat;
window.startCombat=startCombat=function(enemies){oldStartCombat(enemies);normalizeCompanions();if(combat){party().forEach(c=>c.abilityUsed=false);combat.playerScanBonus=0;combat.companionAtkBonus=0;combat.playerDefBonus=0}};
const oldCombatAction=window.combatAction||combatAction;
window.combatAction=combatAction=function(act){
 if(!combat)return;const hpBefore=S.hp;
 if(act==='attack'||act==='vats'){companionBasicAttacks();if(!livingEnemies().length){endCombat(true);return}}
 oldCombatAction(act);if(combat)companionInterceptDamage(hpBefore);save(true);
};
const oldRenderCombat=window.renderCombat||renderCombat;
window.renderCombat=renderCombat=function(){oldRenderCombat();try{if(!combat||combat.lootPhase)return;const panel=$('CP');if(panel&&!panel.querySelector('[data-companion-panel]')){const wrap=document.createElement('div');wrap.setAttribute('data-companion-panel','1');wrap.innerHTML=companionCombatHtml();const bars=panel.querySelector('.combat-bar');if(bars&&wrap.innerHTML.trim())panel.insertBefore(wrap,bars);}}catch(e){}};
const oldEndCombat=window.endCombat||endCombat;
window.endCombat=endCombat=function(won,died){if(won){normalizeCompanions();party().forEach(c=>{c.hp=Math.min(c.maxHp,Math.max(1,c.hp+Math.ceil(c.maxHp*.15)));c.abilityUsed=false;});}oldEndCombat(won,died)};

function companionStatusText(d){
 const here=sameLoc(S.loc,d.loc), inP=isRecruited(d.id), req=d.req(S);
 if(inP)return 'Travelling with you';
 if(here&&req)return 'Available here';
 if(here&&!req)return 'Here, but not ready to join';
 return 'Can be found at '+(LOCS[d.loc]?.n||d.loc);
}
function companionRecruitLine(d){
 if(!sameLoc(S.loc,d.loc))return `Travel to ${LOCS[d.loc]?.n||d.loc} to find ${d.name}.`;
 if(!d.req(S))return `Requires: ${d.reqText}`;
 if(party().length>=2)return 'You already have two companions.';
 return 'Can be recruited here.';
}
function fnvCompanionCard(d,c){
 const inP=!!c, hp=inP?hpPct(c.hp,c.maxHp):100, aff=companionAff(d.id);
 return `<div class="cd" style="background:#19190f;border-color:${inP?'#3a4a28':sameLoc(S.loc,d.loc)?'#4a3a18':'#2a2818'}">
  <div style="display:flex;gap:10px;align-items:flex-start">
   <div style="width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:#0d0d08;border:1px solid #2a2818;border-radius:4px;font-size:24px">${d.icon}</div>
   <div style="flex:1;min-width:0">
    <div style="font-size:13px;font-weight:bold;color:var(--amber)">${d.name}</div>
    <div style="font-size:12px;color:var(--muted)">${d.role} · ${companionStatusText(d)}</div>
    ${inP?`<div style="font-size:10px;margin-top:5px">❤ ${c.hp}/${c.maxHp} · ⚔ ${c.atk} · 🛡 ${c.def} · 🎒 +${c.carryBonus}kg</div><div class="hb" style="margin-top:3px"><div class="hf hp" style="width:${hp}%"></div></div>`:`<div style="font-size:10px;color:${sameLoc(S.loc,d.loc)&&d.req(S)?'var(--green)':'var(--muted)'};margin-top:5px">${companionRecruitLine(d)}</div>`}
    <div style="font-size:10px;color:var(--amber2);margin-top:4px">${d.ability.icon} ${d.ability.name} — ${d.ability.desc}</div>
    <div style="font-size:10px;color:var(--muted);margin-top:3px">Affinity ${aff}/100</div>
   </div>
  </div>
  <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px">
   ${inP?`<button class="bt pip sm" onclick="talkCompanion('${d.id}')">Talk</button><button class="bt go sm" onclick="shareStimCompanion('${d.id}')">Give Stimpak</button><button class="bt dn sm" onclick="dismissCompanion('${d.id}')">Dismiss</button>`:
   (sameLoc(S.loc,d.loc)&&d.req(S)&&party().length<2?`<button class="bt go" onclick="recruitCompanion('${d.id}')">Ask to travel together</button>`:`<button class="bt" disabled>${companionStatusText(d)}</button>`)}
  </div>
 </div>`;
}
function companionCharSection(){
 normalizeCompanions();
 let h='<div class="sh">Companions</div>';
 h+=`<div class="cd" style="font-size:11px;color:var(--muted)">Like New Vegas, companions are people you find at specific places. Recruit up to two, travel with them, talk to them here, and use their once-per-fight ability in combat.<div style="color:var(--amber);margin-top:5px">Slots: ${party().length}/2 · Carry bonus: +${partyCarryBonus()}kg</div></div>`;
 if(party().length){h+='<div class="bs2">Travelling With You</div>'+party().map(c=>fnvCompanionCard(compDef(c.id),c)).join('')}
 else h+='<div class="cd" style="font-size:11px;color:var(--muted)">No companion travelling with you.</div>';
 const here=knownCompanions().filter(d=>sameLoc(S.loc,d.loc)&&!isRecruited(d.id));
 if(here.length)h+='<div class="bs2">Available Here</div>'+here.map(d=>fnvCompanionCard(d,null)).join('');
 const leads=knownCompanions().filter(d=>!sameLoc(S.loc,d.loc)&&!isRecruited(d.id));
 if(leads.length)h+='<div class="bs2">People You Can Find</div>'+leads.map(d=>`<div class="cd" style="font-size:11px"><b style="color:var(--amber)">${d.icon} ${d.name}</b><div style="font-size:12px;color:var(--muted)">${d.role} · ${LOCS[d.loc]?.n||d.loc}</div><div style="font-size:10px;color:var(--muted);margin-top:2px">${d.reqText==='None'?'No known requirement':'Requires: '+d.reqText}</div></div>`).join('');
 return h;
}
window.openCompanionRecruit=function(id){
 const d=compDef(id);if(!d)return;
 openDlg(`<div style="text-align:center"><div style="font-size:42px;margin-bottom:6px">${d.icon}</div><div style="font-size:15px;font-weight:bold;color:var(--amber)">${d.name}</div><div style="font-size:11px;color:var(--muted);margin:4px 0 10px">${d.role}</div><div class="npc-line">${d.recruit||'I can travel with you for a while.'}</div><div style="font-size:10px;color:var(--amber2);margin:8px 0">${d.ability.icon} ${d.ability.name}: ${d.ability.desc}</div><button class="bt go" onclick="closeDlg();recruitCompanion('${id}')">Travel with me</button><button class="bt" onclick="closeDlg()">Not now</button></div>`);
};
function companionWorldCard(){
 normalizeCompanions();
 const here=knownCompanions().filter(d=>sameLoc(S.loc,d.loc)&&!isRecruited(d.id));
 if(!here.length)return '';
 return '<div class="sh">People Nearby</div>'+here.map(d=>`<div class="bc" onclick="openCompanionRecruit('${d.id}')"><div style="font-size:28px;width:34px;text-align:center">${d.icon}</div><div style="flex:1"><div style="font-weight:bold;font-size:12px">${d.name}</div><div style="font-size:12px;color:var(--muted)">${d.role} · ${d.req(S)?'Can join you':'Requires: '+d.reqText}</div></div><div style="color:var(--muted)">›</div></div>`).join('');
}
function removePartyTabUi(){
 const pt=$('party-tab');if(pt)pt.remove();
 const pb=$('nb-party');if(pb)pb.remove();
}
removePartyTabUi();
const oldRefresh=window.refreshActiveTab||refreshActiveTab;
window.refreshActiveTab=function(){removePartyTabUi();oldRefresh();};
const oldUpAll=window.upAll||upAll;
window.upAll=function(){normalizeCompanions();removePartyTabUi();oldUpAll();};
const oldUpChar=window.upChar||upChar;
window.upChar=function(){oldUpChar();try{const tab=$('char-tab');if(!tab||!S)return;tab.insertAdjacentHTML('beforeend',companionCharSection())}catch(e){}};
const oldUpWorld=window.upWorld||upWorld;
window.upWorld=function(){oldUpWorld();try{const tab=$('world-tab');const html=companionWorldCard();if(tab&&html){const prop=[...tab.children].find(x=>x.textContent&&x.textContent.includes('Property'))||null;const wrap=document.createElement('div');wrap.innerHTML=html;while(wrap.firstChild)tab.insertBefore(wrap.firstChild,prop)}}catch(e){}};
normalizeCompanions();removePartyTabUi();
})();

</script>
</body>
</html>
