<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./apple-touch-icon.png">
<meta name="theme-color" content="#1a1a0e">
<title>Fallout: New Vegas RPG</title>
<style>
:root{--bg:#1a1a0e;--panel:#242418;--panel2:#1e1e14;--amber:#f0c850;--amber2:#c9a230;--green:#4aff4a;--green2:#2ecc2e;--red:#ff4444;--blue:#4488cc;--text:#e8e4d0;--muted:#9a9680;--line:#3a3828;--pip:#14cc64;--hp-red:#cc3333;--ap-blue:#3388cc;--xp-gold:#ccaa33;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
@font-face{font-family:'Pip';src:local('Courier New'),local('Courier');font-weight:normal}
body{background:var(--bg);font-family:'Courier New',monospace;color:var(--text);min-height:100dvh;overscroll-behavior:none;font-size:13px}
#W{max-width:430px;margin:0 auto;min-height:100dvh;overflow:hidden;position:relative;
background:linear-gradient(180deg,#1a1a0e 0%,#141410 100%)}
#H{position:sticky;top:0;background:linear-gradient(180deg,#1a1808,#141408);
color:var(--amber);text-align:center;padding:calc(var(--st)+6px) 12px 5px;
font-size:13px;font-weight:bold;letter-spacing:3px;z-index:100;
border-bottom:1px solid #3a3418;text-transform:uppercase}
#H .sub{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:1px}
#SB{background:#0e0e08;color:var(--text);font-size:10px;display:flex;flex-wrap:wrap;padding:2px 4px;gap:1px;border-bottom:1px solid #282818}
#SB .s{flex:1 1 auto;text-align:center;padding:2px 3px;white-space:nowrap}
#SB .s b{color:var(--amber)}
#SB .s .g{color:var(--green)}
#SB .s .r{color:var(--red)}
.scanline{position:fixed;top:0;left:50%;transform:translateX(-50%);width:430px;height:100%;
pointer-events:none;z-index:999;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}
#C{padding:10px;padding-bottom:calc(90px + var(--sb))}
.T{display:none}.T.A{display:block}
#N{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
background:linear-gradient(0deg,#0e0e06,#1a1a0e);display:flex;
border-top:1px solid var(--amber2);z-index:100;padding-bottom:var(--sb)}
#N button{flex:1;padding:6px 1px 4px;background:0 0;color:var(--muted);border:0;
font-size:8px;text-align:center;cursor:pointer;line-height:1.3;font-family:'Courier New',monospace}
#N button i{font-size:14px;display:block;font-style:normal}
#N button.A{background:#2a2a10;color:var(--amber)}
.sh{color:var(--amber2);padding:3px 0;margin:10px 0 4px;font-size:10px;letter-spacing:2px;
text-transform:uppercase;border-bottom:1px solid #2a2818}
.cd{background:var(--panel);border:1px solid #2a2818;border-radius:6px;padding:8px;margin:4px 0}
.bt{display:block;width:100%;padding:8px 10px;margin:3px 0;background:#2a2a18;color:var(--text);
border:1px solid #3a3828;border-radius:4px;font-family:'Courier New',monospace;font-size:12px;
cursor:pointer;text-align:left;transition:transform 80ms}
.bt:active{transform:scale(.97);filter:brightness(1.1)}
.bt.go{background:#2a3a18;color:var(--green);border-color:#3a4828}
.bt.dn{background:#3a1818;color:var(--red);border-color:#4a2828}
.bt.pip{background:#182a1a;color:var(--pip);border-color:#1a3a1a}
.bt:disabled{opacity:.4;transform:none}
.bt.sm{display:inline-block;width:auto;padding:4px 8px;font-size:10px;margin:2px}
.hb{background:#1a1a10;border-radius:3px;height:7px;overflow:hidden;margin:2px 0;border:1px solid #2a2818}
.hf{height:100%;border-radius:2px;transition:width .3s}
.hf.hp{background:var(--hp-red)}.hf.ap{background:var(--ap-blue)}.hf.xp{background:var(--xp-gold)}
.hf.g{background:var(--green2)}.hf.lo{background:var(--amber2)}.hf.cr{background:var(--red)}
.bc{display:flex;align-items:center;gap:8px;padding:7px 8px;background:var(--panel);
border:1px solid #2a2818;border-radius:5px;margin:3px 0;cursor:pointer}
.bc:active{background:#2a2a1a}
/* Overlays */
#CO{position:fixed;inset:0;background:rgba(5,5,2,.9);display:none;justify-content:center;
align-items:flex-start;z-index:200;padding-top:8px;overflow-y:auto}
#CP{background:var(--panel);border:1px solid var(--amber2);border-radius:8px;padding:10px;
width:96%;max-width:400px;max-height:92vh;overflow-y:auto}
/* Building overlay */
#BO{position:fixed;inset:0;background:var(--bg);z-index:150;overflow-y:auto;display:none}
#BO.A{display:block}
.bh{display:flex;align-items:center;gap:8px;padding:calc(var(--st)+8px) 10px 8px;
background:#141408;border-bottom:1px solid #2a2818;position:sticky;top:0;z-index:10}
.bb{font-size:20px;color:var(--amber);cursor:pointer;padding:4px 8px}
.bp{padding:10px}
.bs2{color:var(--amber2);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
padding:3px 0;margin:10px 0 4px;border-bottom:1px solid #2a2818}
.ba{font-size:11px;color:var(--muted);font-style:italic;padding:6px 0;text-align:center;
border-bottom:1px solid #1a1810;margin-bottom:8px}
.bn{display:flex;align-items:center;gap:10px;padding:8px;background:#1a1a10;border-radius:6px;margin:4px 0}
/* Travel overlay */
#TO{position:fixed;inset:0;background:var(--bg);z-index:160;overflow-y:auto;display:none}
#TO.A{display:block}
/* Dialog */
#DO{position:fixed;inset:0;background:rgba(5,5,2,.88);z-index:250;display:none;
justify-content:center;align-items:center;overflow-y:auto;padding:20px 10px}
#DO.A{display:flex}
#DB{background:var(--panel);border:1px solid var(--amber2);border-radius:8px;padding:14px;
width:94%;max-width:380px;max-height:85vh;overflow-y:auto}
/* Result popup */
#RP{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--panel);
border:1px solid var(--amber2);border-radius:10px;padding:18px;width:90%;max-width:340px;
z-index:350;text-align:center;box-shadow:0 0 30px rgba(0,0,0,.6);display:none;opacity:0;transition:opacity .2s}
#RP.show{display:block;opacity:1}
#RBG{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:340;display:none}
#RBG.show{display:block}
/* Ticker */
#TK{position:fixed;top:calc(var(--st) + 44px);left:50%;transform:translateX(-50%);
width:90%;max-width:400px;z-index:300;pointer-events:none}
#TK .tk{background:#1a2a10;color:var(--green);padding:6px 12px;border-radius:4px;
font-size:11px;text-align:center;opacity:0;transition:opacity .3s;border:1px solid #2a3a18}
#TK .tk.show{opacity:1}
/* Notification */
#NF{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--panel);
color:var(--amber);padding:10px 20px;border-radius:6px;font-size:12px;z-index:400;
opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid var(--amber2)}
#NF.show{opacity:1}
/* Log */
.log-group{margin:4px 0;border:1px solid #2a2818;border-radius:4px;overflow:hidden}
.log-header{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;
background:var(--panel2);cursor:pointer;font-size:11px}
.log-header:active{background:#1a1a12}
.log-entries{display:none;padding:4px 8px 6px;font-size:11px;line-height:1.5}
.log-entries.open{display:block}
.log-entry{padding:2px 0;border-bottom:1px dotted #1a1810}
.log-entry:last-child{border-bottom:none}
.combat-log{color:var(--red)}.event-log{color:var(--green2)}.quest-log{color:var(--blue)}
/* SPECIAL bars */
.sp-bar{display:flex;align-items:center;gap:6px;margin:2px 0;font-size:11px}
.sp-label{width:14px;color:var(--amber);font-weight:bold;text-align:center}
.sp-fill-bg{flex:1;height:6px;background:#1a1a10;border-radius:3px;overflow:hidden;border:1px solid #2a2818}
.sp-fill{height:100%;background:var(--green2);border-radius:2px;transition:width .3s}
.sp-val{width:16px;text-align:right;color:var(--muted);font-size:10px}
/* Tap button */
.tap-btn{width:100%;padding:16px;background:linear-gradient(135deg,#2a3a18,#1a2a10);
color:var(--green);border:2px solid #3a4a28;border-radius:8px;font-family:'Courier New',monospace;
font-size:16px;font-weight:bold;cursor:pointer;text-align:center;letter-spacing:2px;
text-transform:uppercase;transition:transform 60ms,box-shadow 60ms}
.tap-btn:active{transform:scale(.95);box-shadow:0 0 20px rgba(74,255,74,.2) inset}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}
.dmg-float{position:absolute;color:var(--red);font-weight:bold;font-size:14px;pointer-events:none;animation:dmgFloat .8s forwards}
.npc-line{font-size:12px;font-style:italic;color:var(--muted);padding:6px 8px;border-left:2px solid var(--amber2);margin:6px 0}
.qc{background:#1a1a10;border:1px solid #2a2818;border-radius:4px;padding:8px;margin:6px 0}
/* Inventory card */
.inv-card{background:var(--panel2);border:1px solid #2a2818;border-radius:5px;padding:6px 8px;margin:3px 0}
.inv-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
/* Combat */
.combat-panel{background:#1a0a0a;border:1px solid #3a1818;border-radius:6px;padding:10px;margin:4px 0}
.enemy-portrait{text-align:center;font-size:48px;margin:8px 0}
.icon-wrap{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;line-height:1;flex:0 0 auto}
.icon-wrap img,.icon-wrap svg{width:100%;height:100%;object-fit:contain;display:block}
.combat-bar{display:flex;gap:4px;margin:4px 0;flex-wrap:wrap}
.combat-bar .bt{flex:1;min-width:80px;text-align:center}
</style>
</head>
<body>
<div class="scanline"></div>
<div id="W">
<div id="H">FALLOUT: NEW VEGAS<div class="sub">Mojave Wasteland</div></div>
<div id="SB"></div>
<div id="C">
<div id="world-tab" class="T A"></div>
<div id="char-tab" class="T"></div>
<div id="inv-tab" class="T"></div>
<div id="roads-tab" class="T"></div>
<div id="log-tab" class="T"></div>
</div>
</div>
<div id="N">
<button onclick="switchTab('world')" id="nb-world" class="A"><i>🏜</i>World</button>
<button onclick="switchTab('char')" id="nb-char"><i>👤</i>Char</button>
<button onclick="switchTab('inv')" id="nb-inv"><i>🎒</i>Items</button>
<button onclick="switchTab('roads')" id="nb-roads"><i>🗺</i>Travel</button>
<button onclick="switchTab('log')" id="nb-log"><i>📋</i>Log</button>
</div>
<div id="BO"><div id="BI"></div></div>
<div id="TO">
<div style="padding:calc(var(--st)+10px) 12px 12px">
<div style="text-align:center;font-size:48px;margin:20px 0" id="TS">🏜</div>
<div style="text-align:center;font-size:14px;margin-bottom:12px" id="TT"></div>
<div class="hb" style="margin:8px 20px"><div class="hf g" id="TB" style="width:0%"></div></div>
<div id="TC" style="padding:0 10px"></div>
<button class="bt go" id="TN" style="display:none;text-align:center;margin:8px 10px" onclick="travelCont()">Continue</button>
</div>
</div>
<div id="DO"><div id="DB"></div></div>
<div id="CO"><div id="CP"></div></div>
<div id="RBG"></div><div id="RP"></div>
<div id="TK"><div class="tk" id="ticker-inner"></div></div>
<div id="NF"></div>

<script>
// ============================================================
// UTILITIES
// ============================================================
const $=id=>document.getElementById(id);
const el=(t,c,h)=>{const e=document.createElement(t||'div');if(c)e.className=c;if(h)e.innerHTML=h;return e};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function rndA(a){return a[Math.floor(Math.random()*a.length)]}
function R(){return Math.random()}
function clone(o){return JSON.parse(JSON.stringify(o))}
function notify(m,d=2200){const n=$('NF');n.textContent=m;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),d)}
function showResult(title,emoji,lines,btnText,btnFn){
  const rp=$('RP');const bg=$('RBG');
  rp.innerHTML=`<div style="font-size:40px;margin-bottom:8px">${emoji}</div><div style="font-size:15px;font-weight:bold;margin-bottom:8px;color:var(--amber)">${title}</div>${lines.map(l=>'<div style="font-size:11px;margin:3px 0;color:var(--muted)">'+l+'</div>').join('')}<button class="bt go" style="margin-top:10px;text-align:center" onclick="closeResult();${btnFn||''}">${btnText||'Continue'}</button>`;
  rp.style.display='block';bg.style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{rp.classList.add('show');bg.classList.add('show')}));
}
function closeResult(){$('RP').classList.remove('show');$('RBG').classList.remove('show');setTimeout(()=>{$('RP').style.display='none';$('RBG').style.display='none'},200)}
function openDlg(h){$('DB').innerHTML=h;$('DO').classList.add('A')}
function closeDlg(){$('DO').classList.remove('A')}

function getBonusLootPool(locId,area){
  const loc=LOCS[locId];
  const pool=['wonderglue','wrench','scrap_electronics','camera','silverware'];
  if(!loc)return pool.filter(id=>ITEMS[id]);
  if(loc.fac==='NCR'||loc.t==='base'||loc.t==='facility'||locId==='HeliosOne'){
    pool.push('fission_battery','conductor','scrap_electronics','wrench');
  }
  if(loc.fac==='Legion'){
    pool.push('legion_coin','silverware','gold_necklace');
  }
  if(loc.fac==='Khans'){
    pool.push('cigarette_pack','cigarette_carton','pre_war_money');
  }
  if(['town','city','district','trading_post','settlement'].includes(loc.t)){
    pool.push('cigarette_pack','camera','silver_watch','gold_necklace');
  }
  if(area&&/(house|hotel|motel|hall|lodge|office|barracks|cottages|station|school|casino|bar|store)/i.test(area.n)){
    pool.push('camera','pre_war_money','silver_watch');
  }
  return pool.filter(id=>ITEMS[id]);
}

function resumeExpeditionAfterCombat(){
  if(!window._resumeArea)return upAll();
  $('TO').classList.add('A');
  runExpedition(window._resumeArea,window._resumeStep||0);
}
function resumeTravelAfterCombat(){
  $('TO').classList.add('A');
  if(tQ.length) nextTEv();
  else finTravel();
}
function acceptPendingQuest(){
  if(!window._pendingQuest)return;
  accQuest(window._pendingQuest);
  window._pendingQuest=null;
}
function npcActPending(action){
  if(!window._npcTarget)return;
  npcAct(action,window._npcTarget);
}
function resetTransientState(){
  combat=null;
  tQ=[];
  tDest=null;
  window._resumeArea=null;
  window._resumeStep=0;
  window._pendingQuest=null;
  window._npcTarget=null;
  try{closeResult()}catch(e){}
  try{closeDlg()}catch(e){}
  if($('CO'))$('CO').style.display='none';
  if($('TO'))$('TO').classList.remove('A');
  if($('BO'))$('BO').classList.remove('A');
  if($('TN')){$('TN').style.display='none';$('TN').onclick=null;}
}
function startFreshGame(){
  try{localStorage.removeItem(SAVE_KEY);localStorage.removeItem(SAVE_BACKUP_KEY)}catch(e){}
  S=null;
  resetTransientState();
  if(typeof switchTab==='function')switchTab('world');
  newGame();
}
function confirmNewGame(){
  openDlg(`<div style="text-align:center">
  <div style="font-size:42px;margin-bottom:8px">⚠️</div>
  <div style="font-size:15px;font-weight:bold;color:var(--amber);margin-bottom:6px">Start New Game?</div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Your current save will be erased.</div>
  <button class="bt dn" style="text-align:center" onclick="closeDlg();startFreshGame()">Yes, start over</button>
  <button class="bt" style="text-align:center" onclick="closeDlg()">Cancel</button>
  </div>`);
}

// ============================================================
// DATA - LOCATIONS
// ============================================================
const LOCS={

  b:["saloon","general_store","gas_station","doc_house"],dg:1,fac:"NCR",

  {n:"Abandoned Schoolhouse",e:"🏚",d:"Giant mantises nest inside.",en:["mantis","mantis","radroach","giant_rat"],lt:["scrap","duct_tape","ammo_9mm","bobby_pin"]}]},
Primm:{n:"Primm",r:"Mojave South",d:"A border town overrun by convicts.",e:'<img src="NVImages/PrimmIcon.png" style="width:80px;height:80px;object-fit:contain;">',t:"town",

  {n:"NCRCF Perimeter",e:"🏗",d:"The prison is close. Dangerous.",en:["powder_ganger","powder_ganger","convict","jackal_raider"],lt:["dynamite","powder_charge","ammo_9mm"]}]},
Nipton:{n:"Nipton",r:"Mojave South",d:"A town destroyed by the Legion as an example.",e:"🔥",t:"ruins",

  sur:[{n:"Nipton Road",e:"🛤",d:"Legion patrols and radscorpions.",en:["legion_recruit","radscorpion","jackal_raider"],lt:["machete","healing_powder","legion_coin","revolver_357","ammo_357"]},
  {n:"Burned Houses",e:"🏚",d:"Ash and ruin. Scavengeable.",en:["radroach","giant_rat","gecko"],lt:["pre_war_money","scrap","duct_tape"]}]},

  sur:[{n:"Boulder City Ruins",e:"🧱",d:"Rubble and tension.",en:["great_khan","great_khan","jackal_raider"],lt:["ammo_9mm","stimpak","jet"]}]},

  b:["atomic_wrangler","kings_hq","mick_ralph","old_mormon_fort","silver_rush","cerulean_robotics"],dg:2,fac:"None",
  sur:[{n:"Freeside Streets",e:"🏚",d:"Thugs and desperate people.",en:["freeside_thug","freeside_thug","giant_rat","giant_rat"],lt:["switchblade","jet","stimpak","nuka_cola"]},
  {n:"East Gate",e:"🚪",d:"The entrance to the Strip... if you can afford it.",en:[],lt:[]}]},
TheStrip:{n:"The Strip",r:"New Vegas",d:"The jewel of the Mojave. Mr. House's domain.",e:"🎰",t:"city",
  b:["lucky_38","gomorrah","ultra_luxe","tops_casino"],dg:1,fac:"House",

CampMcCarran:{n:"Camp McCarran",r:"New Vegas",d:"NCR's main base of operations in the Mojave.",e:'<img src="NVImages/CampmccaranIcon.png" style="width:80px;height:80px;object-fit:contain;">',t:"base",
  b:["mccarran_supply","mccarran_med","mccarran_hq"],dg:1,fac:"NCR",
  sur:[{n:"Fiend Territory",e:"☠",d:"Psycho-addled raiders everywhere.",en:["fiend","fiend","fiend","centaur"],lt:["jet","psycho","ammo_556","combat_knife"]}]},
HiddenValley:{n:"Hidden Valley",r:"Mojave Central",d:"Brotherhood of Steel bunker, hidden underground.",e:'<img src="NVImages/HiddenvalleyIcon.png" alt="Hidden Valley" style="width:80px;height:80px;object-fit:contain;">',t:"bunker",

function hvNpcRel(id){return S.relationships.find(r=>r.name===HIDDEN_VALLEY_NPCS[id].name)}
function addHiddenValleyNpcCard(body,id){
  const npc=HIDDEN_VALLEY_NPCS[id];if(!npc)return;
  const ex=hvNpcRel(id);
  const nc=el('div','bn');nc.style.cursor='pointer';
  nc.innerHTML=`<div style="font-size:28px">${renderIcon(npc.icon||(npc.male?ICONS.NPC.MALE:ICONS.NPC.FEMALE),28)}</div><div style="flex:1"><div style="font-weight:bold;font-size:12px">${npc.name}</div><div style="font-size:10px;color:var(--muted)">${npc.role}${ex?' · '+ex.rel:''}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;font-style:italic">${npc.line}</div></div><div style="color:var(--muted)">›</div>`;
  nc.onclick=()=>openHiddenValleyNPC(id);
  body.appendChild(nc);
}
function hvEnsure(){
  if(!S.flags)S.flags={};
  if(!S.flags.hv)S.flags.hv={stage:0,spoke:{},side:null,veronicaCounsel:false};
  return S.flags.hv;
}
function hvFindQuest(id){return (S.quests||[]).find(q=>q.id===id)||null}
function hvQuestDone(id){const q=hvFindQuest(id);return !!(q&&q.done)}
function hvQuestActive(id){const q=hvFindQuest(id);return !!(q&&!q.done)}
function hvAddQuest(q){if(hvFindQuest(q.id))return hvFindQuest(q.id);S.quests.push(q);log('Accepted: '+q.name,'q');notify('📜 Quest accepted!');queueSave();return q}
function hvSetQuestText(id,text){const q=hvFindQuest(id);if(q)q.progText=text}
function hvCompleteManualQuest(id,repBonus){
  const q=hvFindQuest(id);if(!q||q.done)return;
  q.done=true;
  S.xp+=(q.rx||0);
  S.caps+=(q.rg||0);
  if(repBonus)S.rep.BOS=(S.rep.BOS||0)+repBonus;
  S.questsComplete=(S.questsComplete||0)+1;
  log('Quest complete: '+q.name+' (+'+(q.rg||0)+' caps, +'+(q.rx||0)+' XP)','q');
  notify('📜 Quest Complete!');
  chkLU();queueSave();
}
function hvRefreshState(){
  const hv=hvEnsure();
  const q0=hvFindQuest('hv_access');
  if(q0&&!q0.done){
    const start=q0.ks||{};
    const cleared=Math.max(0,((S.kills['bark_scorpion']||0)-(start.bark_scorpion||0))+((S.kills['radscorpion']||0)-(start.radscorpion||0)));
    q0.progText=`Clear Hidden Valley threats (${Math.min(cleared,3)}/3).`;
  }
  const q1=hvFindQuest('hvq1');
  if(q1&&!q1.done){
    const count=(hv.spoke.hardin?1:0)+(hv.spoke.veronica?1:0);
    q1.progText=`Talk to Veronica and Hardin (${count}/2).`;
    if(count>=2){hvCompleteManualQuest('hvq1',10);hv.stage=Math.max(hv.stage,1);}
  }
  const q3=hvFindQuest('hvq3');
  if(q3&&q3.done)hv.stage=Math.max(hv.stage,3);
  const q5=hvFindQuest('hvq5');
  if(q5&&!q5.done){
    if(!hv.side)q5.progText='Choose whether to back McNamara or Hardin.';
    else if(!hv.veronicaCounsel)q5.progText='Talk to Veronica about the leadership dispute.';
    else q5.progText='Report back to the leader you chose.';
  }
}
function hvHasAccess(){
  const hv=hvEnsure();
  if(hv.access)return true;
  if((S.rep?.BOS||0)>=10){hv.access=true;return true}
  return false;
}
function hvEntryProgress(){
  const q=hvFindQuest('hv_access');
  if(!q)return 0;
  const start=q.ks||{};
  return Math.max(0,((S.kills['bark_scorpion']||0)-(start.bark_scorpion||0))+((S.kills['radscorpion']||0)-(start.radscorpion||0)));
}
function hvStartAccessQuest(){
  const hv=hvEnsure();
  if(hvHasAccess())return;
  if(hvFindQuest('hv_access'))return;
  hvAddQuest({id:'hv_access',name:'Hidden Valley Clearance',desc:'A Brotherhood guard at the Hidden Valley bunker wants proof you can help instead of causing trouble. Clear 3 hostile creatures from the valley approaches, then return to the bunker intercom.',t:'custom',progText:'Clear Hidden Valley threats (0/3).',rg:120,rx:20,done:false,ks:{bark_scorpion:S.kills['bark_scorpion']||0,radscorpion:S.kills['radscorpion']||0}});
}
function hvFinishAccessQuest(){
  const hv=hvEnsure();
  const q=hvFindQuest('hv_access');
  if(!q||q.done)return;
  const cleared=hvEntryProgress();
  if(cleared<3){notify('The Brotherhood wants 3 valley threats cleared first.');return}
  hv.access=true;
  hvCompleteManualQuest('hv_access',12);
  closeDlg();

function openHiddenValleyNPC(id,topic='root'){
  hvRefreshState();
  const npc=HIDDEN_VALLEY_NPCS[id]; if(!npc)return;
  const rel=hvNpcRel(id);
  const title=`<h3 style="display:flex;align-items:center;gap:8px"><span>${renderIcon(npc.icon||(npc.male?ICONS.NPC.MALE:ICONS.NPC.FEMALE),28)}</span><span style="color:var(--amber)">${npc.name}</span></h3><div style="font-size:10px;color:var(--muted);margin-bottom:6px">${npc.role}${npc.age?` · Age ${npc.age}`:''}${rel?` · ${rel.rel}`:''}</div>`;
  let h=title;
  const back=`<button class="bt" onclick="openHiddenValleyNPC('${id}','root')">↩ Back</button><button class="bt dn" onclick="closeDlg()">Walk away</button>`;
  if(topic==='root'){
    h+=`<div class="npc-line">"${npc.line}"</div>`;
    if(id==='elder_mcnamara'){
      h+=`<button class="bt" onclick="openHiddenValleyNPC('elder_mcnamara','elder')">🛡 Ask about bunker leadership</button>`;
      h+=`<button class="bt" onclick="openHiddenValleyNPC('elder_mcnamara','mission')">📜 Ask what the Brotherhood wants</button>`;
      if(!hvFindQuest('hvq1'))h+=`<button class="bt pip" onclick="hvStartQuest1();openHiddenValleyNPC('elder_mcnamara','quest1')">📜 Ask how to earn trust</button>`;
      if(hvQuestActive('hvq1'))h+=`<button class="bt pip" onclick="openHiddenValleyNPC('elder_mcnamara','quest1')">📜 Discuss Eyes Inside the Bunker</button>`;
      if(hvEnsure().stage>=4&&!hvFindQuest('hvq5'))h+=`<button class="bt pip" onclick="hvStartQuest5();openHiddenValleyNPC('elder_mcnamara','quest5')">📜 Raise the issue of leadership</button>`;
      if(hvQuestActive('hvq5'))h+=`<button class="bt pip" onclick="openHiddenValleyNPC('elder_mcnamara','quest5')">📜 Discuss Chain of Command</button>`;
    }else if(id==='head_paladin_hardin'){
      h+=`<button class="bt" onclick="openHiddenValleyNPC('head_paladin_hardin','hardin')">⚔ Ask why he challenges McNamara</button>`;
      h+=`<button class="bt" onclick="hvEnsure().spoke.hardin=true;hvRefreshState();openHiddenValleyNPC('head_paladin_hardin','speak')">💬 Ask about patrol duty</button>`;
      if(hvQuestActive('hvq5'))h+=`<button class="bt pip" onclick="openHiddenValleyNPC('head_paladin_hardin','quest5')">📜 Discuss bunker politics</button>`;
    }else if(id==='senior_knight_lorenzo'){
      h+=`<button class="bt" onclick="openHiddenValleyNPC('senior_knight_lorenzo','security')">🪖 Ask about valley security</button>`;
      h+=`<button class="bt" onclick="openHiddenValleyNPC('senior_knight_lorenzo','supplies')">📦 Ask about patrol supply lines</button>`;
      if(hvEnsure().stage>=2&&!hvFindQuest('hvq3'))h+=`<button class="bt pip" onclick="hvStartQuest3();closeDlg();notify('Valley Sweep accepted.');upAll()">📜 Volunteer for a valley sweep</button>`;
      if(hvQuestActive('hvq3'))h+=`<button class="bt pip" onclick="closeDlg();showResult('Valley Sweep','🏜',['Lorenzo wants 2 radscorpions taken off the valley approaches before somebody gets dragged into the sand.'],'Continue','upAll()')">📜 Review Valley Sweep</button>`;
    }else if(id==='knight_torres'){
      h+=`<button class="bt" onclick="openHiddenValleyNPC('knight_torres','armory')">⚙ Ask about armory clearance</button>`;
      h+=`<button class="bt go" onclick="closeDlg();openBld('bos_armory')">⚡ Browse Brotherhood stock</button>`;
    }else if(id==='scribe_ibsen'){
      h+=`<button class="bt" onclick="openHiddenValleyNPC('scribe_ibsen','diagnostics')">🔬 Ask what he is working on</button>`;
      if(hvEnsure().stage>=1&&!hvFindQuest('hvq2'))h+=`<button class="bt pip" onclick="hvStartQuest2();openHiddenValleyNPC('scribe_ibsen','quest2')">📜 Offer technical help</button>`;
      if(hvQuestActive('hvq2'))h+=`<button class="bt pip" onclick="openHiddenValleyNPC('scribe_ibsen','quest2')">📜 Discuss Ibsen's Diagnostics</button>`;
    }else if(id==='veronica'){
      h+=`<button class="bt" onclick="hvEnsure().spoke.veronica=true;hvRefreshState();openHiddenValleyNPC('veronica','veronica')">💬 Ask how she feels about the Brotherhood</button>`;
      h+=`<button class="bt" onclick="openHiddenValleyNPC('veronica','outside')">🌍 Ask about the outside world</button>`;
      if(hvEnsure().stage>=3&&!hvFindQuest('hvq4'))h+=`<button class="bt pip" onclick="hvStartQuest4();openHiddenValleyNPC('veronica','quest4')">📜 Ask if she needs a hand</button>`;
      if(hvQuestActive('hvq4'))h+=`<button class="bt pip" onclick="openHiddenValleyNPC('veronica','quest4')">📜 Discuss Power for the Archives</button>`;
      if(hvQuestActive('hvq5')&&hvEnsure().side)h+=`<button class="bt pip" onclick="openHiddenValleyNPC('veronica','quest5')">📜 Ask her view on the leadership dispute</button>`;
    }
    h+=`<button class="bt" onclick="closeDlg();openNPCInteraction(HIDDEN_VALLEY_NPCS['${id}'],S.relationships.find(r=>r.name===HIDDEN_VALLEY_NPCS['${id}'].name))">😊 General social talk</button>`;
    h+=`<button class="bt dn" onclick="closeDlg()">Walk away</button>`;
  } else if(id==='elder_mcnamara'&&topic==='elder'){
    h+=`<div class="npc-line">"Leadership is not volume, it is discipline. The Brotherhood lasts because it does not panic every time the wasteland changes shape."</div>${back}`;
  } else if(id==='elder_mcnamara'&&topic==='mission'){
    h+=`<div class="npc-line">"We preserve dangerous knowledge because the people outside these walls have already proven what happens when they are trusted with too much of it."</div>${back}`;
  } else if(id==='elder_mcnamara'&&topic==='quest1'){
    h+=`<div class="npc-line">"If you want the Brotherhood to trust you, then stop treating us like a rumor. Speak to Hardin. Speak to Veronica. Then come back understanding more than you did before."</div>${back}`;
  } else if(id==='elder_mcnamara'&&topic==='quest5'){
    if(!hvQuestActive('hvq5')){h+=`<div class="npc-line">"The bunker cannot afford more division than it already carries."</div>${back}`;}
    else if(!hvEnsure().side){h+=`<div class="npc-line">"If you have an opinion on the bunker's future, speak it plainly."</div><button class="bt pip" onclick="hvChooseSide('mcnamara')">🛡 Back McNamara</button>${back}`;}
    else if(hvEnsure().side==='mcnamara'&&hvEnsure().veronicaCounsel){h+=`<div class="npc-line">"Then you have chosen caution over noise. That may keep more people alive than they appreciate."</div><button class="bt go" onclick="hvFinishQuest5()">🛡 Confirm your support</button>${back}`;}
    else{h+=`<div class="npc-line">"Think it through. The Brotherhood has survived too long to gamble on shallow conviction."</div>${back}`;}
  } else if(id==='head_paladin_hardin'&&topic==='hardin'){
    h+=`<div class="npc-line">"McNamara keeps the bunker breathing. Fine. But breathing isn't the same as living, and it sure isn't the same as winning."</div>${back}`;
  } else if(id==='head_paladin_hardin'&&topic==='speak'){
    h+=`<div class="npc-line">"Patrol duty out here means watching the same hills until something finally tries to kill you from behind one."</div>${back}`;
  } else if(id==='head_paladin_hardin'&&topic==='quest5'){
    if(!hvEnsure().side){h+=`<div class="npc-line">"If you're going to stand for something, stand for action. The Mojave won't wait for McNamara to finish being careful."</div><button class="bt pip" onclick="hvChooseSide('hardin')">⚔ Back Hardin</button>${back}`;}
    else if(hvEnsure().side==='hardin'&&hvEnsure().veronicaCounsel){h+=`<div class="npc-line">"Good. Then maybe this bunker remembers it was built by soldiers, not archivists."</div><button class="bt go" onclick="hvFinishQuest5()">⚔ Confirm your support</button>${back}`;}
    else{h+=`<div class="npc-line">"Talk all you want. Just don't pretend this bunker can stay buried forever."</div>${back}`;}
  } else if(id==='senior_knight_lorenzo'&&topic==='security'){
    h+=`<div class="npc-line">"The valley looks quiet right up until it isn't. Scorpions, raiders, stray patrols — none of them care what the bunker is supposed to be."</div>${back}`;
  } else if(id==='senior_knight_lorenzo'&&topic==='supplies'){
    h+=`<div class="npc-line">"Supply lines are simple: if they break, people start counting bullets and medicine instead of plans."</div>${back}`;
  } else if(id==='knight_torres'&&topic==='armory'){
    h+=`<div class="npc-line">"You don't get Brotherhood kit because you ask nicely. You get it because somebody here decided you wouldn't disgrace it."</div>${back}`;
  } else if(id==='scribe_ibsen'&&topic==='diagnostics'){
    h+=`<div class="npc-line">"I'm keeping the bunker systems from turning one bad cable into a week of people shouting at me in the dark."</div>${back}`;
  } else if(id==='scribe_ibsen'&&topic==='quest2'){
    const hasReq=(S.inv.indexOf('sensor_module')!==-1&&S.inv.indexOf('scrap_electronics')!==-1);
    h+=`<div class="npc-line">"Bring me a Sensor Module and Scrap Electronics and maybe I can stop the diagnostics board from lying to me."</div>${hasReq?'<button class="bt go" onclick="hvTurnInQuest2()">🔧 Hand over the parts</button>':''}${back}`;
  } else if(id==='veronica'&&topic==='veronica'){
    h+=`<div class="npc-line">"I love these people. That's what makes it so frustrating watching them confuse survival with shrinking."</div>${back}`;
  } else if(id==='veronica'&&topic==='outside'){
    h+=`<div class="npc-line">"The outside world is messy, loud, dangerous, and full of people who might actually be worth helping. Weird, right?"</div>${back}`;
  } else if(id==='veronica'&&topic==='quest4'){
    const hasReq=(S.inv.indexOf('fission_battery')!==-1&&S.inv.indexOf('conductor')!==-1);
    h+=`<div class="npc-line">"I can get an archive station running again if you bring me a Fission Battery and some Conductors. It might even help people remember why knowledge matters."</div>${hasReq?'<button class="bt go" onclick="hvTurnInQuest4()">⚡ Hand over the parts</button>':''}${back}`;
  } else if(id==='veronica'&&topic==='quest5'){
    h+=`<div class="npc-line">"McNamara keeps people alive. Hardin wants them to matter again. Pick whichever answer you can live with after the bunker doors shut behind you."</div><button class="bt" onclick="hvHearVeronicaCounsel()">💬 Hear Veronica out</button>${back}`;
  }
  openDlg(h);
}

function serializeSave(){return JSON.stringify(S)}
function canUseStorage(){
  try{return typeof localStorage!=='undefined'}catch(e){return false}
}
function getSaveDb(){
  if(_dbPromise)return _dbPromise;
  _dbPromise=new Promise(resolve=>{
    if(!window.indexedDB){resolve(null);return}
    try{
      const req=indexedDB.open(SAVE_DB_NAME,1);
      req.onupgradeneeded=()=>{
        const db=req.result;
        if(!db.objectStoreNames.contains(SAVE_DB_STORE))db.createObjectStore(SAVE_DB_STORE);
      };
      req.onsuccess=()=>resolve(req.result);
      req.onerror=()=>resolve(null);
    }catch(e){resolve(null)}
  });
  return _dbPromise;
}
async function saveToIndexedDb(raw){
  const db=await getSaveDb();
  if(!db)return false;
  return await new Promise(resolve=>{
    try{
      const tx=db.transaction(SAVE_DB_STORE,'readwrite');
      tx.objectStore(SAVE_DB_STORE).put({raw,stamp:Date.now()},SAVE_DB_SLOT);
      tx.oncomplete=()=>resolve(true);
      tx.onerror=()=>resolve(false);
      tx.onabort=()=>resolve(false);
    }catch(e){resolve(false)}
  });
}
async function loadFromIndexedDb(){
  const db=await getSaveDb();
  if(!db)return null;
  return await new Promise(resolve=>{
    try{
      const tx=db.transaction(SAVE_DB_STORE,'readonly');
      const req=tx.objectStore(SAVE_DB_STORE).get(SAVE_DB_SLOT);
      req.onsuccess=()=>resolve(req.result&&req.result.raw?req.result.raw:null);
      req.onerror=()=>resolve(null);
    }catch(e){resolve(null)}
  });
}
function save(force=false){
  if(!S)return false;
  const now=Date.now();
  if(!force&&now-_lastSaveStamp<150)return true;
  try{
    const raw=serializeSave();
    if(canUseStorage()){
      localStorage.setItem(SAVE_KEY,raw);
      localStorage.setItem(SAVE_BACKUP_KEY,raw);
      localStorage.setItem(SAVE_MIRROR_KEY,raw);
    }
    saveToIndexedDb(raw);
    _lastSaveStamp=now;
    return true;
  }catch(e){
    try{saveToIndexedDb(serializeSave())}catch(err){}
    return false
  }
}
function queueSave(delay=180){
  if(!S)return;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>save(true),delay);
}
function startAutoSaveLoop(){
  clearInterval(_autoSaveTimer);
  _autoSaveTimer=setInterval(()=>save(true),5000);
}
function bindAutoSave(){
  const hardSave=()=>save(true);
  ['pagehide','beforeunload','blur','focusout'].forEach(ev=>window.addEventListener(ev,hardSave,{capture:true}));
  window.addEventListener('pageshow',()=>{if(S)save(true)},{capture:true});
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')hardSave()},{capture:true});
  document.addEventListener('freeze',hardSave,{capture:true});
  document.addEventListener('resume',hardSave,{capture:true});
  document.addEventListener('pause',hardSave,{capture:true});
}
function load(){
  const candidates=[];
  if(canUseStorage())candidates.push(localStorage.getItem(SAVE_KEY),localStorage.getItem(SAVE_BACKUP_KEY),localStorage.getItem(SAVE_MIRROR_KEY));
  for(const raw of candidates){
    if(!raw)continue;
    try{
      S=JSON.parse(raw);
      migrate();
      return true;
    }catch(e){}
  }
  return false;
}
async function loadAsync(){
  if(load())return true;
  const raw=await loadFromIndexedDb();
  if(!raw)return false;
  try{
    S=JSON.parse(raw);
    migrate();
    if(canUseStorage()){
      localStorage.setItem(SAVE_KEY,raw);
      localStorage.setItem(SAVE_BACKUP_KEY,raw);
      localStorage.setItem(SAVE_MIRROR_KEY,raw);
    }
    return true;
  }catch(e){return false}
}
async function requestPersistentStorage(){
  try{
    if(navigator.storage&&navigator.storage.persist)await navigator.storage.persist();
  }catch(e){}
}
function migrate(){
  if(!S.special)S.special=[5,5,5,5,5,5,5];
  if(!S.companions)S.companions=[];
  if(!S.properties)S.properties=[];
  const legacyProps=new Set(['Abandoned Shack','Safehouse','Workshop','Trading Post','Fortified Compound']);
  S.properties=S.properties.filter(p=>p&&(!legacyProps.has(p.name)));
  if(!S.settlements)S.settlements=[];
  if(!S.army)S.army={soldiers:0,quality:1,morale:50,max:0};
  if(!S.hours)S.hours=8;
  if(!S.ap)S.ap=60;if(!S.maxAp)S.maxAp=60;
  if(!S.worldEvents)S.worldEvents=[];
  if(!S.relationships)S.relationships=[];
  if(!S.buildingNpcs)S.buildingNpcs={};
  if(!S.spouse)S.spouse=null;
  if(!S.children)S.children=[];
  if(S.bounty===undefined)S.bounty=0;
  if(!S.perks)S.perks=[];
  if(!S.flags)S.flags={};
  if(!S.flags.bountyBoard)S.flags.bountyBoard={};
  if(!S.gear)S.gear={w:null,body:null,head:null};

function calcMaxHp(){return 60+S.level*8+(S.special?S.special[2]*6:0)}
function calcMaxAp(){return 50+(S.special?S.special[5]*3:0)+S.level*2}
function atkPow(){let a=S.atk+Math.floor(S.level*.5)+(S.special?Math.floor(S.special[0]*0.8):0);if(S.gear.w){const w=ITEMS[S.gear.w];if(w)a+=w.a||0}return a}
function defPow(){let d=S.def+Math.floor(S.level*.3)+(S.special?Math.floor(S.special[2]*0.5):0);if(S.gear.body){const a=ITEMS[S.gear.body];if(a)d+=a.d||0}if(S.gear.head){const h=ITEMS[S.gear.head];if(h)d+=h.d||0}return d}
function xpNeed(l){return Math.floor(50*Math.pow(1.4,l-1))}
function hpPct(h,m){return Math.max(0,Math.min(100,Math.round(h/m*100)))}
function countItem(id){return S&&S.inv?S.inv.filter(x=>x===id).length:0}
function getEquippedWeapon(){return S&&S.gear&&S.gear.w?ITEMS[S.gear.w]||null:null}
function getEquippedWeaponAmmoId(){const w=getEquippedWeapon();return w&&w.ammo?w.ammo:null}
function getEquippedWeaponAmmoCount(){const ammoId=getEquippedWeaponAmmoId();return ammoId?countItem(ammoId):0}
function getCombatAttackProfile(consumeAmmo){
  let a=S.atk+Math.floor(S.level*.5)+(S.special?Math.floor(S.special[0]*0.8):0);
  const w=getEquippedWeapon();
  if(!w)return{atk:a,weapon:null,ammoId:null,ammoName:'',hadAmmo:true,gun:false,usedAmmo:false};
  if(!w.ammo){
    a+=w.a||0;
    return{atk:a,weapon:w,ammoId:null,ammoName:'',hadAmmo:true,gun:false,usedAmmo:false};
  }
  const ammoId=w.ammo;
  const ammoIdx=S.inv.indexOf(ammoId);
  const ammoName=ITEMS[ammoId]?.n||'ammo';
  if(ammoIdx!==-1){
    if(consumeAmmo)S.inv.splice(ammoIdx,1);
    a+=w.a||0;
    return{atk:a,weapon:w,ammoId,ammoName,hadAmmo:true,gun:true,usedAmmo:!!consumeAmmo};
  }
  return{atk:Math.max(1,a+Math.max(1,Math.floor((w.a||0)*0.2))),weapon:w,ammoId,ammoName,hadAmmo:false,gun:true,usedAmmo:false};
}
function hasFlag(k){return !!(S&&S.flags&&S.flags[k])}
function setFlag(k,v=true){if(!S.flags)S.flags={};S.flags[k]=v;save()}

function log(text,type='n'){
  if(!S.log)S.log=[];
  let dg=S.log.find(g=>g.day===S.days);
  if(!dg){dg={day:S.days,entries:[]};S.log.unshift(dg)}
  dg.entries.push({text,type});
  if(S.log.length>40)S.log.pop();
  // Ticker
  const ti=$('ticker-inner');
  if(ti){ti.textContent=text.replace(/<[^>]*>/g,'');ti.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>ti.classList.remove('show'),3000)}
}

function upSB(){

  const hp=hpPct(S.hp,S.maxHp);
  sb.innerHTML=`<div class="s">❤ <b class="${hp<=25?'r':''}">${S.hp}/${S.maxHp}</b></div>

function timeStr(){
  const h=S.hours%24;
  const ampm=h>=12?'PM':'AM';
  const h12=h%12||12;
  const period=h>=6&&h<18?'☀':'🌙';
  return `${period} ${h12}${ampm}`;
}

// ============================================================
// SCAVENGE SYSTEM (Tap mechanic from Elder to King)
// ============================================================
function doScavenge(){
  if(combat)return;
  S.scavengeCount++;
  advanceTime(1);
  const loc=LOCS[S.loc];
  const r=R();

  if(r<.20*loc.dg){
    // Combat encounter
    const surs=loc.sur||[];
    const area=surs.length?rndA(surs):null;
    const enPool=area?area.en:['gecko','radroach'];
    const validPool=enPool.filter(e=>ENEMIES[e]);
    if(validPool.length){
      const cnt=rnd(1,Math.min(2,validPool.length));
      const enemies=[];for(let i=0;i<cnt;i++)enemies.push(mkEnemy(rndA(validPool)));
      startCombat(enemies);
      return;
    }
  }
  if(r<.45){
    // Find caps
    const g=rnd(2,8+S.level*2);S.caps+=g;S.capsEarned+=g;
    log('Found '+g+' caps scavenging.','e');
    notify('💰 +'+g+' caps');
  } else if(r<.70){
    // Find item
    const surs=loc.sur||[];
    const area=surs.length?rndA(surs):null;
    const ltPool=area?area.lt:['herbs','scrap'];
    const bonusPool=getBonusLootPool(S.loc,area);
    const fi=rndA(ltPool.concat(bonusPool));const it=ITEMS[fi];
    if(it){S.inv.push(fi);log('Found '+it.n+'.','e');notify(it.e+' Found '+it.n)}
  } else if(r<.82){
    // NPC encounter
    const npc=mkNPC({loc:S.loc});
    if(!S.relationships.find(r2=>r2.name===npc.name)){
      S.relationships.push({name:npc.name,rel:'stranger',aff:0,male:npc.male,age:npc.age,loc:S.loc,met:S.days});
    }
    openNPCInteraction(npc,S.relationships.find(r2=>r2.name===npc.name));
    return;
  } else {
    // Flavor text
    const scenes=["The wind carries the smell of dust and decay.","You hear gunshots in the distance.","A tumbleweed rolls past.","The Pip-Boy crackles with static.","You spot tracks in the sand — something big.",
    "An old billboard reads: 'NEVADA: Silver State'","Brahmin bones bleach in the sun.","The heat is oppressive."];
    log(rndA(scenes),'n');
    notify(rndA(scenes));
  }
  chkLU();upAll();
}

function explore(idx){
  const loc=LOCS[S.loc];const area=loc?.sur?.[idx];if(!area)return;
  const o=$('TO');o.classList.add('A');
  $('TB').style.width='0%';$('TC').innerHTML='';$('TN').style.display='none';
  $('TS').textContent=area.e;
  $('TT').innerHTML=`<b>${area.n}</b><br><span style="font-size:11px;color:var(--muted)">${area.d}</span>`;
  setTimeout(()=>runExpedition(area,0),500);
}
function runExpedition(area,step){
  const maxSteps=rnd(2,4);
  if(step>=maxSteps){
    $('TS').textContent=area.e;
    $('TT').innerHTML=`Finished scouting <b>${area.n}</b>.`;
    const cd=$('TC');cd.innerHTML='';
    const cb=el('button','bt go','🔍 Keep exploring');cb.style.textAlign='center';
    cb.onclick=()=>{cd.innerHTML='';$('TN').style.display='none';runExpedition(area,0)};cd.appendChild(cb);
    const rb=el('button','bt','🔙 Return to '+LOCS[S.loc]?.n);rb.style.textAlign='center';
    rb.onclick=()=>{$('TO').classList.remove('A');upAll()};cd.appendChild(rb);
    $('TN').style.display='none';return;
  }
  advanceTime(1);
  $('TB').style.width=Math.round(((step+1)/maxSteps)*100)+'%';
  const r=R();
  if(r<.45){
    const cnt=rnd(1,Math.min(2,area.en.length));
    const enemies=[];for(let i=0;i<cnt;i++){const eid=rndA(area.en);if(ENEMIES[eid])enemies.push(mkEnemy(eid))}
    if(!enemies.length){$('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step+1);return}
    $('TS').textContent='⚔';
    $('TT').innerHTML=`<b>Hostiles!</b> ${enemies.map(e=>e.name).join(' & ')}!`;
    const cd=$('TC');cd.innerHTML='';
    const fb=el('button','bt go','⚔ Fight!');fb.style.textAlign='center';
    fb.onclick=()=>{startCombat(enemies);combat._expArea=area;combat._expStep=step+1};cd.appendChild(fb);
    const fl=el('button','bt dn','🏃 Retreat');fl.style.textAlign='center';
    fl.onclick=()=>{log('Retreated from '+area.n+'.','e');$('TO').classList.remove('A');upAll()};cd.appendChild(fl);
    $('TN').style.display='none';
  } else if(r<.65){
    const li=rndA(area.lt);const it=ITEMS[li];
    if(it){S.inv.push(li);log('Found '+it.n+' in '+area.n+'.','e');save();
    $('TS').textContent='✨';$('TT').innerHTML=`Found: <b style="color:var(--green)">${it.e} ${it.n}</b>`;
    $('TC').innerHTML='';$('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step+1)}
  } else {
    const scenes=["Tracks in the dirt — recent.","The wind shifts. Something watches.","Shell casings litter the ground.","A faded sign: DANGER - MINES","An old campfire, still warm."];
    $('TS').textContent=rndA(['🏜','💀','🪨','🌵']);
    $('TT').innerHTML=rndA(scenes);
    $('TC').innerHTML='';$('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step+1);
  }
}
function travelCont(){
  $('TN').onclick=null;
  if(tQ.length) nextTEv();
  else finTravel();
}

function mkEnemy(id){
  const e=ENEMIES[id];if(!e)return{name:"Gecko",hp:20,maxHp:20,a:4,d:0,xp:8,e:"🦎",loot:[]};
  const lvlBonus=Math.max(0,S.level-3);
  return{name:e.n,hp:e.hp+lvlBonus*3,maxHp:e.hp+lvlBonus*3,a:e.a+Math.floor(lvlBonus*.5),d:e.d+Math.floor(lvlBonus*.3),xp:e.xp,e:e.e,loot:clone(e.loot),id};
}

// ============================================================
// COMBAT SYSTEM
// ============================================================
function startCombat(enemies){
  combat={enemies,turn:0,log:[]};
  renderCombat();
}
function renderCombat(){
  if(!combat)return;
  const o=$('CO');o.style.display='flex';
  const p=$('CP');if(!p){
    const cp=el('div','','');cp.id='CP';o.appendChild(cp);
  }
  const panel=$('CP');
  const e=combat.enemies[0];if(!e)return;
  const alive=combat.enemies.filter(en=>en.hp>0);
  const hp=hpPct(S.hp,S.maxHp);

  let enemyHtml=alive.map((en,i)=>`<div class="combat-panel" style="margin:2px 0;padding:6px">
  <div style="display:flex;align-items:center;gap:8px">
  <div style="font-size:28px">${renderIcon(en.e,28)}</div>
  <div style="flex:1"><div style="font-weight:bold;font-size:12px;color:var(--red)">${en.name}</div>
  <div class="hb"><div class="hf cr" style="width:${hpPct(en.hp,en.maxHp)}%"></div></div>
  <div style="font-size:9px;color:var(--muted)">HP ${en.hp}/${en.maxHp} · ATK ${en.a} · DEF ${en.d}</div></div></div></div>`).join('');

  panel.innerHTML=`<div style="text-align:center;font-size:10px;color:var(--amber);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">⚔ COMBAT ⚔</div>
  ${enemyHtml}
  <div style="margin:6px 0;padding:6px;background:#0a1a0a;border-radius:4px;border:1px solid #1a3a1a">
  <div style="display:flex;justify-content:space-between;font-size:11px"><span>❤ ${S.hp}/${S.maxHp}</span><span>⚡ AP ${S.ap}</span></div>
  <div class="hb"><div class="hf g" style="width:${hp}%"></div></div>
  <div style="font-size:10px;color:var(--muted);margin-top:4px">${(()=>{const w=getEquippedWeapon();if(!w)return 'Weapon: Unarmed';if(!w.ammo)return `Weapon: ${w.e} ${w.n}`;const ammoId=w.ammo;const ammo=ITEMS[ammoId];const ammoCount=countItem(ammoId);return `Weapon: ${w.e} ${w.n} · ${ammo?ammo.e+' '+ammo.n:''} ×${ammoCount}`})()}</div></div>
  <div class="combat-bar">
  <button class="bt go" onclick="combatAction('attack')">⚔ Attack</button>
  <button class="bt pip" onclick="combatAction('vats')">🎯 V.A.T.S.</button></div>
  <div class="combat-bar">
  <button class="bt" onclick="combatAction('heal')">💉 Heal</button>
  <button class="bt dn" onclick="combatAction('flee')">🏃 Flee</button></div>
  <div style="max-height:100px;overflow-y:auto;margin-top:6px;padding:4px;background:#0a0a04;border-radius:4px;font-size:10px;color:var(--muted)">${combat.log.slice(-8).map(l=>'<div>'+l+'</div>').join('')}</div>`;
}
function combatAction(act){
  if(!combat)return;
  const alive=combat.enemies.filter(en=>en.hp>0);
  if(!alive.length){endCombat(true);return}
  const target=alive[0];

  switch(act){
    case 'attack':{
      const attack=getCombatAttackProfile(true);
      const dmg=Math.max(1,attack.atk-Math.floor(target.d*.5)+rnd(-2,3));
      target.hp=Math.max(0,target.hp-dmg);
      if(attack.gun&&attack.hadAmmo){
        combat.log.push(`You fire ${attack.weapon.n} and deal ${dmg} damage to ${target.name}.`);
      }else if(attack.gun&&!attack.hadAmmo){
        combat.log.push(`Out of ${attack.ammoName}! You swing ${attack.weapon.n} and deal ${dmg} damage to ${target.name}.`);
        notify('Out of '+attack.ammoName+'! Weak melee attack only.');
      }else{
        combat.log.push(`You deal ${dmg} damage to ${target.name}.`);
      }
      S.ap=Math.max(0,S.ap-8);
      if(target.hp<=0){
        combat.log.push(`${target.name} is killed!`);
        log('Killed '+target.name+'.','c');
        S.kills[target.id||'unknown']=(S.kills[target.id||'unknown']||0)+1;
        S.killCount++;
      }
      break;
    }
    case 'vats':{
      if(S.ap<20){notify('Not enough AP!');return}
      const attack=getCombatAttackProfile(true);
      if(attack.gun&&!attack.hadAmmo){
        notify('No '+attack.ammoName+' loaded.');
        combat.log.push(`V.A.T.S. failed — no ${attack.ammoName}.`);
        renderCombat();
        return;
      }
      S.ap-=20;
      const crit=R()<(.15+S.special[6]*.02);
      const mult=crit?2.5:1.8;
      const dmg=Math.max(1,Math.round((attack.atk-Math.floor(target.d*.3))*mult)+rnd(0,5));
      target.hp=Math.max(0,target.hp-dmg);
      if(attack.gun)combat.log.push(`V.A.T.S.! ${crit?'CRITICAL! ':''}${dmg} damage to ${target.name} with ${attack.weapon.n}!`);
      else combat.log.push(`V.A.T.S.! ${crit?'CRITICAL! ':''}${dmg} damage to ${target.name}!`);
      if(target.hp<=0){
        combat.log.push(`${target.name} eliminated!`);
        log('Killed '+target.name+' (V.A.T.S.).','c');
        S.kills[target.id||'unknown']=(S.kills[target.id||'unknown']||0)+1;
        S.killCount++;
      }
      break;
    }
    case 'heal':{
      const si=S.inv.indexOf('stimpak');
      const ssi=si===-1?S.inv.indexOf('super_stimpak'):-1;
      const idx=si!==-1?si:ssi;
      if(idx===-1){notify('No healing items!');return}
      const item=ITEMS[S.inv[idx]];
      S.hp=Math.min(S.maxHp,S.hp+(item.hp||30));
      combat.log.push(`Used ${item.n}. +${item.hp||30} HP.`);
      S.inv.splice(idx,1);
      break;
    }
    case 'flee':{
      const flee=R()<(.3+S.spd*.05+(S.special?S.special[5]*.03:0));
      if(flee){combat.log.push('You escaped!');log('Fled from combat.','c');endCombat(false);return}
      else{combat.log.push('Failed to escape!');}
      break;
    }
  }

  const survivors=combat.enemies.filter(en=>en.hp>0);
  if(!survivors.length){endCombat(true);return}

  survivors.forEach(en=>{
    const eDmg=Math.max(1,en.a-Math.floor(defPow()*.4)+rnd(-2,2));
    S.hp=Math.max(0,S.hp-eDmg);
    combat.log.push(`${en.name} deals ${eDmg} damage to you.`);
  });

  if(S.hp<=0){combat.log.push('You are critically wounded!');endCombat(false,true);return}
  combat.turn++;
  renderCombat();
}
function endCombat(won,died){
  if(!combat)return;
  const expArea=combat._expArea;
  const expStep=combat._expStep;
  const postT=combat.postT;
  $('CO').style.display='none';
  window._resumeArea=expArea||null;
  window._resumeStep=expStep||0;

  if(died){
    S.hp=Math.floor(S.maxHp*.3);S.caps=Math.max(0,S.caps-rnd(10,30));
    combat=null;save();
    if(postT){
      showResult('Knocked Out','💀',['You wake up later, stripped of some caps.','Lost some caps.'],'Continue','resumeTravelAfterCombat()');
    }else{
      showResult('Knocked Out','💀',['You wake up later, stripped of some caps.','Lost some caps.'],'Continue','upAll()');
    }
    return;
  }
  if(!won){
    combat=null;save();
    if(postT){showResult('Escaped Combat','🏃',['You got away and kept moving.'],'Continue','resumeTravelAfterCombat()');}
    else if(expArea){showResult('Retreated','🏃',['You escaped the fight.'],'Continue','resumeExpeditionAfterCombat()');}
    else{upAll();}
    return;
  }

  let totalXp=0,totalCaps=0;const lootFound=[];
  combat.enemies.forEach(en=>{
    totalXp+=en.xp;
    const c=rnd(3,8+S.level*2);totalCaps+=c;
    if(en.loot&&en.loot.length){
      const li=rndA(en.loot);
      if(ITEMS[li]){lootFound.push(li);S.inv.push(li)}
    }
  });
  S.xp+=totalXp;S.caps+=totalCaps;S.capsEarned+=totalCaps;

  const lines=['⭐ +'+totalXp+' XP','💰 +'+totalCaps+' caps'];
  lootFound.forEach(l=>{const it=ITEMS[l];if(it)lines.push(it.e+' '+it.n)});
  if(combat.bountyTarget){
    const bt=combat.bountyTarget;
    const bonusCaps=rnd(bt.caps[0],bt.caps[1]);
    S.caps+=bonusCaps;S.capsEarned+=bonusCaps;
    S.xp+=bt.xp;
    lines.push('🎯 Bounty claimed: '+bt.name);
    lines.push('💰 +'+bonusCaps+' caps bonus');
    lines.push('⭐ +'+bt.xp+' XP bonus');
    if(bt.rep){Object.entries(bt.rep).forEach(([fac,val])=>{S.rep[fac]=(S.rep[fac]||0)+val;lines.push('🏴 +'+val+' '+(FACTIONS[fac]||fac)+' standing')})}
    if(S.flags.bountyBoard)S.flags.bountyBoard.current=null;
    log('Claimed bounty on '+bt.name+'.','q');
  }

  combat=null;
  chkLU();save();

  if(postT){
    showResult('Victory!','⚔',lines,'Continue','resumeTravelAfterCombat()');
  } else if(expArea){
    showResult('Victory!','⚔',lines,'Continue','resumeExpeditionAfterCombat()');
  } else {
    showResult('Victory!','⚔',lines,'Continue','upAll()');
  }
}

// ============================================================
// LEVEL UP
// ============================================================
function chkLU(){
  while(S.xp>=xpNeed(S.level)){
    S.xp-=xpNeed(S.level);S.level++;
    S.maxHp=calcMaxHp();S.hp=S.maxHp;
    S.maxAp=calcMaxAp();S.ap=S.maxAp;
    S.atk++;if(S.level%2===0)S.def++;if(S.level%3===0)S.spd++;
    log('Level up! Now level '+S.level+'.','q');
    notify('⬆ LEVEL '+S.level+'!');
    // Offer SPECIAL point
    if(S.level%2===0)S.special[rnd(0,6)]++;
  }
}

// NPC SYSTEM (BitLife style from GoT + Goodsprings dialogue)
// ============================================================
function getNpcRolePool(ctx={}){
  const locId=ctx.loc||S.loc||'';
  const bId=(ctx.bId||'').toLowerCase();
  const fac=((ctx.fac||((LOCS[locId]||{}).fac)||'')+'').toLowerCase();

  if(fac==='bos'||bId.includes('bos')||locId==='HiddenValley')return['Brotherhood Knight','Brotherhood Paladin','Brotherhood Scribe','Brotherhood Initiate','Brotherhood Guard','Brotherhood Technician'];
  if(fac==='ncr'||['CampMcCarran','CampGolf','BitterSprings','HeliosOne','HooverDam','MojaveOutpost','CampForlornHope'].includes(locId)||/(mccarran|golf|bitter|helios|outpost|dam|forlorn)/.test(bId))return['NCR Trooper','NCR Ranger','NCR Scout','NCR Officer','NCR Medic','NCR Engineer'];
  if(fac==='powdergangers'||locId==='NCRCF'||bId.includes('ncrcf'))return['Powder Ganger','Powder Ganger Trader','Prisoner','Powder Ganger Guard','Escaped Convict'];
  if(fac==='legion'||locId==='TheFort'||locId==='NelsonCamp'||locId==='CottonwoodCove'||/(legion|caesar|cove)/.test(bId))return['Legion Recruit','Legion Veteran','Legion Scout','Legion Handler','Legion Priest'];
  if(fac==='boomers'||locId==='NellisAFB'||bId.includes('nellis'))return['Boomer Guard','Boomer Mechanic','Boomer Pilot','Boomer Loader','Boomer Doctor'];
  if(fac==='kings'||locId==='FreesideN'||/(king|wrangler|mick|mormon|silver_rush|cerulean)/.test(bId))return['Merchant','Drifter','King Member','Mechanic','Doctor','Guard'];
  return['Trader','Prospector','Drifter','NCR Trooper','Caravan Guard','Settler','Scavenger','Doctor','Gambler','Bounty Hunter','Mechanic','Farmer'];
}
function inferNpcIcon(npc,ctx={}){
  const locId=ctx.loc||npc.loc||S.loc||'';
  const bId=(ctx.bId||'').toLowerCase();
  const role=((npc.role||'')+'').toLowerCase();
  const fac=((npc.fac||ctx.fac||((LOCS[locId]||{}).fac)||'')+'').toLowerCase();

  if(npc.icon)return npc.icon;
  if(fac==='bos'||bId.includes('bos')||locId==='HiddenValley'||role.includes('brotherhood'))return(role.includes('scribe')||role.includes('technician')||role.includes('scientist'))?ICONS.NPC.BOS_SCRIBE:ICONS.NPC.BOS;
  if(fac==='ncr'||role.includes('ncr')||['CampMcCarran','CampGolf','BitterSprings','HeliosOne','HooverDam','MojaveOutpost','CampForlornHope'].includes(locId)||/(mccarran|golf|bitter|helios|outpost|dam|forlorn)/.test(bId)){
    if(role.includes('ranger'))return ICONS.NPC.NCR_RANGER;
    if(role.includes('medic')||role.includes('doctor'))return ICONS.NPC.NCR_MEDIC;
    if(role.includes('officer')||role.includes('sergeant')||role.includes('lieutenant')||role.includes('captain')||role.includes('major')||role.includes('chief')||role.includes('command'))return ICONS.NPC.NCR_COMMAND;
    if(role.includes('scout'))return ICONS.NPC.NCR_SCOUT;
    return ICONS.NPC.NCR;
  }
  if(fac==='followers'||role.includes('follower'))return ICONS.NPC.FOLLOWERS;
  if(fac==='powdergangers'||locId==='NCRCF'||bId.includes('ncrcf')||role.includes('powder ganger'))return role.includes('trader')?ICONS.NPC.POWDER_TRADER:(role.includes('prisoner')||role.includes('convict')?ICONS.NPC.PRISONER:ICONS.NPC.POWDER_GANGER);
  if(fac==='kings'||role.includes('king'))return ICONS.NPC.KINGS;
  if(fac==='boomers'||locId==='NellisAFB'||bId.includes('nellis')||role.includes('boomer'))return role.includes('doctor')?ICONS.NPC.DOCTOR:(role.includes('mechanic')?ICONS.NPC.MECHANIC:ICONS.NPC.BOOMERS);
  if(role.includes('merchant')||role.includes('trader'))return ICONS.NPC.MERCHANT;
  if(role.includes('cook'))return ICONS.NPC.COOK;
  if(role.includes('robot'))return ICONS.NPC.ROBOT;
  if(role.includes('law')||role.includes('deputy')||role.includes('guard'))return ICONS.NPC.LAW;
  if(role.includes('doctor'))return ICONS.NPC.DOCTOR;
  if(role.includes('mechanic')||role.includes('engineer')||role.includes('technician'))return ICONS.NPC.MECHANIC;
  if(role.includes('ranch'))return ICONS.NPC.RANCHER;
  if(role.includes('entertainer'))return ICONS.NPC.ENTERTAINER;
  return npc.male?ICONS.NPC.MALE:ICONS.NPC.FEMALE;
}
function mkNPC(ctx={}){
  const male=R()<.5;
  const name=(male?rndA(FM):rndA(FF))+' '+rndA(LN);
  const role=rndA(getNpcRolePool(ctx));
  const npc={name,male,age:rnd(18,55),role,loc:ctx.loc||S.loc,fac:ctx.fac||((LOCS[ctx.loc||S.loc]||{}).fac)||''};
  npc.icon=inferNpcIcon(npc,ctx);
  return npc;
}
function getBuildingNpcKey(loc,bId,slot='main'){
  return `${loc||S.loc}::${bId}::${slot}`;
}
function getBuildingNpc(loc,bId,ctx={},slot='main'){
  if(!S.buildingNpcs)S.buildingNpcs={};
  const key=getBuildingNpcKey(loc,bId,slot);
  if(!S.buildingNpcs[key]){
    S.buildingNpcs[key]=mkNPC(Object.assign({},ctx,{loc:loc||S.loc,bId}));
  }
  return S.buildingNpcs[key];
}
function getBuildingNpcGroup(loc,bId,countFactory,ctx={},slot='group'){
  if(!S.buildingNpcs)S.buildingNpcs={};
  const key=getBuildingNpcKey(loc,bId,slot);
  if(!Array.isArray(S.buildingNpcs[key])||!S.buildingNpcs[key].length){
    const count=typeof countFactory==='function'?countFactory():countFactory;
    S.buildingNpcs[key]=Array.from({length:Math.max(1,count||1)},(_,i)=>mkNPC(Object.assign({},ctx,{loc:loc||S.loc,bId,slot:`${slot}_${i}`})));
  }
  return S.buildingNpcs[key];
}
function openNPCInteraction(npc,existing){
  let rel=existing;
  if(!rel){rel={name:npc.name,rel:'stranger',aff:0,male:npc.male,age:npc.age,role:npc.role,loc:npc.loc||S.loc,fac:npc.fac,icon:inferNpcIcon(npc),met:S.days};S.relationships.push(rel)}
  const aff=rel.aff;
  const canFlirt=npc.male!==S.isMale&&!S.spouse;

  let h=`<h3 style="display:flex;align-items:center;gap:8px"><span style="font-size:28px">${renderIcon(inferNpcIcon(npc),28)}</span><span style="color:var(--amber)">${npc.name}</span></h3>
  <div style="font-size:10px;color:var(--muted);margin-bottom:6px">${npc.role} · Age ${npc.age} · ${rel.rel}</div>
  ${aff?`<div class="hb" style="margin-bottom:8px"><div class="hf g" style="width:${aff}%"></div></div>`:''}
  <div class="npc-line">"${rndA(["Hey there.","What do you want?","Looking for something?","Watch yourself out there.","Got caps? I got time.","You look like trouble.","Need something?","Stay safe, stranger."])}"</div>`;

  h+=`<button class="bt" onclick="npcAct('chat','${npc.name.replace(/'/g,"\\'")}')">💬 Talk</button>`;

  if(canFlirt)h+=`<button class="bt" onclick="npcAct('flirt','${npc.name.replace(/'/g,"\\'")}')">💕 Flirt</button>`;
  h+=`<button class="bt" onclick="npcAct('drink','${npc.name.replace(/'/g,"\\'")}')">🍺 Share a drink (5 caps)</button>`;
  h+=`<button class="bt" onclick="npcAct('quest','${npc.name.replace(/'/g,"\\'")}')">📜 Ask for work</button>`;
  if(aff>=40)h+=`<button class="bt pip" onclick="npcAct('recruit','${npc.name.replace(/'/g,"\\'")}')">🤝 Recruit as companion</button>`;
  if(aff>=60&&canFlirt)h+=`<button class="bt" onclick="npcAct('propose','${npc.name.replace(/'/g,"\\'")}')">💍 Propose</button>`;
  h+=`<button class="bt dn" onclick="closeDlg()">Walk away</button>`;
  openDlg(h);
}
function npcAct(action,name){
  let rel=S.relationships.find(r=>r.name===name);
  if(!rel){rel={name,rel:'stranger',aff:0,male:R()<.5,age:rnd(20,50),role:'Wastelander',loc:S.loc,icon:null,met:S.days};S.relationships.push(rel)}
  let msg='',affChange=0;

  switch(action){
    case 'chat': affChange=rnd(3,8);msg=rndA(["You swap stories about the wasteland.","You talk about the NCR and Legion.","A pleasant conversation about survival.","You discuss trade routes."]);break;
    case 'compliment': if(R()<.8){affChange=rnd(5,12);msg=rndA(["They appreciate the kind words.","They smile.","That seemed to land well."])}else{affChange=-3;msg="They seem suspicious of flattery."};break;
    case 'flirt': if(R()<.5+(S.special?S.special[3]*.04:0)){affChange=rnd(8,18);msg=rndA(["They blush.","They lean closer.","Chemistry in the wasteland."])}else{affChange=-5;msg="Awkward silence."}break;
    case 'drink': if(S.caps<5){notify("Not enough caps.");return}S.caps-=5;affChange=rnd(5,15);msg="You share drinks. Trust builds.";break;
    case 'quest':
      if(R()<.5){
        const q=mkQuest(name);
        window._pendingQuest=q;closeDlg();showResult('New Quest!','📜',[`<b>${q.name}</b>`,q.desc,`💰 ${q.rg} caps · ⭐ ${q.rx} XP`],'Accept','acceptPendingQuest()');
        return;
      }else{msg="They don't have anything right now."};break;
    case 'recruit':
      if(S.companions.length>=2){notify("Max 2 companions.");return}
      if(rel.aff<40){notify("Not friendly enough.");return}
      S.companions.push({name,hp:40+S.level*5,maxHp:40+S.level*5,atk:5+S.level,def:3+Math.floor(S.level*.5),male:rel.male,role:rel.role||'Companion',loc:rel.loc||S.loc,fac:rel.fac,icon:rel.icon||inferNpcIcon(rel,{loc:rel.loc||S.loc})});
      rel.rel='companion';msg=name+" joins you!";log(name+' is now your companion.','q');break;
    case 'propose':
      if(R()<(rel.aff/100)){
        S.spouse={name,aff:rel.aff,male:rel.male};rel.rel='spouse';
        msg=name+" says yes!";log('Married '+name+'!','q');
      }else{msg="They're not ready.";affChange=-5}break;
  }
  rel.aff=Math.max(0,Math.min(100,rel.aff+affChange));
  if(affChange>0&&rel.rel==='stranger')rel.rel='acquaintance';
  if(rel.aff>=30&&rel.rel==='acquaintance')rel.rel='friend';
  if(rel.aff>=60&&rel.rel==='friend')rel.rel='close friend';
  log(msg,'e');save();
  closeDlg();
  if(msg)notify(msg);
  upAll();
}

function propertyOwned(id){return !!S.properties.find(p=>p.id===id)}
function getPropertyDef(id){return PROPERTY_DEFS.find(p=>p.id===id)||null}
function propertyAtLoc(loc){return S.properties.filter(p=>p.loc===loc)}
function canBuyProperty(def){
  if(!def||propertyOwned(def.id))return false;
  if(def.requires){
    const rep=S.rep[def.requires.fac]||0;
    if(rep<def.requires.rep)return false;
  }
  return S.caps>=def.cost;
}
function propertyReady(flagKey){return (S.flags[flagKey]||0)!==S.days}
function markPropertyUsed(flagKey){S.flags[flagKey]=S.days;queueSave()}
function getCurrentBounty(){
  const b=S.flags.bountyBoard?.current;
  if(!b)return null;
  return PRIMM_BOUNTY_TARGETS.find(t=>t.id===b.id)||null;
}
function rollNewBounty(){
  const board=S.flags.bountyBoard||(S.flags.bountyBoard={});
  const used=board.lastTarget||null;
  const pool=PRIMM_BOUNTY_TARGETS.filter(t=>t.id!==used);
  const pick=clone(rndA(pool.length?pool:PRIMM_BOUNTY_TARGETS));
  board.current={id:pick.id,day:S.days};
  board.lastTarget=pick.id;
  return pick;
}
function startPrimmBountyHunt(){
  if(!propertyOwned('primm_bounty_office')){notify('You do not own the bounty office.');return}
  const target=getCurrentBounty()||rollNewBounty();

  const en=mkEnemy(target.enemy);
  en.name=target.name;
  en.maxHp=Math.round(en.maxHp*1.2)+8;
  en.hp=en.maxHp;
  en.a+=3;
  en.d+=1;
  en.xp+=target.xp;
  en.loot=clone(target.itemPool||en.loot||[]);
  closeBld();
  combat={enemies:[en],turn:0,log:[`Bounty target spotted: ${target.name}.`,target.desc],bountyTarget:clone(target)};
  renderCombat();
}

  markPropertyUsed('prop_bos_energy_day');
  const amt=rnd(3,6);
  for(let i=0;i<amt;i++)S.inv.push('energy_cell');
  const bonus=rndA(['scrap_electronics','sensor_module','fission_battery']);
  S.inv.push(bonus);
  log('You collect a Brotherhood energy ration from your quarters.','e');
  closeBld();showResult('Brotherhood Energy Ration','⚡',[`Energy Cells ×${amt}`,`${ITEMS[bonus].e} ${ITEMS[bonus].n}`],'Continue','upAll()');
}
function claimBosMedCache(){

function bosRep(){return S.rep?.BOS||0}
function claimBosTechCache(){
  if(!propertyReady('prop_bos_tech_day')){notify('The workshop cache has already been checked today.');return}
  markPropertyUsed('prop_bos_tech_day');
  const picks=['energy_cell','energy_cell','scrap_electronics','sensor_module','conductor','fission_battery','bos_holotape','laser_focusing_lens','microfusion_regulator','servo_motor','scribe_data_slate','knight_toolkit'];
  const pick=rndA(picks);
  const extra=rnd(2,5);
  for(let i=0;i<extra;i++)S.inv.push('energy_cell');
  S.inv.push(pick);
  log('You pull calibrated parts and ammo from the Brotherhood workbench reserve.','e');
  closeBld();showResult('Tech Cache','🔧',[`Energy Cells ×${extra}`,`${ITEMS[pick].e} ${ITEMS[pick].n}`],'Continue','upAll()');
}
function bosTuneEnergyGear(){
  const tape=S.inv.indexOf('scrap_electronics');
  const cond=S.inv.indexOf('conductor');
  if(tape===-1||cond===-1){notify('Need Scrap Electronics and Conductors.');return}
  const hi=Math.max(tape,cond), lo=Math.min(tape,cond);
  S.inv.splice(hi,1);S.inv.splice(lo,1);
  const reward=rndA(['energy_cell','energy_cell','plasma_defender','laser_rcw']);
  if(reward==='energy_cell'){for(let i=0;i<8;i++)S.inv.push('energy_cell')} else S.inv.push(reward);
  S.xp+=12;
  log('You tune Brotherhood energy systems at the scribe workbench.','e');
  closeBld();showResult('Energy Calibration','⚡',[reward==='energy_cell'?'Energy Cells ×8':`${ITEMS[reward].e} ${ITEMS[reward].n}`,'⭐ +12 XP'],'Continue','chkLU();upAll()');
}
function claimBosEliteCache(){

}

function openPropertyMenu(){
  const o=$('BO');o.classList.add('A');const bi=$('BI');bi.innerHTML='';
  const hd=el('div','bh');
  hd.innerHTML=`<div class="bb" onclick="closeBld()">‹</div><div style="flex:1;font-size:14px;font-weight:bold;color:var(--amber)">🏠 PROPERTY</div><div style="font-size:11px;color:var(--amber)">💰${S.caps}</div>`;
  bi.appendChild(hd);
  const body=el('div','bp');
  const localOwned=propertyAtLoc(S.loc);
  const allOwned=S.properties||[];

  if(localOwned.length){
    body.appendChild(el('div','bs2','Owned Here'));
    localOwned.forEach(p=>{
      const card=el('div','cd');
      card.innerHTML=`<div style="font-weight:bold;font-size:12px">${p.name}</div><div style="font-size:10px;color:var(--muted)">${getPropertyDef(p.id)?.desc||''}</div>`;
      if(p.id==='goodsprings_shack'||p.id==='goodsprings_house'){
        const stash=el('button','bt','📦 Check stash');stash.onclick=claimPropertyStash;card.appendChild(stash);
      }
      if(p.id==='goodsprings_house'){
        const cache=el('button','bt','🥫 Pull house cache');cache.onclick=claimGoodspringsCache;card.appendChild(cache);
      }
      if(p.id==='goodsprings_workshop'){
        const repair=el('button','bt','🔧 Repair gear (10 caps + scrap)');
        repair.onclick=()=>{if(S.caps<10){notify('Not enough caps.');return}const si=S.inv.indexOf('scrap');if(si===-1){notify('Need Scrap Metal.');return}S.caps-=10;S.inv.splice(si,1);S.atk+=1;log('Repaired and improved gear. +1 ATK.','e');closeBld();showResult('Repaired','🔧',['⚔ +1 ATK','Used Scrap Metal'],'Continue','upAll()')};
        card.appendChild(repair);
        const ammo=el('button','bt','🔸 Craft 5 rounds (scrap + duct tape)');
        ammo.onclick=()=>{const si=S.inv.indexOf('scrap');const dt=S.inv.indexOf('duct_tape');if(si===-1||dt===-1){notify('Need Scrap Metal and Duct Tape.');return}S.inv.splice(Math.max(si,dt),1);S.inv.splice(Math.min(si,dt),1);const ammoPick=rndA(['ammo_9mm','ammo_357','ammo_556']);for(let i=0;i<5;i++)S.inv.push(ammoPick);log('Crafted ammunition at your Goodsprings workshop.','e');closeBld();showResult('Ammo Crafted','🔸',[`${ITEMS[ammoPick].n} ×5`],'Continue','upAll()')};
        card.appendChild(ammo);
      }
      if(p.id==='goodsprings_water_rights'){
        const water=el('button','bt','💧 Collect water share');water.onclick=drawGoodspringsWater;card.appendChild(water);
        const gather=el('button','bt','🌿 Gather at the spring');gather.onclick=gatherAtSpring;card.appendChild(gather);
      }
      if(p.id==='primm_bounty_office'){
        const board=getCurrentBounty()||rollNewBounty();
        card.appendChild(el('div','cd',`<div style="font-size:11px"><b>Current target:</b> ${board.name}</div><div style="font-size:10px;color:var(--muted)">${board.desc}</div>`));
        const hunt=el('button','bt dn','🎯 Hunt bounty target');hunt.onclick=startPrimmBountyHunt;card.appendChild(hunt);
        const evidence=el('button','bt','🗄 Open evidence locker');evidence.onclick=claimEvidenceLocker;card.appendChild(evidence);
      }
      if(p.id==='hidden_valley_quarters'){
        const energy=el('button','bt','⚡ Collect energy ration');energy.onclick=claimBosEnergyRation;card.appendChild(energy);
        const meds=el('button','bt','⚕️ Check med cache');meds.onclick=claimBosMedCache;card.appendChild(meds);
      }
      if(p.id==='hidden_valley_workbench'){
        const cache=el('button','bt','🔧 Open tech cache');cache.onclick=claimBosTechCache;card.appendChild(cache);
        const tune=el('button','bt','⚡ Tune energy gear');tune.onclick=bosTuneEnergyGear;card.appendChild(tune);
      }
      if(p.id==='hidden_valley_requisition'){
        const elite=el('button','bt','🛡 Open elite requisition');elite.onclick=claimBosEliteCache;card.appendChild(elite);
      }
      body.appendChild(card);
    });
  }

  if(allOwned.length){
    body.appendChild(el('div','bs2','All Owned Properties'));
    allOwned.forEach(p=>body.appendChild(el('div','cd',`<div style="font-weight:bold;font-size:12px">${p.name}</div><div style="font-size:10px;color:var(--muted)">${LOCS[p.loc]?.n||p.loc}</div>`)));
  }

  body.appendChild(el('div','bs2','Available Here'));
  const here=PROPERTY_DEFS.filter(p=>p.loc===S.loc);
  if(!here.length)body.appendChild(el('div','cd','<div style="font-size:11px;color:var(--muted)">No properties for sale in this location yet.</div>'));
  here.forEach(p=>{
    if(propertyOwned(p.id))return;
    const pc=el('div','cd');
    const req=p.requires?` · Requires ${FACTIONS[p.requires.fac]||p.requires.fac} ${p.requires.rep}+`:'';
    pc.innerHTML=`<div style="font-weight:bold;font-size:12px">${p.name} — ${p.cost} caps</div><div style="font-size:10px;color:var(--muted)">${p.desc}${req}</div>`;
    if(p.requires){
      const rep=S.rep[p.requires.fac]||0;
      pc.appendChild(el('div','cd',`<div style="font-size:10px">Standing with <b style="color:var(--amber)">${FACTIONS[p.requires.fac]||p.requires.fac}</b>: <b style="color:${rep>=p.requires.rep?'var(--green)':'var(--red)'}">${rep}/${p.requires.rep}</b></div>`));
    }
    const bb=el('button',canBuyProperty(p)?'bt go':'bt',canBuyProperty(p)?'Buy':'Cannot buy yet');
    bb.disabled=!canBuyProperty(p);
    bb.onclick=()=>{if(!canBuyProperty(p))return;S.caps-=p.cost;S.properties.push({id:p.id,name:p.name,loc:p.loc,cost:p.cost});log('Bought '+p.name+'!','q');closeBld();showResult('Purchased!','🏠',[p.name,'📍 '+LOCS[p.loc]?.n,p.requires?`Requirement met: ${FACTIONS[p.requires.fac]} ${p.requires.rep}+`: 'New property unlocked'],'Continue','upAll()')};
    pc.appendChild(bb);
    body.appendChild(pc);
  });
  bi.appendChild(body);
}
