<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./apple-touch-icon.png">
<meta name="theme-color" content="#1a1a0e">
<title>Fallout: New Vegas RPG</title>
<style>
:root{--bg:#1a1a0e;--panel:#242418;--panel2:#1e1e14;--amber:#f0c850;--amber2:#c9a230;--green:#4aff4a;--green2:#2ecc2e;--red:#ff4444;--blue:#4488cc;--text:#e8e4d0;--muted:#9a9680;--line:#3a3828;--pip:#14cc64;--hp-red:#cc3333;--ap-blue:#3388cc;--xp-gold:#ccaa33;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
@font-face{font-family:'Pip';src:local('Courier New'),local('Courier');font-weight:normal}
body{background:var(--bg);font-family:'Courier New',monospace;color:var(--text);min-height:100dvh;overscroll-behavior:none;font-size:14px}
#W{max-width:430px;margin:0 auto;min-height:100dvh;overflow:hidden;position:relative;
background:linear-gradient(180deg,#1a1a0e 0%,#141410 100%)}
#H{position:sticky;top:0;background:linear-gradient(180deg,#1a1808,#141408);
color:var(--amber);text-align:center;padding:calc(var(--st)+6px) 12px 5px;
font-size:13px;font-weight:bold;letter-spacing:3px;z-index:100;
border-bottom:1px solid #3a3418;text-transform:uppercase}
#H .sub{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:1px}
#NG{position:absolute;right:8px;bottom:5px;background:#2a1818;color:var(--red);border:1px solid #4a2828;border-radius:4px;font-family:'Courier New',monospace;font-size:9px;padding:4px 6px;letter-spacing:0;cursor:pointer}
#SB{background:#0e0e08;color:var(--text);font-size:11px;display:flex;flex-wrap:wrap;padding:3px 4px;gap:1px;border-bottom:1px solid #282818}
#SB .s{flex:1 1 auto;text-align:center;padding:3px 4px;white-space:nowrap}
#SB .s b{color:var(--amber)}
#SB .s .g{color:var(--green)}
#SB .s .r{color:var(--red)}
.scanline{position:fixed;top:0;left:50%;transform:translateX(-50%);width:430px;height:100%;
pointer-events:none;z-index:999;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px)}
#C{padding:10px;padding-bottom:calc(100px + var(--sb))}
.T{display:none}.T.A{display:block}
#N{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
background:linear-gradient(0deg,#0e0e06,#1a1a0e);display:flex;
border-top:1px solid var(--amber2);z-index:100;padding-bottom:var(--sb)}
#N button{flex:1;padding:8px 1px 6px;background:0 0;color:var(--muted);border:0;
font-size:10px;text-align:center;cursor:pointer;line-height:1.3;font-family:'Courier New',monospace}
#N button i{font-size:18px;display:flex;justify-content:center;align-items:center;height:26px;font-style:normal;margin-bottom:2px}
#N button.A{background:#2a2a10;color:var(--amber)}
.sh{color:var(--amber2);padding:4px 0;margin:12px 0 5px;font-size:11px;letter-spacing:2px;
text-transform:uppercase;border-bottom:1px solid #2a2818}
.cd{background:var(--panel);border:1px solid #2a2818;border-radius:6px;padding:8px;margin:4px 0}
.bt{display:block;width:100%;padding:11px 12px;margin:4px 0;background:#2a2a18;color:var(--text);
border:1px solid #3a3828;border-radius:4px;font-family:'Courier New',monospace;font-size:13px;
cursor:pointer;text-align:left;transition:transform 80ms;min-height:44px}
.bt:active{transform:scale(.97);filter:brightness(1.1)}
.bt.go{background:#2a3a18;color:var(--green);border-color:#3a4828}
.bt.dn{background:#3a1818;color:var(--red);border-color:#4a2828}
.bt.pip{background:#182a1a;color:var(--pip);border-color:#1a3a1a}
.bt:disabled{opacity:.4;transform:none}
.bt.sm{display:inline-block;width:auto;padding:6px 10px;font-size:11px;margin:2px;min-height:36px}
.hb{background:#1a1a10;border-radius:3px;height:9px;overflow:hidden;margin:3px 0;border:1px solid #2a2818}
.hf{height:100%;border-radius:2px;transition:width .3s}
.hf.hp{background:var(--hp-red)}.hf.ap{background:var(--ap-blue)}.hf.xp{background:var(--xp-gold)}
.hf.g{background:var(--green2)}.hf.lo{background:var(--amber2)}.hf.cr{background:var(--red)}
.bc{display:flex;align-items:center;gap:8px;padding:10px 10px;background:var(--panel);
border:1px solid #2a2818;border-radius:5px;margin:4px 0;cursor:pointer;min-height:48px}
.bc:active{background:#2a2a1a}
/* Overlays */
#CO{position:fixed;inset:0;background:rgba(5,5,2,.9);display:none;justify-content:center;
align-items:center;z-index:200;padding:12px;overflow-y:auto}
#CP{background:var(--panel);border:1px solid var(--amber2);border-radius:8px;padding:10px;
width:96%;max-width:400px;max-height:92vh;overflow-y:auto}
/* Building overlay */
#BO{position:fixed;inset:0;background:var(--bg);z-index:150;overflow-y:auto;display:none}
#BO.A{display:block}
.bh{display:flex;align-items:center;gap:8px;padding:calc(var(--st)+8px) 10px 8px;
background:#141408;border-bottom:1px solid #2a2818;position:sticky;top:0;z-index:10}
.bb{font-size:20px;color:var(--amber);cursor:pointer;padding:4px 8px}
.bp{padding:10px}
.bs2{color:var(--amber2);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
padding:3px 0;margin:10px 0 4px;border-bottom:1px solid #2a2818}
.ba{font-size:11px;color:var(--muted);font-style:italic;padding:6px 0;text-align:center;
border-bottom:1px solid #1a1810;margin-bottom:8px}
.bn{display:flex;align-items:center;gap:10px;padding:8px;background:#1a1a10;border-radius:6px;margin:4px 0}
/* Travel overlay */
#TO{position:fixed;inset:0;background:var(--bg);z-index:160;overflow-y:auto;display:none;
flex-direction:column;justify-content:center;align-items:center}
#TO.A{display:flex}
#TO>div{width:100%;max-width:430px;padding:20px 12px}
/* Dialog */
#DO{position:fixed;inset:0;background:rgba(5,5,2,.88);z-index:250;display:none;
justify-content:center;align-items:center;overflow-y:auto;padding:20px 10px}
#DO.A{display:flex}
#DB{background:var(--panel);border:1px solid var(--amber2);border-radius:8px;padding:14px;
width:94%;max-width:380px;max-height:85vh;overflow-y:auto}
/* Result popup */
#RP{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--panel);
border:1px solid var(--amber2);border-radius:10px;padding:18px;width:90%;max-width:340px;
z-index:350;text-align:center;box-shadow:0 0 30px rgba(0,0,0,.6);display:none;opacity:0;transition:opacity .2s}
#RP.show{display:block;opacity:1}
#RBG{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:340;display:none}
#RBG.show{display:block}
/* Ticker */
#TK{position:fixed;top:calc(var(--st) + 44px);left:50%;transform:translateX(-50%);
width:90%;max-width:400px;z-index:300;pointer-events:none}
#TK .tk{background:#1a2a10;color:var(--green);padding:6px 12px;border-radius:4px;
font-size:11px;text-align:center;opacity:0;transition:opacity .3s;border:1px solid #2a3a18}
#TK .tk.show{opacity:1}
/* Notification */
#NF{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--panel);
color:var(--amber);padding:10px 20px;border-radius:6px;font-size:12px;z-index:400;
opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid var(--amber2)}
#NF.show{opacity:1}
/* Log */
.log-group{margin:4px 0;border:1px solid #2a2818;border-radius:4px;overflow:hidden}
.log-header{display:flex;justify-content:space-between;align-items:center;padding:9px 10px;
background:var(--panel2);cursor:pointer;font-size:12px;min-height:44px}
.log-header:active{background:#1a1a12}
.log-entries{display:none;padding:5px 10px 8px;font-size:12px;line-height:1.6}
.log-entries.open{display:block}
.log-entry{padding:2px 0;border-bottom:1px dotted #1a1810}
.log-entry:last-child{border-bottom:none}
.combat-log{color:var(--red)}.event-log{color:var(--green2)}.quest-log{color:var(--blue)}
/* SPECIAL bars */
.sp-bar{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:12px}
.sp-label{width:16px;color:var(--amber);font-weight:bold;text-align:center}
.sp-fill-bg{flex:1;height:8px;background:#1a1a10;border-radius:3px;overflow:hidden;border:1px solid #2a2818}
.sp-fill{height:100%;background:var(--green2);border-radius:2px;transition:width .3s}
.sp-val{width:18px;text-align:right;color:var(--muted);font-size:11px}
/* Tap button */
.tap-btn{width:100%;padding:20px;background:linear-gradient(135deg,#2a3a18,#1a2a10);
color:var(--green);border:2px solid #3a4a28;border-radius:8px;font-family:'Courier New',monospace;
font-size:18px;font-weight:bold;cursor:pointer;text-align:center;letter-spacing:2px;
text-transform:uppercase;transition:transform 60ms,box-shadow 60ms}
.tap-btn:active{transform:scale(.95);box-shadow:0 0 20px rgba(74,255,74,.2) inset}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-30px)}}
.dmg-float{position:absolute;color:var(--red);font-weight:bold;font-size:14px;pointer-events:none;animation:dmgFloat .8s forwards}
.npc-line{font-size:12px;font-style:italic;color:var(--muted);padding:6px 8px;border-left:2px solid var(--amber2);margin:6px 0}
.qc{background:#1a1a10;border:1px solid #2a2818;border-radius:4px;padding:8px;margin:6px 0}
/* Inventory card */
.inv-card{background:var(--panel2);border:1px solid #2a2818;border-radius:5px;padding:6px 8px;margin:3px 0}
.inv-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
/* Combat */
.combat-panel{background:#1a0a0a;border:1px solid #3a1818;border-radius:6px;padding:10px;margin:4px 0}
.enemy-portrait{text-align:center;font-size:48px;margin:8px 0}
.icon-wrap{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;line-height:1;flex:0 0 auto}
.icon-wrap img,.icon-wrap svg{width:100%;height:100%;object-fit:contain;display:block}
.combat-bar{display:flex;gap:4px;margin:4px 0;flex-wrap:wrap}
.combat-bar .bt{flex:1;min-width:80px;text-align:center}
/* Combat */
.combat-panel{background:#1a0a0a;border:1px solid #3a1818;border-radius:6px;padding:10px;margin:4px 0}
.enemy-portrait{text-align:center;font-size:48px;margin:8px 0}
.icon-wrap{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;line-height:1;flex:0 0 auto}
.icon-wrap img,.icon-wrap svg{width:100%;height:100%;object-fit:contain;display:block}
.combat-bar{display:flex;gap:4px;margin:4px 0;flex-wrap:wrap}
.combat-bar .bt{flex:1;min-width:80px;text-align:center}
.corpse-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-top:8px}
.corpse-card{background:#15150d;border:1px solid #3a3828;border-radius:8px;padding:8px;text-align:center;position:relative}
.corpse-portrait{position:relative;width:72px;height:72px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;background:#0f0f08;border:1px solid #2a2818;border-radius:8px}
.corpse-portrait .icon-wrap{width:46px !important;height:46px !important;font-size:46px !important}
.loot-actions{display:flex;gap:8px;margin-top:10px}
.loot-actions .bt{flex:1;text-align:center}
.loot-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.loot-item{
  display:flex;align-items:center;gap:8px;
  background:#1a1a10;border:1px solid #3a3828;border-radius:6px;
  padding:10px;cursor:pointer;min-height:48px
}
.loot-item:active{transform:scale(.98);filter:brightness(1.08)}
.loot-item.taken{opacity:.45;filter:grayscale(.2)}
.loot-item-icon{
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  background:#0f0f08;border:1px solid #2a2818;border-radius:6px;font-size:20px;flex:0 0 auto
}
.loot-item-name{flex:1;font-size:12px}
.loot-item-tick{color:var(--green);font-size:18px}
@keyframes enemyShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-5px)}30%{transform:translateX(5px)}45%{transform:translateX(-4px)}60%{transform:translateX(4px)}75%{transform:translateX(-2px)}}
.enemy-hit{animation:enemyShake .24s ease both;filter:brightness(1.25)}
.enemy-crit{animation:enemyShake .32s ease both;filter:brightness(1.45) drop-shadow(0 0 8px rgba(240,200,80,.55));border-color:var(--amber)!important}
.crit-float{position:absolute;right:8px;top:4px;color:var(--amber);font-weight:bold;font-size:11px;letter-spacing:1px;pointer-events:none;animation:dmgFloat .8s forwards}
/* Perk screen */
#PO{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:none;
  justify-content:center;align-items:center;padding:16px}
#PO.A{display:flex}
#PP{background:var(--panel);border:2px solid var(--amber);border-radius:10px;
  padding:14px;width:96%;max-width:400px;max-height:90vh;overflow-y:auto}
.perk-card{background:#1e1e10;border:1px solid #3a3828;border-radius:8px;
  padding:12px 14px;margin:6px 0;cursor:pointer;transition:border-color .15s,background .15s;position:relative;min-height:52px}
.perk-card:active{transform:scale(.98)}
.perk-card.selected{border-color:var(--amber);background:#2a2a14}
.perk-card.locked{opacity:.38;cursor:not-allowed}
.perk-icon{font-size:28px;flex:0 0 auto;width:40px;text-align:center}
.perk-name{font-size:14px;font-weight:bold;color:var(--amber)}
.perk-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.45}
.perk-req{font-size:10px;color:var(--red);margin-top:3px}
/* Crafting */
.craft-card{background:#1a1a10;border:1px solid #2a2818;border-radius:6px;padding:8px 10px;margin:5px 0}
.craft-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.craft-mat{display:inline-flex;align-items:center;gap:3px;background:#141408;
  border:1px solid #2a2818;border-radius:4px;padding:2px 6px;font-size:10px}
.craft-mat.ok{border-color:#2a4a18;color:var(--green)}
.craft-mat.missing{border-color:#4a1818;color:var(--red)}

/* Encounter/icon image size safety */
#TS{display:flex;align-items:center;justify-content:center;min-height:74px;text-align:center}
#TS img,#TS svg,#TS .icon-wrap{
  width:64px!important;height:64px!important;
  max-width:64px!important;max-height:64px!important;
  object-fit:contain!important;display:block!important;margin:0 auto!important
}
#TT img,#TT svg,#TT .icon-wrap,
#TC img,#TC svg,#TC .icon-wrap{
  width:42px!important;height:42px!important;
  max-width:42px!important;max-height:42px!important;
  object-fit:contain!important;display:inline-flex!important;vertical-align:middle!important
}
.loot-item-icon img,.loot-item-icon svg,
.inv-card img,.inv-card svg,
.bc img,.bc svg,.bn img,.bn svg{
  width:28px!important;height:28px!important;
  max-width:28px!important;max-height:28px!important;
  object-fit:contain!important;display:inline-block!important;vertical-align:middle!important
}

/* Bigger clickable map-card icons (buildings, surroundings, travel routes).
   Does not affect the main location header icon. */
.card-icon-lg{
  width:118px!important;height:118px!important;min-width:118px!important;
  display:flex!important;align-items:center!important;justify-content:center!important;
  background:#111108;border:1px solid #2a2818;border-radius:10px;
  overflow:hidden;font-size:88px!important;line-height:1!important;
}
.card-icon-lg .icon-wrap,
.card-icon-lg img,
.card-icon-lg svg{
  width:108px!important;height:108px!important;
  max-width:108px!important;max-height:108px!important;
  object-fit:contain!important;display:block!important;margin:0 auto!important;
}
.bc.big-icon-card{min-height:128px;padding:8px 10px;gap:10px}
.bc.big-icon-card:active{background:#2a2a1a}
</style>
</head>
<body>
<div class="scanline"></div>
<div id="W">
<div id="H">FALLOUT: NEW VEGAS<div class="sub">Mojave Wasteland</div><button id="NG" onclick="confirmNewGame()">New Game</button></div>
<div id="SB"></div>
<div id="C">
<div id="world-tab" class="T A"></div>
<div id="char-tab" class="T"></div>
<div id="inv-tab" class="T"></div>
<div id="roads-tab" class="T"></div>
<div id="log-tab" class="T"></div>
</div>
</div>
<div id="N">
<button onclick="switchTab('world')" id="nb-world" class="A"><i><img src="NVImages/WorldIcon.png" style="width:26px;height:26px;object-fit:contain;display:block;margin:0 auto"></i>World</button>
<button onclick="switchTab('char')" id="nb-char"><i><img src="NVImages/CharIcon.png" style="width:26px;height:26px;object-fit:contain;display:block;margin:0 auto"></i>Char</button>
<button onclick="switchTab('inv')" id="nb-inv"><i><img src="NVImages/ItemsIcon.png" style="width:26px;height:26px;object-fit:contain;display:block;margin:0 auto"></i>Items</button>
<button onclick="switchTab('roads')" id="nb-roads"><i><img src="NVImages/TravelIcon.png" style="width:26px;height:26px;object-fit:contain;display:block;margin:0 auto"></i>Travel</button>
<button onclick="switchTab('log')" id="nb-log"><i><img src="NVImages/LogIcon.png" style="width:26px;height:26px;object-fit:contain;display:block;margin:0 auto"></i>People</button>
</div>
<div id="BO"><div id="BI"></div></div>
<div id="TO">
<div>
<div style="text-align:center;font-size:48px;margin:20px 0" id="TS">🏜</div>
<div style="text-align:center;font-size:14px;margin-bottom:12px" id="TT"></div>
<div class="hb" style="margin:8px 20px"><div class="hf g" id="TB" style="width:0%"></div></div>
<div id="TC" style="padding:0 10px"></div>
<button class="bt go" id="TN" style="display:none;text-align:center;margin:8px 10px" onclick="travelCont()">Continue</button>
</div>
</div>
<div id="DO"><div id="DB"></div></div>
<div id="CO"><div id="CP"></div></div>
<div id="RBG"></div><div id="RP"></div>
<div id="TK"><div class="tk" id="ticker-inner"></div></div>
<div id="NF"></div>
<div id="PO"><div id="PP"></div></div>
<script>
// ============================================================
// UTILITIES
// ============================================================
const $=id=>{const e=document.getElementById(id);return e};
const el=(t,c,h)=>{const e=document.createElement(t||'div');if(c)e.className=c;if(h)e.innerHTML=h;return e};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function rndA(a){if(!a||!a.length)return undefined;return a[Math.floor(Math.random()*a.length)]}
function R(){return Math.random()}
function clone(o){try{return JSON.parse(JSON.stringify(o))}catch(e){return o}}
function safeGet(el,fn){try{if(el)fn(el)}catch(e){}}
function notify(m,d=2200){const n=$('NF');if(!n)return;n.textContent=m;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),d)}
function showResult(title,emoji,lines,btnText,btnFn){
  const rp=$('RP');const bg=$('RBG');
  rp.innerHTML=`<div style="font-size:40px;margin-bottom:8px">${emoji}</div><div style="font-size:15px;font-weight:bold;margin-bottom:8px;color:var(--amber)">${title}</div>${lines.map(l=>'<div style="font-size:11px;margin:3px 0;color:var(--muted)">'+l+'</div>').join('')}<button class="bt go" style="margin-top:10px;text-align:center" onclick="closeResult();${btnFn||''}">${btnText||'Continue'}</button>`;
  rp.style.display='block';bg.style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{rp.classList.add('show');bg.classList.add('show')}));
}
function closeResult(){$('RP').classList.remove('show');$('RBG').classList.remove('show');setTimeout(()=>{$('RP').style.display='none';$('RBG').style.display='none'},200)}
function openDlg(h){const db=$('DB'),dlg=$('DO');if(!db||!dlg)return;db.innerHTML=h;dlg.classList.add('A')}
function closeDlg(){const dlg=$('DO');if(dlg)dlg.classList.remove('A')}

function getBonusLootPool(locId,area){
  const loc=LOCS[locId];
  const pool=['wonderglue','wrench','scrap_electronics','camera','silverware'];
  if(!loc)return pool.filter(id=>ITEMS[id]);
  if(loc.fac==='NCR'||loc.t==='base'||loc.t==='facility'||locId==='HeliosOne'){
    pool.push('fission_battery','conductor','scrap_electronics','wrench');
  }
  if(loc.fac==='Legion'){
    pool.push('legion_coin','silverware','gold_necklace');
  }
  if(loc.fac==='Khans'){
    pool.push('cigarette_pack','cigarette_carton','pre_war_money');
  }
  if(['town','city','district','trading_post','settlement'].includes(loc.t)){
    pool.push('cigarette_pack','camera','silver_watch','gold_necklace');
  }
  if(area&&/(house|hotel|motel|hall|lodge|office|barracks|cottages|station|school|casino|bar|store)/i.test(area.n)){
    pool.push('camera','pre_war_money','silver_watch');
  }
  return pool.filter(id=>ITEMS[id]);
}

function resumeExpeditionAfterCombat(){
  if(!window._resumeArea)return upAll();
  $('TO').classList.add('A');
  runExpedition(window._resumeArea,window._resumeStep||0);
}
function resumeTravelAfterCombat(){
  $('TO').classList.add('A');
  if(tQ.length) nextTEv();
  else finTravel();
}
function acceptPendingQuest(){
  if(!window._pendingQuest)return;
  accQuest(window._pendingQuest);
  window._pendingQuest=null;
}
function npcActPending(action){
  if(!window._npcTarget)return;
  npcAct(action,window._npcTarget);
}
function resetTransientState(){
  combat=null;
  tQ=[];
  tDest=null;
  window._resumeArea=null;
  window._resumeStep=0;
  window._pendingQuest=null;
  window._npcTarget=null;
  try{closeResult()}catch(e){}
  try{closeDlg()}catch(e){}
  if($('CO'))$('CO').style.display='none';
  if($('TO'))$('TO').classList.remove('A');
  if($('BO'))$('BO').classList.remove('A');
  if($('TN')){$('TN').style.display='none';$('TN').onclick=null;}
}
function startFreshGame(){
  try{localStorage.removeItem(SAVE_KEY);localStorage.removeItem(SAVE_BACKUP_KEY)}catch(e){}
  S=null;
  resetTransientState();
  if(typeof switchTab==='function')switchTab('world');
  newGame();
}

function gsEnsure(){
  if(!S.flags)S.flags={};
  if(!S.flags.goodsprings)S.flags.goodsprings={spoke:{}};
  return S.flags.goodsprings;
}
function gsNpcRel(id){return S.relationships.find(r=>r.name===GOODSPRINGS_NPCS[id].name)}
function addGoodspringsNpcCard(body,id){
  const npc=GOODSPRINGS_NPCS[id];if(!npc)return;
  const ex=gsNpcRel(id);
  const nc=el('div','bn');nc.style.cursor='pointer';
  nc.innerHTML=`<div style="font-size:28px">${renderIcon(npc.icon||(npc.male?ICONS.NPC.MALE:ICONS.NPC.FEMALE),28)}</div><div style="flex:1"><div style="font-weight:bold;font-size:12px">${npc.name}</div><div style="font-size:10px;color:var(--muted)">${npc.role}${ex?' · '+ex.rel:''}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;font-style:italic">${npc.line}</div></div><div style="color:var(--muted)">›</div>`;
  nc.onclick=()=>openGoodspringsNPC(id);
  body.appendChild(nc);
}
function gsFindQuest(id){return (S.quests||[]).find(q=>q.id===id)||null}
function gsQuestActive(id){const q=gsFindQuest(id);return !!(q&&!q.done)}
function gsKillSince(start,id){return Math.max(0,(S.kills[id]||0)-((start||{})[id]||0))}
function gsCompleteQuest(id){
  const q=gsFindQuest(id);if(!q||q.done)return;
  q.done=true;
  S.xp+=(q.rx||0);S.caps+=(q.rg||0);S.questsComplete=(S.questsComplete||0)+1;
  log('Quest complete: '+q.name+' (+'+(q.rg||0)+' caps, +'+(q.rx||0)+' XP)','q');
  notify('📜 Quest Complete!');
  chkLU();queueSave();
}

function gsGhostQuest(){return gsFindQuest('gs_ghost_town_gunfight')}
function gsGhostActive(){const q=gsGhostQuest();return !!(q&&!q.done)}
function gsGhostDone(){const q=gsGhostQuest();return !!(q&&q.done)}
function gsGhostCount(){return ['gs_ghost_trudy','gs_ghost_sunny','gs_ghost_chet','gs_ghost_pete'].filter(hasFlag).length}
function gsGhostLine(){
  const bits=[];
  if(hasFlag('gs_ghost_trudy'))bits.push('Trudy rallied');
  if(hasFlag('gs_ghost_sunny'))bits.push('Sunny ready');
  if(hasFlag('gs_ghost_chet'))bits.push('Chet supplied');
  if(hasFlag('gs_ghost_pete'))bits.push('Easy Pete armed');
  return bits.length?bits.join(', '):'No town help recruited yet';
}
function gsUpdateGhostQuest(){
  const q=gsGhostQuest();if(!q||q.done)return;
  const n=gsGhostCount();
  q.progText=`Recruit Goodsprings help, then start the fight from the Prospector Saloon (${n}/4 helped: ${gsGhostLine()}).`;
}
function gsStartGhostQuest(){
  if(gsGhostDone()){closeDlg();showResult('Ringo','📦',['The Powder Ganger trouble is already settled.','Goodsprings still remembers who stood with them.'],'Continue','upAll()');return}
  if(gsGhostActive()){gsUpdateGhostQuest();closeDlg();showResult('Ghost Town Gunfight','📜',[gsGhostQuest().progText],'Continue','upAll()');return}
  S.quests.push({id:'gs_ghost_town_gunfight',name:'Ghost Town Gunfight',desc:'Ringo is hiding in Goodsprings while Joe Cobb and the Powder Gangers threaten the town. Recruit help, then defend the Prospector Saloon.',t:'custom',progText:'Recruit Goodsprings help, then start the fight from the Prospector Saloon (0/4 helped).',rg:160,rx:75,fac:'NCR',repBonus:8,giver:'Ringo',done:false});
  log('Accepted: Ghost Town Gunfight','q');
  closeDlg();showResult('New Quest!','📜',['<b>Ghost Town Gunfight</b>','Ringo needs help against Joe Cobb. Talk to Trudy, Sunny Smiles, Chet, and Easy Pete before starting the fight at the saloon.'],'Continue','upAll()');
}
function gsRecruitGhost(id,label,lines,item){
  if(!gsGhostActive()){notify('No active town defence quest.');return}
  const flag='gs_ghost_'+id;
  if(hasFlag(flag)){notify(label+' is already helping.');return}
  setFlag(flag);
  if(item)giveItem(item,1,{ignoreLimit:true});
  gsUpdateGhostQuest();
  log(label+' agreed to help defend Goodsprings.','q');
  closeDlg();showResult('Help Recruited','🤝',lines,'Continue','upAll()');
}
function gsStartGhostFight(){
  const q=gsGhostQuest();
  if(!q||q.done){notify('No Goodsprings fight to start.');return}
  const n=gsGhostCount();
  if(n<2){notify('Recruit at least 2 townsfolk first.');return}
  setFlag('gs_ghost_fight_started');
  closeBld();closeDlg();
  const gang=[mkEnemy('joe_cobb'),mkEnemy('powder_ganger'),mkEnemy('powder_ganger')];
  if(n<4)gang.push(mkEnemy('powder_ganger'));
  combat={enemies:gang,turn:0,log:[`Joe Cobb and the Powder Gangers march on Goodsprings.`,`${gsGhostLine()}.`],questComplete:'gs_ghost_town_gunfight'};
  renderCombat();
}
function gsFinishGhostQuest(lines){
  const q=gsGhostQuest();if(!q||q.done)return lines;
  setFlag('gs_ghost_fight_won');
  const idx1=S.inv.indexOf('goodsprings_town_supplies');if(idx1!==-1)S.inv.splice(idx1,1);
  const idx2=S.inv.indexOf('goodsprings_dynamite_bundle');if(idx2!==-1)S.inv.splice(idx2,1);
  completeQuest(q);
  giveItem('varmint_rifle',1,{ignoreLimit:true});
  giveItem('ammo_556',3,{ignoreLimit:true});
  S.karma=(S.karma||0)+5;
  lines.push('📜 Ghost Town Gunfight complete');
  lines.push('🔫 Varmint Rifle');
  lines.push('🔸 5.56mm Rounds x3');
  lines.push('⚖ +5 karma');
  return lines;
}
function gsRefreshState(){
  const q1=gsFindQuest('gs_source_clear');
  if(q1&&!q1.done){
    const geckos=gsKillSince(q1.ks,'gecko');
    const scorps=gsKillSince(q1.ks,'bark_scorpion');
    q1.progText=`Kill geckos and a bark scorpion near Goodsprings Source (${Math.min(geckos,2)}/2 geckos, ${Math.min(scorps,1)}/1 bark scorpion).`;
    if(geckos>=2&&scorps>=1)gsCompleteQuest('gs_source_clear');
  }
  const q2=gsFindQuest('gs_schoolhouse_clear');
  if(q2&&!q2.done){
    const mantis=gsKillSince(q2.ks,'mantis');
    q2.progText=`Thin out the schoolhouse mantises (${Math.min(mantis,2)}/2).`;
    if(mantis>=2)gsCompleteQuest('gs_schoolhouse_clear');
  }
  const q3=gsFindQuest('gs_powder_road');
  if(q3&&!q3.done){
    const pg=gsKillSince(q3.ks,'powder_ganger');
    const conv=gsKillSince(q3.ks,'convict');
    q3.progText=`Break up the raiders hitting roads near Goodsprings (${Math.min(pg,2)}/2 Powder Gangers, ${Math.min(conv,1)}/1 convict).`;
    if(pg>=2&&conv>=1)gsCompleteQuest('gs_powder_road');
  }
  gsUpdateGhostQuest();
}
function gsStartQuest(id){
  if(gsFindQuest(id))return;
  if(id==='gs_source_clear')S.quests.push({id:'gs_source_clear',name:'Clean Water, Clear Source',desc:'Sunny Smiles wants the creatures around Goodsprings Source culled before they turn a water run into a funeral.',t:'custom',progText:'Kill geckos and a bark scorpion near Goodsprings Source (0/2 geckos, 0/1 bark scorpion).',rg:90,rx:20,done:false,ks:{gecko:S.kills['gecko']||0,bark_scorpion:S.kills['bark_scorpion']||0}});
  if(id==='gs_schoolhouse_clear')S.quests.push({id:'gs_schoolhouse_clear',name:'Schoolhouse Sweep',desc:'Doc Mitchell wants the abandoned schoolhouse made a little less lethal for anyone stupid enough to poke around in it.',t:'custom',progText:'Thin out the schoolhouse mantises (0/2).',rg:85,rx:18,done:false,ks:{mantis:S.kills['mantis']||0}});
  if(id==='gs_powder_road')S.quests.push({id:'gs_powder_road',name:'Roadside Trouble',desc:'Trudy wants the raiders and Powder Gangers around the Goodsprings roads knocked down before trade gets strangled completely.',t:'custom',progText:'Break up the raiders hitting roads near Goodsprings (0/2 Powder Gangers, 0/1 convict).',rg:120,rx:26,done:false,ks:{powder_ganger:S.kills['powder_ganger']||0,convict:S.kills['convict']||0}});
  log('Accepted: '+gsFindQuest(id).name,'q');notify('📜 Quest accepted!');queueSave();
}

  }else if(id==='sunny_smiles'){

function primmFindQuest(id){return (S.quests||[]).find(q=>q.id===id)||null}

function primmKindActive(){const q=primmKindQuest();return !!(q&&!q.done)}
function primmKindDone(){const q=primmKindQuest();return !!(q&&q.done)}

function primmRefreshKindQuest(){
  const q=primmKindQuest();if(!q||q.done)return;
  if(hasFlag('primm_sheriff_chosen'))q.progText='Return to Johnson Nash at Vikki & Vance and tell him Primm has a sheriff.';
  else if(hasFlag('primm_beagle_freed_for_quest'))q.progText='Choose Primm\'s new sheriff: reprogram Primm Slim, ask NCR under Hayes, or recruit Meyers from NCRCF.';

}
function primmFreeBeagleQuest(){
  const q=primmKindQuest();
  if(!q||q.done){notify('No active reason to risk that storage room.');return}
  if(hasFlag('primm_beagle_freed_for_quest')){notify('Deputy Beagle is already free.');return}
  setFlag('primm_beagle_freed_for_quest');setFlag('bison_beagle_rescued');
  giveItem('primm_sheriff_papers',1,{ignoreLimit:true});

}
function primmChooseSheriff(who){
  const q=primmKindQuest();
  if(!q||q.done){notify('Primm is not waiting on your decision.');return}

}
function primmFinishKindQuest(){
  const q=primmKindQuest();
  if(!q||q.done){closeDlg();showResult('Johnson Nash','📦',['Nash says Primm is trading again, slowly but surely.'],'Continue','upAll()');return}

function hvEnsure(){

function hvFindQuest(id){return (S.quests||[]).find(q=>q.id===id)||null}
function hvQuestDone(id){const q=hvFindQuest(id);return !!(q&&q.done)}
function hvQuestActive(id){const q=hvFindQuest(id);return !!(q&&!q.done)}

function hvCompleteManualQuest(id,repBonus){
  const q=hvFindQuest(id);if(!q||q.done)return;
  q.done=true;
  S.xp+=(q.rx||0);
  S.caps+=(q.rg||0);
  if(repBonus)S.rep.BOS=(S.rep.BOS||0)+repBonus;
  S.questsComplete=(S.questsComplete||0)+1;
  log('Quest complete: '+q.name+' (+'+(q.rg||0)+' caps, +'+(q.rx||0)+' XP)','q');
  notify('📜 Quest Complete!');

}
function hvRefreshState(){
  const hv=hvEnsure();
  const q0=hvFindQuest('hv_access');
  if(q0&&!q0.done){
    const start=q0.ks||{};
    const cleared=Math.max(0,((S.kills['bark_scorpion']||0)-(start.bark_scorpion||0))+((S.kills['radscorpion']||0)-(start.radscorpion||0)));
    q0.progText=`Clear Hidden Valley threats (${Math.min(cleared,3)}/3).`;
  }
  const q1=hvFindQuest('hvq1');
  if(q1&&!q1.done){
    const count=(hv.spoke.hardin?1:0)+(hv.spoke.veronica?1:0);
    q1.progText=`Talk to Veronica and Hardin (${count}/2).`;

function hvHasAccess(){

}
function hvEntryProgress(){

function openHiddenValleyNPC(id,topic='root'){
  hvRefreshState();
  const npc=HIDDEN_VALLEY_NPCS[id]; if(!npc)return;
  const rel=hvNpcRel(id);
  const title=`<h3 style="display:flex;align-items:center;gap:8px"><span>${renderIcon(npc.icon||(npc.male?ICONS.NPC.MALE:ICONS.NPC.FEMALE),28)}</span><span style="color:var(--amber)">${npc.name}</span></h3><div style="font-size:10px;color:var(--muted);margin-bottom:6px">${npc.role}${npc.age?` · Age ${npc.age}`:''}${rel?` · ${rel.rel}`:''}</div>`;
  let h=title;
  const back=`<button class="bt" onclick="openHiddenValleyNPC('${id}','root')">↩ Back</button><button class="bt dn" onclick="closeDlg()">Walk away</button>`;
  if(topic==='root'){
    h+=`<div class="npc-line">"${npc.line}"</div>`;
    if(id==='elder_mcnamara'){
      h+=`<button class="bt" onclick="openHiddenValleyNPC('elder_mcnamara','elder')">🛡 Ask about bunker leadership</button>`;
      h+=`<button class="bt" onclick="openHiddenValleyNPC('elder_mcnamara','mission')">📜 Ask what the Brotherhood wants</button>`;

      if(hvQuestActive('hvq1'))h+=`<button class="bt pip" onclick="openHiddenValleyNPC('elder_mcnamara','quest1')">📜 Discuss Eyes Inside the Bunker</button>`;
      if(hvEnsure().stage>=4&&!hvFindQuest('hvq5'))h+=`<button class="bt pip" onclick="hvStartQuest5();openHiddenValleyNPC('elder_mcnamara','quest5')">📜 Raise the issue of leadership</button>`;
      if(hvQuestActive('hvq5'))h+=`<button class="bt pip" onclick="openHiddenValleyNPC('elder_mcnamara','quest5')">📜 Discuss Chain of Command</button>`;
    }else if(id==='head_paladin_hardin'){
      h+=`<button class="bt" onclick="openHiddenValleyNPC('head_paladin_hardin','hardin')">⚔ Ask why he challenges McNamara</button>`;
      h+=`<button class="bt" onclick="hvEnsure().spoke.hardin=true;hvRefreshState();openHiddenValleyNPC('head_paladin_hardin','speak')">💬 Ask about patrol duty</button>`;
      if(hvQuestActive('hvq5'))h+=`<button class="bt pip" onclick="openHiddenValleyNPC('head_paladin_hardin','quest5')">📜 Discuss bunker politics</button>`;
    }else if(id==='senior_knight_lorenzo'){
      h+=`<button class="bt" onclick="openHiddenValleyNPC('senior_knight_lorenzo','security')">🪖 Ask about valley security</button>`;
      h+=`<button class="bt" onclick="openHiddenValleyNPC('senior_knight_lorenzo','supplies')">📦 Ask about patrol supply lines</button>`;
      if(hvEnsure().stage>=2&&!hvFindQuest('hvq3'))h+=`<button class="bt pip" onclick="hvStartQuest3();closeDlg();notify('Valley Sweep accepted.');upAll()">📜 Volunteer for a valley sweep</button>`;
      if(hvQuestActive('hvq3'))h+=`<button class="bt pip" onclick="closeDlg();showResult('Valley Sweep','🏜',['Lorenzo wants 2 radscorpions taken off the valley approaches before somebody gets dragged into the sand.'],'Continue','upAll()')">📜 Review Valley Sweep</button>`;
    }else if(id==='knight_torres'){
      h+=`<button class="bt" onclick="openHiddenValleyNPC('knight_torres','armory')">⚙ Ask about armory clearance</button>`;
      h+=`<button class="bt go" onclick="closeDlg();openBld('bos_armory')">⚡ Browse Brotherhood stock</button>`;
    }else if(id==='scribe_ibsen'){
      h+=`<button class="bt" onclick="openHiddenValleyNPC('scribe_ibsen','diagnostics')">🔬 Ask what he is working on</button>`;

      if(hvQuestActive('hvq2'))h+=`<button class="bt pip" onclick="openHiddenValleyNPC('scribe_ibsen','quest2')">📜 Discuss Ibsen's Diagnostics</button>`;

      h+=`<button class="bt" onclick="hvEnsure().spoke.veronica=true;hvRefreshState();openHiddenValleyNPC('veronica','veronica')">💬 Ask how she feels about the Brotherhood</button>`;

    h+=`<div class="npc-line">"Leadership is not volume, it is discipline. The Brotherhood lasts because it does not panic every time the wasteland changes shape."</div>${back}`;

    h+=`<div class="npc-line">"We preserve dangerous knowledge because the people outside these walls have already proven what happens when they are trusted with too much of it."</div>${back}`;

  } else if(id==='head_paladin_hardin'&&topic==='hardin'){
    h+=`<div class="npc-line">"McNamara keeps the bunker breathing. Fine. But breathing isn't the same as living, and it sure isn't the same as winning."</div>${back}`;
  } else if(id==='head_paladin_hardin'&&topic==='speak'){
    h+=`<div class="npc-line">"Patrol duty out here means watching the same hills until something finally tries to kill you from behind one."</div>${back}`;
  } else if(id==='head_paladin_hardin'&&topic==='quest5'){
    if(!hvEnsure().side){h+=`<div class="npc-line">"If you're going to stand for something, stand for action. The Mojave won't wait for McNamara to finish being careful."</div><button class="bt pip" onclick="hvChooseSide('hardin')">⚔ Back Hardin</button>${back}`;}
    else if(hvEnsure().side==='hardin'&&hvEnsure().veronicaCounsel){h+=`<div class="npc-line">"Good. Then maybe this bunker remembers it was built by soldiers, not archivists."</div><button class="bt go" onclick="hvFinishQuest5()">⚔ Confirm your support</button>${back}`;}
    else{h+=`<div class="npc-line">"Talk all you want. Just don't pretend this bunker can stay buried forever."</div>${back}`;}
  } else if(id==='senior_knight_lorenzo'&&topic==='security'){
    h+=`<div class="npc-line">"The valley looks quiet right up until it isn't. Scorpions, raiders, stray patrols — none of them care what the bunker is supposed to be."</div>${back}`;
  } else if(id==='senior_knight_lorenzo'&&topic==='supplies'){
    h+=`<div class="npc-line">"Supply lines are simple: if they break, people start counting bullets and medicine instead of plans."</div>${back}`;
  } else if(id==='knight_torres'&&topic==='armory'){
    h+=`<div class="npc-line">"You don't get Brotherhood kit because you ask nicely. You get it because somebody here decided you wouldn't disgrace it."</div>${back}`;
  } else if(id==='scribe_ibsen'&&topic==='diagnostics'){
    h+=`<div class="npc-line">"I'm keeping the bunker systems from turning one bad cable into a week of people shouting at me in the dark."</div>${back}`;
  } else if(id==='scribe_ibsen'&&topic==='quest2'){
    const hasReq=(S.inv.indexOf('sensor_module')!==-1&&S.inv.indexOf('scrap_electronics')!==-1);
    h+=`<div class="npc-line">"Bring me a Sensor Module and Scrap Electronics and maybe I can stop the diagnostics board from lying to me."</div>${hasReq?'<button class="bt go" onclick="hvTurnInQuest2()">🔧 Hand over the parts</button>':''}${back}`;
  } else if(id==='veronica'&&topic==='veronica'){
    h+=`<div class="npc-line">"I love these people. That's what makes it so frustrating watching them confuse survival with shrinking."</div>${back}`;
  } else if(id==='veronica'&&topic==='outside'){
    h+=`<div class="npc-line">"The outside world is messy, loud, dangerous, and full of people who might actually be worth helping. Weird, right?"</div>${back}`;
  } else if(id==='veronica'&&topic==='quest4'){
    const hasReq=(S.inv.indexOf('fission_battery')!==-1&&S.inv.indexOf('conductor')!==-1);
    h+=`<div class="npc-line">"I can get an archive station running again if you bring me a Fission Battery and some Conductors. It might even help people remember why knowledge matters."</div>${hasReq?'<button class="bt go" onclick="hvTurnInQuest4()">⚡ Hand over the parts</button>':''}${back}`;
  } else if(id==='veronica'&&topic==='quest5'){
    h+=`<div class="npc-line">"McNamara keeps people alive. Hardin wants them to matter again. Pick whichever answer you can live with after the bunker doors shut behind you."</div><button class="bt" onclick="hvHearVeronicaCounsel()">💬 Hear Veronica out</button>${back}`;
  }
  openDlg(h);
}

function serializeSave(){try{return JSON.stringify(S)}catch(e){return null}}
function canUseStorage(){
  try{return typeof localStorage!=='undefined'}catch(e){return false}
}
function safeParse(raw){
  if(!raw||typeof raw!=='string')return null;
  try{return JSON.parse(raw)}catch(e){return null}
}
function makeSaveEnvelope(raw){
  return JSON.stringify({stamp:Date.now(),version:2,raw});
}
function unpackSaveEnvelope(packed){
  const parsed=safeParse(packed);
  if(!parsed)return null;
  if(typeof parsed.raw==='string')return parsed;
  if(typeof packed==='string')return {stamp:0,version:1,raw:packed};
  return null;
}
function collectStorageCandidates(){
  const out=[];
  if(!canUseStorage())return out;
  [SAVE_KEY,SAVE_BACKUP_KEY,SAVE_MIRROR_KEY,...SAVE_SLOT_KEYS].forEach(key=>{
    const packed=localStorage.getItem(key);
    const env=unpackSaveEnvelope(packed);
    if(env&&env.raw)out.push({raw:env.raw,stamp:env.stamp||0,src:key});
  });
  return out.sort((a,b)=>b.stamp-a.stamp);
}
function writeLocalCopies(raw,stamp){
  if(!canUseStorage())return;
  const packed=JSON.stringify({stamp,version:2,raw});
  localStorage.setItem(SAVE_KEY,packed);
  localStorage.setItem(SAVE_BACKUP_KEY,packed);
  localStorage.setItem(SAVE_MIRROR_KEY,packed);
  localStorage.setItem(SAVE_SLOT_KEYS[_slotCursor%SAVE_SLOT_KEYS.length],packed);
  localStorage.setItem(SAVE_META_KEY,JSON.stringify({stamp,slot:_slotCursor%SAVE_SLOT_KEYS.length}));
  _slotCursor++;
}
function getSaveDb(){
  if(_dbPromise)return _dbPromise;
  _dbPromise=new Promise(resolve=>{
    if(!window.indexedDB){resolve(null);return}
    try{
      const req=indexedDB.open(SAVE_DB_NAME,1);
      req.onupgradeneeded=()=>{
        const db=req.result;
        if(!db.objectStoreNames.contains(SAVE_DB_STORE))db.createObjectStore(SAVE_DB_STORE);
      };
      req.onsuccess=()=>resolve(req.result);
      req.onerror=()=>resolve(null);
    }catch(e){resolve(null)}
  });
  return _dbPromise;
}
async function saveToIndexedDb(raw){
  const db=await getSaveDb();
  if(!db)return false;
  return await new Promise(resolve=>{
    try{
      const tx=db.transaction(SAVE_DB_STORE,'readwrite');
      const store=tx.objectStore(SAVE_DB_STORE);
      const stamp=Date.now();
      SAVE_DB_SLOTS.forEach((slot,i)=>store.put({raw,stamp:stamp-i},slot));
      tx.oncomplete=()=>resolve(true);
      tx.onerror=()=>resolve(false);
      tx.onabort=()=>resolve(false);
    }catch(e){resolve(false)}
  });
}
async function loadFromIndexedDb(){
  const db=await getSaveDb();
  if(!db)return null;
  return await new Promise(resolve=>{
    try{
      const tx=db.transaction(SAVE_DB_STORE,'readonly');
      const store=tx.objectStore(SAVE_DB_STORE);
      const reqs=SAVE_DB_SLOTS.map(slot=>new Promise(done=>{
        try{
          const req=store.get(slot);
          req.onsuccess=()=>done(req.result&&req.result.raw?{raw:req.result.raw,stamp:req.result.stamp||0,src:'idb:'+slot}:null);
          req.onerror=()=>done(null);
        }catch(e){done(null)}
      }));
      Promise.all(reqs).then(rows=>{
        const best=rows.filter(Boolean).sort((a,b)=>b.stamp-a.stamp)[0]||null;
        resolve(best?best.raw:null);
      });
    }catch(e){resolve(null)}
  });
}
function save(force=false){
  if(!S)return false;
  const now=Date.now();
  if(!force&&now-_lastSaveStamp<150)return true;
  try{
    const raw=serializeSave();
    if(!raw)return false; // serializeSave failed
    _lastSerialized=raw;
    writeLocalCopies(raw,now);
    saveToIndexedDb(raw);
    _lastSaveStamp=now;
    return true;
  }catch(e){
    try{
      const raw=_lastSerialized||serializeSave();
      if(raw){writeLocalCopies(raw,Date.now());saveToIndexedDb(raw)}
    }catch(err){}
    return false
  }
}
function queueSave(delay=180){
  if(!S)return;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>save(true),delay);
}
function snapshotState(){
  if(!S)return;
  try{window.name='fnv_rpg::'+serializeSave()}catch(e){}
}
function recoverWindowSnapshot(){
  try{
    if(typeof window.name!=='string'||!window.name.startsWith('fnv_rpg::'))return false;
    const raw=window.name.slice(9);
    const parsed=safeParse(raw);
    if(!parsed)return false;
    S=parsed;
    migrate();
    save(true);
    return true;
  }catch(e){return false}
}
function startAutoSaveLoop(){
  clearInterval(_autoSaveTimer);
  _autoSaveTimer=setInterval(()=>{save(true);snapshotState()},3000);
}
function bindAutoSave(){
  const hardSave=()=>{save(true);snapshotState()};
  ['pagehide','beforeunload','blur','focusout','unload'].forEach(ev=>window.addEventListener(ev,hardSave,{capture:true}));
  ['visibilitychange','webkitvisibilitychange','freeze','resume','pause'].forEach(ev=>document.addEventListener(ev,()=>{
    if(ev==='visibilitychange'||ev==='webkitvisibilitychange'){
      if(document.visibilityState==='hidden')hardSave();
      return;
    }
    hardSave();
  },{capture:true}));
  ['pageshow','focus','online'].forEach(ev=>window.addEventListener(ev,()=>{if(S){save(true);snapshotState()}},{capture:true}));
  ['touchend','click'].forEach(ev=>document.addEventListener(ev,()=>queueSave(120),{capture:true,passive:true}));
}
function load(){
  const candidates=collectStorageCandidates();
  for(const row of candidates){
    try{
      S=JSON.parse(row.raw);
      migrate();
      _lastSerialized=row.raw;
      return true;
    }catch(e){}
  }
  return recoverWindowSnapshot();
}
async function loadAsync(){
  if(load())return true;
  const raw=await loadFromIndexedDb();
  if(!raw)return recoverWindowSnapshot();
  try{
    S=JSON.parse(raw);
    migrate();
    _lastSerialized=raw;
    writeLocalCopies(raw,Date.now());
    snapshotState();
    return true;
  }catch(e){return recoverWindowSnapshot()}
}

    if(navigator.storage&&navigator.storage.persist)await navigator.storage.persist();

}

// ============================================================
// STAT HELPERS
// ============================================================
function calcMaxHp(){return 100+((S&&S.special)?S.special[2]:5)*20+Math.max(0,((S&&S.level)||1)-1)*5}
function calcMaxAp(){return 65+((S&&S.special)?S.special[5]:5)*3}
function itemWeight(id){
  const it=ITEMS[id];
  return it&&typeof it.w==='number'?it.w:0;
}
function carryCapacity(){
  return calcCarryCap();
}
function currentCarryWeight(){
  if(!S)return 0;
  let total=0;
  (S.inv||[]).forEach(id=>{total+=itemWeight(id)});
  if(S.gear){
    ['w','body','head'].forEach(slot=>{if(S.gear[slot])total+=itemWeight(S.gear[slot])});
  }
  return Math.round(total*10)/10;
}
function carryPct(){
  const cap=carryCapacity()||1;
  return Math.max(0,Math.min(100,Math.round((currentCarryWeight()/cap)*100)));
}
function fmtWeight(n){
  return Number.isInteger(n)?String(n):n.toFixed(1);
}
function overEncumbered(){
  return currentCarryWeight()>carryCapacity();
}
function giveItem(id,count=1,opts={}){
  if(!S||!ITEMS[id])return 0;
  let added=0;
  const ignoreLimit=!!opts.ignoreLimit;
  for(let i=0;i<count;i++){
    if(ignoreLimit||currentCarryWeight()+itemWeight(id)<=carryCapacity()){
      S.inv.push(id);
      added++;
    }else{
      if(!opts.silent)notify(`Too heavy for ${ITEMS[id].n}.`);
      break;
    }
  }
  return added;
}
function atkPow(){const w=getEquippedWeapon&&getEquippedWeapon();let a=w?(w.a||1):(1+Math.max(0,Math.floor(((S.special?S.special[0]:5)-5)/2)));a+=S.atk||0;return Math.max(1,Math.round(a))}
function defPow(){let d=S.def||0;if(S.gear.body){const a=ITEMS[S.gear.body];if(a)d+=a.d||0}if(S.gear.head){const h=ITEMS[S.gear.head];if(h)d+=h.d||0}return Math.max(0,Math.round(d))}
function xpNeed(l){return Math.floor(200*l)}
function grantXP(amount){
  const bonus=S.xpPerk||0;
  return Math.max(0,Math.round(amount*(1+bonus/100))+(S.flatXpBonus||0));
}
function hpPct(h,m){return Math.max(0,Math.min(100,Math.round(h/m*100)))}
function countItem(id){return S&&S.inv?S.inv.filter(x=>x===id).length:0}
function getEquippedWeapon(){return S&&S.gear&&S.gear.w?ITEMS[S.gear.w]||null:null}
function getEquippedWeaponAmmoId(){const w=getEquippedWeapon();return w&&w.ammo?w.ammo:null}
function getEquippedWeaponAmmoCount(){const ammoId=getEquippedWeaponAmmoId();return ammoId?countItem(ammoId):0}
function getCombatAttackProfile(consumeAmmo){
  const w=getEquippedWeapon();
  const baseUnarmed=1+Math.max(0,Math.floor(((S.special?S.special[0]:5)-5)/2))+(S.unarmedBonus||0);
  if(!w)return{atk:baseUnarmed,weapon:null,ammoId:null,ammoName:'',hadAmmo:true,gun:false,usedAmmo:false};
  let a=w.a||1;
  if(!w.ammo){
    a+=calcMeleeBonus()+(S.meleeBonus||0);
    return{atk:Math.max(1,a),weapon:w,ammoId:null,ammoName:'',hadAmmo:true,gun:false,usedAmmo:false};
  }
  const ammoId=w.ammo;
  const ammoIdx=S.inv.indexOf(ammoId);
  const ammoName=ITEMS[ammoId]?.n||'ammo';
  if(ammoIdx!==-1){
    if(consumeAmmo)S.inv.splice(ammoIdx,1);
    a+=S.gunBonus||0;
    return{atk:Math.max(1,a),weapon:w,ammoId,ammoName,hadAmmo:true,gun:true,usedAmmo:!!consumeAmmo};
  }
  return{atk:baseUnarmed,weapon:w,ammoId,ammoName,hadAmmo:false,gun:true,usedAmmo:false};
}
function hasFlag(k){return !!(S&&S.flags&&S.flags[k])}
function setFlag(k,v=true){if(!S.flags)S.flags={};S.flags[k]=v;save()}

function log(text,type='n'){
  if(!S.log)S.log=[];
  let dg=S.log.find(g=>g.day===S.days);
  if(!dg){dg={day:S.days,entries:[]};S.log.unshift(dg)}
  dg.entries.push({text,type});
  if(S.log.length>40)S.log.pop();
  // Ticker
  const ti=$('ticker-inner');
  if(ti){ti.textContent=(text||'').replace(/<[^>]*>/g,'');ti.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>ti.classList.remove('show'),3000)}
}

function upSB(){

  const hp=hpPct(S.hp,S.maxHp);
  const cw=currentCarryWeight(), cap=carryCapacity(), ow=overEncumbered();
  const nearFull=!ow&&(cw/cap)>=0.8;
  sb.innerHTML=`<div class="s">❤ <b class="${hp<=25?'r':''}">${S.hp}/${S.maxHp}</b></div>
  <div class="s">⚡ <b style="color:${S.ap<20?'var(--red)':'inherit'}">${S.ap}</b></div>

// SCAVENGE SYSTEM (Tap mechanic from Elder to King)
// ============================================================
function doScavenge(){
  if(combat)return;
  S.scavengeCount++;
  S.lastScavengeTick={day:S.days,hour:S.hours||8};
  advanceTime(1);
  const loc=LOCS[S.loc];
  const r=R();

  if(r<.20*loc.dg){
    const surs=loc.sur||[];
    const area=surs.length?rndA(surs):null;
    const enPool=area?area.en:['gecko','radroach'];
    const validPool=enPool.filter(e=>ENEMIES[e]);
    if(validPool.length){
      const enemies=buildCohesiveGroup(validPool,rnd(1,Math.min(2,validPool.length)));
      if(enemies.length){
        // Scavenge encounters go straight to pre-encounter via a quick overlay
        $('TO').classList.add('A');
        preEncounter(enemies,area,0,false);
        return;
      }
    }
  }
  if(r<.45){
    // Find caps
    const g=rnd(2,8+S.level*2);S.caps+=g;S.capsEarned+=g;
    log('Found '+g+' caps scavenging.','e');
    notify('💰 +'+g+' caps');
  } else if(r<.70){
    // Find item
    const surs=loc.sur||[];
    const area=surs.length?rndA(surs):null;
    const ltPool=area?area.lt:['herbs','scrap'];
    const bonusPool=getBonusLootPool(S.loc,area);
    const fi=rndA(ltPool.concat(bonusPool));const it=ITEMS[fi];
    if(it){giveItem(fi);log('Found '+it.n+'.','e');notify(it.e+' Found '+it.n)}
  } else if(r<.82){
    // NPC encounter
    const npc=mkNPC({loc:S.loc});
    if(!S.relationships.find(r2=>r2.name===npc.name)){
      S.relationships.push({name:npc.name,rel:'stranger',aff:0,male:npc.male,age:npc.age,loc:S.loc,met:S.days});
    }
    openNPCInteraction(npc,S.relationships.find(r2=>r2.name===npc.name));
    return;
  } else {
    // Flavor text
    const scenes=["The wind carries the smell of dust and decay.","You hear gunshots in the distance.","A tumbleweed rolls past.","The Pip-Boy crackles with static.","You spot tracks in the sand — something big.",
    "An old billboard reads: 'NEVADA: Silver State'","Brahmin bones bleach in the sun.","The heat is oppressive."];
    log(rndA(scenes),'n');
    notify(rndA(scenes));
  }
  chkLU();upAll();
}

// ── ENCOUNTER ENGINE ─────────────────────────────────────────

let _activeEncounter=null;

function rollEncounterCard(locId,area){
  // Build candidate pool: location-specific first, then generic
  const locCards=ENCOUNTER_CARDS[locId]||[];
  const genCards=ENCOUNTER_CARDS.generic||[];
  // Weight location cards 3:1 over generic
  const pool=[...locCards,...locCards,...locCards,...genCards];
  if(!pool.length)return null;
  // Avoid repeating same card too soon
  const recent=S.recentEncounters||[];
  const fresh=pool.filter(c=>!recent.includes(c.id));
  const pick=rndA(fresh.length?fresh:pool);
  if(!S.recentEncounters)S.recentEncounters=[];
  S.recentEncounters.unshift(pick.id);
  if(S.recentEncounters.length>6)S.recentEncounters.pop();
  return pick;
}

function startCombatCard(enemyId,count=1){
  // Helper used inside encounter choice fns — queues combat that resumes expedition
  const enemies=[];
  for(let i=0;i<count;i++){if(ENEMIES[enemyId])enemies.push(mkEnemy(enemyId));}
  if(enemies.length)startCombat(enemies);
}

function showEncounterCard(card,area,step){
  _activeEncounter={card,area,step};
  $('TS').innerHTML=card.icon;
  $('TT').innerHTML=`<b style="color:var(--amber)">${card.title}</b><br><span style="font-size:11px;color:var(--muted)">${card.body}</span>`;
  const cd=$('TC');cd.innerHTML='';
  card.choices.forEach((ch,i)=>{
    const btn=el('button','bt','');
    btn.style.textAlign='left';
    btn.textContent=ch.label;
    btn.onclick=()=>resolveEncounterChoice(i);
    cd.appendChild(btn);
  });
  $('TN').style.display='none';
}

function resolveEncounterChoice(idx){
  if(!_activeEncounter)return;
  const {card,area,step}=_activeEncounter;
  const choice=card.choices[idx];
  if(!choice)return;
  // Run the choice function — it may start combat (which will take over the screen)
  const customResult=choice.fn();
  // If combat was started, it takes over — set resume state
  if(combat){
    combat._expArea=area;
    combat._expStep=step;
    combat._encTitle=card.title;
    combat._encResult=customResult||choice.result||'The encounter is resolved.';
    _activeEncounter=null;
    return;
  }
  _activeEncounter=null;
  // Show a clear result popup, then continue expedition
  const resultText=customResult||choice.result||'Done.';
  $('TC').innerHTML='';
  $('TS').innerHTML='✅';
  $('TT').innerHTML=`<div style="font-size:12px;color:var(--green);margin-bottom:4px"><b>${card.title}</b></div><div style="font-size:11px;color:var(--muted)">${resultText}</div>`;
  chkLU();save();
  window._activeOutcomeArea=area;
  window._activeOutcomeStep=step;
  showResult(card.title,'✅',[resultText],'Continue','runExpedition(_activeOutcomeArea,_activeOutcomeStep)');
}

// ============================================================
// ENEMY GROUP BUILDER — ensures ecologically/factionally coherent groups
// ============================================================

// Factions that are always hostile regardless of player rep
const ALWAYS_HOSTILE_FACS=new Set(['Raiders','Fiends','PowderGangers','Legion','SuperMutants','Freeside']);

// Faction compatibility: which enemy facs can appear together in one group
const FAC_GROUPS={
  wild:      ['wild'],
  insect:    ['insect','wild'],
  animal:    ['animal','wild'],
  undead:    ['undead','wild'],
  creature:  ['creature','wild'],
  mutant:    ['mutant'],          // super mutants + nightkin only
  Raiders:   ['Raiders'],
  PowderGangers:['PowderGangers'],
  Legion:    ['Legion'],
  NCR:       ['NCR'],
  Fiends:    ['Fiends'],
  Khans:     ['Khans'],
  House:     ['House'],
  SuperMutants:['SuperMutants','mutant'],
};

function buildCohesiveGroup(pool,count){
  // Pick anchor enemy first, then only add compatible faction-mates
  const validPool=pool.filter(id=>ENEMIES[id]);
  if(!validPool.length)return[];
  const anchorId=rndA(validPool);
  const anchorFac=ENEMIES[anchorId]?.fac||'wild';
  const anchorType=ENEMIES[anchorId]?.type||'wild';
  const allowed=FAC_GROUPS[anchorFac]||[anchorFac];
  const compatible=validPool.filter(id=>{
    const e=ENEMIES[id];if(!e)return false;
    return allowed.includes(e.fac)||allowed.includes(e.type);
  });
  const group=[];
  for(let i=0;i<count;i++){
    const pick=rndA(i===0?[anchorId]:compatible);
    if(ENEMIES[pick])group.push(mkEnemy(pick));
  }
  return group;
}

// ── FACTION HOSTILITY CHECK ────────────────────────────────

function isHostileToPlayer(enemyId){
  const e=ENEMIES[enemyId];if(!e)return true;
  if(e.hostile)return true; // explicitly marked always-hostile
  if(ALWAYS_HOSTILE_FACS.has(e.fac))return true;
  const fac=e.fac;
  const rep=S.rep[fac]||0;
  // Hostile if rep < -20 or fac has no player rep entry and is military
  if(rep<=-20)return true;
  return false;
}

function groupIsHostile(enemies){
  return enemies.some(en=>isHostileToPlayer(en.id));
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function statVal(i){return S.special?S.special[i]:5}
function checkChance(stat,diff=6,bonus=0){
  // Stat unlocks the option, but never makes it automatic.
  return clamp(0.25+(stat-diff)*0.08+bonus,0.15,0.88);
}
function checkLabel(name,stat,diff,bonus=0){
  return `${name} ${stat}/${diff} · ${Math.round(checkChance(stat,diff,bonus)*100)}%`;
}
function startFailedEncounter(enemies,area,step,travelMode,msg){
  log(msg||'The attempt failed.','c');
  if(travelMode){startCombat(enemies);combat.postT=tDest}
  else{startCombat(enemies);combat._expArea=area;combat._expStep=step}
}

// ── PRE-ENCOUNTER SYSTEM ───────────────────────────────────

// Called instead of startCombat — presents interaction options first
function preEncounter(enemies,area,step,travelMode=false){
  if(!enemies.length)return;

  const anchor=ENEMIES[enemies[0].id]||{type:'creature',fac:'wild',hostile:true};
  const hostile=groupIsHostile(enemies);
  const isAnimal=['animal','insect'].includes(anchor.type);
  const isUndead=['undead','mutant','robot'].includes(anchor.type);
  const hasHunterPerk=S.hunterPerk||false;
  const cha=S.special?S.special[3]:5;
  const str=S.special?S.special[0]:5;
  const agi=S.special?S.special[5]:5;
  const fac=anchor.fac;
  const facName=FACTIONS[fac]||fac;
  const rep=S.rep[fac]||0;
  const enemyLabel=enemies.map(e=>e.name).join(' & ');
  const hasWeapon=!!S.gear.w;

  // Build choices
  const choices=[];

  // Always: Fight
  choices.push({
    label:'⚔ Fight',
    style:'bt go',
    fn:()=>{
      if(travelMode){startCombat(enemies);combat.postT=tDest}
      else{startCombat(enemies);combat._expArea=area;combat._expStep=step}
    }
  });

  // Animals/insects with Hunter perk: Calm Animal
  if(isAnimal&&hasHunterPerk){
    choices.push({
      label:'🐾 Calm animal [Hunter perk]',
      style:'bt pip',
      fn:()=>_preEncResolve(`You extend your hand slowly. The ${enemies[0].name} circles once, then retreats. Hunter's instinct.`,area,step,travelMode,true)
    });
  }

  // Animals/insects: Scare off (Strength check, no perk needed)
  if(isAnimal&&!isUndead){
    choices.push({
      label:`💪 Scare them off [${checkLabel('STR',str,6)}]`,
      style:'bt',
      fn:()=>{
        if(R()<checkChance(str,6)){
          return _preEncResolve(`You stand tall and shout. The creatures scatter.`,area,step,travelMode,true);
        }
        startFailedEncounter(enemies,area,step,travelMode,'Failed to scare off the creatures.');
      }
    });
  }

  // Non-hostile faction humans: Talk
  if(!hostile&&!isUndead&&!isAnimal&&anchor.type==='human'){
    const talkLabel=rep>=20?`💬 Talk to them [${facName}, +${rep} rep]`:`💬 Talk to them [${facName}]`;
    choices.push({
      label:talkLabel,
      style:'bt pip',
      fn:()=>{
        const xpGain=rnd(6,12);
        S.xp+=xpGain;
        const repGain=R()<0.5?1:0;
        if(repGain)S.rep[fac]=(S.rep[fac]||0)+1;
        return _preEncResolve(`They're wary but not aggressive. You exchange words. ${repGain?`+1 ${facName} rep. `:''}⭐ +${xpGain} XP.`,area,step,travelMode,true);
      }
    });
  }

  // Hostile humans with high CHA: Intimidate
  if(anchor.type==='human'&&!isUndead){
    choices.push({
      label:`😠 Intimidate [${checkLabel('CHA',cha,7)}]`,
      style:'bt',
      fn:()=>{
        if(R()<checkChance(cha,7)){
          S.xp+=rnd(8,14);
          return _preEncResolve(`You meet their eyes and don't blink. They back down.`,area,step,travelMode,true);
        }
        startFailedEncounter(enemies,area,step,travelMode,'Intimidation failed.');
      }
    });
  }

  // Hostile humans: Bribe (costs caps)
  if(anchor.type==='human'&&!isUndead&&hostile){
    const bribeAmt=Math.max(20,enemies.length*15+S.level*5);
    choices.push({
      label:`💰 Bribe them off (${bribeAmt} caps · ${Math.round(checkChance(cha,6,rep/200)*100)}%)`,
      style:'bt',
      fn:()=>{
        if(S.caps<bribeAmt){notify('Not enough caps.');return null}
        S.caps-=bribeAmt;
        if(R()<checkChance(cha,6,rep/200)){
          return _preEncResolve(`You slide them the caps. They count it slowly and walk.`,area,step,travelMode,true);
        }
        startFailedEncounter(enemies,area,step,travelMode,'Bribe failed. They take the caps and reach for their weapons.');
      }
    });
  }

  // Sneak past (Agility attempt — chanced, never guaranteed)
  if(!isUndead){
    choices.push({
      label:`🤫 Sneak past [${checkLabel('AGI',agi,6)}]`,
      style:'bt',
      fn:()=>{
        if(R()<checkChance(agi,6)){
          return _preEncResolve(`You move quietly through the terrain. They never spot you.`,area,step,travelMode,true);
        }
        startFailedEncounter(enemies,area,step,travelMode,'Sneak attempt spotted.');
      }
    });
  }

  // Always: Retreat/flee
  choices.push({
    label:'🏃 Retreat',
    style:'bt dn',
    fn:()=>{
      log('Retreated from '+( area?.n||'the road')+'.','e');
      if(travelMode){$('TO').classList.remove('A');finTravel()}
      else{$('TO').classList.remove('A');upAll()}
    }
  });

  // Render the pre-encounter screen in the TO overlay
  $('TS').innerHTML=enemies[0].e||'⚔';
  const hostile_label=hostile?`<span style="color:var(--red)">HOSTILE</span>`:`<span style="color:var(--amber)">${facName}</span>`;
  $('TT').innerHTML=`<b>${enemyLabel}</b><br><span style="font-size:10px;color:var(--muted)">${hostile_label} · ${anchor.type}</span>`;
  const cd=$('TC');cd.innerHTML='';
  choices.forEach(ch=>{
    const btn=el('button',ch.style,'');
    btn.textContent=ch.label;btn.style.textAlign='left';btn.style.marginBottom='2px';
    btn.onclick=()=>ch.fn();
    cd.appendChild(btn);
  });
  $('TN').style.display='none';
}

function _preEncResolve(msg,area,step,travelMode,skipCombat){
  $('TC').innerHTML='';
  $('TS').innerHTML='✅';
  $('TT').innerHTML=`<span style="font-size:11px;color:var(--muted)">${msg}</span>`;
  chkLU();save();
  if(travelMode){
    $('TN').style.display='block';$('TN').onclick=()=>travelCont();
  }else if(area){
    $('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step);
  }else{
    // Scavenge encounter — close overlay and refresh
    $('TN').style.display='block';$('TN').onclick=()=>{$('TO').classList.remove('A');chkLU();upAll()};
  }
  return msg;
}

function explore(idx){
  const loc=LOCS[S.loc];const area=loc?.sur?.[idx];if(!area)return;
  const o=$('TO');o.classList.add('A');
  $('TB').style.width='0%';$('TC').innerHTML='';$('TN').style.display='none';
  $('TS').innerHTML=area.e;
  $('TT').innerHTML=`<b>${area.n}</b><br><span style="font-size:11px;color:var(--muted)">${area.d}</span>`;
  setTimeout(()=>runExpedition(area,0),500);
}
function runExpedition(area,step){
  const maxSteps=rnd(2,4);
  if(step>=maxSteps){
    $('TS').innerHTML=area.e;
    $('TT').innerHTML=`Finished scouting <b>${area.n}</b>.`;
    const cd=$('TC');cd.innerHTML='';
    const cb=el('button','bt go','🔍 Keep exploring');cb.style.textAlign='center';
    cb.onclick=()=>{cd.innerHTML='';$('TN').style.display='none';runExpedition(area,0)};cd.appendChild(cb);
    const rb=el('button','bt','🔙 Return to '+LOCS[S.loc]?.n);rb.style.textAlign='center';
    rb.onclick=()=>{$('TO').classList.remove('A');upAll()};cd.appendChild(rb);
    $('TN').style.display='none';return;
  }
  advanceTime(1);
  $('TB').style.width=Math.round(((step+1)/maxSteps)*100)+'%';
  const r=R();
  const _combatThresh=S.lightStepPerk?0.28:0.45;
  if(r<_combatThresh){
    const cnt=rnd(1,Math.min(2,area.en.length));
    const enemies=buildCohesiveGroup(area.en,cnt);
    if(!enemies.length){$('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step+1);return}
    preEncounter(enemies,area,step+1,false);
  } else if(r<.65){
    const li=rndA(area.lt);const it=ITEMS[li];
    if(it){giveItem(li);log('Found '+it.n+' in '+area.n+'.','e');save();
    $('TS').innerHTML='✨';
    $('TT').innerHTML=`<div style="text-align:center"><div style="display:flex;align-items:center;justify-content:center;width:64px;height:64px;background:#0f0f08;border:1px solid #3a3828;border-radius:10px;margin:6px auto">${it.e}</div><b style="color:var(--green);display:block;margin-top:4px">${it.n}</b></div>`;
    $('TC').innerHTML='';$('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step+1)}
  } else {
    // 60% chance of encounter card, 40% plain scene flavour
    const card=R()<0.60?rollEncounterCard(S.loc,area):null;
    if(card){
      showEncounterCard(card,area,step+1);
    }else{
      const scenes=["Tracks in the dirt — recent.","The wind shifts. Something watches.","Shell casings litter the ground.","A faded sign: DANGER - MINES","An old campfire, still warm."];
      $('TS').innerHTML=rndA(['🏜','💀','🪨','🌵']);
      $('TT').innerHTML=rndA(scenes);
      $('TC').innerHTML='';$('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step+1);
    }
  }
}
function travelCont(){
  $('TN').onclick=null;
  if(tQ.length) nextTEv();
  else finTravel();
}

function mkEnemy(id){

}

function takeLootEntry(corpseIndex,entryIndex){
  if(!combat||!combat.corpses||!combat.corpses[corpseIndex])return;
  const corpse=combat.corpses[corpseIndex];
  if(corpse.taken)return;

  const entry=corpse.loot[entryIndex];
  if(!entry||entry.taken)return;

  if(entry.type==='caps'){
    S.caps+=entry.amount;
    S.capsEarned=(S.capsEarned||0)+entry.amount;
    notify(`💰 +${entry.amount} caps`);
  }else if(entry.type==='item'&&ITEMS[entry.id]){
    const added=giveItem(entry.id);
    if(!added)return;
    notify(`${ITEMS[entry.id].e} ${ITEMS[entry.id].n}`);
  }

  entry.taken=true;

  if(corpse.loot.every(x=>x.taken)){
    corpse.taken=true;
    log(`Looted ${corpse.name}.`,'e');
  }

  renderCombat();
  queueSave();
}

function lootAllCorpse(corpseIndex){
  if(!combat||!combat.corpses||!combat.corpses[corpseIndex])return;
  const corpse=combat.corpses[corpseIndex];
  if(corpse.taken)return;

  let gotSomething=false;

  corpse.loot.forEach(entry=>{
    if(entry.taken)return;

    if(entry.type==='caps'){
      S.caps+=entry.amount;
      S.capsEarned=(S.capsEarned||0)+entry.amount;
      entry.taken=true;
      gotSomething=true;
      return;
    }

    if(entry.type==='item'&&ITEMS[entry.id]){
      const added=giveItem(entry.id);
      if(added){
        entry.taken=true;
        gotSomething=true;
      }
    }
  });

  if(corpse.loot.every(x=>x.taken)){
    corpse.taken=true;
    log(`Looted ${corpse.name}.`,'e');
  }

  if(gotSomething)notify(`🎒 Looted ${corpse.name}`);
  renderCombat();
  queueSave();
}

function lootAllCorpses(){
  if(!combat||!combat.corpses)return;
  combat.corpses.forEach((corpse,i)=>{
    if(!corpse.taken)lootAllCorpse(i);
  });
}
function finishCombatLoot(){
  const lootCaps=combat.pendingRewards?.caps||0;
  const lootXp=grantXP(combat.pendingRewards?.xp||0);
  const bounty=combat.pendingRewards?.bounty;
  const questComplete=combat.questComplete;
  const expArea=combat._expArea;
  const postT=combat.postT;

  S.xp+=lootXp;
  if(lootCaps>0){
    S.caps+=lootCaps;
    S.capsEarned=(S.capsEarned||0)+lootCaps;
  }

  const lines=[`⭐ +${lootXp} XP`];
  if(lootCaps>0)lines.push(`💰 +${lootCaps} combat reward caps`);
  if(combat._encTitle||combat._encResult){
    if(combat._encTitle)lines.push('📌 '+combat._encTitle);
    if(combat._encResult)lines.push(String(combat._encResult));
  }

  if(bounty){
    const bonusCaps=rnd(bounty.caps[0],bounty.caps[1]);
    S.caps+=bonusCaps;S.capsEarned+=bonusCaps;
    S.xp+=bounty.xp;
    lines.push('🎯 Bounty claimed: '+bounty.name);
    lines.push('💰 +'+bonusCaps+' caps bonus');
    lines.push('⭐ +'+bounty.xp+' XP bonus');
    if(bounty.rep){Object.entries(bounty.rep).forEach(([fac,val])=>{S.rep[fac]=(S.rep[fac]||0)+val;lines.push('🏴 +'+val+' '+(FACTIONS[fac]||fac)+' standing')})}
    if(S.flags.bountyBoard)S.flags.bountyBoard.current=null;
    log('Claimed bounty on '+bounty.name+'.','q');
  }
  if(questComplete==='gs_ghost_town_gunfight')gsFinishGhostQuest(lines);

  $('CO').style.display='none';
  combat=null;
  chkLU();save();

  if(postT){
    showResult('Victory!','⚔',lines,'Continue','resumeTravelAfterCombat()');
  } else if(expArea){
    showResult('Victory!','⚔',lines,'Continue','resumeExpeditionAfterCombat()');
  } else {
    showResult('Victory!','⚔',lines,'Continue','upAll()');
  }
}

  
function markEnemyHit(enemy,crit=false){
  if(!enemy)return;
  enemy.hitAnim=crit?'crit':'hit';
  setTimeout(()=>{try{if(enemy)enemy.hitAnim='';if(combat&&!combat.lootPhase)renderCombat()}catch(e){}},280);
}
function rollPlayerCrit(vats=false){
  const chance=Math.min(0.95,calcCritChance()*(vats?2.5:1));
  return R()<chance;
}
function playerHitDamage(attack,target,vats=false){
  const crit=rollPlayerCrit(vats);
  const mult=vats?(crit?2.25:1.5):(crit?2:1);
  const variance=vats?rnd(0,2):rnd(-1,1);
  return {crit,dmg:fnvDTDamage(Math.round(attack.atk*mult)+variance,target.d,FNV_NORMAL.playerDamage)};
}
function renderCombat(){

  const o=$('CO');o.style.display='flex';

function combatAction(act){
  if(!combat)return;
  const alive=combat.enemies.filter(en=>en.hp>0);
  if(!alive.length){endCombat(true);return}
  const target=alive[0];

  switch(act){
    case 'attack':{
      const attack=getCombatAttackProfile(true);
      const hit=playerHitDamage(attack,target,false);
      const dmg=hit.dmg;
      target.hp=Math.max(0,target.hp-dmg);
      markEnemyHit(target,hit.crit);
      if(attack.gun&&attack.hadAmmo){
        combat.log.push(`${hit.crit?'CRITICAL HIT! ':''}You fire ${attack.weapon.n} and deal ${dmg} damage to ${target.name}.`);
      }else if(attack.gun&&!attack.hadAmmo){
        combat.log.push(`${hit.crit?'CRITICAL HIT! ':''}Out of ${attack.ammoName}! You swing ${attack.weapon.n} and deal ${dmg} damage to ${target.name}.`);
        notify('Out of '+attack.ammoName+'! Weak melee attack only.');
      }else{
        combat.log.push(`${hit.crit?'CRITICAL HIT! ':''}You deal ${dmg} damage to ${target.name}.`);
      }
      S.ap=Math.max(0,S.ap-8);
      if(target.hp<=0){
        combat.log.push(`${target.name} is killed!`);
        log('Killed '+target.name+'.','c');
        S.kills[target.id||'unknown']=(S.kills[target.id||'unknown']||0)+1;
        S.killCount++;
      }
      break;
    }
    case 'vats':{
      if(S.ap<20){notify('Not enough AP!');return}
      const attack=getCombatAttackProfile(true);
      if(attack.gun&&!attack.hadAmmo){
        notify('No '+attack.ammoName+' loaded.');
        combat.log.push(`V.A.T.S. failed — no ${attack.ammoName}.`);
        renderCombat();
        return;
      }
      S.ap-=20;
      const hit=playerHitDamage(attack,target,true);
      const crit=hit.crit;
      const dmg=hit.dmg;
      target.hp=Math.max(0,target.hp-dmg);
      markEnemyHit(target,crit);
      if(attack.gun)combat.log.push(`V.A.T.S.! ${crit?'CRITICAL! ':''}${dmg} damage to ${target.name} with ${attack.weapon.n}!`);
      else combat.log.push(`V.A.T.S.! ${crit?'CRITICAL! ':''}${dmg} damage to ${target.name}!`);
      if(target.hp<=0){
        combat.log.push(`${target.name} eliminated!`);
        log('Killed '+target.name+' (V.A.T.S.).','c');
        S.kills[target.id||'unknown']=(S.kills[target.id||'unknown']||0)+1;
        S.killCount++;
      }
      break;
    }
    case 'heal':{
      const si=S.inv.indexOf('stimpak');
      const ssi=si===-1?S.inv.indexOf('super_stimpak'):-1;
      const idx=si!==-1?si:ssi;
      if(idx===-1){notify('No healing items!');return}
      const item=ITEMS[S.inv[idx]];
      S.hp=Math.min(S.maxHp,S.hp+(item.hp||30));
      combat.log.push(`Used ${item.n}. +${item.hp||30} HP.`);
      S.inv.splice(idx,1);
      break;
    }
    case 'flee':{
      const flee=R()<(.3+S.spd*.05+(S.special?S.special[5]*.03:0));
      if(flee){combat.log.push('You escaped!');log('Fled from combat.','c');endCombat(false);return}
      else{combat.log.push('Failed to escape!');}
      break;
    }
  }

  const survivors=combat.enemies.filter(en=>en.hp>0);
  if(!survivors.length){endCombat(true);return}

  survivors.forEach(en=>{
    const eDmg=fnvDTDamage(en.a+rnd(-1,1),defPow(),FNV_NORMAL.enemyDamage);
    S.hp=Math.max(0,S.hp-eDmg);
    combat.log.push(`${en.name} deals ${eDmg} damage to you.`);
  });

  if(S.hp<=0){combat.log.push('You are critically wounded!');endCombat(false,true);return}
  combat.turn++;
  renderCombat();
}
function endCombat(won,died){
  if(!combat)return;
  const expArea=combat._expArea;
  const expStep=combat._expStep;
  const postT=combat.postT;
  $('CO').style.display='none';
  window._resumeArea=expArea||null;
  window._resumeStep=expStep||0;

  if(died){
    S.hp=Math.floor(S.maxHp*.3);S.caps=Math.max(0,S.caps-rnd(10,30));
    combat=null;save();
    if(postT){
      showResult('Knocked Out','💀',['You wake up later, stripped of some caps.','Lost some caps.'],'Continue','resumeTravelAfterCombat()');
    }else{
      showResult('Knocked Out','💀',['You wake up later, stripped of some caps.','Lost some caps.'],'Continue','upAll()');
    }
    return;
  }
  if(!won){
    combat=null;save();
    if(postT){showResult('Escaped Combat','🏃',['You got away and kept moving.'],'Continue','resumeTravelAfterCombat()');}
    else if(expArea){showResult('Retreated','🏃',['You escaped the fight.'],'Continue','resumeExpeditionAfterCombat()');}
    else{upAll();}
    return;
  }

  let totalXp=0,totalCaps=0;
  const corpses=[];
  combat.enemies.forEach(en=>{
    totalXp+=en.xp;
    totalCaps+=rnd(3,8+S.level*2);
    corpses.push({
      name:en.name,
      icon:en.e,
      loot:buildEnemyLoot(en).map(x=>({...x,taken:false})),
      taken:false
    });
  });

  combat.pendingRewards={xp:totalXp,caps:totalCaps,bounty:combat.bountyTarget||null};
  combat.corpses=corpses;
  combat.lootPhase=true;
  renderCombat();
  return;
}

// LEVEL UP
// ============================================================
let _pendingLevelUps=0;

function chkLU(){
  let levelled=false;
  while(S.xp>=xpNeed(S.level)){
    S.xp-=xpNeed(S.level);S.level++;
    syncFNVStats(true);
    log('Level up! Now level '+S.level+'. HP +5 from New Vegas levelling.','q');
    if(calcPerkDue(S.level))_pendingLevelUps++;
    levelled=true;
  }
  if(_pendingLevelUps) showPerkScreen();
  else if(levelled) upSB();
}

function perkOwned(id){return (S.perks||[]).includes(id)}

function perkMeetsReq(p){
  if(!p.req) return true;
  if(p.req.level && S.level < p.req.level) return false;
  if(p.req.special !== undefined && S.special[p.req.special] < p.req.min) return false;
  if(p.req.perk && !perkOwned(p.req.perk)) return false;
  return true;
}

function showPerkScreen(){
  if(!_pendingLevelUps) return;
  if(!S.perks) S.perks=[];

  // Pick 3 random unowned perks, weighted toward meetable requirements
  const pool=PERKS.filter(p=>!perkOwned(p.id));
  const meetable=pool.filter(p=>perkMeetsReq(p));
  const locked=pool.filter(p=>!perkMeetsReq(p));
  // Offer 2 meetable + 1 locked (shown as locked/dim) if possible, else 3 meetable
  let choices=[];
  const shuffled=[...meetable].sort(()=>R()-.5);
  choices=shuffled.slice(0,3);
  if(choices.length<3 && locked.length){
    choices=[...choices,...locked.slice(0,3-choices.length)];
  }
  if(!choices.length){
    // No perks left — just give a stat bonus
    _pendingLevelUps=0;
    notify('⬆ LEVEL '+S.level+'! Max perks reached.');
    upSB();save();
    return;
  }

  const lvl=S.level-(_pendingLevelUps-1); // Display for current pending level
  const panel=$('PP');
  panel.innerHTML=`
    <div style="text-align:center;margin-bottom:10px">
      <div style="font-size:32px;margin-bottom:4px">⬆</div>
      <div style="font-size:17px;font-weight:bold;color:var(--amber);letter-spacing:2px">LEVEL ${S.level}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">Perks arrive every 2 levels, closer to New Vegas pacing.</div>
      ${_pendingLevelUps>1?`<div style="font-size:10px;color:var(--green);margin-top:2px">${_pendingLevelUps} level-ups pending</div>`:''}
    </div>
    <div style="font-size:9px;color:var(--muted);text-align:center;margin-bottom:8px;letter-spacing:1px">AVAILABLE PERKS</div>
    ${choices.map(p=>{
      const ok=perkMeetsReq(p);
      const reqText=!ok?(p.req?.perk?`Req: ${PERKS.find(x=>x.id===p.req.perk)?.name||p.req.perk}`:(p.req?.level&&S.level<p.req.level?`Req: Level ${p.req.level}`:`Req: ${SPECIAL_NAMES[p.req?.special||0]} ${p.req?.min}+`)):'';
      return `<div class="perk-card${ok?'':' locked'}" onclick="${ok?`pickPerk('${p.id}')`:''}" style="display:flex;align-items:flex-start;gap:10px">
        <div class="perk-icon">${p.icon}</div>
        <div style="flex:1">
          <div class="perk-name">${p.name}</div>
          <div style="font-size:9px;color:var(--amber2);text-transform:uppercase;margin:1px 0">${p.cat}</div>
          <div class="perk-desc">${p.desc}</div>
          ${reqText?`<div class="perk-req">🔒 ${reqText}</div>`:''}
        </div>
      </div>`;
    }).join('')}
    <button class="bt" style="margin-top:10px;text-align:center;font-size:11px" onclick="skipPerk()">Skip — bank +50 XP instead</button>`;

  $('PO').classList.add('A');
  upSB();
}

function pickPerk(id){
  const p=PERKS.find(x=>x.id===id);
  if(!p||!perkMeetsReq(p))return;
  if(!S.perks)S.perks=[];
  S.perks.push(id);
  p.apply(S);
  log('Perk: '+p.name+' — '+p.desc,'q');
  _pendingLevelUps--;
  $('PO').classList.remove('A');
  // Show result then continue if more pending
  showResult('Perk Acquired',''+p.icon,
    [`<b style="color:var(--amber)">${p.name}</b>`, p.desc, '⭐ Level '+S.level],
    _pendingLevelUps?'Next Level Up':'Continue',
    _pendingLevelUps?'showPerkScreen()':'upAll()');
  save();
}

function skipPerk(){
  S.xp+=50;
  log('Skipped perk — banked +50 XP.','q');
  _pendingLevelUps--;
  $('PO').classList.remove('A');
  if(_pendingLevelUps) showPerkScreen();
  else{notify('⬆ LEVEL '+S.level+'!');upAll();}
  save();
}
