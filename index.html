// Factions that are always hostile regardless of player rep
// Factions that are ALWAYS hostile regardless of rep (truly feral/irredeemable)
const ALWAYS_HOSTILE_FACS=new Set(['Raiders','Fiends','SuperMutants']);

// Factions that are hostile by DEFAULT but can become neutral/friendly via rep
// Hostile when rep < 0, neutral at 0-9, friendly at 10+
const DEFAULT_HOSTILE_FACS=new Set(['PowderGangers','Legion']);

// Faction wars — if you're aligned with one side, the other sends more hostiles
const FACTION_WARS={
  NCR:['Legion','Fiends'],
  Legion:['NCR'],
  Kings:['NCR'],  // tensions, not open war
  BOS:['NCR'],    // uneasy
};

// Faction patrol enemy pools — what each faction sends as patrols
const FACTION_PATROLS={
  NCR:['ncr_trooper','ncr_trooper','ncr_trooper','ncr_ranger','ncr_heavy_trooper'],
  Legion:['legion_recruit','legion_recruit','legion_veteran','legion_decanus','legion_assassin'],
  PowderGangers:['powder_ganger','powder_ganger','convict','escaped_convict','powder_ganger_leader'],
  BOS:['bos_paladin','bos_knight','bos_knight'],
  Kings:['freeside_thug','freeside_thug'],
  Khans:['khan_warrior','khan_warrior'],
  Fiends:['fiend','fiend','fiend','fiend_leader'],
  Raiders:['jackal_raider','jackal_raider','jackal_veteran','viper_gunslinger','viper_leader','raider_leader'],
};

// Faction compatibility: which enemy facs can appear together in one group
const FAC_GROUPS={
  wild:      ['wild'],
  insect:    ['insect','wild'],
  animal:    ['animal','wild'],
  undead:    ['undead','wild'],
  creature:  ['creature','wild'],
  mutant:    ['mutant'],          // super mutants + nightkin only
  Raiders:   ['Raiders'],
  PowderGangers:['PowderGangers'],
  Legion:    ['Legion'],
  NCR:       ['NCR'],
  Fiends:    ['Fiends'],
  Khans:     ['Khans'],
  House:     ['House'],
  SuperMutants:['SuperMutants','mutant'],
};


function locDangerForScaling(){
  const loc=LOCS[S?.loc]||{};
  if(S?.loc==='MojaveTunnels')return 5;
  return Number(loc.dg||1);
}
function canScaleHere(){
  // Keeps starter areas and low-danger towns from suddenly spawning endgame monsters.
  if(!S)return false;
  if(S.loc==='Goodsprings'||S.loc==='Primm'||S.loc==='MojaveOutpost')return false;
  return locDangerForScaling()>=2 && S.level>=12;
}
function scaleEnemyForEndgame(enemy){
  if(!enemy||!canScaleHere())return enemy;
  const danger=locDangerForScaling();
  const tunnel=S.loc==='MojaveTunnels';
  const lvl=Math.max(1,S.level||1);
  let eliteChance=(lvl>=12?0.05:0)+(lvl>=18?0.06:0)+(danger>=3?0.05:0)+(tunnel?0.14:0);
  let legendaryChance=(lvl>=20&&danger>=3?0.025:0)+(tunnel&&lvl>=20?0.045:0);
  if(enemy.boss)legendaryChance*=0.5;
  if(R()<legendaryChance){
    enemy.name='Legendary '+enemy.name;
    enemy.hp=enemy.maxHp=Math.round(enemy.maxHp*(1.9+Math.min(0.9,lvl/40)));
    enemy.a=Math.round(enemy.a*(1.45+Math.min(0.45,lvl/50)));
    enemy.d=Math.round(enemy.d+4+lvl/5);
    enemy.xp=Math.round(enemy.xp*2.4);
    enemy.legendary=1;
    enemy.loot=(enemy.loot||[]).concat(['super_stimpak','ammo_308','energy_cell','combat_armor']);
  }else if(R()<eliteChance){
    const tag=rndA(['Hardened','Veteran','Alpha','Armoured','Ravenous']);
    enemy.name=tag+' '+enemy.name;
    enemy.hp=enemy.maxHp=Math.round(enemy.maxHp*(1.35+Math.min(0.45,lvl/60)));
    enemy.a=Math.round(enemy.a*(1.18+Math.min(0.25,lvl/70)));
    enemy.d=Math.round(enemy.d+2+lvl/8);
    enemy.xp=Math.round(enemy.xp*1.55);
    enemy.elite=1;
  }
  return enemy;
}
function maybeUpgradePatrolPool(pool){
  if(!S||S.level<16)return pool;
  const danger=locDangerForScaling();
  if(S.loc==='Goodsprings'||S.loc==='Primm'||S.loc==='MojaveOutpost')return pool;
  const out=pool.slice();
  if(danger>=3&&R()<0.25){
    if(out.includes('legion_recruit'))out.push('legion_veteran','legion_decanus','legion_assassin');
    if(out.includes('ncr_trooper'))out.push('ncr_ranger','ncr_heavy_trooper');
    if(out.includes('powder_ganger'))out.push('powder_ganger_leader','escaped_convict');
    if(out.includes('great_khan'))out.push('khan_warrior');
    if(out.includes('fiend'))out.push('fiend','fiend_leader','centaur');
    if(out.includes('jackal_raider'))out.push('jackal_veteran','raider_leader');
    if(out.includes('viper_gunslinger'))out.push('viper_leader','raider_leader');
    if(out.includes('feral_ghoul'))out.push('feral_ghoul_roamer','feral_ghoul_reaver','glowing_one');
    if(out.includes('gecko'))out.push('green_gecko','golden_gecko','fire_gecko','gecko_hunter');
    if(out.includes('giant_rat'))out.push('mole_rat');
    if(out.includes('radscorpion'))out.push('cazador');
    if(out.includes('super_mutant'))out.push('super_mutant_brute','nightkin','nightkin_master');
    if(out.includes('bos_knight'))out.push('bos_paladin');
    if(out.includes('protectron'))out.push('mr_gutsy','sentry_bot');
  }
  if(S.loc==='MojaveTunnels')out.push('nightkin','nightkin_master','super_mutant','super_mutant_brute','glowing_one','feral_ghoul_reaver','deathclaw','sentry_bot');
  return out;
}
function buildCohesiveGroup(pool,count){
  // Pick anchor enemy first, then only add compatible faction-mates
  const validPool=maybeUpgradePatrolPool(pool.filter(id=>ENEMIES[id]));
  if(!validPool.length)return[];
  const anchorId=rndA(validPool);
  const anchorFac=ENEMIES[anchorId]?.fac||'wild';
  const anchorType=ENEMIES[anchorId]?.type||'wild';
  const allowed=FAC_GROUPS[anchorFac]||[anchorFac];
  const compatible=validPool.filter(id=>{
    const e=ENEMIES[id];if(!e)return false;
    return allowed.includes(e.fac)||allowed.includes(e.type);
  });
  const group=[];
  for(let i=0;i<count;i++){
    const pick=rndA(i===0?[anchorId]:compatible);
    if(ENEMIES[pick])group.push(scaleEnemyForEndgame(mkEnemy(pick)));
  }
  return group;
}

// ── FACTION HOSTILITY CHECK ────────────────────────────────

function isHostileToPlayer(enemyId){
  const e=ENEMIES[enemyId];if(!e)return true;
  if(e.hostile)return true;
  if(ALWAYS_HOSTILE_FACS.has(e.fac))return true;
  const fac=e.fac;
  const rep=S.rep[fac]||0;
  // Default-hostile facs: hostile below 0, neutral 0-9, friendly 10+
  if(DEFAULT_HOSTILE_FACS.has(fac))return rep<0;
  // Regular facs: hostile below -20
  if(rep<=-20)return true;
  // Animals/creatures/undead are always hostile
  if(['animal','insect','creature','wild','undead'].includes(e.type))return true;
  return false;
}

function getFactionDisposition(fac){
  const rep=S.rep[fac]||0;
  if(ALWAYS_HOSTILE_FACS.has(fac))return 'hostile';
  if(DEFAULT_HOSTILE_FACS.has(fac)){
    if(rep<0)return 'hostile';
    if(rep<10)return 'wary';
    return 'friendly';
  }
  if(rep<=-20)return 'hostile';
  if(rep<0)return 'wary';
  if(rep<10)return 'neutral';
  if(rep<30)return 'friendly';
  return 'allied';
}

function getDispositionColor(disp){
  if(disp==='hostile')return 'var(--red)';
  if(disp==='wary')return 'var(--amber2)';
  if(disp==='neutral')return 'var(--muted)';
  if(disp==='friendly')return 'var(--green)';
  if(disp==='allied')return 'var(--green)';
  return 'var(--muted)';
}

function groupIsHostile(enemies){
  return enemies.some(en=>isHostileToPlayer(en.id));
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function statVal(i){return S.special?S.special[i]:5}
function checkChance(stat,diff=6,bonus=0){
  // Stat unlocks the option, but never makes it automatic.
  return clamp(0.25+(stat-diff)*0.08+bonus,0.15,0.88);
}
function checkLabel(name,stat,diff,bonus=0){
  return `${name} ${stat}/${diff} · ${Math.round(checkChance(stat,diff,bonus)*100)}%`;
}
function startFailedEncounter(enemies,area,step,travelMode,msg){
  log(msg||'The attempt failed.','c');
  if(travelMode){startCombat(enemies);combat.postT=tDest}
  else{startCombat(enemies);combat._expArea=area;combat._expStep=step}
}

// ── PRE-ENCOUNTER SYSTEM ───────────────────────────────────

// Called instead of startCombat — presents interaction options first
function preEncounter(enemies,area,step,travelMode=false){
  if(!enemies.length)return;

  const anchor=ENEMIES[enemies[0].id]||{type:'creature',fac:'wild',hostile:true};
  const hostile=groupIsHostile(enemies);
  const isAnimal=['animal','insect'].includes(anchor.type);
  const isUndead=['undead','mutant','robot'].includes(anchor.type);
  const isHuman=anchor.type==='human';
  const hasHunterPerk=S.hunterPerk||false;
  const cha=S.special?S.special[3]:5;
  const str=S.special?S.special[0]:5;
  const agi=S.special?S.special[5]:5;
  const per=S.special?S.special[1]:5;
  const lck=S.special?S.special[6]:5;
  const fac=anchor.fac;
  const facName=FACTIONS[fac]||fac;
  const rep=S.rep[fac]||0;
  const disp=isHuman&&fac?getFactionDisposition(fac):'hostile';
  const hasWeapon=!!S.gear.w;

  // Group enemy names for display
  const nameCounts={};
  enemies.forEach(en=>{nameCounts[en.name]=(nameCounts[en.name]||0)+1});
  const enemyLabel=Object.entries(nameCounts).map(([n,c])=>c>1?c+'× '+n:n).join(' & ');

  const choices=[];

  // ── FRIENDLY / ALLIED encounters ──
  if(!hostile&&isHuman&&(disp==='friendly'||disp==='allied')){
    // Trade opportunity
    choices.push({
      label:`🤝 Greet them [${facName}, ${disp}]`,
      style:'bt go',
      fn:()=>{
        const xpGain=rnd(8,15);S.xp+=xpGain;
        const repGain=R()<0.3?1:0;
        if(repGain)S.rep[fac]=(S.rep[fac]||0)+1;
        const lines=[];
        if(disp==='allied')lines.push(`The ${facName} patrol recognises you. "Good to see a friendly face out here."`);
        else lines.push(`The ${facName} patrol nods cautiously. They're not looking for trouble.`);
        if(repGain)lines.push(`+1 ${facName} rep.`);
        lines.push(`⭐ +${xpGain} XP`);
        return _preEncResolve(lines.join(' '),area,step,travelMode,true);
      }
    });
    // Trade
    choices.push({
      label:'💰 Trade supplies',
      style:'bt pip',
      fn:()=>{
        // Give a random useful item
        const tradeItems=['stimpak','purified_water','ammo_9mm','ammo_556','ammo_357','sunset_sars','nuka_cola','cram'];
        const offer=rndA(tradeItems);
        const cost=Math.round((ITEMS[offer]?.p||20)*0.8);
        if(S.caps<cost){return _preEncResolve(`They offer ${ITEMS[offer]?.e} ${ITEMS[offer]?.n} but you can't afford the ${cost} caps.`,area,step,travelMode,true)}
        S.caps-=cost;giveItem(offer,1,{ignoreLimit:true});
        return _preEncResolve(`You trade ${cost} caps for ${ITEMS[offer]?.e} ${ITEMS[offer]?.n}. Fair deal on the road.`,area,step,travelMode,true);
      }
    });
    // Intel
    choices.push({
      label:'🗨 Ask for intel',
      style:'bt',
      fn:()=>{
        const xpGain=rnd(5,10);S.xp+=xpGain;
        const tips=[
          `"Watch the road south — Fiends have been hitting caravans."`,
          `"There's good scavenge near the old overpass if you know where to look."`,
          `"${facName} command has been on edge lately. Something big coming."`,
          `"Heard there's a trader in trouble east of here. Might be worth checking out."`,
          `"Legion scouts were spotted near the ridge last week. Stay sharp."`,
          `"Word is the Khans are restless again. Keep your distance unless you're allied."`,
        ];
        return _preEncResolve(rndA(tips)+` ⭐ +${xpGain} XP`,area,step,travelMode,true);
      }
    });
  }

  // ── NEUTRAL / WARY encounters ──
  else if(!hostile&&isHuman&&(disp==='neutral'||disp==='wary')){
    choices.push({
      label:`💬 Approach carefully [${facName}, ${disp}]`,
      style:'bt pip',
      fn:()=>{
        const xpGain=rnd(6,12);S.xp+=xpGain;
        const repGain=R()<0.4?1:0;
        if(repGain)S.rep[fac]=(S.rep[fac]||0)+1;
        let msg=disp==='wary'
          ?`The ${facName} patrol eyes you warily. Hands stay near weapons, but nobody draws.`
          :`The ${facName} group watches you pass. No trouble — this time.`;
        if(repGain)msg+=` +1 ${facName} rep.`;
        msg+=` ⭐ +${xpGain} XP`;
        return _preEncResolve(msg,area,step,travelMode,true);
      }
    });

    // Persuade for supplies (CHA check)
    choices.push({
      label:`😏 Persuade for supplies [${checkLabel('CHA',cha,6)}]`,
      style:'bt',
      fn:()=>{
        if(R()<checkChance(cha,6)){
          const gifts=['stimpak','purified_water','ammo_9mm','sunset_sars'];
          const g=rndA(gifts);giveItem(g,1,{ignoreLimit:true});
          S.rep[fac]=(S.rep[fac]||0)+1;
          return _preEncResolve(`You talk them into sharing supplies. ${ITEMS[g]?.e} ${ITEMS[g]?.n} received. +1 ${facName} rep.`,area,step,travelMode,true);
        }
        return _preEncResolve(`They're not convinced. "Buy from a trader like everyone else." No harm done.`,area,step,travelMode,true);
      }
    });
  }

  // ── HOSTILE encounters — always have Fight ──
  if(hostile){
    choices.push({
      label:'⚔ Fight',
      style:'bt go',
      fn:()=>{
        if(travelMode){startCombat(enemies);combat.postT=tDest}
        else{startCombat(enemies);combat._expArea=area;combat._expStep=step}
      }
    });
  }else if(isAnimal||isUndead){
    // Always fight option for creatures
    choices.push({
      label:'⚔ Fight',
      style:'bt go',
      fn:()=>{
        if(travelMode){startCombat(enemies);combat.postT=tDest}
        else{startCombat(enemies);combat._expArea=area;combat._expStep=step}
      }
    });
  }

  // ── PROVOKE — attack non-hostile faction (rep cost) ──
  if(!hostile&&isHuman&&fac&&!ALWAYS_HOSTILE_FACS.has(fac)){
    choices.push({
      label:`⚔ Attack them [-5 ${facName} rep]`,
      style:'bt dn',
      fn:()=>{
        S.rep[fac]=(S.rep[fac]||0)-5;S.karma=(S.karma||0)-3;
        combat.log=['You attacked a '+facName+' patrol. This will have consequences.'];
        if(travelMode){startCombat(enemies);combat.postT=tDest}
        else{startCombat(enemies);combat._expArea=area;combat._expStep=step}
      }
    });
  }

  // ── Animals/insects ──
  if(isAnimal&&hasHunterPerk){
    choices.push({
      label:'🐾 Calm animal [Hunter perk]',
      style:'bt pip',
      fn:()=>_preEncResolve(`You extend your hand slowly. The ${enemies[0].name} circles once, then retreats. Hunter's instinct.`,area,step,travelMode,true)
    });
  }
  if(isAnimal&&S.animalFriend){
    choices.push({
      label:'🐾 Pacify [Animal Friend perk]',
      style:'bt pip',
      fn:()=>{
        if(R()<0.7){return _preEncResolve(`The creatures sense no threat from you and wander off.`,area,step,travelMode,true)}
        startFailedEncounter(enemies,area,step,travelMode,'Too agitated to pacify.');
      }
    });
  }
  if(isAnimal&&!isUndead){
    choices.push({
      label:`💪 Scare them off [${checkLabel('STR',str,6)}]`,
      style:'bt',
      fn:()=>{
        if(R()<checkChance(str,6)){
          return _preEncResolve(`You stand tall and shout. The creatures scatter.`,area,step,travelMode,true);
        }
        startFailedEncounter(enemies,area,step,travelMode,'Failed to scare off the creatures.');
      }
    });
  }

  // ── Intimidate hostile humans ──
  if(isHuman&&hostile){
    choices.push({
      label:`😠 Intimidate [${checkLabel('CHA',cha,7)}]`,
      style:'bt',
      fn:()=>{
        if(R()<checkChance(cha,7)){
          S.xp+=rnd(8,14);
          return _preEncResolve(`You meet their eyes and don't blink. They back down.`,area,step,travelMode,true);
        }
        startFailedEncounter(enemies,area,step,travelMode,'Intimidation failed.');
      }
    });
  }

  // ── Terrifying Presence perk ──
  if(isHuman&&hostile&&S.terrifyingPresence){
    choices.push({
      label:'😨 Terrifying Presence [perk — 80%]',
      style:'bt pip',
      fn:()=>{
        if(R()<0.8){
          S.xp+=rnd(10,18);
          return _preEncResolve(`Your reputation precedes you. They take one look and run.`,area,step,travelMode,true);
        }
        startFailedEncounter(enemies,area,step,travelMode,'"We\'re not scared of you." Apparently they are — but not enough.');
      }
    });
  }

  // ── Bribe hostile humans ──
  if(isHuman&&hostile){
    const bribeAmt=Math.max(20,enemies.length*15+S.level*5);
    choices.push({
      label:`💰 Bribe (${bribeAmt} caps · ${Math.round(checkChance(cha,6,rep/200)*100)}%)`,
      style:'bt',
      fn:()=>{
        if(S.caps<bribeAmt){notify('Not enough caps.');return null}
        S.caps-=bribeAmt;
        if(R()<checkChance(cha,6,rep/200)){
          return _preEncResolve(`You slide them the caps. They count it slowly and walk.`,area,step,travelMode,true);
        }
        startFailedEncounter(enemies,area,step,travelMode,'Bribe failed. They take the caps and reach for their weapons.');
      }
    });
  }

  // ── Sneak (always available except undead) ──
  if(!isUndead){
    const sneakBonus=S.lightStepPerk?0.1:0;
    choices.push({
      label:`🤫 Sneak past [${checkLabel('AGI',agi,6,sneakBonus)}]`,
      style:'bt',
      fn:()=>{
        if(R()<checkChance(agi,6,sneakBonus)){
          return _preEncResolve(`You move quietly through the terrain. They never spot you.`,area,step,travelMode,true);
        }
        startFailedEncounter(enemies,area,step,travelMode,'Sneak attempt spotted.');
      }
    });
  }

  // ── Retreat ──
  choices.push({
    label:'🏃 Retreat',
    style:'bt dn',
    fn:()=>{
      log('Retreated from '+(area?.n||'the road')+'.','e');
      if(travelMode){cancelTravel('You turn back before reaching your destination.')}
      else{$('TO').classList.remove('A');upAll()}
    }
  });

  // ── Render ──
  $('TS').innerHTML=enemies[0].e||'⚔';
  const dispLabel=isHuman&&fac?`<span style="color:${getDispositionColor(disp)}">${disp.toUpperCase()}</span> · ${facName}`
    :(hostile?`<span style="color:var(--red)">HOSTILE</span>`:`<span style="color:var(--amber)">WILD</span>`);
  $('TT').innerHTML=`<b>${enemyLabel}</b><br><span style="font-size:12px;color:var(--muted)">${dispLabel} · ${anchor.type}</span>`;
  const cd=$('TC');cd.innerHTML='';
  choices.forEach(ch=>{
    const btn=el('button',ch.style,'');
    btn.textContent=ch.label;btn.style.textAlign='left';btn.style.marginBottom='2px';
    btn.onclick=()=>ch.fn();
    cd.appendChild(btn);
  });
  $('TN').style.display='none';
}

function _preEncResolve(msg,area,step,travelMode,skipCombat){
  if(travelMode)clearTravelEncounterIcons();
  $('TC').innerHTML='';
  $('TS').innerHTML='✅';
  $('TT').innerHTML=`<span style="font-size:11px;color:var(--muted)">${msg}</span>`;
  chkLU();save();
  if(travelMode){
    $('TN').style.display='block';$('TN').onclick=()=>travelCont();
  }else if(area){
    $('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step);
  }else{
    // Scavenge encounter — close overlay and refresh
    $('TN').style.display='block';$('TN').onclick=()=>{$('TO').classList.remove('A');chkLU();upAll()};
  }
  return msg;
}

function explore(idx){
  const loc=LOCS[S.loc];const area=loc?.sur?.[idx];if(!area)return;
  const o=$('TO');o.classList.add('A');
  $('TB').style.width='0%';$('TC').innerHTML='';$('TN').style.display='none';
  $('TS').innerHTML=area.e;
  $('TT').innerHTML=`<b>${area.n}</b><br><span style="font-size:11px;color:var(--muted)">${area.d}</span>`;
  setTimeout(()=>runExpedition(area,0),500);
}
function runExpedition(area,step){
  const maxSteps=rnd(2,4);
  if(step>=maxSteps){
    $('TS').innerHTML=area.e;
    $('TT').innerHTML=`Finished scouting <b>${area.n}</b>.`;
    const cd=$('TC');cd.innerHTML='';
    const cb=el('button','bt go','🔍 Keep exploring');cb.style.textAlign='center';
    cb.onclick=()=>{cd.innerHTML='';$('TN').style.display='none';runExpedition(area,0)};cd.appendChild(cb);
    const rb=el('button','bt','🔙 Return to '+LOCS[S.loc]?.n);rb.style.textAlign='center';
    rb.onclick=()=>{$('TO').classList.remove('A');upAll()};cd.appendChild(rb);
    $('TN').style.display='none';return;
  }
  advanceTime(1);
  $('TB').style.width=Math.round(((step+1)/maxSteps)*100)+'%';
  const r=R();
  const _combatThresh=S.lightStepPerk?0.28:0.45;
  if(r<_combatThresh){
    const cnt=rnd(1,Math.min(2,area.en.length));
    const enemies=buildCohesiveGroup(area.en,cnt);
    if(!enemies.length){$('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step+1);return}
    preEncounter(enemies,area,step+1,false);
  } else if(r<.65){
    const li=rndA(area.lt);const it=ITEMS[li];
    if(it){giveItem(li);log('Found '+it.n+' in '+area.n+'.','e');save();
    $('TS').innerHTML='✨';
    $('TT').innerHTML=`<div style="text-align:center"><div style="display:flex;align-items:center;justify-content:center;width:64px;height:64px;background:#0f0f08;border:1px solid #3a3828;border-radius:10px;margin:6px auto">${it.e}</div><b style="color:var(--green);display:block;margin-top:4px">${it.n}</b></div>`;
    $('TC').innerHTML='';$('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step+1)}
  } else {
    // 25% chance of faction patrol in expedition areas
    const facPat=R()<0.25?rollFactionPatrol(S.loc):null;
    if(facPat&&facPat._factionAid){
      // Friendly faction aid during expedition
      const lines=handleFactionAid(facPat.aidData);
      const facName=FACTIONS[facPat.aidData.fac]||facPat.aidData.fac;
      $('TS').innerHTML='🏴';
      $('TT').innerHTML=`<b>${facName} Patrol</b><br><span style="font-size:12px;color:var(--muted)">${lines.join('<br>')}</span>`;
      $('TC').innerHTML='';$('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step+1);
      save();return;
    }else if(facPat&&facPat.length){
      preEncounter(facPat,area,step+1,false);return;
    }
    // 40% encounter card, rest is flavour
    const card=R()<0.60?rollEncounterCard(S.loc,area):null;
    if(card){
      showEncounterCard(card,area,step+1);
    }else{
      const scenes=["Tracks in the dirt — recent.","The wind shifts. Something watches.","Shell casings litter the ground.","A faded sign: DANGER - MINES","An old campfire, still warm."];
      $('TS').innerHTML=rndA(['🏜','💀','🪨','🌵']);
      $('TT').innerHTML=rndA(scenes);
      $('TC').innerHTML='';$('TN').style.display='block';$('TN').onclick=()=>runExpedition(area,step+1);
    }
  }
}

function takeLootEntry(corpseIndex,entryIndex){
  if(!combat||!combat.corpses||!combat.corpses[corpseIndex])return;
  const corpse=combat.corpses[corpseIndex];
  if(corpse.taken)return;

  const entry=corpse.loot[entryIndex];
  if(!entry||entry.taken)return;

  if(entry.type==='caps'){
    S.caps+=entry.amount;
    S.capsEarned=(S.capsEarned||0)+entry.amount;
    notify(`💰 +${entry.amount} caps`);
  }else if(entry.type==='item'&&ITEMS[entry.id]){
    const added=giveItem(entry.id);
    if(!added)return;
    notify(`${ITEMS[entry.id].e} ${ITEMS[entry.id].n}`);
  }

  entry.taken=true;

  if(corpse.loot.every(x=>x.taken)){
    corpse.taken=true;
    log(`Looted ${corpse.name}.`,'e');
  }

  renderCombat();
  queueSave();
}

function lootAllCorpse(corpseIndex){
  if(!combat||!combat.corpses||!combat.corpses[corpseIndex])return;
  const corpse=combat.corpses[corpseIndex];
  if(corpse.taken)return;

  let gotSomething=false;

  corpse.loot.forEach(entry=>{
    if(entry.taken)return;

    if(entry.type==='caps'){
      S.caps+=entry.amount;
      S.capsEarned=(S.capsEarned||0)+entry.amount;
      entry.taken=true;
      gotSomething=true;
      return;
    }

    if(entry.type==='item'&&ITEMS[entry.id]){
      const added=giveItem(entry.id);
      if(added){
        entry.taken=true;
        gotSomething=true;
      }
    }
  });

  if(corpse.loot.every(x=>x.taken)){
    corpse.taken=true;
    log(`Looted ${corpse.name}.`,'e');
  }

  if(gotSomething)notify(`🎒 Looted ${corpse.name}`);
  renderCombat();
  queueSave();
}

function lootAllCorpses(){
  if(!combat||!combat.corpses)return;
  combat.corpses.forEach((corpse,i)=>{
    if(!corpse.taken)lootAllCorpse(i);
  });
}
function finishCombatLoot(){
  const lootCaps=combat.pendingRewards?.caps||0;
  const lootXp=grantXP(combat.pendingRewards?.xp||0);
  const bounty=combat.pendingRewards?.bounty;
  const questComplete=combat.questComplete;
  const expArea=combat._expArea;
  const postT=combat.postT;

  S.xp+=lootXp;
  if(lootCaps>0){
    S.caps+=lootCaps;
    S.capsEarned=(S.capsEarned||0)+lootCaps;
  }

  const lines=[`⭐ +${lootXp} XP`];
  if(lootCaps>0)lines.push(`💰 +${lootCaps} combat reward caps`);
  if(combat._encTitle||combat._encResult){
    if(combat._encTitle)lines.push('📌 '+combat._encTitle);
    if(combat._encResult)lines.push(String(combat._encResult));
  }

  if(bounty){
    const bonusCaps=rnd(bounty.caps[0],bounty.caps[1]);
    S.caps+=bonusCaps;S.capsEarned+=bonusCaps;
    S.xp+=bounty.xp;
    lines.push('🎯 Bounty claimed: '+bounty.name);
    lines.push('💰 +'+bonusCaps+' caps bonus');
    lines.push('⭐ +'+bounty.xp+' XP bonus');
    if(bounty.rep){Object.entries(bounty.rep).forEach(([fac,val])=>{S.rep[fac]=(S.rep[fac]||0)+val;lines.push('🏴 +'+val+' '+(FACTIONS[fac]||fac)+' standing')})}
    if(S.flags.bountyBoard)S.flags.bountyBoard.current=null;
    log('Claimed bounty on '+bounty.name+'.','q');
  }
  if(questComplete==='gs_ghost_town_gunfight')gsFinishGhostQuest(lines);

  // Check deep quest combat hooks
  if(checkPostCombatQuestHooks()){
    $('CO').style.display='none';combat=null;chkLU();save();return;
  }

  const pendingWEId=combat._pendingWEId;
  const pendingWEResult=combat._pendingWEResult;

  updateSideTasks(lines);
  $('CO').style.display='none';
  combat=null;
  chkLU();save();

  // Resolve pending world event if combat was triggered by one
  if(pendingWEId){
    const ev=S.worldEvents.find(e=>e.id===pendingWEId);
    if(ev&&!ev.resolved&&pendingWEResult){
      resolveWorldEvent(ev,pendingWEResult);
      const resultLines=[...lines];
      if(pendingWEResult.postText)resultLines.push(pendingWEResult.postText);
      if(pendingWEResult.repDelta)Object.entries(pendingWEResult.repDelta).forEach(([fac,v])=>{if(v!==0)resultLines.push((FACTIONS[fac]||fac)+': '+(v>0?'+':'')+v+' rep')});
      showResult('Victory!','⚔',resultLines,'Continue','upAll()');
      return;
    }
  }

  if(postT){
    showResult('Victory!','⚔',lines,'Continue','resumeTravelAfterCombat()');
  } else if(expArea){
    showResult('Victory!','⚔',lines,'Continue','resumeExpeditionAfterCombat()');
  } else {
    showResult('Victory!','⚔',lines,'Continue','upAll()');
  }
}

function rollPlayerCrit(vats=false){
  const chance=Math.min(0.95,calcCritChance()*(vats?2.5:1));
  return R()<chance;
}
function playerHitDamage(attack,target,vats=false){
  const crit=rollPlayerCrit(vats);
  const mult=vats?(crit?2.25:1.5):(crit?2:1);
  const variance=vats?rnd(0,2):rnd(-1,1);
  let bonus=0;
  // Perk damage bonuses
  if(S.bloodyMess)bonus+=Math.max(1,Math.round(attack.atk*0.05));
  if(S.nerdRage&&S.hp<=Math.floor(S.maxHp*0.25))bonus+=15;
  if(S.entomologistPerk&&target.type==='insect')bonus+=Math.round(attack.atk*0.5);
  if(S.hunterDmg&&(target.type==='animal'||target.type==='insect'))bonus+=S.hunterDmg;
  if(S.centerMass&&attack.gun&&!vats)bonus+=S.centerMass;
  return {crit,dmg:fnvDTDamage(Math.round(attack.atk*mult)+variance+bonus,target.d,FNV_NORMAL.playerDamage)};
}

function openCombatInventory(mode='all'){
  if(!combat)return;
  const panel=$('CP');
  const counts={};(S.inv||[]).forEach(id=>{counts[id]=(counts[id]||0)+1});
  const rows=Object.entries(counts).filter(([id,c])=>{
    const it=ITEMS[id];if(!it)return false;
    if(mode==='weapons')return it.t==='w';
    if(mode==='aid')return it.t==='c'||it.t==='chem'||it.hp||it.buff;
    return it.t==='w'||it.t==='c'||it.t==='chem'||it.hp||it.buff;
  });

  // Sort aid items: highest HP first, then chems
  if(mode==='aid')rows.sort((a,b)=>{const ia=ITEMS[a[0]],ib=ITEMS[b[0]];return(ib.hp||0)-(ia.hp||0)});

  // Show currently equipped weapon at top of weapon list

        <div style="font-size:10px;color:var(--muted);margin:2px 0">${w.desc||''} ${w.a?'ATK +'+w.a:''}${ammo}</div>

        <div class="inv-row"><div style="flex:1">👊 <b>Unarmed</b></div><div style="font-size:10px;color:var(--amber)">EQUIPPED</div></div>
      </div>`;
    }
  }

  // Show current HP in aid mode
  let hpBarHtml='';
  if(mode==='aid'){
    const hp=hpPct(S.hp,S.maxHp);
    hpBarHtml=`<div style="margin-bottom:8px;padding:4px 6px;background:#0a1a0a;border-radius:4px;border:1px solid #1a3a1a">
      <div style="font-size:11px;margin-bottom:2px">❤ ${S.hp}/${S.maxHp}${S.ap!==undefined?' · ⚡ '+S.ap+'/'+S.maxAp:''}</div>
      <div class="hb"><div class="hf ${hp<=25?'cr':'g'}" style="width:${hp}%"></div></div>
    </div>`;
  }

  panel.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
    <button class="bt sm" onclick="renderCombat()">‹ Back</button>
    <div style="flex:1;font-size:13px;font-weight:bold;color:var(--amber)">${title}</div>
  </div>
  <div style="font-size:10px;color:var(--muted);margin-bottom:8px">${subtitle}</div>
  ${hpBarHtml}${equippedHtml}
  ${rows.length?rows.map(([id,c])=>{const it=ITEMS[id];const ammo=it.ammo?` · Ammo: ${ITEMS[it.ammo]?.n||'ammo'} ×${countItem(it.ammo)}`:'';const hpInfo=it.hp?`<span style="color:var(--green)">+${it.hp} HP</span> `:'';const apInfo=it.buff&&it.buff.ap?`<span style="color:var(--ap-blue)">+${it.buff.ap} AP</span> `:'';const dmgInfo=it.buff&&it.buff.dmg?`<span style="color:var(--red)">+${it.buff.dmg} DMG</span> `:'';const drInfo=it.buff&&it.buff.dr?`<span style="color:var(--amber)">+${it.buff.dr} DR</span> `:'';return `<div class="inv-card">

    <div>${it.t==='w'?`<button class="bt sm go" onclick="combatEquipItem('${id}')">Equip</button>`:''}${(it.t==='c'||it.t==='chem'||it.hp||it.buff)?`<button class="bt sm pip" onclick="combatUseItem('${id}')">Use</button>`:''}</div>

function combatEquipItem(id){
  if(!combat){renderCombat();return}
  const idx=S.inv.indexOf(id);if(idx===-1){notify('Item not found.');renderCombat();return}
  const it=ITEMS[id];if(!it||it.t!=='w'){renderCombat();return}
  if(S.gear.w)giveItem(S.gear.w,1,{ignoreLimit:true,silent:true});
  S.gear.w=id;S.inv.splice(idx,1);
  let msg=`Equipped ${it.n}.`;
  if(S.rapidReload){S.ap=Math.min(S.maxAp,S.ap+5);msg+=` Rapid Reload: +5 AP!`}
  combat.log.push(msg);notify('Equipped '+it.n);save();renderCombat();
}
function combatUseItem(id){
  if(!combat){renderCombat();return}
  const idx=S.inv.indexOf(id);if(idx===-1){notify('Item not found.');renderCombat();return}
  const it=ITEMS[id];if(!it){renderCombat();return}
  let lines=[];
  let totalHeal=0;
  if(it.hp){
    let heal=it.hp;
    if(S.triagePerk&&(id==='stimpak'||id==='super_stimpak'||id==='doctor_bag'||id==='healing_powder'||id==='antivenom')){heal=Math.round(heal*1.25)}
    if(S.leadBelly&&(id==='nuka_cola'||id==='sunset_sars'||id==='fancy_lad'||id==='cram'||id==='iguana_bits'||id==='gecko_steak'||id==='bighorner_meat'||id==='purified_water'||id==='dirty_water')){heal=Math.round(heal*1.5)}
    const before=S.hp;
    S.hp=Math.min(S.maxHp,S.hp+heal);
    totalHeal=S.hp-before;
    lines.push('+'+totalHeal+' HP ('+S.hp+'/'+S.maxHp+')');
  }
  if(it.buff&&it.buff.ap){let apGain=it.buff.ap;if(S.chemResistant)apGain+=10;S.ap=Math.min(S.maxAp,S.ap+apGain);lines.push('+'+apGain+' AP')}
  if(it.buff&&it.buff.dmg){lines.push('+'+it.buff.dmg+' DMG')}
  if(it.buff&&it.buff.dr){lines.push('+'+it.buff.dr+' DR')}
  S.inv.splice(idx,1);
  combat.log.push(`Used ${it.n}${lines.length?' ('+lines.join(', ')+')':''}.`);
  notify(totalHeal>0?'Used '+it.n+' +'+totalHeal+' HP':'Used '+it.n);
  // Using items is a FREE action — no enemy turn, no turn increment
  upSB();save();renderCombat();
}
  
function combatAction(act){
  if(!combat)return;
  const alive=combat.enemies.filter(en=>en.hp>0);
  if(!alive.length){endCombat(true);return}
  const target=alive[0];

  switch(act){
    case 'attack':{
      const attack=getCombatAttackProfile(true);
      const hit=playerHitDamage(attack,target,false);
      const dmg=hit.dmg;
      target.hp=Math.max(0,target.hp-dmg);
      markEnemyHit(target,hit.crit);
      if(attack.gun&&attack.hadAmmo){
        combat.log.push(`${hit.crit?'CRITICAL HIT! ':''}You fire ${attack.weapon.n} and deal ${dmg} damage to ${target.name}.`);
      }else if(attack.gun&&!attack.hadAmmo){
        combat.log.push(`${hit.crit?'CRITICAL HIT! ':''}Out of ${attack.ammoName}! You swing ${attack.weapon.n} and deal ${dmg} damage to ${target.name}.`);
        notify('Out of '+attack.ammoName+'! Weak melee attack only.');
      }else{
        combat.log.push(`${hit.crit?'CRITICAL HIT! ':''}You deal ${dmg} damage to ${target.name}.`);
      }
      S.ap=Math.max(0,S.ap-8);
      if(target.hp<=0){
        combat.log.push(`${target.name} is killed!`);
        log('Killed '+target.name+'.','c');
        S.kills[target.id||'unknown']=(S.kills[target.id||'unknown']||0)+1;
        S.killCount++;
      }
      break;
    }
    case 'vats':{
      if(S.ap<20){notify('Not enough AP!');return}
      const attack=getCombatAttackProfile(true);
      if(attack.gun&&!attack.hadAmmo){
        notify('No '+attack.ammoName+' loaded.');
        combat.log.push(`V.A.T.S. failed — no ${attack.ammoName}.`);
        renderCombat();
        return;
      }
      S.ap-=20;
      const hit=playerHitDamage(attack,target,true);
      const crit=hit.crit;
      const dmg=hit.dmg;
      target.hp=Math.max(0,target.hp-dmg);
      markEnemyHit(target,crit);
      if(attack.gun)combat.log.push(`V.A.T.S.! ${crit?'CRITICAL! ':''}${dmg} damage to ${target.name} with ${attack.weapon.n}!`);
      else combat.log.push(`V.A.T.S.! ${crit?'CRITICAL! ':''}${dmg} damage to ${target.name}!`);
      if(target.hp<=0){
        combat.log.push(`${target.name} eliminated!`);
        log('Killed '+target.name+' (V.A.T.S.).','c');
        S.kills[target.id||'unknown']=(S.kills[target.id||'unknown']||0)+1;
        S.killCount++;
        if(S.grimReaper){S.ap=Math.min(S.maxAp,S.ap+20);combat.log.push("Grim Reaper's Sprint: +20 AP!")}
      }
      break;
    }
    case 'heal':{
      // Legacy fallback — redirect to aid inventory
      openCombatInventory('aid');
      return;
    }
    case 'flee':{
      const flee=R()<(.3+S.spd*.05+(S.special?S.special[5]*.03:0)+(S.travelLight?0.1:0));
      if(flee){combat.log.push('You escaped!');log('Fled from combat.','c');endCombat(false);return}
      else{combat.log.push('Failed to escape!');}
      break;
    }
  }

  const survivors=combat.enemies.filter(en=>en.hp>0);
  if(!survivors.length){endCombat(true);return}

  // Rad Child regen
  if(S.radChild&&S.hp<S.maxHp){S.hp=Math.min(S.maxHp,S.hp+3);combat.log.push('Rad Child: +3 HP regen.')}

  // Enemy turn — group identical enemies in log
  const atkGroups={};
  survivors.forEach(en=>{
    const eDmg=fnvDTDamage(en.a+rnd(-1,1),defPow(),FNV_NORMAL.enemyDamage);
    S.hp=Math.max(0,S.hp-eDmg);
    if(!atkGroups[en.name])atkGroups[en.name]={count:0,totalDmg:0};
    atkGroups[en.name].count++;
    atkGroups[en.name].totalDmg+=eDmg;
  });
  Object.entries(atkGroups).forEach(([name,g])=>{
    if(g.count>1)combat.log.push(`${g.count}× ${name} deal ${g.totalDmg} total damage.`);
    else combat.log.push(`${name} deals ${g.totalDmg} damage.`);
  });

  if(S.hp<=0){combat.log.push('You are critically wounded!');endCombat(false,true);return}
  combat.turn++;
  renderCombat();
}
function endCombat(won,died){
  if(!combat){$('CO').style.display='none';return}
  const expArea=combat._expArea;
  const expStep=combat._expStep;
  const postT=combat.postT;
  $('CO').style.display='none';
  window._resumeArea=expArea||null;
  window._resumeStep=expStep||0;

  if(died){
    S.hp=Math.floor(S.maxHp*.3);S.caps=Math.max(0,S.caps-rnd(10,30));
    combat=null;save();
    if(postT){
      showResult('Knocked Out','💀',['You wake up later, stripped of some caps.','Lost some caps.'],'Continue','resumeTravelAfterCombat()');
    }else{
      showResult('Knocked Out','💀',['You wake up later, stripped of some caps.','Lost some caps.'],'Continue','upAll()');
    }
    return;
  }
  if(!won){
    combat=null;save();
    if(postT){showResult('Escaped Combat','🏃',['You got away and kept moving.'],'Continue','resumeTravelAfterCombat()');}
    else if(expArea){showResult('Retreated','🏃',['You escaped the fight.'],'Continue','resumeExpeditionAfterCombat()');}
    else{upAll();}
    return;
  }

  let totalXp=0,totalCaps=0;
  const corpses=[];
  combat.enemies.forEach(en=>{
    totalXp+=en.xp;
    totalCaps+=rnd(3,8+S.level*2);
    corpses.push({
      name:en.name,
      icon:en.e,
      loot:buildEnemyLoot(en).map(x=>({...x,taken:false})),
      taken:false
    });
  });

  combat.pendingRewards={xp:totalXp,caps:totalCaps,bounty:combat.bountyTarget||null};
  combat.corpses=corpses;
  combat.lootPhase=true;
  renderCombat();
  return;
}

// LEVEL UP
// ============================================================
let _pendingLevelUps=0;

// Per-level stat gains beyond HP+5
function applyLevelBonuses(level){
  // Every level: +5 HP (already in syncFNVStats)
  // Every 3 levels: +2 AP
  if(level%3===0){S.maxAp+=2;S.ap=Math.min(S.ap+2,S.maxAp)}
  // Every 5 levels: +1 base ATK
  if(level%5===0){S.atk=(S.atk||0)+1}
  // Every 4 levels: +1 base DEF
  if(level%4===0){S.def=(S.def||0)+1}
}

function chkLU(){
  let levelled=false;
  while(S.xp>=xpNeed(S.level)){
    S.xp-=xpNeed(S.level);S.level++;
    applyLevelBonuses(S.level);
    syncFNVStats(true);
    const bonuses=['HP +5'];
    if(S.level%3===0)bonuses.push('AP +2');
    if(S.level%5===0)bonuses.push('ATK +1');
    if(S.level%4===0)bonuses.push('DEF +1');
    log('Level up! Now level '+S.level+'. '+bonuses.join(', ')+'.','q');
    if(calcPerkDue(S.level))_pendingLevelUps++;
    levelled=true;
  }
  if(_pendingLevelUps) showPerkScreen();
  else if(levelled){notify('⬆ LEVEL '+S.level+'!');upSB()}
}

function perkOwned(id){return (S.perks||[]).includes(id)}

function perkMeetsReq(p){
  if(!p.req) return true;
  if(p.req.level && S.level < p.req.level) return false;
  if(p.req.special !== undefined && S.special[p.req.special] < p.req.min) return false;
  if(p.req.perk && !perkOwned(p.req.perk)) return false;
  // Block Intense Training if that stat is already maxed
  const itMap={it_str:0,it_per:1,it_end:2,it_cha:3,it_int:4,it_agi:5,it_lck:6};
  if(itMap[p.id]!==undefined && S.special[itMap[p.id]]>=10) return false;
  return true;
}

function showPerkScreen(){
  if(!_pendingLevelUps) return;
  if(!S.perks) S.perks=[];

  const panel=$('PP');
  const pool=PERKS.filter(p=>!perkOwned(p.id));
  const meetable=pool.filter(p=>perkMeetsReq(p));

  if(!meetable.length && !pool.length){
    _pendingLevelUps=0;
    notify('⬆ LEVEL '+S.level+'! All perks acquired!');
    upSB();save();return;
  }

  // Build level-up stat summary
  const bonuses=['❤ HP +5'];
  if(S.level%3===0)bonuses.push('⚡ AP +2');
  if(S.level%5===0)bonuses.push('⚔ ATK +1');
  if(S.level%4===0)bonuses.push('🛡 DEF +1');

  // Group available perks by category
  const perkCats=['Training','Combat','Survival','Social','Utility'];
  const catIcons={Training:'🏋️',Combat:'⚔️',Survival:'❤️',Social:'💬',Utility:'🔧'};

  let catSections='';
  perkCats.forEach(cat=>{
    const catMeetable=meetable.filter(p=>p.cat===cat);
    if(!catMeetable.length)return;
    catSections+=`<div style="margin-top:8px">
      <div style="font-size:10px;font-weight:bold;color:var(--amber2);letter-spacing:1px;margin-bottom:4px">${catIcons[cat]||''} ${cat.toUpperCase()} (${catMeetable.length})</div>
      ${catMeetable.map(p=>{
        // Build requirement text for display
        let reqParts=[];
        if(p.req&&p.req.perk){const pp=PERKS.find(x=>x.id===p.req.perk);if(pp)reqParts.push('Requires: '+pp.name)}
        const itMap2={it_str:0,it_per:1,it_end:2,it_cha:3,it_int:4,it_agi:5,it_lck:6};
        let itInfo='';
        if(itMap2[p.id]!==undefined){itInfo=SPECIAL_NAMES[itMap2[p.id]]+' '+S.special[itMap2[p.id]]+'→'+(S.special[itMap2[p.id]]+1)}
        return `<div class="perk-card" onclick="pickPerk('${p.id}')" style="display:flex;align-items:flex-start;gap:10px">
          <div class="perk-icon">${p.icon}</div>
          <div style="flex:1">
            <div class="perk-name">${p.name}</div>
            <div class="perk-desc">${p.desc}</div>
            ${itInfo?'<div style="font-size:10px;color:var(--green2);margin-top:2px">'+itInfo+'</div>':''}
            ${reqParts.length?'<div style="font-size:9px;color:var(--amber2);margin-top:2px">'+reqParts.join(' · ')+'</div>':''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  });

  // Count locked perks for info
  const lockedCount=pool.length-meetable.length;

  panel.innerHTML=`
    <div style="text-align:center;margin-bottom:6px">
      <div style="font-size:32px;margin-bottom:4px">⬆</div>
      <div style="font-size:17px;font-weight:bold;color:var(--amber);letter-spacing:2px">LEVEL ${S.level}</div>
      <div style="display:flex;justify-content:center;gap:8px;margin:6px 0;flex-wrap:wrap">
        ${bonuses.map(b=>'<span style="font-size:10px;padding:2px 8px;background:#1a2a1a;border:1px solid #2a4a2a;border-radius:10px;color:var(--green)">'+b+'</span>').join('')}
      </div>
      ${_pendingLevelUps>1?'<div style="font-size:10px;color:var(--green);margin-top:2px">'+_pendingLevelUps+' perk choices pending</div>':''}
      <div style="font-size:10px;color:var(--muted);margin-top:4px">${meetable.length} perks available${lockedCount?' · '+lockedCount+' locked':''} · Choose one</div>
    </div>
    <div style="max-height:55vh;overflow-y:auto;padding-right:4px">
      ${catSections}
    </div>
    <div style="margin-top:8px;display:flex;gap:6px">
      <button class="bt" style="flex:1;text-align:center;font-size:11px" onclick="skipPerk()">Skip — bank +50 XP</button>
    </div>`;

  $('PO').classList.add('A');
  upSB();
}

function pickPerk(id){
  const p=PERKS.find(x=>x.id===id);
  if(!p||!perkMeetsReq(p))return;
  if(!S.perks)S.perks=[];
  S.perks.push(id);
  p.apply(S);
  log('Perk: '+p.name+' — '+p.desc,'q');
  _pendingLevelUps--;
  $('PO').classList.remove('A');
  showResult('Perk Acquired',''+p.icon,
    [`<b style="color:var(--amber)">${p.name}</b>`, p.desc, '⭐ Level '+S.level],
    _pendingLevelUps?'Next Level Up':'Continue',
    _pendingLevelUps?'showPerkScreen()':'upAll()');
  save();
}

function skipPerk(){
  S.xp+=50;
  log('Skipped perk — banked +50 XP.','q');
  _pendingLevelUps--;
  $('PO').classList.remove('A');
  if(_pendingLevelUps) showPerkScreen();
  else{notify('⬆ LEVEL '+S.level+'!');upAll();}
  save();
}

// ── Quest 1: "Come Fly With Me" (Novac / REPCONN) ──────────
// Manny Vargas points you to REPCONN. Ghouls want to launch rockets.
// Choice: help them launch, sabotage, or kill the nightkin leader.
function cfwmQuest(){return (S.quests||[]).find(q=>q.id==='novac_come_fly')||null}
function cfwmActive(){const q=cfwmQuest();return !!(q&&!q.done)}
function cfwmDone(){const q=cfwmQuest();return !!(q&&q.done)}
function cfwmRefresh(){
  const q=cfwmQuest();if(!q||q.done)return;
  const s=S.flags.cfwm_stage||0;
  if(s===0)q.progText='Travel to REPCONN Test Site and investigate the ghoul activity.';
  if(s===1)q.progText='Clear the basement of nightkin. Davison wants a shipment of Stealth Boys.';
  if(s===2)q.progText='Decide: help the ghouls launch, sabotage the rockets, or negotiate with Davison.';
  if(s===3)q.progText='Return to Manny Vargas in Novac with news.';
}
function cfwmStart(){
  if(cfwmDone()){closeDlg();showResult('Manny Vargas','🎯',['The REPCONN business is already settled.'],'Continue','upAll()');return}
  if(cfwmActive()){cfwmRefresh();closeDlg();showResult('Come Fly With Me','📜',[cfwmQuest().progText],'Continue','upAll()');return}
  S.quests.push({id:'novac_come_fly',name:'Come Fly With Me',desc:'Manny says ghouls at REPCONN are building rockets. Something about the Great Journey. Nightkin are in the basement.',t:'custom',progText:'Travel to REPCONN Test Site and investigate.',rg:200,rx:120,fac:'Novac',repBonus:8,giver:'Manny Vargas',done:false});
  S.flags.cfwm_stage=0;
  log('Accepted: Come Fly With Me','q');notify('📜 Quest accepted!');
  closeDlg();showResult('New Quest!','📜',['<b>Come Fly With Me</b>','Manny says the ghouls at REPCONN have been building something in the upper levels. Nightkin are in the basement, and the whole place is dangerous.','He asks you to clear it out — or at least figure out what they want.','Travel to REPCONN Test Site near Novac.'],'Continue','upAll()');
}
function cfwmEnterRepconn(){
  if(!cfwmActive())return;
  const s=S.flags.cfwm_stage||0;
  if(s===0){
    S.flags.cfwm_stage=1;cfwmRefresh();
    closeBld();
    const enemies=[mkEnemy('feral_ghoul'),mkEnemy('feral_ghoul'),mkEnemy('nightkin')];
    combat={enemies,turn:0,log:['The REPCONN basement is crawling with nightkin and feral ghouls.','A massive Super Mutant called Davison guards the lower level.']};

    h+='<div class="npc-line">"The bright one speaks! Jason Bright\'s followers have built rockets in the launch bay. They want to fly to a promised land. The nightkin leader Davison is holed up below, hunting for Stealth Boys."</div>';
    h+='<div style="font-size:10px;color:var(--muted);margin:8px 0">Jason Bright, a glowing ghoul in robes, approaches you with calm certainty. Behind him, ghouls in jumpsuits work on pre-war rockets.</div>';

    h+='<button class="bt pip" onclick="cfwmChoose(\'sabotage\')">💥 Sabotage the rockets — they\'ll never fly</button>';
    h+='<button class="bt" onclick="cfwmChoose(\'negotiate\')">🤝 Negotiate with Davison — trade Stealth Boys for peace</button>';
    h+='<button class="bt dn" onclick="closeDlg()">Leave for now</button>';

// ============================================================
function getNpcRolePool(ctx={}){
  const locId=ctx.loc||S.loc||'';
  const bId=(ctx.bId||'').toLowerCase();
  const fac=((ctx.fac||((LOCS[locId]||{}).fac)||'')+'').toLowerCase();

  if(fac==='bos'||bId.includes('bos')||locId==='HiddenValley')return['Brotherhood Knight','Brotherhood Paladin','Brotherhood Scribe','Brotherhood Initiate','Brotherhood Guard','Brotherhood Technician'];
  if(fac==='ncr'||['CampMcCarran','CampGolf','BitterSprings','HeliosOne','HooverDam','MojaveOutpost','CampForlornHope'].includes(locId)||/(mccarran|golf|bitter|helios|outpost|dam|forlorn)/.test(bId))return['NCR Trooper','NCR Ranger','NCR Scout','NCR Officer','NCR Medic','NCR Engineer'];
  if(fac==='powdergangers'||locId==='NCRCF'||bId.includes('ncrcf'))return['Powder Ganger','Powder Ganger Trader','Prisoner','Powder Ganger Guard','Escaped Convict'];
  if(fac==='legion'||locId==='TheFort'||locId==='NelsonCamp'||locId==='CottonwoodCove'||/(legion|caesar|cove)/.test(bId))return['Legion Recruit','Legion Veteran','Legion Scout','Legion Handler','Legion Priest'];
  if(fac==='boomers'||locId==='NellisAFB'||bId.includes('nellis'))return['Boomer Guard','Boomer Mechanic','Boomer Pilot','Boomer Loader','Boomer Doctor'];
  if(fac==='kings'||locId==='FreesideN'||/(king|wrangler|mick|mormon|silver_rush|cerulean)/.test(bId))return['Merchant','Drifter','King Member','Mechanic','Doctor','Guard'];
  return['Trader','Prospector','Drifter','NCR Trooper','Caravan Guard','Settler','Scavenger','Doctor','Gambler','Bounty Hunter','Mechanic','Farmer'];
}
function inferNpcIcon(npc,ctx={}){
  // 1. Central registry by name — one-stop shop for all named NPC icons
  if(npc.name&&NPC_ICON[npc.name])return NPC_ICON[npc.name];
  // 2. Explicit icon on the NPC data object
  if(npc.icon)return npc.icon;

  const locId=ctx.loc||npc.loc||S.loc||'';
  const bId=(ctx.bId||'').toLowerCase();
  const role=((npc.role||'')+'').toLowerCase();
  const fac=((npc.fac||ctx.fac||((LOCS[locId]||{}).fac)||'')+'').toLowerCase();
  if(fac==='bos'||bId.includes('bos')||locId==='HiddenValley'||role.includes('brotherhood'))return(role.includes('scribe')||role.includes('technician')||role.includes('scientist'))?ICONS.NPC.BOS_SCRIBE:ICONS.NPC.BOS;
  if(fac==='ncr'||role.includes('ncr')||['CampMcCarran','CampGolf','BitterSprings','HeliosOne','HooverDam','MojaveOutpost','CampForlornHope'].includes(locId)||/(mccarran|golf|bitter|helios|outpost|dam|forlorn)/.test(bId)){
    if(role.includes('ranger'))return ICONS.NPC.NCR_RANGER;
    if(role.includes('medic')||role.includes('doctor'))return ICONS.NPC.NCR_MEDIC;
    if(role.includes('officer')||role.includes('sergeant')||role.includes('lieutenant')||role.includes('captain')||role.includes('major')||role.includes('chief')||role.includes('command'))return ICONS.NPC.NCR_COMMAND;
    if(role.includes('scout'))return ICONS.NPC.NCR_SCOUT;
    return ICONS.NPC.NCR;
  }
  if(fac==='followers'||role.includes('follower'))return ICONS.NPC.FOLLOWERS;
  if(fac==='powdergangers'||locId==='NCRCF'||bId.includes('ncrcf')||role.includes('powder ganger'))return role.includes('trader')?ICONS.NPC.POWDER_TRADER:(role.includes('prisoner')||role.includes('convict')?ICONS.NPC.PRISONER:ICONS.NPC.POWDER_GANGER);
  if(fac==='kings'||role.includes('king'))return ICONS.NPC.KINGS;
  if(fac==='boomers'||locId==='NellisAFB'||bId.includes('nellis')||role.includes('boomer'))return role.includes('doctor')?ICONS.NPC.DOCTOR:(role.includes('mechanic')?ICONS.NPC.MECHANIC:ICONS.NPC.BOOMERS);
  if(role.includes('merchant')||role.includes('trader'))return ICONS.NPC.MERCHANT;
  if(role.includes('cook'))return ICONS.NPC.COOK;
  if(role.includes('robot'))return ICONS.NPC.ROBOT;
  if(role.includes('law')||role.includes('deputy')||role.includes('guard'))return ICONS.NPC.LAW;
  if(role.includes('doctor'))return ICONS.NPC.DOCTOR;
  if(role.includes('mechanic')||role.includes('engineer')||role.includes('technician'))return ICONS.NPC.MECHANIC;
  if(role.includes('ranch'))return ICONS.NPC.RANCHER;
  if(role.includes('entertainer'))return ICONS.NPC.ENTERTAINER;
  return npc.male?ICONS.NPC.MALE:ICONS.NPC.FEMALE;
}
function mkNPC(ctx={}){
  const male=R()<.5;
  const name=(male?rndA(FM):rndA(FF))+' '+rndA(LN);
  const role=rndA(getNpcRolePool(ctx));
  const npc={name,male,age:rnd(18,55),role,loc:ctx.loc||S.loc,fac:ctx.fac||((LOCS[ctx.loc||S.loc]||{}).fac)||''};
  npc.icon=inferNpcIcon(npc,ctx);
  return npc;
}
function getBuildingNpcKey(loc,bId,slot='main'){
  return `${loc||S.loc}::${bId}::${slot}`;
}
function getBuildingNpc(loc,bId,ctx={},slot='main'){
  if(!S.buildingNpcs)S.buildingNpcs={};

  if(!S.buildingNpcs[key]){

function getBuildingNpcGroup(loc,bId,countFactory,ctx={},slot='group'){

  return S.buildingNpcs[key];
}

function npcAct(action,name){
  let rel=S.relationships.find(r=>r.name===name);
  if(!rel){rel={name,rel:'stranger',aff:0,male:R()<.5,age:rnd(20,50),role:'Wastelander',loc:S.loc,icon:null,met:S.days};S.relationships.push(rel)}
  let msg='',affChange=0;

  switch(action){
    case 'chat': affChange=rnd(3,8);msg=rndA(["You swap stories about the wasteland.","You talk about the NCR and Legion.","A pleasant conversation about survival.","You discuss trade routes."]);break;
    case 'compliment': if(R()<.8){affChange=rnd(5,12);msg=rndA(["They appreciate the kind words.","They smile.","That seemed to land well."])}else{affChange=-3;msg="They seem suspicious of flattery."};break;
    case 'flirt': if(R()<.5+(S.special?S.special[3]*.04:0)){affChange=rnd(8,18);msg=rndA(["They blush.","They lean closer.","Chemistry in the wasteland."])}else{affChange=-5;msg="Awkward silence."}break;
    case 'drink': if(S.caps<5){notify("Not enough caps.");return}S.caps-=5;affChange=rnd(5,15);msg="You share drinks. Trust builds.";break;
    case 'quest':
      if(R()<.5){
        const q=mkQuest(name);
        window._pendingQuest=q;closeDlg();showResult('New Quest!','📜',[`<b>${q.name}</b>`,q.desc,`💰 ${q.rg} caps · ⭐ ${q.rx} XP`],'Accept','acceptPendingQuest()');
        return;
      }else{msg="They don't have anything right now."};break;
    case 'recruit':
      if(S.companions.length>=2){notify("Max 2 companions.");return}
      if(rel.aff<40){notify("Not friendly enough.");return}
      S.companions.push({name,hp:40+S.level*5,maxHp:40+S.level*5,atk:5+S.level,def:3+Math.floor(S.level*.5),male:rel.male,role:rel.role||'Companion',loc:rel.loc||S.loc,fac:rel.fac,icon:rel.icon||inferNpcIcon(rel,{loc:rel.loc||S.loc})});
      rel.rel='companion';msg=name+" joins you!";log(name+' is now your companion.','q');break;
    case 'propose':
      if(R()<(rel.aff/100)){
        S.spouse={name,aff:rel.aff,male:rel.male};rel.rel='spouse';
        msg=name+" says yes!";log('Married '+name+'!','q');
      }else{msg="They're not ready.";affChange=-5}break;
  }
  rel.aff=Math.max(0,Math.min(100,rel.aff+(affChange>0?affChange+Math.floor((S.charmPerk||0)/5):affChange)));
  if(affChange>0&&rel.rel==='stranger')rel.rel='acquaintance';
  if(rel.aff>=30&&rel.rel==='acquaintance')rel.rel='friend';
  if(rel.aff>=60&&rel.rel==='friend')rel.rel='close friend';
  log(msg,'e');save();
  closeDlg();
  if(msg)notify(msg);
  upAll();
}

function sideTaskActive(boardId){return (S.quests||[]).find(q=>!q.done&&q.sideBoard===boardId)||null}
function sideTaskProgress(q){
  if(!q||q.t!=='side_kill')return 0;
  return (q.targets||[]).reduce((sum,id)=>sum+Math.max(0,(S.kills[id]||0)-((q.ks||{})[id]||0)),0);
}
function sideTaskText(q){
  const n=Math.min(q.need||1,sideTaskProgress(q));
  const names=(q.targets||[]).map(id=>ENEMIES[id]?.n||id).join(', ');

  return q.progText;
}
function sideTaskCheck(q,lines){
  if(!q||q.done||q.t!=='side_kill')return false;

  q.done=true;
  S.xp+=grantXP(q.rx||0);S.caps+=(q.rg||0);S.capsEarned=(S.capsEarned||0)+(q.rg||0);S.questsComplete=(S.questsComplete||0)+1;

  return true;

function openSideTaskBoard(boardId){
  const b=SIDE_TASK_BOARDS[boardId];if(!b)return;
  let h=`<div style="text-align:center;font-size:38px;margin-bottom:6px">${b.icon}</div><div style="font-size:15px;font-weight:bold;color:var(--amber);text-align:center;margin-bottom:6px">${b.title}</div>`;
  h+=`<div style="font-size:11px;color:var(--muted);line-height:1.45;margin-bottom:10px;text-align:center">${b.intro}</div>`;
  const active=sideTaskActive(boardId);
  if(active){
    h+=`<div class="cd" style="border-color:var(--amber2)"><div style="font-size:12px;color:var(--amber);font-weight:bold">Active: ${active.name}</div><div style="font-size:11px;color:var(--muted);margin-top:4px">${active.desc}</div><div style="font-size:11px;color:var(--green);margin-top:6px">${sideTaskText(active)}</div><div style="font-size:10px;color:var(--muted);margin-top:4px">Area: ${active.where||'field assignment'}</div></div>`;
  }else{
    h+=`<div style="font-size:10px;color:var(--amber);letter-spacing:1px;text-transform:uppercase;margin:8px 0 4px">Available Side Tasks</div>`;
    b.tasks.forEach((t,i)=>{
      const names=(t.targets||[]).map(id=>ENEMIES[id]?.n||id).join(', ');
      h+=`<button class="bt pip" onclick="acceptSideTask('${boardId}',${i})"><b>${t.name}</b><br><span style="font-size:10px;color:var(--muted)">${t.desc}<br>Targets: ${names} · Area: ${t.where}</span></button>`;
    });
  }
  h+='<button class="bt dn" onclick="closeDlg()">Close board</button>';
  openDlg(h);
}

function novacFindQuest(id){return (S.quests||[]).find(q=>q.id===id)||null}
function booneQuest(){return novacFindQuest('novac_one_for_my_baby')}
function booneQuestActive(){const q=booneQuest();return !!(q&&!q.done)}
function booneQuestDone(){const q=booneQuest();return !!(q&&q.done)}
function novacRefreshState(){
  const q=booneQuest();if(!q||q.done)return;
  if(hasFlag('boone_culprit_exposed')){
    q.progText='Return to Boone at the dinosaur mouth.';
  }else if(hasFlag('boone_bill_found')){
    q.progText='Show Boone the Bill of Sale or confront Jeannie May at the Dino Dee-lite Motel.';
  }else{
    q.progText='Search the Dino Dee-lite Motel office records for proof about Carla Boone.';
  }
}
function startBooneQuest(){
  if(booneQuestDone()){closeDlg();showResult('Boone','🔭',['Boone has nothing more to say about Carla.','The matter is finished.'],'Continue','upAll()');return}
  if(booneQuestActive()){closeDlg();showResult('One for My Baby','📜',[booneQuest().progText||'Keep investigating Novac.'],'Continue','upAll()');return}
  S.quests.push({id:'novac_one_for_my_baby',name:'One for My Baby',desc:'Craig Boone wants proof of who betrayed his wife Carla in Novac.',t:'custom',progText:'Search the Dino Dee-lite Motel office records for proof about Carla Boone.',rg:80,rx:65,giver:'Craig Boone',done:false});
  log('Accepted: One for My Baby','q');
  closeDlg();showResult('New Quest!','📜',['<b>One for My Baby</b>','Boone asks you to quietly find proof of who betrayed Carla.','Start at the Dino Dee-lite Motel office.'],'Continue','upAll()');
}
function findBooneBill(){
  const q=booneQuest();
  if(!q||q.done){notify('No reason to dig through those records yet.');return}
  if(hasFlag('boone_bill_found')){notify('You already found the bill of sale.');return}
  setFlag('boone_bill_found');
  giveItem('boone_bill_of_sale',1,{ignoreLimit:true});
  q.progText='Show Boone the Bill of Sale or confront Jeannie May at the Dino Dee-lite Motel.';
  advanceTime(1);
  log('Found the Bill of Sale implicating Jeannie May Crawford.','q');
  closeBld();showResult('Bill of Sale Found','📄',['You find a locked-away sale record naming Carla Boone.','Jeannie May Crawford signed the deal.','📄 Bill of Sale added','⏰ 1 hour passed'],'Continue','upAll()');
}
function confrontJeannieMay(){
  const q=booneQuest();
  if(!q||q.done){closeDlg();showResult('Jeannie May Crawford','🏨',['Jeannie keeps her smile polished and her answers careful.'],'Continue','upAll()');return}
  if(!hasFlag('boone_bill_found')){closeDlg();showResult('No Proof','📄',['You suspect something is wrong, but you need hard evidence first.','Search the motel office records.'],'Continue','upAll()');return}
  setFlag('boone_culprit_exposed');
  q.progText='Return to Boone at the dinosaur mouth.';
  log('You confront Jeannie May with the Bill of Sale.','q');
  closeDlg();showResult('Jeannie Exposed','🏨',['Jeannie May loses the smile when you show her the Bill of Sale.','She knows Boone will believe the evidence.','Return to Boone at the dinosaur mouth.'],'Continue','upAll()');
}
function finishBooneQuest(){
  const q=booneQuest();
  if(!q||q.done){closeDlg();showResult('Boone','🔭',['Boone keeps watching the highway.'],'Continue','upAll()');return}
  if(!hasFlag('boone_bill_found')){closeDlg();showResult('Boone','🔭',['Boone needs proof, not guesses.','Search the motel office records.'],'Continue','upAll()');return}
  const idx=S.inv.indexOf('boone_bill_of_sale');if(idx!==-1)S.inv.splice(idx,1);
  setFlag('boone_culprit_exposed');setFlag('boone_quest_done');
  completeQuest(q);
  giveItem('boones_beret',1,{ignoreLimit:true});
  giveItem('boones_varmint_rifle',1,{ignoreLimit:true});
  log('Boone gives you his 1st Recon beret and scoped varmint rifle.','q');
  closeDlg();showResult('One for My Baby Complete','🎖',['Boone reads the Bill of Sale in silence.','He gives you his old 1st Recon beret and a scoped rifle.','🎖 1st Recon Beret','🔭 Boone\'s Scoped Varmint Rifle','💰 +80 caps','⭐ +65 XP'],'Continue','upAll()');
}

function heliosNamedNpcRel(id){return S.relationships.find(r=>r.name===HELIOS_NPCS[id].name)}
function addHeliosNpcCard(body,id){
  const npc=HELIOS_NPCS[id];if(!npc)return;
  const ex=heliosNamedNpcRel(id);
  const nc=el('div','bn');nc.style.cursor='pointer';
  nc.innerHTML=`<div style="font-size:28px">${renderIcon(inferNpcIcon(npc),28)}</div><div style="flex:1"><div style="font-weight:bold;font-size:12px">${npc.name}</div><div style="font-size:12px;color:var(--muted)">${npc.role}${ex?' · '+ex.rel:''}</div><div style="font-size:10px;color:var(--muted);margin-top:2px;font-style:italic">${npc.line}</div></div><div style="color:var(--muted)">›</div>`;
  nc.onclick=()=>openHeliosNPC(id);
  body.appendChild(nc);
}
function queueHeliosQuest(id,prefix,capBonus=18,xpBonus=12){
  const npc=HELIOS_NPCS[id];if(!npc)return;
  const q=mkQuest(npc.name);q.rg+=capBonus;q.rx+=xpBonus;q.name=prefix+': '+q.name;
  window._pendingQuest=q;closeDlg();showResult('New Quest!','📜',[`<b>${q.name}</b>`,q.desc,`💰 ${q.rg} caps · ⭐ ${q.rx} XP`],'Accept','acceptPendingQuest()');
}
function openHeliosNPC(id){

  <div class="npc-line">"${npc.line}"</div>`;
  if(id==='lt_haggerty'){
    h+=`<button class="bt" onclick="closeDlg();showResult('Lieutenant Haggerty','🪖',['Haggerty wants HELIOS One secured, the NCR supplied, and every civilian kept out of the way unless they can be useful.'],'Continue','upAll()')">🪖 Ask about the NCR mission</button>`;

function gsSaloonOddJob(){
  const jobs=[
    {n:'run water jugs from the source',loot:['purified_water','sunset_sars'],caps:[6,14],xp:[6,10]},
    {n:'break down gecko hides for traders',loot:['gecko_hide','duct_tape'],caps:[8,16],xp:[7,12]},
    {n:'sweep the saloon and listen for road gossip',loot:['pre_war_money','fancy_lad'],caps:[5,12],xp:[5,9]},
    {n:'sort scrap behind the gas station',loot:['scrap','wrench','duct_tape'],caps:[4,10],xp:[6,11]}
  ];
  const job=rndA(jobs);
  const caps=rnd(job.caps[0],job.caps[1]);
  const xp=rnd(job.xp[0],job.xp[1]);
  const pick=rndA(job.loot);
  S.caps+=caps;S.xp+=xp;S.rep.Goodsprings=(S.rep.Goodsprings||0)+1;
  giveItem(pick,1,{silent:true});advanceTime(1);
  log('Goodsprings odd job: '+job.n+'.','e');
  closeBld();showResult('Goodsprings Odd Job','🛠',[job.n,`💰 +${caps} caps`,`⭐ +${xp} XP`,`🏘 Goodsprings standing +1`,`${ITEMS[pick].e} ${ITEMS[pick].n}`,'⏰ 1 hour passed'],'Continue','chkLU();upAll()');
}

function openGoodspringsCaravanTrade(){

function gsCaravanRumor(){

function gsCaravanUnload(){
  advanceTime(2);

  if(bonus)giveItem(bonus);
  S.rep.Goodsprings=(S.rep.Goodsprings||0)+1;
  log('Helped unload a caravan at Goodsprings.','q');
  const lines=[`💰 +${pay} caps`,'📍 Goodsprings reputation +1','⏰ 2 hours passed'];

}

const TRADE_CATS={
  all:  {label:'All',     filter:()=>true},
  weap: {label:'Weapons', filter:it=>it.t==='w'},
  armor:{label:'Armor',   filter:it=>it.t==='a'},
  ammo: {label:'Ammo',    filter:it=>it.t==='ammo'},
  aid:  {label:'Aid',     filter:it=>it.t==='c'},
  misc: {label:'Misc',    filter:it=>it.t==='m'},
};
let _tradeState={mode:'buy',shopId:null,merchantName:'',stock:{},selId:null,qty:1,cat:'all'};

// Shop stock: {itemId: qty, ...}. Stored in S.shopStock[shopId] as {items:{id:qty}, lastRestock:day}
function getShopStock(shopId,defaultItems){
  if(!S.shopStock)S.shopStock={};
  const ss=S.shopStock[shopId];
  // Restock every 3 days or on first visit
  if(!ss||!ss.items||(S.days-ss.lastRestock)>=3){
    const items={};
    defaultItems.forEach(entry=>{
      if(typeof entry==='string'){items[entry]=(items[entry]||0)+1}
      else{items[entry.id]=(items[entry.id]||0)+(entry.qty||1)}
    });
    S.shopStock[shopId]={items,lastRestock:S.days};
    save();
    return S.shopStock[shopId].items;
  }
  return ss.items;
}
function shopBuy(shopId,itemId,count){
  if(!S.shopStock||!S.shopStock[shopId])return;
  const items=S.shopStock[shopId].items;
  if(items[itemId]!==undefined){
    items[itemId]=Math.max(0,items[itemId]-count);
    if(items[itemId]<=0)delete items[itemId];
  }
}

function _tradeGetMerchantName(bId){
  if(bId.includes('khan'))return 'Khan Trader';
  if(bId.includes('armory'))return 'Brotherhood Quartermaster';
  if(bId.includes('bos'))return 'Brotherhood Stock';
  if(bId.includes('legion'))return 'Legion Trader';
  if(bId.includes('med')||bId.includes('clinic'))return 'Medical Supplies';
  if(bId.includes('ralph'))return "Mick & Ralph's";
  if(bId.includes('silver_rush'))return 'Silver Rush';
  if(bId.includes('supply'))return 'General Supplies';
  if(bId.includes('general_store'))return "Chet's Store";
  if(bId.includes('express'))return 'Mojave Express';
  if(bId.includes('dino'))return 'Dino Bite Shop';
  return 'Merchant';
}

function barterBuyPrice(baseP){
  const cha=S.special?S.special[3]:5;
  return Math.max(1,Math.round(baseP*Math.max(0.6,1-(cha*.015)-(S.barterPerk||0)/100)));
}
function barterSellPrice(baseP){
  const cha=S.special?S.special[3]:5;
  return Math.max(1,Math.floor(baseP*Math.min(0.7,0.42+(cha*.012)+(S.barterPerk||0)/200)));
}

function openTrade(stockDef,shopId,merchantName){
  closeDlg();
  const stock=getShopStock(shopId||'_tmp_'+Date.now(),stockDef);
  _tradeState={mode:'buy',shopId:shopId||null,merchantName:merchantName||'Merchant',
    stock:stock,selId:null,qty:1,cat:'all'};
  $('TRADE-TITLE').textContent=(merchantName||'Trade').toUpperCase();
  $('TRADE').classList.add('A');
  $('TRADE-TAB-BUY').classList.add('active');
  $('TRADE-TAB-SELL').classList.remove('active');
  const tb=$('TRADE-BODY');if(tb)tb.scrollTop=0;
  try{window.scrollTo(0,0)}catch(e){}
  tradeRender();
}
function closeTrade(){
  const tr=$('TRADE');if(tr)tr.classList.remove('A');
  _tradeState.selId=null;
  _tradeState.qty=1;
  const tb=$('TRADE-BODY');if(tb)tb.scrollTop=0;
  if(_tradeState.shopId)openBld(_tradeState.shopId);
  else upAll();
}
function tradeSetTab(mode){
  _tradeState.mode=mode;_tradeState.selId=null;_tradeState.qty=1;_tradeState.cat='all';
  $('TRADE-TAB-BUY').classList.toggle('active',mode==='buy');
  $('TRADE-TAB-SELL').classList.toggle('active',mode==='sell');
  tradeRender();
}
function tradeCat(cat){
  _tradeState.cat=cat;_tradeState.selId=null;_tradeState.qty=1;
  tradeRenderCats();tradeRenderItems();tradeRenderFooter();
}
function tradeSelect(id){
  _tradeState.selId=(_tradeState.selId===id)?null:id;
  _tradeState.qty=1;
  tradeRenderItems();tradeRenderFooter();
}
function tradeQty(delta){
  const st=_tradeState;if(!st.selId)return;
  const it=ITEMS[st.selId];if(!it)return;
  let cap;
  if(st.mode==='buy'){
    const afford=Math.floor((S.caps||0)/barterBuyPrice(it.p));
    const inStock=st.stock[st.selId]||0;
    cap=Math.min(afford,inStock);
  } else {
    cap=S.inv.filter(x=>x===st.selId).length;
  }
  st.qty=Math.max(1,Math.min(Math.max(cap,1),(st.qty||1)+delta));
  tradeRenderFooter();
}
function tradeQtyMax(){
  const st=_tradeState;if(!st.selId)return;
  const it=ITEMS[st.selId];if(!it)return;
  let cap;
  if(st.mode==='buy'){
    const afford=Math.floor((S.caps||0)/barterBuyPrice(it.p));
    const inStock=st.stock[st.selId]||0;
    cap=Math.min(afford,inStock);
  } else {
    cap=S.inv.filter(x=>x===st.selId).length;
  }
  st.qty=Math.max(1,cap);
  tradeRenderFooter();
}
function tradeExecute(){
  const st=_tradeState;if(!st.selId||!st.qty)return;
  const it=ITEMS[st.selId];if(!it)return;
  if(st.mode==='buy'){
    const unit=barterBuyPrice(it.p);
    const total=unit*st.qty;
    const inStock=st.stock[st.selId]||0;
    const buyQty=Math.min(st.qty,inStock);
    if(!buyQty){notify('Out of stock.');return}
    if((S.caps||0)<unit*buyQty){notify('Not enough caps.');return}
    S.caps-=unit*buyQty;
    let got=0;
    for(let i=0;i<buyQty;i++){if(giveItem(st.selId))got++;else{S.caps+=unit*(buyQty-i);break}}
    if(got>0){
      shopBuy(st.shopId,st.selId,got);
      st.stock=S.shopStock[st.shopId]?.items||st.stock;
      log('Bought '+got+'× '+it.n+' ('+unit*got+' caps).','n');
    }
    notify('⬇ '+it.n+' ×'+got);
  } else {
    const unit=barterSellPrice(it.p);
    const have=S.inv.filter(x=>x===st.selId).length;
    const n=Math.min(st.qty,have);
    if(!n){notify('Not in inventory.');return}
    for(let i=0;i<n;i++){const ix=S.inv.indexOf(st.selId);if(ix!==-1)S.inv.splice(ix,1)}
    const total=unit*n;S.caps+=total;S.capsEarned=(S.capsEarned||0)+total;
    log('Sold '+n+'× '+it.n+' ('+total+' caps).','n');
    notify('⬆ '+it.n+' ×'+n+' +'+total+'c');
  }
  st.qty=1;save();
  tradeRenderCaps();tradeRenderCats();tradeRenderItems();tradeRenderFooter();upSB();
}
function tradeRender(){
  tradeRenderCaps();tradeRenderCats();tradeRenderItems();tradeRenderFooter();
}
function tradeRenderCaps(){
  $('TRADE-CAPS').textContent='💰 '+S.caps+' caps  ·  🎒 '+S.inv.length+' items';
}
function tradeRenderCats(){
  const cats=$('TRADE-CATS');cats.innerHTML='';
  const st=_tradeState;
  const src=st.mode==='buy'
    ?Object.keys(st.stock).map(id=>ITEMS[id]).filter(Boolean)
    :[...new Set(S.inv)].map(id=>ITEMS[id]).filter(Boolean);
  Object.entries(TRADE_CATS).forEach(([key,cfg])=>{
    const n=src.filter(cfg.filter).length;
    if(n===0&&key!=='all')return;
    const b=document.createElement('button');
    b.textContent=cfg.label+(key!=='all'?' ('+n+')':'');
    if(st.cat===key)b.classList.add('active');
    b.onclick=()=>tradeCat(key);
    cats.appendChild(b);
  });
}
function tradeRenderItems(){
  const body=$('TRADE-BODY');body.innerHTML='';
  const st=_tradeState;
  const cf=TRADE_CATS[st.cat]?.filter||TRADE_CATS.all.filter;
  if(st.mode==='buy'){
    const rows=Object.entries(st.stock)
      .map(([id,qty])=>({id,it:ITEMS[id],qty}))
      .filter(x=>x.it&&x.qty>0&&cf(x.it))
      .sort((a,b)=>a.it.p-b.it.p);
    if(!rows.length){body.innerHTML='<div style="padding:20px;text-align:center;font-size:11px;color:var(--muted)">Nothing in stock.</div>';return}
    rows.forEach(({id,it,qty})=>{
      const price=barterBuyPrice(it.p);
      const canAfford=(S.caps||0)>=price;
      const sel=st.selId===id;
      const row=document.createElement('div');
      row.className='tr-item'+(sel?' selected':'');
      row.innerHTML=`<div class="tr-icon">${renderIcon(it.e,96)}</div>
        <div style="flex:1;min-width:0;line-height:1.3">
          <div style="font-size:16px;font-weight:bold;color:${canAfford?'var(--text)':'var(--muted)'}">${it.n}</div>
          <div style="font-size:12px;color:var(--muted)">${_tradeDesc(it)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:6px">
          <div style="font-size:16px;font-weight:bold;color:${canAfford?'var(--amber)':'var(--red)'}">${price}c</div>
          <div style="font-size:10px;color:${qty<=2?'var(--red)':'var(--muted)'}">×${qty} in stock</div>
        </div>`;
      row.onclick=()=>tradeSelect(id);
      body.appendChild(row);
    });
  } else {
    const counts={};S.inv.forEach(id=>{counts[id]=(counts[id]||0)+1});
    const rows=Object.entries(counts)
      .map(([id,cnt])=>({id,it:ITEMS[id],cnt}))
      .filter(x=>x.it&&cf(x.it))
      .sort((a,b)=>b.it.p-a.it.p);
    if(!rows.length){body.innerHTML='<div style="padding:20px;text-align:center;font-size:11px;color:var(--muted)">Nothing to sell.</div>';return}
    rows.forEach(({id,it,cnt})=>{
      const price=barterSellPrice(it.p);
      const sel=st.selId===id;
      const row=document.createElement('div');
      row.className='tr-item'+(sel?' selected':'');
      row.innerHTML=`<div class="tr-icon">${renderIcon(it.e,96)}</div>
        <div style="flex:1;min-width:0;line-height:1.3">
          <div style="font-size:16px;font-weight:bold;color:var(--text)">${it.n}</div>
          <div style="font-size:12px;color:var(--muted)">${_tradeDesc(it)}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:6px">
          <div style="font-size:16px;font-weight:bold;color:var(--amber2)">${price}c</div>
          <div style="font-size:12px;color:var(--muted)">×${cnt}</div>
        </div>`;
      row.onclick=()=>tradeSelect(id);
      body.appendChild(row);
    });
  }
}
function _tradeDesc(it){
  if(it.t==='w'){const ammoN=it.ammo?ITEMS[it.ammo]?.n||'Ammo':'';return 'ATK +'+it.a+(ammoN?' · '+ammoN:'');}
  if(it.t==='a')return 'DEF +'+it.d+' · '+(it.slot==='head'?'Head':'Body');
  if(it.t==='c')return it.hp?'+'+it.hp+' HP'+(it.desc?' · '+it.desc:''):it.desc||'Consumable';
  if(it.t==='ammo')return 'Ammunition';
  return it.desc||it.t||'';
}
function tradeRenderFooter(){
  const st=_tradeState;
  const qw=$('TRADE-QTY-WRAP'),info=$('TRADE-SEL-INFO');
  tradeRenderCaps();
  if(!st.selId){
    qw.style.display='none';info.style.display='';
    info.textContent='Tap an item to select it';
    return;
  }
  const it=ITEMS[st.selId];if(!it){qw.style.display='none';return}
  qw.style.display='flex';qw.style.flexDirection='column';
  info.style.display='none';
  $('TRADE-SEL-NAME').textContent=it.n;
  const unit=st.mode==='buy'?barterBuyPrice(it.p):barterSellPrice(it.p);
  const inInv=S.inv.filter(x=>x===st.selId).length;
  $('TRADE-SEL-PRICE').textContent=(st.mode==='buy'?'Cost: '+unit+'c · Owned: '+inInv:'Value: '+unit+'c · Have: '+inInv);
  // Clamp qty
  const maxQ=st.mode==='buy'?Math.max(1,Math.floor((S.caps||0)/unit)):Math.max(1,inInv);
  if((st.qty||1)>maxQ)st.qty=maxQ;
  $('TRADE-QTY-NUM').textContent=st.qty||1;
  $('TRADE-TOTAL').textContent=((st.qty||1)*unit)+'c';
  const btn=$('TRADE-DO-BTN');
  const qty=st.qty||1;
  btn.textContent=(st.mode==='buy'?'BUY':'SELL')+' ×'+qty+' — '+qty*unit+'c';
  btn.className='tr-confirm'+(st.mode==='sell'?' sell':'');
  const ok=st.mode==='buy'?(S.caps||0)>=unit:inInv>0;
  btn.disabled=!ok;
}

  const cost=30-Math.floor((S.special?S.special[3]:5)*2);
  const healBtn=el('button','bt go',`💉 Full heal — ${cost} caps`);
  healBtn.onclick=()=>{if(S.caps<cost){notify("Not enough caps.");return}S.caps-=cost;S.hp=S.maxHp;S.ap=S.maxAp;log('Fully healed.','e');closeBld();showResult('Healed','💉',['❤ Full HP restored','⚡ AP restored'],'Continue','upAll()')};
  body.appendChild(healBtn);

  // Buy medical supplies
  body.appendChild(el('div','bs2','Supplies'));
  [{id:'stimpak'},{id:'super_stimpak'},{id:'antivenom'},{id:'med_x'}].forEach(si=>{
    const it=ITEMS[si.id];if(!it)return;
    const sb=el('button','bt',`${it.e} ${it.n} — ${it.p} caps`);
    sb.onclick=()=>{if(S.caps<it.p){notify("Not enough.");return}S.caps-=it.p;const added=giveItem(si.id);if(!added){S.caps+=it.p;return}notify('Bought '+it.n)};
    body.appendChild(sb);
  });
}
function bldRest(body,bId){
  body.appendChild(el('div','bs2','Rest'));
  const ownsProp=S.properties.find(p=>p.loc===S.loc);
  const cost=ownsProp?0:25;
  const rb=el('button','bt go',`🛏 Rest (8 hours) — ${cost?cost+' caps':'FREE'}`);
  rb.onclick=()=>{if(cost&&S.caps<cost){notify("Not enough.");return}S.caps-=cost;S.hp=S.maxHp;S.ap=S.maxAp;S.days++;S.hours=8;
  payDaily();log('Rested. New day.','e');closeBld();showResult('Rested','🛏',['❤ Full HP/AP','📅 Day '+S.days],'Continue','upAll()')};
  body.appendChild(rb);

  const nb=el('button','bt',`🛏 Nap (4 hours) — ${Math.floor(cost/2)?Math.floor(cost/2)+' caps':'FREE'}`);
  nb.onclick=()=>{const c=Math.floor(cost/2);if(c&&S.caps<c){notify("Not enough.");return}S.caps-=c;
  S.hp=Math.min(S.maxHp,S.hp+Math.floor(S.maxHp*.5));S.ap=S.maxAp;advanceTime(4);
  log('Took a nap.','e');closeBld();showResult('Napped','😴',['❤ +50% HP','⚡ AP restored'],'Continue','upAll()')};
  body.appendChild(nb);
}
function bldCasino(body,bId){
  body.appendChild(el('div','bs2','Gambling'));
  [10,25,50,100].forEach(bet=>{
    const gb=el('button','bt',`🎰 Bet ${bet} caps`);
    gb.onclick=()=>{if(S.caps<bet){notify("Not enough.");return}
    const luck=S.special?S.special[6]:5;
    const win=R()<(.35+luck*.03);
    if(win){const w=Math.floor(bet*(1.5+luck*.1));S.caps+=w-bet;log('Won '+w+' caps gambling!','e');closeBld();showResult('Winner!','🎰',['💰 +'+w+' caps','Lady Luck smiles.'],'Continue','upAll()')}
    else{S.caps-=bet;log('Lost '+bet+' caps gambling.','e');closeBld();showResult('Bust','💸',['💰 -'+bet+' caps','The house always wins... usually.'],'Continue','upAll()')}};
    body.appendChild(gb);
  });

  body.appendChild(el('div','bs2','Services'));
  const drinkBtn=el('button','bt','🍸 Drink (5 caps) — +5 HP');
  drinkBtn.onclick=()=>{if(S.caps<5){notify("Not enough.");return}S.caps-=5;S.hp=Math.min(S.maxHp,S.hp+5);log('Had a drink.','e');openBld(bId)};
  body.appendChild(drinkBtn);
}

function countMat(id){return S.inv?S.inv.filter(x=>x===id).length:0}

function canCraft(recipe,advanced){
  if(recipe.advanced&&!advanced)return false;
  return recipe.mats.every(m=>countMat(m.id)>=m.qty);
}

function doCraft(recipeId,bId){
  const recipe=RECIPES.find(r=>r.id===recipeId);if(!recipe)return;
  const hasWorkbench=S.properties.some(p=>p.id==='goodsprings_workshop');
  if(!canCraft(recipe,hasWorkbench)){notify('Missing materials.');return}
  // Remove mats
  recipe.mats.forEach(m=>{
    let removed=0;
    for(let i=S.inv.length-1;i>=0&&removed<m.qty;i--){
      if(S.inv[i]===m.id){S.inv.splice(i,1);removed++;}
    }
  });
  // Give output
  for(let i=0;i<recipe.qty;i++) giveItem(recipe.out,1,{ignoreLimit:false,silent:false});
  const out=ITEMS[recipe.out];
  const label=recipe.qty>1?`${out.e} ${out.n} ×${recipe.qty}`:`${out.e} ${out.n}`;
  log(`Crafted: ${out.n}${recipe.qty>1?' ×'+recipe.qty:''}.`,'e');
  advanceTime(1);
  save();
  // Re-render the building
  closeBld();
  showResult('Crafted!','🔧',[label,'⏰ 1 hour passed'],'Continue','openBld("'+bId+'")');
}

function bldWorkshop(body,bId){
  const hasWorkbench=S.properties.some(p=>p.id==='goodsprings_workshop');

  body.appendChild(el('div','bs2','Craft'));
  body.appendChild(el('div','cd',`<div style="font-size:11px;color:var(--muted)">Use materials from your inventory to craft items.${hasWorkbench?'':' <span style="color:var(--amber2)">Own the Goodsprings Workshop to unlock Advanced recipes.</span>'}</div>`));

  const cats=[...new Set(RECIPES.map(r=>r.cat))];
  cats.forEach(cat=>{
    const inCat=RECIPES.filter(r=>r.cat===cat);
    // Hide Advanced if no workbench and all locked
    if(cat==='Advanced'&&!hasWorkbench)return;
    body.appendChild(el('div','bs2 fade-in',cat));
    inCat.forEach(recipe=>{
      if(recipe.advanced&&!hasWorkbench)return;
      const out=ITEMS[recipe.out];if(!out)return;
      const canDo=canCraft(recipe,hasWorkbench);
      const card=el('div','craft-card');
      const matHtml=recipe.mats.map(m=>{
        const have=countMat(m.id);
        const ok=have>=m.qty;
        const mat=ITEMS[m.id];
        return `<span class="craft-mat ${ok?'ok':'missing'}">${mat?mat.e:'?'} ${mat?mat.n:m.id} ${have}/${m.qty}</span>`;
      }).join(' ');
      card.innerHTML=`<div class="craft-row" style="margin-bottom:5px">
        <span class="craft-out-icon">${renderIcon(out.e,24)}</span>
        <div style="flex:1"><div style="font-size:12px;font-weight:bold;color:${canDo?'var(--green)':'var(--text)'}">${out.n}${recipe.qty>1?' ×'+recipe.qty:''}</div>
        <div style="font-size:12px;color:var(--muted)">${recipe.desc}</div></div>
      </div>
      <div style="margin-bottom:6px">${matHtml}</div>`;
      const btn=el('button',canDo?'bt go':'bt',canDo?'🔧 Craft':'🔒 Missing materials');
      btn.disabled=!canDo;
      btn.onclick=()=>doCraft(recipe.id,bId);
      card.appendChild(btn);
      body.appendChild(card);
    });
  });

  // Old repair still useful
  body.appendChild(el('div','bs2','Repair'));
  const repairBtn=el('button','bt','🔧 Repair gear (10 caps + Scrap Metal) → +1 ATK');
  repairBtn.onclick=()=>{if(S.caps<10){notify("Not enough caps.");return}
  const si=S.inv.indexOf('scrap');if(si===-1){notify("Need Scrap Metal.");return}
  S.caps-=10;S.inv.splice(si,1);S.atk+=1;advanceTime(1);log('Repaired gear. +1 ATK.','e');
  closeBld();showResult('Repaired','🔧',['⚔ +1 ATK','Used Scrap Metal','⏰ 1 hour passed'],'Continue','openBld("'+bId+'")')};
  body.appendChild(repairBtn);
}
